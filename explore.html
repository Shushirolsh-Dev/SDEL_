<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="nav.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #000;
            color: #fff;
            padding-bottom: 85px;
        }
        
        /* Light mode - Fixed properly */
        body.light-mode {
            background-color: #f5f5f5;
            color: #000;
        }
        
        body.light-mode nav,
        body.light-mode .bottom-nav {
            background: rgba(255,255,255,0.98);
            border-color: #e5e5e5;
        }
        
        body.light-mode .post-card {
            background: #fff !important;
            border-bottom-color: #efefef !important;
        }
        
        body.light-mode .post-card .text-zinc-200 {
            color: #1a1a1a !important;
        }
        
        body.light-mode .post-card .text-zinc-500 {
            color: #71717a !important;
        }
        
        body.light-mode .action-btn:active {
            background: rgba(0,0,0,0.05);
        }
        
        body.light-mode .tab-btn {
            color: #000;
        }
        
        body.light-mode .tab-active {
            color: #FF6600;
        }
        
        body.light-mode .mention-link {
            color: #FF6600;
        }
        
        /* Post Card */
        .post-card {
            background: #0a0a0a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: background 0.15s;
            padding: 16px;
        }
        
        /* Like Button */
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: all 0.15s ease;
            background: transparent;
            cursor: pointer;
            min-width: 52px;
        }
        
        .like-btn i {
            width: 20px;
            height: 20px;
            transition: transform 0.12s cubic-bezier(0.34, 1.2, 0.64, 1);
            flex-shrink: 0;
        }
        
        .like-btn:active i {
            transform: scale(1.2);
        }
        
        .like-btn.liked i {
            color: #FF6600;
            fill: #FF6600 !important;
        }
        
        .like-btn span {
            font-size: 13px;
            font-weight: 600;
            min-width: 28px;
            color: #71717a;
        }
        
        .like-btn.liked span {
            color: #FF6600;
        }
        
        /* Action buttons */
        .action-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: background 0.15s;
            cursor: pointer;
            background: transparent;
        }
        
        .action-btn:active {
            background: rgba(255,255,255,0.05);
        }
        
        .action-btn i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: #71717a;
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
            color: #71717a;
        }
        
        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 0;
        }
        
        .tab-btn {
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 12px 24px;
        }
        
        .tab-active {
            color: #FF6600;
            border-bottom: 2px solid #FF6600;
            opacity: 1;
        }
        
        /* Swipe container - NO click triggers */
        .swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            flex: 1;
            scrollbar-width: none;
            cursor: default;
        }
        
        .swipe-container::-webkit-scrollbar {
            display: none;
        }
        
        .swipe-page {
            flex: 0 0 100%;
            scroll-snap-align: start;
            overflow-y: auto;
            height: 100%;
            padding-bottom: 80px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: #111;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            border: 1px solid #222;
        }
        
        body.light-mode .modal-content {
            background: #fff;
            border-color: #e5e5e5;
        }
        
        body.light-mode .modal-content textarea {
            background: #f5f5f5 !important;
            color: #000 !important;
            border-color: #e5e5e5 !important;
        }
        
        body.light-mode .modal-content textarea::placeholder {
            color: #999 !important;
        }
        
        /* Action Sheet */
        .action-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            z-index: 3000;
            padding: 20px;
            border-top: 1px solid #222;
        }
        
        .action-sheet.open {
            transform: translateY(0);
        }
        
        body.light-mode .action-sheet {
            background: #fff;
            border-top-color: #e5e5e5;
        }
        
        /* ========== BOTTOM NAVIGATION ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 15, 12, 0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 140, 60, 0.25);
            padding: 10px 20px 20px;
            z-index: 1000;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #2a1a0e, #1f1408, #2d1c0f);
            background-size: 200% 200%;
            animation: warmBottomShift 12s ease infinite;
            overflow: hidden;
        }

        /* Light Sweep Animation Overlay */
        .light-sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 200, 120, 0.4) 30%,
                rgba(255, 220, 150, 0.6) 50%,
                rgba(255, 200, 120, 0.4) 70%,
                transparent 100%);
            pointer-events: none;
            z-index: 10;
            animation: sweepLight 8s ease-in-out infinite;
        }

        @keyframes sweepLight {
            0% { left: -100%; opacity: 0; }
            10% { opacity: 0.8; }
            30% { left: 120%; opacity: 0.8; }
            31% { opacity: 0; }
            100% { left: 120%; opacity: 0; }
        }

        /* Vibration animation for nav items when light passes */
        @keyframes vibrateFavicon {
            0% { transform: translateX(0px) rotate(0deg); }
            25% { transform: translateX(1.5px) rotate(1deg); }
            50% { transform: translateX(-1.5px) rotate(-1deg); }
            75% { transform: translateX(1px) rotate(0.5deg); }
            100% { transform: translateX(0px) rotate(0deg); }
        }

        .nav-item-bottom.vibrate {
            animation: vibrateFavicon 0.25s ease-in-out 0s 1;
        }

        /* Soft shifting animation for bottom nav background */
        @keyframes warmBottomShift {
            0% {
                background-position: 0% 50%;
                background-color: #2a1a0e;
            }
            50% {
                background-position: 100% 50%;
                background-color: #3d2616;
            }
            100% {
                background-position: 0% 50%;
                background-color: #2a1a0e;
            }
        }

        /* Sunlight mode adjustment for bottom nav */
        .sunlight-mode .bottom-nav {
            background: linear-gradient(135deg, #fff0e6, #ffe6d9, #fff0e6);
            background-size: 200% 200%;
            animation: warmBottomShiftLight 12s ease infinite;
            border-top: 1px solid rgba(255, 102, 0, 0.3);
        }

        @keyframes warmBottomShiftLight {
            0% { background-position: 0% 50%; background-color: #fff0e6; }
            50% { background-position: 100% 50%; background-color: #ffe0d0; }
            100% { background-position: 0% 50%; background-color: #fff0e6; }
        }

        /* Nav container - straight line horizontal layout */
        .nav-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            gap: 4px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 15;
        }

        /* Individual nav item - pure straight line */
        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
            text-decoration: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 0 4px;
            border-radius: 40px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: rgba(255, 200, 160, 0.7);
        }

        /* Nav icon styling - crisp vector-only (no emojis) */
        .nav-item-bottom i {
            font-size: 22px;
            transition: transform 0.2s ease, color 0.2s;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        .nav-item-bottom span {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        /* Active state - warm orange glow */
        .nav-item-bottom.active {
            color: #FF884D;
            transform: translateY(-2px);
        }

        .nav-item-bottom.active i {
            color: #FF884D;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
            transform: scale(1.05);
        }

        .nav-item-bottom.active span {
            color: #FF884D;
            font-weight: 800;
        }

        /* Hover / tap feedback */
        .nav-item-bottom:hover {
            background: rgba(255, 140, 60, 0.15);
            border-radius: 40px;
            transform: translateY(-1px);
        }

        .nav-item-bottom:active {
            transform: scale(0.96);
            transition: 0.05s;
        }

        /* Remove focus outline and keep accessible ring */
        .nav-item-bottom:focus-visible {
            outline: 2px solid #FF884D;
            outline-offset: 2px;
            border-radius: 40px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .nav-item-bottom i { font-size: 20px; }
            .nav-item-bottom span { font-size: 9px; }
            .bottom-nav { padding: 8px 12px 18px; }
        }
        
        /* Utilities */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .mention-link {
            color: #FF6600;
            font-weight: 600;
            text-decoration: none;
        }
        
        /* Typing animation */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

let currentUser = null;

let page = { campus: 0, universe: 0 };

function formatNumber(num) {
    if (!num) return '0';
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return `${seconds}s`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d`;
    return new Date(date).toLocaleDateString();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatContent(text) {
    if (!text) return '';
    let formatted = escapeHtml(text);
    formatted = formatted.replace(/@(\w+)/g, '<span class="mention-link">@$1</span>');
    formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="#" onclick="event.stopPropagation(); safeRedirect(\'$1\')" class="mention-link">$1</a>');
    return formatted;
}

async function getCurrentUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'login.html';
        return null;
    }
    const { data: profile } = await supabase.from('profile').select('*').eq('id', session.user.id).single();
    if (profile?.is_banned) {
        window.location.href = 'banned.html';
        return null;
    }
    return profile;
}

async function loadPosts(mode, reset = false) {
    if (isLoading[mode]) return;
    if (reset) {
        page[mode] = 0;
        if (mode === 'campus') campusPosts = [];
        else universePosts = [];
        hasMore[mode] = true;
    }
    if (!hasMore[mode]) return;
    
    isLoading[mode] = true;
    page[mode]++;
    
    try {
        let query = supabase
            .from('posts')
            .select('*, profile:user_id(username, is_verified, is_official, school_name)')
            .eq('post_type', 'post')
            .order('created_at', { ascending: false })
            .range((page[mode] - 1) * 15, page[mode] * 15 - 1);
        
        if (mode === 'campus' && currentUser?.school_name) {
            query = query.eq('school_name', currentUser.school_name);
        }
        
        if (searchQuery) {
            query = query.ilike('content', `%${searchQuery}%`);
        }
        
        const { data: newPosts, error } = await query;
        
        if (error) throw error;
        
        if (!newPosts || newPosts.length === 0) {
            hasMore[mode] = false;
            isLoading[mode] = false;
            renderFeed(mode);
            return;
        }
        
        if (currentUser) {
            const { data: likes } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'like');
            likedPosts = new Set(likes?.map(l => l.post_id) || []);
            
            const { data: reposts } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'repost');
            repostedPosts = new Set(reposts?.map(r => r.post_id) || []);
        }
        
        if (mode === 'campus') campusPosts = [...campusPosts, ...newPosts];
        else universePosts = [...universePosts, ...newPosts];
        
        renderFeed(mode);
        
    } catch (error) {
        console.error(error);
    }
    
    isLoading[mode] = false;
}

function renderFeed(mode) {
    const container = mode === 'campus' ? campusFeed : universeFeed;
    const postsList = mode === 'campus' ? campusPosts : universePosts;
    
    if (postsList.length === 0 && !isLoading[mode]) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center h-80 px-6 text-center">
                <i data-lucide="inbox" size="48" class="text-zinc-700 mb-3"></i>
                <p class="text-zinc-500 text-sm">No posts yet</p>
                <button onclick="openPostModal()" class="mt-4 px-5 py-2 bg-[#FF6600] text-black rounded-full font-bold text-sm">Create first post</button>
            </div>
        `;
        lucide.createIcons();
        return;
    }
    
    let html = '';
    for (const post of postsList) {
        const profile = post.profile;
        const username = profile?.username || 'anon';
        const isLiked = likedPosts.has(post.id);
        const hasReposted = repostedPosts.has(post.id);
        const isEditable = post.user_id === currentUser?.id && (new Date() - new Date(post.created_at) < 15 * 60 * 1000);
        const editBadge = isEditable ? '<span class="text-zinc-500 text-[10px] ml-2">(editable)</span>' : '';
        
        let badge = '';
        if (profile?.is_official) {
            badge = '<span class="bg-[#FF6600] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        } else if (profile?.is_verified) {
            badge = '<span class="bg-[#1da1f2] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        }
        
        const schoolTag = (mode === 'universe' && post.school_name) ? 
            `<span class="text-[10px] text-zinc-500 ml-2">🏛️ ${escapeHtml(post.school_name)}</span>` : '';
        
        html += `
            <div class="post-card" data-post-id="${post.id}" data-post='${JSON.stringify(post).replace(/'/g, "&#39;")}'
                 oncontextmenu="event.preventDefault()"
                 ondblclick="handleDoubleTap(event, '${post.id}')">
                <div class="flex gap-3">
                    <div onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                         class="w-11 h-11 rounded-full bg-gradient-to-br from-[#FF6600] to-[#FF9940] flex items-center justify-center text-white font-bold text-base cursor-pointer flex-shrink-0">
                        ${username.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center flex-wrap gap-1 mb-1">
                            <span onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                                  class="font-bold text-sm cursor-pointer hover:underline">@${escapeHtml(username)}</span>
                            ${badge}
                            <span class="text-xs text-zinc-500">${timeAgo(post.created_at)}</span>
                            ${schoolTag}
                            ${editBadge}
                        </div>
                        <div class="text-sm text-zinc-200 leading-relaxed break-words">
                            ${formatContent(post.content)}
                        </div>
                        <div class="action-buttons">
                            <button onclick="event.stopPropagation(); handleLike('${post.id}')" 
                                    class="action-btn like-btn ${isLiked ? 'liked' : ''}">
                                <i data-lucide="heart" size="18" ${isLiked ? 'fill="#FF6600"' : ''}></i>
                                <span>${formatNumber(post.likes_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); location.href='gist.html?id=${post.id}'" 
                                    class="action-btn">
                                <i data-lucide="message-circle" size="18"></i>
                                <span>${formatNumber(post.comments_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleRepost('${post.id}', '${username}')" 
                                    class="action-btn ${hasReposted ? 'opacity-50' : ''}">
                                <i data-lucide="repeat" size="18"></i>
                                <span>${formatNumber(post.reposts_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleShare('${post.id}', '${username}')" 
                                    class="action-btn">
                                <i data-lucide="share-2" size="18"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html;
    lucide.createIcons();
    
    if (hasMore[mode] && !isLoading[mode]) {
        const sentinel = document.createElement('div');
        sentinel.className = 'h-12 flex items-center justify-center';
        sentinel.innerHTML = '<div class="w-5 h-5 border-2 border-[#FF6600] border-t-transparent rounded-full animate-spin"></div>';
        container.appendChild(sentinel);
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && hasMore[mode] && !isLoading[mode]) {
                observer.disconnect();
                loadPosts(mode);
            }
        });
        observer.observe(sentinel);
    }
}

async function handleLike(postId) {
    const isLiked = likedPosts.has(postId);
    
    if (isLiked) {
        likedPosts.delete(postId);
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
    } else {
        likedPosts.add(postId);
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
    }
    
    renderFeed('campus');
    renderFeed('universe');
    
    if (isLiked) {
        await supabase.from('interactions').delete().eq('user_id', currentUser.id).eq('post_id', postId).eq('interaction_type', 'like');
        await supabase.rpc('decrement_stat', { post_id: postId, field: 'likes_count' });
    } else {
        await supabase.from('interactions').upsert({ user_id: currentUser.id, post_id: postId, interaction_type: 'like' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'likes_count' });
    }
}

async function handleRepost(postId, username) {
    if (username === currentUser.username) return;
    if (repostedPosts.has(postId)) return;
    
    const originalPost = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (!originalPost) return;
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: `Reposted from @${username}: ${originalPost.content.substring(0, 100)}`,
        school_name: currentUser.school_name || 'Global',
        post_type: 'repost'
    });
    
    if (!error) {
        await supabase.from('interactions').insert({ user_id: currentUser.id, post_id: postId, interaction_type: 'repost' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'reposts_count' });
        repostedPosts.add(postId);
        
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        
        renderFeed('campus');
        renderFeed('universe');
    }
}

async function handleShare(postId, username) {
    const url = `${window.location.origin}/gist.html?id=${postId}`;
    if (navigator.share) {
        try {
            await navigator.share({ title: 'Sdel', text: `@${username}`, url });
        } catch(e) { copyToClipboard(url); }
    } else {
        copyToClipboard(url);
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
}

function safeRedirect(url) {
    window.open(url, '_blank');
}

function openPostModal(editPost = null) {
    const modal = document.getElementById('post-modal');
    const input = document.getElementById('modal-post-input');
    const title = document.getElementById('post-modal-title');
    const btn = document.getElementById('modal-post-btn');
    
    if (editPost) {
        currentEditPostId = editPost.id;
        title.innerText = 'Edit post (15min window)';
        input.value = editPost.content;
        btn.innerText = 'Update';
    } else {
        currentEditPostId = null;
        title.innerText = 'Create post';
        input.value = '';
        btn.innerText = 'Post';
        startTypingAnimation();
    }
    
    modal.style.display = 'flex';
    input.focus();
}

function startTypingAnimation() {
    const textarea = document.getElementById('modal-post-input');
    if (!textarea) return;
    
    let currentText = '';
    let isDeleting = false;
    let currentPhraseIndex = 0;
    
    function typeEffect() {
        const fullText = placeholderMessages[currentPhraseIndex];
        
        if (!isDeleting) {
            currentText = fullText.substring(0, currentText.length + 1);
            textarea.placeholder = currentText;
            
            if (currentText === fullText) {
                isDeleting = true;
                setTimeout(typeEffect, 2000);
                return;
            }
        } else {
            currentText = currentText.substring(0, currentText.length - 1);
            textarea.placeholder = currentText;
            
            if (currentText === '') {
                isDeleting = false;
                currentPhraseIndex = (currentPhraseIndex + 1) % placeholderMessages.length;
                setTimeout(typeEffect, 500);
                return;
            }
        }
        
        setTimeout(typeEffect, isDeleting ? 50 : 100);
    }
    
    typeEffect();
}

function closePostModal() {
    document.getElementById('post-modal').style.display = 'none';
    currentEditPostId = null;
}

async function submitPost() {
    const content = document.getElementById('modal-post-input').value.trim();
    if (!content) return;
    
    if (currentEditPostId) {
        const { error } = await supabase.from('posts').update({ content }).eq('id', currentEditPostId);
        if (!error) {
            closePostModal();
            loadPosts('campus', true);
            loadPosts('universe', true);
        }
        return;
    }
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: content,
        school_name: currentUser.school_name || 'Global',
        post_type: 'post'
    });
    
    if (!error) {
        closePostModal();
        if (currentPageIndex === 0) loadPosts('campus', true);
        else loadPosts('universe', true);
        loadPosts(currentPageIndex === 0 ? 'universe' : 'campus', true);
    }
}

function switchToPage(index) {
    if (index === currentPageIndex) return;
    currentPageIndex = index;
    swipeContainer.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
    
    const campusTab = document.getElementById('tab-campus');
    const universeTab = document.getElementById('tab-universe');
    
    if (index === 0) {
        campusTab.classList.add('tab-active');
        universeTab.classList.remove('tab-active');
        if (campusPosts.length === 0) loadPosts('campus');
    } else {
        universeTab.classList.add('tab-active');
        campusTab.classList.remove('tab-active');
        if (universePosts.length === 0) loadPosts('universe');
    }
}

// Swipe detection - ONLY on horizontal swipe, NO click triggers
swipeContainer.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
    isSwiping = false;
}, { passive: true });

swipeContainer.addEventListener('touchmove', (e) => {
    const diffX = Math.abs(e.changedTouches[0].screenX - touchStartX);
    const diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
    
    // Only consider it a swipe if horizontal movement > vertical
    if (diffX > 10 && diffX > diffY) {
        isSwiping = true;
        e.preventDefault();
    }
}, { passive: false });

swipeContainer.addEventListener('touchend', (e) => {
    if (!isSwiping) {
        touchStartX = 0;
        return;
    }
    
    const diff = e.changedTouches[0].screenX - touchStartX;
    const threshold = 50;
    
    if (Math.abs(diff) > threshold) {
        if (diff > 0 && currentPageIndex > 0) {
            switchToPage(currentPageIndex - 1);
        } else if (diff < 0 && currentPageIndex < 1) {
            switchToPage(currentPageIndex + 1);
        }
    }
    
    touchStartX = 0;
    isSwiping = false;
});

// Double tap for action sheet (replaces long press)
function handleDoubleTap(event, postId) {
    event.stopPropagation();
    const post = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (post) showActionSheet(post);
}

function showActionSheet(post) {
    const sheet = document.getElementById('action-sheet');
    const options = document.getElementById('action-options');
    const isOwner = post.user_id === currentUser?.id;
    const isEditable = isOwner && (new Date() - new Date(post.created_at) < 15 * 60 * 1000);
    
    let html = '';
    if (isOwner) {
        if (isEditable) {
            html += `<button onclick="editPost('${post.id}')" class="w-full py-3 text-center text-[#FF6600] font-semibold text-sm">✏️ Edit post (15min left)</button>`;
        }
        html += `<button onclick="deletePost('${post.id}')" class="w-full py-3 text-center text-red-500 font-semibold text-sm">🗑️ Delete post</button>`;
    } else {
        html += `<button onclick="reportPost('${post.id}')" class="w-full py-3 text-center text-red-500 font-semibold text-sm">🚩 Report</button>`;
    }
    
    options.innerHTML = html;
    sheet.classList.add('open');
}

function closeActionSheet() {
    document.getElementById('action-sheet').classList.remove('open');
}

function editPost(postId) {
    const post = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (post) {
        closeActionSheet();
        openPostModal(post);
    }
}

async function deletePost(postId) {
    const { error } = await supabase.from('posts').delete().eq('id', postId);
    if (!error) {
        closeActionSheet();
        loadPosts('campus', true);
        loadPosts('universe', true);
    }
}

function reportPost(postId) {
    closeActionSheet();
}

function toggleSearch() {
    const bar = document.getElementById('search-bar');
    bar.classList.toggle('hidden');
    if (!bar.classList.contains('hidden')) {
        document.getElementById('search-input').focus();
    } else {
        searchQuery = '';
        loadPosts('campus', true);
        loadPosts('universe', true);
    }
}

function handleSearch(val) {
    searchQuery = val;
    loadPosts('campus', true);
    loadPosts('universe', true);
}

function toggleTheme() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
}

async function init() {
    currentUser = await getCurrentUser();
    if (!currentUser) return;
    
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    
    await loadPosts('campus');
    await loadPosts('universe');
    
    supabase.channel('posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
        loadPosts('campus', true);
        loadPosts('universe', true);
    }).subscribe();
}

// Make global
window.openPostModal = openPostModal;
window.closePostModal = closePostModal;
window.submitPost = submitPost;
window.switchToPage = switchToPage;
window.toggleSearch = toggleSearch;
window.handleSearch = handleSearch;
window.toggleTheme = toggleTheme;
window.handleLike = handleLike;
window.handleRepost = handleRepost;
window.handleShare = handleShare;
window.safeRedirect = safeRedirect;
window.handleDoubleTap = handleDoubleTap;
window.deletePost = deletePost;
window.reportPost = reportPost;
window.closeActionSheet = closeActionSheet;
window.editPost = editPost;

init();
</script>
