<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sdel | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        body.light-mode {
            background-color: #fff;
            color: #000;
        }
        
        body.light-mode .post-card {
            background: #fff;
            border-bottom-color: #efefef;
        }
        
        body.light-mode nav,
        body.light-mode .bottom-nav {
            background: rgba(255,255,255,0.98);
            border-color: #efefef;
        }
        
        /* Post Card - Keep your card style */
        .post-card {
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: background 0.15s;
            cursor: pointer;
            padding: 16px;
        }
        
        .post-card:active {
            background: rgba(255,102,0,0.03);
        }
        
        /* Like Button - FIXED fill */
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: all 0.15s ease;
            background: transparent;
            cursor: pointer;
            min-width: 52px;
        }
        
        .like-btn i {
            width: 20px;
            height: 20px;
            transition: transform 0.12s cubic-bezier(0.34, 1.2, 0.64, 1);
            flex-shrink: 0;
        }
        
        .like-btn:active i {
            transform: scale(1.2);
        }
        
        .like-btn.liked i {
            color: #FF6600;
            fill: #FF6600 !important;
        }
        
        .like-btn span {
            font-size: 13px;
            font-weight: 600;
            min-width: 28px;
            color: #71717a;
        }
        
        .like-btn.liked span {
            color: #FF6600;
        }
        
        /* Action buttons */
        .action-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: background 0.15s;
            cursor: pointer;
            background: transparent;
        }
        
        .action-btn:active {
            background: rgba(255,255,255,0.05);
        }
        
        .action-btn i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: #71717a;
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
            color: #71717a;
        }
        
        /* Tabs with swipe */
        .tabs-container {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            white-space: nowrap;
        }
        
        .tabs-container::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            display: inline-block;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 12px 24px;
            scroll-snap-align: start;
        }
        
        .tab-active {
            color: #FF6600;
            border-bottom: 2px solid #FF6600;
            opacity: 1;
        }
        
        /* Swipe container */
        .swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            height: 100%;
        }
        
        .swipe-page {
            flex: 0 0 100%;
            scroll-snap-align: start;
            overflow-y: auto;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: #111;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            border: 1px solid #222;
        }
        
        body.light-mode .modal-content {
            background: #fff;
            border-color: #e5e5e5;
        }
        
        /* Action Sheet */
        .action-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            z-index: 3000;
            padding: 20px;
            border-top: 1px solid #222;
        }
        
        .action-sheet.open {
            transform: translateY(0);
        }
        
        /* Bottom Nav - YOUR SIZE (preserved) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 50;
        }
        
        .bottom-nav-inner {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: opacity 0.15s;
            padding: 4px 12px;
        }
        
        .bottom-nav-item:active {
            opacity: 0.6;
        }
        
        .center-btn {
            background: #FF6600;
            padding: 12px;
            border-radius: 28px;
            margin-top: -24px;
            box-shadow: 0 4px 12px rgba(255,102,0,0.3);
            transition: transform 0.12s;
            cursor: pointer;
        }
        
        .center-btn:active {
            transform: scale(0.95);
        }
        
        /* Utilities */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .mention-link {
            color: #FF6600;
            font-weight: 600;
            text-decoration: none;
        }
        
        /* Edit indicator */
        .edit-badge {
            font-size: 10px;
            color: #71717a;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="flex flex-col h-screen">
    
    <!-- Header -->
    <nav class="sticky top-0 bg-black/95 backdrop-blur-xl border-b border-white/10 safe-top z-50">
        <div class="px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight">
                sdel<span class="text-[#FF6600]">.</span>
            </h1>
            <div class="flex items-center gap-4">
                <i data-lucide="sun" size="20" onclick="toggleTheme()" style="cursor: pointer;"></i>
                <i data-lucide="search" size="20" onclick="toggleSearch()" style="cursor: pointer;"></i>
                <i data-lucide="bell" size="20" onclick="location.href='messages.html'" style="cursor: pointer;"></i>
            </div>
        </div>
        
        <!-- Search -->
        <div id="search-bar" class="px-4 pb-3 hidden">
            <div class="bg-[#111] rounded-full px-4 py-2 flex items-center gap-3 border border-white/10">
                <i data-lucide="search" size="18" class="text-zinc-500"></i>
                <input type="text" id="search-input" placeholder="Search users..." class="bg-transparent flex-1 outline-none text-sm" oninput="handleSearch(this.value)">
                <i data-lucide="x" size="18" class="text-zinc-500 cursor-pointer" onclick="toggleSearch()"></i>
            </div>
            <div id="search-results" class="mt-2 rounded-xl overflow-hidden hidden bg-[#111] border border-white/10"></div>
        </div>
        
        <!-- Tabs with swipe indicator -->
        <div class="tabs-container text-center">
            <button id="tab-campus" onclick="switchTab('campus')" class="tab-btn tab-active">THE CAMPUS</button>
            <button id="tab-universe" onclick="switchTab('universe')" class="tab-btn">UNIVERSE</button>
        </div>
    </nav>
    
    <!-- Swipeable Feed Container -->
    <div class="swipe-container hide-scrollbar" id="swipe-container" style="flex: 1;">
        <div id="campus-feed" class="swipe-page"></div>
        <div id="universe-feed" class="swipe-page"></div>
    </div>
    
    <!-- Bottom Nav - YOUR SIZE (copy this to other pages) -->
    <div class="bottom-nav">
        <div class="bottom-nav-inner">
            <div class="bottom-nav-item" onclick="location.href='dashboard.html'">
                <i data-lucide="home" size="22" class="text-zinc-500"></i>
            </div>
            <div class="bottom-nav-item" onclick="location.href='explore.html'">
                <i data-lucide="compass" size="22" class="text-[#FF6600]"></i>
            </div>
            <div class="center-btn" onclick="openPostModal()">
                <i data-lucide="plus" size="22" class="text-black" stroke-width="2.5"></i>
            </div>
            <div class="bottom-nav-item" onclick="location.href='market.html'">
                <i data-lucide="shopping-cart" size="22" class="text-zinc-500"></i>
            </div>
            <div class="bottom-nav-item" onclick="location.href='profile.html'">
                <i data-lucide="user" size="22" class="text-zinc-500"></i>
            </div>
        </div>
    </div>
</div>

<!-- Post Modal -->
<div id="post-modal" class="modal-overlay" onclick="closePostModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg" id="post-modal-title">Create post</h3>
            <i data-lucide="x" size="20" onclick="closePostModal()" style="cursor: pointer;"></i>

        <textarea id="modal-post-input" placeholder="What's happening?" class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none resize-none min-h-[120px] text-sm"></textarea>

<!-- Action Sheet -->
<div id="action-sheet" class="action-sheet" onclick="event.stopPropagation()">

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://lgfyrlfjoazedwymjpfc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
);

let currentUser = null;
let currentMode = 'campus';
let campusPosts = [];
let universePosts = [];
let likedPosts = new Set();
let repostedPosts = new Set();
let isLoading = { campus: false, universe: false };
let hasMore = { campus: true, universe: true };
let page = { campus: 0, universe: 0 };
let searchQuery = '';
let pressTimer = null;
let currentEditPostId = null;

const campusFeed = document.getElementById('campus-feed');
const universeFeed = document.getElementById('universe-feed');
const swipeContainer = document.getElementById('swipe-container');

function showToast(msg) {
    // No toast - removed as requested
    console.log(msg);
}

function formatNumber(num) {
    if (!num) return '0';
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return `${seconds}s`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d`;
    return new Date(date).toLocaleDateString();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatContent(text) {
    if (!text) return '';
    let formatted = escapeHtml(text);
    formatted = formatted.replace(/@(\w+)/g, '<span class="mention-link">@$1</span>');
    formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="#" onclick="event.stopPropagation(); safeRedirect(\'$1\')" class="mention-link">$1</a>');
    return formatted;
}

async function getCurrentUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'login.html';
        return null;
    }
    const { data: profile } = await supabase.from('profile').select('*').eq('id', session.user.id).single();
    if (profile?.is_banned) {
        window.location.href = 'banned.html';
        return null;
    }
    return profile;
}

async function loadPosts(mode, reset = false) {
    if (isLoading[mode]) return;
    if (reset) {
        page[mode] = 0;
        if (mode === 'campus') campusPosts = [];
        else universePosts = [];
        hasMore[mode] = true;
    }
    if (!hasMore[mode]) return;
    
    isLoading[mode] = true;
    page[mode]++;
    
    try {
        let query = supabase
            .from('posts')
            .select('*, profile:user_id(username, is_verified, is_official)')
            .eq('post_type', 'post')
            .order('created_at', { ascending: false })
            .range((page[mode] - 1) * 15, page[mode] * 15 - 1);
        
        if (mode === 'campus' && currentUser?.school_name) {
            query = query.eq('school_name', currentUser.school_name);
        }
        
        if (searchQuery) {
            query = query.ilike('content', `%${searchQuery}%`);
        }
        
        const { data: newPosts, error } = await query;
        
        if (error) throw error;
        
        if (!newPosts || newPosts.length === 0) {
            hasMore[mode] = false;
            isLoading[mode] = false;
            renderFeed(mode);
            return;
        }
        
        if (currentUser) {
            const { data: likes } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'like');
            likedPosts = new Set(likes?.map(l => l.post_id) || []);
            
            const { data: reposts } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'repost');
            repostedPosts = new Set(reposts?.map(r => r.post_id) || []);
        }
        
        if (mode === 'campus') campusPosts = [...campusPosts, ...newPosts];
        else universePosts = [...universePosts, ...newPosts];
        
        renderFeed(mode);
        
    } catch (error) {
        console.error(error);
    }
    
    isLoading[mode] = false;
}

function renderFeed(mode) {
    const container = mode === 'campus' ? campusFeed : universeFeed;
    const postsList = mode === 'campus' ? campusPosts : universePosts;
    
    if (postsList.length === 0 && !isLoading[mode]) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center h-80 px-6 text-center">
                <i data-lucide="inbox" size="48" class="text-zinc-700 mb-3"></i>
                <p class="text-zinc-500 text-sm">No posts yet</p>
                <button onclick="openPostModal()" class="mt-4 px-5 py-2 bg-[#FF6600] text-black rounded-full font-bold text-sm">Create first post</button>
            </div>
        `;
        lucide.createIcons();
        return;
    }
    
    let html = '';
    for (const post of postsList) {
        const profile = post.profile;
        const username = profile?.username || 'anon';
        const isLiked = likedPosts.has(post.id);
        const hasReposted = repostedPosts.has(post.id);
        const isEditable = post.user_id === currentUser?.id && (new Date() - new Date(post.created_at) < 15 * 60 * 1000);
        const editBadge = isEditable ? '<span class="edit-badge">(editable)</span>' : '';
        
        let badge = '';
        if (profile?.is_official) {
            badge = '<span class="bg-[#FF6600] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        } else if (profile?.is_verified) {
            badge = '<span class="bg-[#1da1f2] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        }
        
        html += `
            <div class="post-card" data-post-id="${post.id}" data-post='${JSON.stringify(post).replace(/'/g, "&#39;")}'
                 onmousedown="startPress(event, '${post.id}')"
                 onmouseup="endPress()"
                 onmouseleave="endPress()"
                 ontouchstart="startPress(event, '${post.id}')"
                 ontouchend="endPress()">
                <div class="flex gap-3">
                    <div onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                         class="w-11 h-11 rounded-full bg-gradient-to-br from-[#FF6600] to-[#FF9940] flex items-center justify-center text-white font-bold text-base cursor-pointer flex-shrink-0">
                        ${username.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center flex-wrap gap-1 mb-1">
                            <span onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                                  class="font-bold text-sm cursor-pointer hover:underline">@${escapeHtml(username)}</span>
                            ${badge}
                            <span class="text-xs text-zinc-500">${timeAgo(post.created_at)}</span>
                            ${editBadge}
                        </div>
                        <div class="text-sm text-zinc-200 leading-relaxed break-words">
                            ${formatContent(post.content)}
                        </div>
                        <div class="action-buttons">
                            <button onclick="event.stopPropagation(); handleLike('${post.id}')" 
                                    class="action-btn like-btn ${isLiked ? 'liked' : ''}">
                                <i data-lucide="heart" size="18" ${isLiked ? 'fill="#FF6600"' : ''}></i>
                                <span>${formatNumber(post.likes_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); location.href='gist.html?id=${post.id}'" 
                                    class="action-btn">
                                <i data-lucide="message-circle" size="18"></i>
                                <span>${formatNumber(post.comments_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleRepost('${post.id}', '${username}')" 
                                    class="action-btn ${hasReposted ? 'opacity-50' : ''}">
                                <i data-lucide="repeat" size="18"></i>
                                <span>${formatNumber(post.reposts_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleShare('${post.id}', '${username}')" 
                                    class="action-btn">
                                <i data-lucide="share-2" size="18"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html;
    lucide.createIcons();
    
    // Infinite scroll for this feed
    if (hasMore[mode] && !isLoading[mode]) {
        const sentinel = document.createElement('div');
        sentinel.className = 'h-12 flex items-center justify-center';
        sentinel.innerHTML = '<div class="w-5 h-5 border-2 border-[#FF6600] border-t-transparent rounded-full animate-spin"></div>';
        container.appendChild(sentinel);
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && hasMore[mode] && !isLoading[mode]) {
                observer.disconnect();
                loadPosts(mode);
            }
        });
        observer.observe(sentinel);
    }
}

async function handleLike(postId) {
    const isLiked = likedPosts.has(postId);
    
    // Update local state
    if (isLiked) {
        likedPosts.delete(postId);
        // Update count in both feeds
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
    } else {
        likedPosts.add(postId);
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
    }
    
    // Update UI
    renderFeed('campus');
    renderFeed('universe');
    
    // Background API
    if (isLiked) {
        await supabase.from('interactions').delete().eq('user_id', currentUser.id).eq('post_id', postId).eq('interaction_type', 'like');
        await supabase.rpc('decrement_stat', { post_id: postId, field: 'likes_count' });
    } else {
        await supabase.from('interactions').upsert({ user_id: currentUser.id, post_id: postId, interaction_type: 'like' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'likes_count' });
    }
}

async function handleRepost(postId, username) {
    if (username === currentUser.username) {
        alert("Can't repost your own post");
        return;
    }
    
    if (repostedPosts.has(postId)) {
        alert("Already reposted!");
        return;
    }
    
    const originalPost = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (!originalPost) return;
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: `Reposted from @${username}: ${originalPost.content.substring(0, 100)}`,
        school_name: currentUser.school_name || 'Global',
        post_type: 'repost'
    });
    
    if (!error) {
        await supabase.from('interactions').insert({ user_id: currentUser.id, post_id: postId, interaction_type: 'repost' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'reposts_count' });
        repostedPosts.add(postId);
        
        // Update count
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        
        renderFeed('campus');
        renderFeed('universe');
    }
}

async function handleShare(postId, username) {
    const url = `${window.location.origin}/gist.html?id=${postId}`;
    if (navigator.share) {
        try {
            await navigator.share({ title: 'Sdel', text: `@${username}`, url });
        } catch(e) { copyToClipboard(url); }
    } else {
        copyToClipboard(url);
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
}

function safeRedirect(url) {
    window.open(url, '_blank');
}

function openPostModal(editPost = null) {
    const modal = document.getElementById('post-modal');
    const input = document.getElementById('modal-post-input');
    const title = document.getElementById('post-modal-title');
    const btn = document.getElementById('modal-post-btn');
    
    if (editPost) {
        currentEditPostId = editPost.id;
        title.innerText = 'Edit post (15min window)';
        input.value = editPost.content;
        btn.innerText = 'Update';
    } else {
        currentEditPostId = null;
        title.innerText = 'Create post';
        input.value = '';
        btn.innerText = 'Post';
    }
    
    modal.style.display = 'flex';
    input.focus();
}

function closePostModal() {
    document.getElementById('post-modal').style.display = 'none';
    currentEditPostId = null;
}

async function submitPost() {
    const content = document.getElementById('modal-post-input').value.trim();
    if (!content) return;
    
    if (currentEditPostId) {
        const { error } = await supabase.from('posts').update({ content }).eq('id', currentEditPostId);
        if (!error) {
            closePostModal();
            loadPosts('campus', true);
            loadPosts('universe', true);
        }
        return;
    }
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: content,
        school_name: currentUser.school_name || 'Global',
        post_type: 'post'
    });
    
    if (!error) {
        closePostModal();
        loadPosts(currentMode === 'campus' ? 'campus' : 'universe', true);
        if (currentMode === 'campus') loadPosts('universe', true);
        else loadPosts('campus', true);
    }
}

function switchTab(mode) {
    currentMode = mode;
    document.getElementById('tab-campus').classList.toggle('tab-active', mode === 'campus');
    document.getElementById('tab-universe').classList.toggle('tab-active', mode === 'universe');
    
    // Scroll to page
    const index = mode === 'campus' ? 0 : 1;
    swipeContainer.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
    
    // Load if empty
    if (mode === 'campus' && campusPosts.length === 0) loadPosts('campus');
    if (mode === 'universe' && universePosts.length === 0) loadPosts('universe');
}

// Swipe detection
let touchStartX = 0;
let touchEndX = 0;

swipeContainer.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

swipeContainer.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;
    const currentScroll = swipeContainer.scrollLeft;
    const pageWidth = window.innerWidth;
    const currentPage = Math.round(currentScroll / pageWidth);
    
    if (Math.abs(diff) > 50) {
        if (diff > 0 && currentPage > 0) {
            // Swipe right - go to previous
            switchTab(currentPage === 0 ? 'campus' : 'universe');
        } else if (diff < 0 && currentPage < 1) {
            // Swipe left - go to next
            switchTab(currentPage === 0 ? 'universe' : 'campus');
        }
    }
});

function toggleSearch() {
    const bar = document.getElementById('search-bar');
    bar.classList.toggle('hidden');
    if (!bar.classList.contains('hidden')) {
        document.getElementById('search-input').focus();
    } else {
        searchQuery = '';
        loadPosts('campus', true);
        loadPosts('universe', true);
    }
}

function handleSearch(val) {
    searchQuery = val;
    loadPosts('campus', true);
    loadPosts('universe', true);
}

function toggleTheme() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
}

function startPress(event, postId) {
    pressTimer = setTimeout(() => {
        const post = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
        if (post) showActionSheet(post);
    }, 500);
}

function endPress() {
    if (pressTimer) clearTimeout(pressTimer);
}

function showActionSheet(post) {
    const sheet = document.getElementById('action-sheet');
    const options = document.getElementById('action-options');
    const isOwner = post.user_id === currentUser?.id;
    const isEditable = isOwner && (new Date() - new Date(post.created_at) < 15 * 60 * 1000);
    
    let html = '';
    if (isOwner) {
        if (isEditable) {
            html += `<button onclick="editPost('${post.id}')" class="w-full py-3 text-center text-[#FF6600] font-semibold text-sm">Edit post (15min left)</button>`;
        }
        html += `<button onclick="deletePost('${post.id}')" class="w-full py-3 text-center text-red-500 font-semibold text-sm">Delete post</button>`;
    } else {
        html += `<button onclick="reportPost('${post.id}')" class="w-full py-3 text-center text-red-500 font-semibold text-sm">Report</button>`;
    }
    
    options.innerHTML = html;
    sheet.classList.add('open');
}

function closeActionSheet() {
    document.getElementById('action-sheet').classList.remove('open');
}

function editPost(postId) {
    const post = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (post) {
        closeActionSheet();
        openPostModal(post);
    }
}

async function deletePost(postId) {
    const { error } = await supabase.from('posts').delete().eq('id', postId);
    if (!error) {
        closeActionSheet();
        loadPosts('campus', true);
        loadPosts('universe', true);
    }
}

function reportPost(postId) {
    closeActionSheet();
}

async function init() {
    currentUser = await getCurrentUser();
    if (!currentUser) return;
    
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    
    await loadPosts('campus');
    await loadPosts('universe');
    
    // Realtime
    supabase.channel('posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
        loadPosts('campus', true);
        loadPosts('universe', true);
    }).subscribe();
}

// Make global
window.openPostModal = openPostModal;
window.closePostModal = closePostModal;
window.submitPost = submitPost;
window.switchTab = switchTab;
window.toggleSearch = toggleSearch;
window.handleSearch = handleSearch;
window.toggleTheme = toggleTheme;
window.handleLike = handleLike;
window.handleRepost = handleRepost;
window.handleShare = handleShare;
window.safeRedirect = safeRedirect;
window.startPress = startPress;
window.endPress = endPress;
window.deletePost = deletePost;
window.reportPost = reportPost;
window.closeActionSheet = closeActionSheet;
window.editPost = editPost;

init();
</script>
