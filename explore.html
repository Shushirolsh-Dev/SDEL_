<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sdel | Explore</title>
    
    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
        }
        
        /* X-style orange accent */
        .accent {
            color: #FF6600;
        }
        .accent-bg {
            background-color: #FF6600;
        }
        .accent-border {
            border-color: #FF6600;
        }
        
        /* Feed card styling - clean like X */
        .tweet-card {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .tweet-card:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        /* Tab styling */
        .tab {
            font-weight: 700;
            font-size: 15px;
            padding: 16px 0;
            position: relative;
            cursor: pointer;
            color: #71717a;
            transition: color 0.2s;
        }
        .tab.active {
            color: #FF6600;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #FF6600;
            border-radius: 4px;
        }
        
        /* Composer */
        .composer {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
        }
        .composer textarea {
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-size: 18px;
            width: 100%;
            color: white;
            font-weight: 500;
        }
        .composer textarea::placeholder {
            color: #3f3f46;
        }
        
        /* Like button animation */
        .like-btn.liked i {
            fill: #FF6600;
            color: #FF6600;
            animation: likePop 0.3s ease;
        }
        @keyframes likePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #71717a;
            transition: color 0.2s;
            cursor: pointer;
        }
        .nav-item.active {
            color: #FF6600;
        }
        .post-btn {
            background: #FF6600;
            width: 52px;
            height: 52px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .post-btn:active {
            transform: scale(0.95);
        }
        
        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #000000;
            border-radius: 28px 28px 0 0;
            width: 100%;
            max-width: 600px;
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #FF6600;
            color: black;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            z-index: 2000;
            transition: transform 0.3s;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Link styling */
        .mention-link, .hashtag-link {
            color: #FF6600;
            text-decoration: none;
        }
        .external-link {
            color: #FF6600;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #FF6600;
            border-radius: 4px;
        }
        
        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">Published</div>

    <!-- Header -->
    <div class="sticky top-0 bg-black/95 backdrop-blur-xl z-50 border-b border-white/10">
        <div class="px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-black tracking-tight">S<span class="accent">del</span></h1>
            <div class="flex gap-4">
                <i data-lucide="search" size="22" class="cursor-pointer text-zinc-400" onclick="toggleSearch()"></i>
                <i data-lucide="bell" size="22" class="cursor-pointer text-zinc-400" onclick="location.href='notifications.html'"></i>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="flex">
            <div class="flex-1 tab active text-center" onclick="switchTab('campus')" id="tab-campus">For you</div>
            <div class="flex-1 tab text-center" onclick="switchTab('universe')" id="tab-universe">Following</div>
        </div>
        
        <!-- Search (hidden by default) -->
        <div id="search-box" class="px-4 pb-3 hidden">
            <input type="text" id="search-input" placeholder="Search posts or people..." 
                   class="w-full bg-zinc-900 rounded-full px-4 py-3 text-sm outline-none focus:ring-1 focus:ring-orange-500">
        </div>
    </div>

    <!-- Compose Box -->
    <div class="composer">
        <div class="flex gap-3">
            <div id="my-avatar" class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-lg flex-shrink-0">?</div>
            <div class="flex-1">
                <textarea id="post-input" rows="1" placeholder="What's happening?" oninput="autoResize(this)"></textarea>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-xs text-zinc-500">Anyone can reply</span>
                    <button onclick="openPostModal()" class="accent-bg text-black px-5 py-2 rounded-full font-bold text-sm">Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Feed Container -->
    <div id="feed-container">
        <!-- Skeletons will load here -->
        <div class="p-4 border-b border-white/10">
            <div class="flex gap-3">
                <div class="skeleton w-12 h-12 rounded-full"></div>
                <div class="flex-1">
                    <div class="skeleton h-4 w-24 mb-2"></div>
                    <div class="skeleton h-4 w-full mb-2"></div>
                    <div class="skeleton h-4 w-3/4"></div>
                </div>
            </div>
        </div>
        <div class="p-4 border-b border-white/10">
            <div class="flex gap-3">
                <div class="skeleton w-12 h-12 rounded-full"></div>
                <div class="flex-1">
                    <div class="skeleton h-4 w-24 mb-2"></div>
                    <div class="skeleton h-4 w-full mb-2"></div>
                    <div class="skeleton h-4 w-3/4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="scroll-sentry" style="height: 20px;"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='dashboard.html'">
            <i data-lucide="home" size="24"></i>
            <span class="text-[10px]">Home</span>
        </div>
        <div class="nav-item active" onclick="location.href='explore.html'">
            <i data-lucide="compass" size="24"></i>
            <span class="text-[10px]">Explore</span>
        </div>
        <div class="post-btn" onclick="openPostModal()">
            <i data-lucide="plus" size="28" stroke-width="2.5"></i>
        </div>
        <div class="nav-item" onclick="location.href='notifications.html'">
            <i data-lucide="bell" size="24"></i>
            <span class="text-[10px]">Notifs</span>
        </div>
        <div class="nav-item" onclick="location.href='profile.html'">
            <i data-lucide="user" size="24"></i>
            <span class="text-[10px]">Profile</span>
        </div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="modal" onclick="closePostModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">New Gist</h3>
                <i data-lucide="x" size="24" class="cursor-pointer text-zinc-500" onclick="closePostModal()"></i>
            </div>
            <textarea id="modal-post-input" rows="6" placeholder="What's happening?" 
                      class="w-full bg-transparent border border-zinc-800 rounded-2xl p-4 text-white text-lg outline-none focus:border-orange-500"></textarea>
            <div class="flex gap-3 mt-4">
                <button onclick="closePostModal()" class="flex-1 py-3 border border-zinc-700 rounded-full font-bold">Cancel</button>
                <button onclick="submitPost()" class="flex-1 py-3 accent-bg text-black rounded-full font-bold">Post</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        // Supabase client
        const supabase = createClient(
            'https://lgfyrlfjoazedwymjpfc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
        );
        
        // App state
        let currentUser = null;
        let currentTab = 'campus';
        let posts = [];
        let likedPosts = new Set();
        let page = 0;
        let loading = false;
        let hasMore = true;
        
        // Load user session
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            
            const { data: profile } = await supabase
                .from('profile')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            currentUser = profile;
            
            if (currentUser?.is_banned) {
                window.location.href = 'banned.html';
                return;
            }
            
            document.getElementById('my-avatar').textContent = currentUser?.username?.charAt(0).toUpperCase() || 'U';
            
            // Load user's liked posts
            const { data: likes } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'like');
            
            if (likes) {
                likes.forEach(like => likedPosts.add(like.post_id));
            }
            
            await loadPosts();
            setupInfiniteScroll();
        }
        
        // Load posts from Supabase
        async function loadPosts() {
            if (loading || !hasMore) return;
            
            loading = true;
            
            let query = supabase
                .from('posts')
                .select(`
                    *,
                    profile:user_id (username, is_official, is_verified)
                `)
                .eq('post_type', 'post')
                .order('created_at', { ascending: false })
                .range(page * 10, (page + 1) * 10 - 1);
            
            if (currentTab === 'campus' && currentUser?.school_name) {
                query = query.eq('school_name', currentUser.school_name);
            }
            
            const { data, error } = await query;
            
            if (error) {
                console.error('Error loading posts:', error);
                loading = false;
                return;
            }
            
            if (!data || data.length === 0) {
                hasMore = false;
                loading = false;
                
                if (page === 0 && posts.length === 0) {
                    document.getElementById('feed-container').innerHTML = `
                        <div class="text-center py-20 text-zinc-500">
                            <i data-lucide="inbox" size="48" class="mx-auto mb-4"></i>
                            <p class="font-bold">No posts yet</p>
                            <p class="text-sm">Be the first to post something!</p>
                        </div>
                    `;
                    lucide.createIcons();
                }
                return;
            }
            
            if (page === 0) {
                posts = data;
            } else {
                posts = [...posts, ...data];
            }
            
            page++;
            renderFeed();
            loading = false;
        }
        
        // Render feed (X-style)
        function renderFeed() {
            const container = document.getElementById('feed-container');
            
            if (posts.length === 0 && page === 0) {
                return;
            }
            
            container.innerHTML = posts.map(post => {
                const username = post.profile?.username || 'anonymous';
                const isLiked = likedPosts.has(post.id);
                const timeAgo = getTimeAgo(post.created_at);
                
                return `
                    <div class="tweet-card p-4" onclick="location.href='gist.html?id=${post.id}'">
                        <div class="flex gap-3">
                            <div class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-lg flex-shrink-0 cursor-pointer" 
                                 onclick="event.stopPropagation(); location.href='profile.html?u=${username}'">
                                ${username[0].toUpperCase()}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-1 flex-wrap">
                                    <span class="font-bold hover:underline cursor-pointer" 
                                          onclick="event.stopPropagation(); location.href='profile.html?u=${username}'">
                                        @${username}
                                    </span>
                                    ${post.profile?.is_official ? '<span class="accent text-xs">✓</span>' : ''}
                                    <span class="text-zinc-500 text-sm">· ${timeAgo}</span>
                                </div>
                                <div class="mt-1 text-[15px] leading-relaxed whitespace-pre-wrap break-words">
                                    ${formatContent(post.content)}
                                </div>
                                <div class="flex justify-between mt-3 max-w-md">
                                    <button class="flex items-center gap-2 text-zinc-500 hover:text-accent transition" 
                                            onclick="event.stopPropagation(); handleReply('${post.id}')">
                                        <i data-lucide="message-circle" size="18"></i>
                                        <span class="text-sm">${formatNumber(post.comments_count || 0)}</span>
                                    </button>
                                    <button class="flex items-center gap-2 text-zinc-500 hover:text-green-500 transition" 
                                            onclick="event.stopPropagation(); handleRepost('${post.id}', '${username}')">
                                        <i data-lucide="repeat" size="18"></i>
                                        <span class="text-sm">${formatNumber(post.reposts_count || 0)}</span>
                                    </button>
                                    <button class="flex items-center gap-2 transition ${isLiked ? 'liked' : 'text-zinc-500 hover:text-red-500'}" 
                                            onclick="event.stopPropagation(); handleLike('${post.id}')">
                                        <i data-lucide="heart" size="18" ${isLiked ? 'fill="#FF6600" style="color:#FF6600"' : ''}></i>
                                        <span class="text-sm">${formatNumber(post.likes_count || 0)}</span>
                                    </button>
                                    <button class="flex items-center gap-2 text-zinc-500 hover:text-accent transition" 
                                            onclick="event.stopPropagation(); handleShare('${post.id}', '${username}', \`${escapeJS(post.content)}\`)">
                                        <i data-lucide="share-2" size="18"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }
        
        // Format content with links and mentions
        function formatContent(text) {
            if (!text) return '';
            
            let formatted = escapeHtml(text);
            
            // Links
            formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="external-link" onclick="event.stopPropagation()">$1</a>');
            
            // Mentions
            formatted = formatted.replace(/@(\w+)/g, '<a href="profile.html?u=$1" class="mention-link" onclick="event.stopPropagation()">@$1</a>');
            
            // Hashtags
            formatted = formatted.replace(/#(\w+)/g, '<a href="search.html?q=$1" class="mention-link" onclick="event.stopPropagation()">#$1</a>');
            
            return formatted;
        }
        
        // Like handler
        async function handleLike(postId) {
            const isCurrentlyLiked = likedPosts.has(postId);
            
            // Update UI immediately
            if (isCurrentlyLiked) {
                likedPosts.delete(postId);
            } else {
                likedPosts.add(postId);
            }
            renderFeed();
            
            // Update database
            if (isCurrentlyLiked) {
                const { data: existing } = await supabase
                    .from('interactions')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .eq('post_id', postId)
                    .eq('interaction_type', 'like')
                    .single();
                
                if (existing) {
                    await supabase.from('interactions').delete().eq('id', existing.id);
                    await supabase.rpc('decrement_stat', { post_id: postId, field: 'likes_count' });
                }
            } else {
                await supabase.from('interactions').insert({
                    user_id: currentUser.id,
                    post_id: postId,
                    interaction_type: 'like'
                });
                await supabase.rpc('increment_stat', { post_id: postId, field: 'likes_count' });
            }
        }
        
        // Create post
        async function createPost(content) {
            if (!content.trim()) return;
            
            const { data, error } = await supabase
                .from('posts')
                .insert({
                    user_id: currentUser.id,
                    content: content.trim(),
                    school_name: currentUser.school_name || 'Global',
                    post_type: 'post',
                    likes_count: 0,
                    comments_count: 0,
                    reposts_count: 0
                })
                .select('*, profile:user_id(username, is_official, is_verified)')
                .single();
            
            if (!error && data) {
                posts = [data, ...posts];
                renderFeed();
                showToast('Gist published!');
                document.getElementById('post-input').value = '';
                document.getElementById('modal-post-input').value = '';
            } else {
                showToast('Failed to post');
            }
        }
        
        // Repost handler
        async function handleRepost(postId, originalAuthor) {
            if (originalAuthor === currentUser.username) {
                showToast("Can't repost your own gist");
                return;
            }
            
            // Find original post
            const originalPost = posts.find(p => p.id === postId);
            if (!originalPost) return;
            
            const newContent = `Reposted from @${originalAuthor}: ${originalPost.content}`;
            
            const { data, error } = await supabase
                .from('posts')
                .insert({
                    user_id: currentUser.id,
                    content: newContent,
                    school_name: currentUser.school_name,
                    post_type: 'repost',
                    likes_count: 0,
                    comments_count: 0,
                    reposts_count: 0
                })
                .select('*, profile:user_id(username, is_official, is_verified)')
                .single();
            
            if (!error && data) {
                // Increment repost count on original
                await supabase.rpc('increment_stat', { post_id: postId, field: 'reposts_count' });
                
                posts = [data, ...posts];
                renderFeed();
                showToast('Reposted!');
            }
        }
        
        // Helper functions
        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return `${seconds}s`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d`;
            return new Date(date).toLocaleDateString();
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function escapeJS(str) {
            return str.replace(/'/g, "\\'").replace(/`/g, '\\`').replace(/"/g, '\\"');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }
        
        function setupInfiniteScroll() {
            const sentry = document.getElementById('scroll-sentry');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !loading && hasMore) {
                    loadPosts();
                }
            }, { threshold: 0.1 });
            observer.observe(sentry);
        }
        
        async function switchTab(tab) {
            currentTab = tab;
            page = 0;
            posts = [];
            hasMore = true;
            
            document.getElementById('tab-campus').classList.toggle('active', tab === 'campus');
            document.getElementById('tab-universe').classList.toggle('active', tab === 'universe');
            
            document.getElementById('feed-container').innerHTML = `
                <div class="p-4 border-b border-white/10"><div class="flex gap-3"><div class="skeleton w-12 h-12 rounded-full"></div><div class="flex-1"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-4 w-full mb-2"></div><div class="skeleton h-4 w-3/4"></div></div></div></div>
            `;
            
            await loadPosts();
        }
        
        function openPostModal() {
            document.getElementById('post-modal').style.display = 'flex';
            document.getElementById('modal-post-input').focus();
        }
        
        function closePostModal() {
            document.getElementById('post-modal').style.display = 'none';
        }
        
        function submitPost() {
            const content = document.getElementById('modal-post-input').value;
            createPost(content);
            closePostModal();
        }
        
        function toggleSearch() {
            const box = document.getElementById('search-box');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            }
        }
        
        function handleReply(postId) {
            window.location.href = `gist.html?id=${postId}`;
        }
        
        function handleShare(postId, username, content) {
            const url = `${window.location.origin}/gist.html?id=${postId}`;
            navigator.clipboard.writeText(`Check out @${username}'s gist on Sdel: ${content.substring(0, 80)}... ${url}`);
            showToast('Link copied!');
        }
        
        // Make functions global
        window.handleLike = handleLike;
        window.handleRepost = handleRepost;
        window.handleReply = handleReply;
        window.handleShare = handleShare;
        window.switchTab = switchTab;
        window.openPostModal = openPostModal;
        window.closePostModal = closePostModal;
        window.submitPost = submitPost;
        window.toggleSearch = toggleSearch;
        window.autoResize = autoResize;
        
        // Start app
        init();
    </script>
</body>
</html>
