<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign up · Asperthan — Join the Trust Layer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #DEB887;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .logo:hover {
      opacity: 0.85;
    }

    .back-link {
      color: #2c241e;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: rgba(0,0,0,0.05);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .signup-card {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 36px;
      padding: 48px 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid #f0e4d8;
      transition: transform 0.2s;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      color: #1a1a1a;
    }

    .sub {
      color: #6b5a4a;
      margin-bottom: 32px;
      font-size: 0.9rem;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2b2b2b;
    }

    /* Custom dropdown wrapper + native select but visually enhanced */
    .custom-dropdown {
      position: relative;
      width: 100%;
    }

    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 20px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s ease;
      background: #fefcf9;
      color: #1f1f1f;
      cursor: pointer;
    }

    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23847260" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 18px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.25);
      background: #ffffff;
    }

    .btn-signup {
      width: 100%;
      background: #1a1a1a;
      color: #DEB887;
      border: none;
      padding: 14px 18px;
      border-radius: 200px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 28px;
      font-family: inherit;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-signup:hover {
      background: #2c2c2c;
      transform: scale(0.98);
      color: #e7cba5;
    }

    .login-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #5e5243;
      line-height: 1.5;
    }

    .login-prompt a {
      color: #b87c3a;
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px dotted #deb887;
    }

    .login-prompt a:hover {
      color: #9b5e2a;
    }

    /* custom message under the "already have account" row */
    .shushi-text {
      text-align: center;
      margin-top: 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b28b60;
      letter-spacing: 0.2px;
      background: #fef6ed;
      display: inline-block;
      width: auto;
      padding: 6px 18px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    .shushi-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    /* Custom dropdown alert panel (toast / inline message) - no browser alert */
    .custom-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2c241e;
      color: #f5e7d9;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      z-index: 1000;
      backdrop-filter: blur(8px);
      background: rgba(30, 24, 20, 0.92);
      border: 1px solid #dbb67b;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 0;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .custom-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: none;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #7f6e5c;
      border-top: 1px solid #ece4db;
      margin-top: auto;
    }

    @media (max-width: 550px) {
      .navbar { padding: 16px 24px; }
      .signup-card { padding: 32px 24px; }
      h1 { font-size: 1.7rem; }
      .custom-toast { white-space: normal; max-width: 85vw; text-align: center; padding: 10px 20px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="#" class="logo">ASPER·THAN</a>
    <a href="#" class="back-link">← Back</a>
  </div>
  <div class="container">
    <div class="signup-card">
      <h1>Create account</h1>
      <p class="sub">Join the trust layer for K-12 schools</p>
      <form id="signupForm">
        <div class="input-group">
          <label>Full name</label>
          <input type="text" id="fullname" placeholder="James Mwangi" autocomplete="name" required>
        </div>
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@school.edu" autocomplete="email" required>
        </div>
        <div class="input-group">
          <label>Role</label>
          <div class="custom-dropdown">
            <select id="role" required>
              <option value="" disabled selected>Select your role</option>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="parent">Parent</option>
              <!-- "School Admin" option is REMOVED completely as per request -->
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-signup">Get started →</button>
      </form>
      <div class="login-prompt">
        Already have an account? <a href="login.html">Log in</a>
      </div>
      <!-- Exactly under "already have account" in the middle below we put Shushirolsh -->
      <div class="shushi-wrapper">
        <div class="shushi-text">Shushirolsh</div>
      </div>
    </div>
  </div>
  <div class="footer">
    Asperthan — restoring trust through transparency
  </div>

  <!-- CUSTOM TOAST instead of browser alert -->
  <div id="customToast" class="custom-toast"></div>

  <script>
    (function() {
      // DOM elements
      const fullnameInput = document.getElementById('fullname');
      const emailInput = document.getElementById('email');
      const roleSelect = document.getElementById('role');
      const passwordInput = document.getElementById('password');
      const signupForm = document.getElementById('signupForm');
      const toastEl = document.getElementById('customToast');

      // Helper: show custom dropdown-friendly message (no browser alert)
      function showMessage(message, isError = true) {
        if (!toastEl) return;
        toastEl.textContent = message;
        toastEl.classList.add('show');
        setTimeout(() => {
          toastEl.classList.remove('show');
        }, 2800);
      }

      // Validation and signup handler
      function handleSignup(event) {
        if (event) event.preventDefault();

        // get trimmed values
        const fullname = fullnameInput.value.trim();
        const email = emailInput.value.trim();
        const role = roleSelect.value;
        const password = passwordInput.value;

        // validation
        if (!fullname) {
          showMessage('✨ Please enter your full name');
          fullnameInput.focus();
          return false;
        }

        if (!email) {
          showMessage('📧 Email address is required');
          emailInput.focus();
          return false;
        }

        // basic email format check (simple)
        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailPattern.test(email)) {
          showMessage('📭 Please enter a valid email address (e.g., name@domain.com)');
          emailInput.focus();
          return false;
        }

        if (!role) {
          showMessage('🎓 Please select your role from the dropdown (Student, Teacher, Parent)');
          roleSelect.focus();
          return false;
        }

        if (!password) {
          showMessage('🔒 Password cannot be empty');
          passwordInput.focus();
          return false;
        }

        if (password.length < 4) {
          showMessage('⚠️ Password must be at least 4 characters long');
          passwordInput.focus();
          return false;
        }

        // If everything is valid -> simulate success (no browser alert)
        // Using custom notification instead of alert
        showMessage(`🎉 Welcome, ${fullname}! (Role: ${role}) Demo signup complete. Redirecting to login...`, false);
        
        // slight delay to show the success toast then redirect
        setTimeout(() => {
          // redirect to login.html (preserving flow)
          window.location.href = 'login.html';
        }, 1500);
        
        return true;
      }

      // attach submit listener
      if (signupForm) {
        signupForm.addEventListener('submit', handleSignup);
      }

      // additionally, ensure that no stray alerts appear from any other legacy calls
      // also we can add live inline hint but it's fine
      // remove any default alert from global scope (just safety)
      window.alert = function() {
        // override original alert to prevent any accidental browser alert popups 
        // but we keep custom messages; we also disable native confirm style
        console.warn('Native alert blocked. Using custom notification.');
      };
      
      // Optional: add nice interaction to "Back" link & logo (demo behaviour)
      const backLink = document.querySelector('.back-link');
      if (backLink) {
        backLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('↩️ Navigate back to homepage (demo behavior)', false);
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        });
      }
      const logoLink = document.querySelector('.logo');
      if (logoLink) {
        logoLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('🏠 Asperthan – returning to main', false);
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 600);
        });
      }
      
      // Prefill any demo optional? not needed, but clean.
      // Also ensure that 'School Admin' option does not exist in dropdown:
      // we have removed it from markup. Double-check that all works.
      // Additional: if any browser tries to re-populate admin, we are safe.
      console.log('✅ Custom dropdown ready — School Admin removed. Shushirolsh added below login prompt.');
    })();
  </script>
</body>
</html>
