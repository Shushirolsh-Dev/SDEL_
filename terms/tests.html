<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign up · Asperthan — Join the Trust Layer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #DEB887;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .logo:hover {
      opacity: 0.85;
    }

    .back-link {
      color: #2c241e;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: rgba(0,0,0,0.05);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .signup-card {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 36px;
      padding: 48px 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid #f0e4d8;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      color: #1a1a1a;
    }

    .sub {
      color: #6b5a4a;
      margin-bottom: 32px;
      font-size: 0.9rem;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2b2b2b;
    }

    /* Custom dropdown button style */
    .custom-dropdown-btn {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 20px;
      font-size: 1rem;
      font-family: inherit;
      background: #fefcf9;
      color: #1f1f1f;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .custom-dropdown-btn:hover {
      border-color: #DEB887;
      background: #ffffff;
    }

    .custom-dropdown-btn.active {
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.25);
    }

    .dropdown-arrow {
      transition: transform 0.2s;
    }

    .custom-dropdown-btn.active .dropdown-arrow {
      transform: rotate(180deg);
    }

    /* Custom dropdown menu (modal-like, appears above everything) */
    .custom-dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      border: 1px solid #e8dfd5;
      overflow: hidden;
      z-index: 1000;
      max-height: 0;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .custom-dropdown-menu.open {
      max-height: 300px;
      opacity: 1;
      visibility: visible;
    }

    .dropdown-option {
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.95rem;
      color: #2c241e;
    }

    .dropdown-option:hover {
      background: #fef6ed;
    }

    .dropdown-option.selected {
      background: #DEB88720;
      color: #b87c3a;
      font-weight: 600;
    }

    .dropdown-option:not(:last-child) {
      border-bottom: 1px solid #f0e4d8;
    }

    .input-group {
      position: relative;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 20px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s ease;
      background: #fefcf9;
      color: #1f1f1f;
    }

    input:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.25);
      background: #ffffff;
    }

    .btn-signup {
      width: 100%;
      background: #1a1a1a;
      color: #DEB887;
      border: none;
      padding: 14px 18px;
      border-radius: 200px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 28px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-signup:hover {
      background: #2c2c2c;
      transform: scale(0.98);
    }

    .login-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #5e5243;
      line-height: 1.5;
    }

    .login-prompt a {
      color: #b87c3a;
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px dotted #deb887;
    }

    .login-prompt a:hover {
      color: #9b5e2a;
    }

    .shushi-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .shushi-text {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b28b60;
      background: #fef6ed;
      padding: 6px 18px;
      border-radius: 40px;
    }

    /* Custom toast message (no browser alert) */
    .custom-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2c241e;
      color: #f5e7d9;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      z-index: 1001;
      backdrop-filter: blur(8px);
      background: rgba(30, 24, 20, 0.95);
      border: 1px solid #dbb67b;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .custom-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #7f6e5c;
      border-top: 1px solid #ece4db;
      margin-top: auto;
    }

    @media (max-width: 550px) {
      .navbar { padding: 16px 24px; }
      .signup-card { padding: 32px 24px; }
      h1 { font-size: 1.7rem; }
      .custom-toast { white-space: normal; max-width: 85vw; text-align: center; }
    }

    /* Overlay to close dropdown when clicking outside */
    .dropdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 999;
      display: none;
    }

    .dropdown-overlay.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="#" class="logo">ASPER·THAN</a>
    <a href="#" class="back-link">← Back</a>
  </div>
  <div class="container">
    <div class="signup-card">
      <h1>Create account</h1>
      <p class="sub">Join the trust layer for K-12 schools</p>
      <form id="signupForm">
        <div class="input-group">
          <label>Full name</label>
          <input type="text" id="fullname" placeholder="James Mwangi" autocomplete="name" required>
        </div>
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@school.edu" autocomplete="email" required>
        </div>
        <div class="input-group" id="dropdownGroup">
          <label>Role</label>
          <div class="custom-dropdown-btn" id="dropdownBtn">
            <span id="selectedRoleText">Select your role</span>
            <span class="dropdown-arrow">▼</span>
          </div>
          <div class="custom-dropdown-menu" id="dropdownMenu">
            <div class="dropdown-option" data-value="student">Student</div>
            <div class="dropdown-option" data-value="teacher">Teacher</div>
            <div class="dropdown-option" data-value="parent">Parent</div>
            <!-- School Admin option REMOVED as requested -->
          </div>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-signup">Get started →</button>
      </form>
      <div class="login-prompt">
        Already have an account? <a href="login.html">Log in</a>
      </div>
      <!-- Shushirolsh exactly below in the middle -->
      <div class="shushi-wrapper">
        <div class="shushi-text">Shushirolsh</div>
      </div>
    </div>
  </div>
  <div class="footer">
    Asperthan — restoring trust through transparency
  </div>

  <div class="dropdown-overlay" id="dropdownOverlay"></div>
  <div id="customToast" class="custom-toast"></div>

  <script>
    (function() {
      // DOM elements
      const fullnameInput = document.getElementById('fullname');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const signupForm = document.getElementById('signupForm');
      const toastEl = document.getElementById('customToast');
      
      // Custom dropdown elements
      const dropdownBtn = document.getElementById('dropdownBtn');
      const dropdownMenu = document.getElementById('dropdownMenu');
      const selectedRoleText = document.getElementById('selectedRoleText');
      const dropdownOverlay = document.getElementById('dropdownOverlay');
      const dropdownGroup = document.getElementById('dropdownGroup');
      
      let selectedRoleValue = ''; // Store selected value (student, teacher, parent)
      
      // Show custom toast (replaces browser alert)
      function showMessage(message, isSuccess = false) {
        if (!toastEl) return;
        toastEl.textContent = message;
        toastEl.classList.add('show');
        setTimeout(() => {
          toastEl.classList.remove('show');
        }, 2800);
      }
      
      // Close dropdown
      function closeDropdown() {
        dropdownMenu.classList.remove('open');
        dropdownBtn.classList.remove('active');
        dropdownOverlay.classList.remove('active');
      }
      
      // Open dropdown
      function openDropdown() {
        dropdownMenu.classList.add('open');
        dropdownBtn.classList.add('active');
        dropdownOverlay.classList.add('active');
      }
      
      // Toggle dropdown
      function toggleDropdown() {
        if (dropdownMenu.classList.contains('open')) {
          closeDropdown();
        } else {
          openDropdown();
        }
      }
      
      // Handle option selection
      function selectOption(value, label) {
        selectedRoleValue = value;
        selectedRoleText.textContent = label;
        selectedRoleText.style.color = '#1f1f1f';
        
        // Update selected class in dropdown
        const options = document.querySelectorAll('.dropdown-option');
        options.forEach(opt => {
          if (opt.getAttribute('data-value') === value) {
            opt.classList.add('selected');
          } else {
            opt.classList.remove('selected');
          }
        });
        
        closeDropdown();
      }
      
      // Setup dropdown event listeners
      dropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown();
      });
      
      // Add click handlers to dropdown options
      const options = document.querySelectorAll('.dropdown-option');
      options.forEach(opt => {
        opt.addEventListener('click', () => {
          const value = opt.getAttribute('data-value');
          const label = opt.textContent;
          selectOption(value, label);
        });
      });
      
      // Close dropdown when clicking overlay
      dropdownOverlay.addEventListener('click', () => {
        closeDropdown();
      });
      
      // Close dropdown on escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && dropdownMenu.classList.contains('open')) {
          closeDropdown();
        }
      });
      
      // Prevent any native browser alerts completely
      window.alert = function() {
        console.warn('Native alert blocked - using custom notifications');
      };
      
      // Handle form submission with custom validation (NO BROWSER ALERTS)
      function handleSignup(event) {
        if (event) event.preventDefault();
        
        const fullname = fullnameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        // Validation with custom toasts (not browser alerts)
        if (!fullname) {
          showMessage('✨ Please enter your full name');
          fullnameInput.focus();
          return false;
        }
        
        if (!email) {
          showMessage('📧 Email address is required');
          emailInput.focus();
          return false;
        }
        
        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailPattern.test(email)) {
          showMessage('📭 Please enter a valid email address');
          emailInput.focus();
          return false;
        }
        
        if (!selectedRoleValue) {
          showMessage('🎓 Please select your role from the custom dropdown (Student, Teacher, or Parent)');
          return false;
        }
        
        if (!password) {
          showMessage('🔒 Password cannot be empty');
          passwordInput.focus();
          return false;
        }
        
        if (password.length < 4) {
          showMessage('⚠️ Password must be at least 4 characters long');
          passwordInput.focus();
          return false;
        }
        
        // Success - show custom success message
        const roleDisplay = selectedRoleText.textContent;
        showMessage(`🎉 Welcome, ${fullname}! (Role: ${roleDisplay}) Account created! Redirecting...`, true);
        
        // Simulate redirect after delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        
        return true;
      }
      
      // Attach submit handler
      if (signupForm) {
        signupForm.addEventListener('submit', handleSignup);
      }
      
      // Handle back link and logo
      const backLink = document.querySelector('.back-link');
      if (backLink) {
        backLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('↩️ Returning to homepage', false);
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        });
      }
      
      const logoLink = document.querySelector('.logo');
      if (logoLink) {
        logoLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('🏠 Asperthan – main page', false);
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 600);
        });
      }
      
      console.log('✅ Custom dropdown ready — NO browser alerts! School Admin removed. Shushirolsh added.');
    })();
  </script>
</body>
</html>
