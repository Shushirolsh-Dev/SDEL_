<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up · Asperthan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #DEB887;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
    }

    .back-link {
      color: #2c241e;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .signup-card {
      max-width: 460px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #f0e4d6;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .sub {
      color: #6b5a4a;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f1f1f;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.2s;
      background: #fefcf9;
    }

    select {
      cursor: pointer;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.2);
    }

    .btn-signup {
      width: 100%;
      background: #1a1a1a;
      color: #DEB887;
      border: none;
      padding: 14px;
      border-radius: 200px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 24px;
      font-family: inherit;
    }

    .btn-signup:hover {
      background: #2d2a27;
    }

    .login-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #5e5243;
    }

    .login-prompt a {
      color: #b87c3a;
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #7f6e5c;
      border-top: 1px solid #ece4db;
    }

    @media (max-width: 550px) {
      .navbar { padding: 16px 24px; }
      .signup-card { padding: 32px 24px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="index.html" class="logo">ASPER·THAN</a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
  <div class="container">
    <div class="signup-card">
      <h1>Create account</h1>
      <p class="sub">Join the trust layer for K-12 schools</p>
      <form id="signupForm" onsubmit="event.preventDefault(); handleSignup();">
        <div class="input-group">
          <label>Full name</label>
          <input type="text" id="fullname" placeholder="James Mwangi" required>
        </div>
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@school.edu" required>
        </div>
        <div class="input-group">
          <label>Role</label>
          <select id="role" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
            <option value="admin">School Admin</option>
          </select>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a strong password" required>
        </div>
        <button type="submit" class="btn-signup">Get started →</button>
      </form>
      <div class="login-prompt">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>
  <div class="footer">
    Asperthan — restoring trust through transparency
  </div>
  <script>
    function handleSignup() {
      const name = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      
      if (name && email && role && password && password.length >= 4) {
        alert(`Welcome, ${name}! (Demo signup as ${role})\nYour account has been created. Redirecting to login...`);
        window.location.href = 'login.html';
      } else {
        alert('Please fill all fields correctly (password min 4 chars).');
      }
    }
  </script>
</body>
  </html>
