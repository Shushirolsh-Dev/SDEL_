<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Litheral - Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a0a 100%);
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0088ff;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .status {
            font-size: 1rem;
            color: #88ffaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 2rem;
            border: 1px solid rgba(136, 255, 170, 0.3);
        }

        .command-display {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 1rem 0 2rem;
            min-height: 120px;
            color: #ccddff;
            font-size: 1.1rem;
            border-left: 4px solid #00ffff;
            text-align: left;
            font-family: 'Courier New', monospace;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .mic-btn {
            background: radial-gradient(circle at 30% 10%, #1a2a3a, #0a0a1a);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-size: 3rem;
            padding: 1rem 2rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            width: 100px;
            height: 100px;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffff;
            background: radial-gradient(circle at 30% 10%, #2a3a4a, #1a1a2a);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .listening {
            animation: pulse 1s infinite;
            box-shadow: 0 0 30px #ff5500;
            border-color: #ff5500;
            color: #ff5500;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .mic-btn {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
            .command-display {
                font-size: 0.9rem;
                min-height: 100px;
            }
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #446688;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LITHERAL</h1>
        <div class="status" id="status">Ready</div>
        <div class="command-display" id="commandDisplay">Click the microphone and speak to Litheral...</div>
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="footer">Powered by Web Speech API | Works offline</div>
    </div>

    <script>
        // DOM elements
        const micBtn = document.getElementById('micBtn');
        const statusDiv = document.getElementById('status');
        const commandDisplay = document.getElementById('commandDisplay');

        // Check browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            statusDiv.textContent = '❌ Browser not supported. Use Chrome or Edge.';
            micBtn.disabled = true;
            commandDisplay.innerHTML = 'Your browser does not support voice recognition. Please use Chrome, Edge, or Safari.';
        }

        // Initialize recognition
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        // Speech synthesis setup
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.volume = 1;
            
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('David') || v.name.includes('Samantha'));
            if (preferredVoice) utterance.voice = preferredVoice;
            
            synth.speak(utterance);
        }

        // HARDCODED COMMANDS
        function processCommand(command) {
            const lower = command.toLowerCase().trim();
            
            // Time
            if (lower.includes('time') || lower.includes('what time')) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const response = `The time is ${timeStr}`;
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // Date
            if (lower.includes('date') || lower.includes('today')) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                const response = `Today is ${dateStr}`;
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // Greeting
            if (lower.includes('hello') || lower.includes('hey') || lower.includes('hi litheral') || lower.includes('sup litheral')) {
                const response = "Hello sir, Litheral ready for your command.";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // Who are you
            if (lower.includes('who are you') || lower.includes('your name') || lower.includes('what is your name')) {
                const response = "I am Litheral, your personal voice assistant, built in JavaScript.";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // How are you
            if (lower.includes('how are you')) {
                const response = "Functioning perfectly, sir. Ready for anything.";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // Search Google
            if (lower.includes('search for') || lower.includes('google')) {
                let query = command.replace(/search for|google/i, '').trim();
                if (query) {
                    const response = `Searching Google for ${query}`;
                    commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                    speak(response);
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                } else {
                    speak("What would you like me to search for?");
                }
                return;
            }
            
            // Open YouTube
            if (lower.includes('youtube')) {
                const response = "Opening YouTube";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                window.open('https://youtube.com', '_blank');
                return;
            }
            
            // Open GitHub
            if (lower.includes('github')) {
                const response = "Opening GitHub";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                window.open('https://github.com', '_blank');
                return;
            }
            
            // Tell a joke
            if (lower.includes('joke')) {
                const jokes = [
                    "Why do programmers prefer dark mode? Because light attracts bugs.",
                    "What do you call a fake noodle? An impasta.",
                    "Why did the JavaScript developer go to therapy? He had too many callbacks.",
                    "What's a computer's favorite beat? An algorithm."
                ];
                const response = jokes[Math.floor(Math.random() * jokes.length)];
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                return;
            }
            
            // Goodbye
            if (lower.includes('bye') || lower.includes('goodbye') || lower.includes('exit')) {
                const response = "Goodbye sir. Litheral signing off.";
                commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
                speak(response);
                setTimeout(() => {
                    commandDisplay.innerHTML = "Click the microphone when you need me again.";
                }, 3000);
                return;
            }
            
            // Default
            const response = `I heard "${command}". I don't know how to respond to that yet.`;
            commandDisplay.innerHTML = `🧑 You said: "${command}"<br><br>⚡ Litheral: ${response}`;
            speak(response);
        }

        // Voice recognition event handlers
        recognition.onstart = () => {
            statusDiv.textContent = '🎙️ Listening...';
            micBtn.classList.add('listening');
            commandDisplay.innerHTML = '🎙️ Litheral is listening...';
        };

        recognition.onend = () => {
            statusDiv.textContent = 'Ready';
            micBtn.classList.remove('listening');
        };

        recognition.onresult = (event) => {
            const command = event.results[0][0].transcript;
            processCommand(command);
        };

        recognition.onerror = (event) => {
            console.error('Recognition error:', event.error);
            statusDiv.textContent = `❌ Error: ${event.error}`;
            micBtn.classList.remove('listening');
            
            if (event.error === 'not-allowed') {
                commandDisplay.innerHTML = '❌ Microphone access denied. Please check your permissions and refresh.';
                speak('Microphone access denied. Please check your permissions.');
            } else if (event.error === 'no-speech') {
                commandDisplay.innerHTML = 'No speech detected. Click the mic and try again.';
            } else {
                commandDisplay.innerHTML = `Error: ${event.error}. Please try again.`;
                speak('Sorry, I had trouble hearing you. Please try again.');
            }
            
            setTimeout(() => {
                if (statusDiv.textContent !== 'Ready') {
                    statusDiv.textContent = 'Ready';
                }
            }, 2000);
        };

        // Mic button click
        micBtn.addEventListener('click', () => {
            try {
                recognition.start();
            } catch (e) {
                console.log('Recognition already active');
            }
        });

        // Load voices and welcome message
        let voicesLoaded = false;
        
        function initVoices() {
            if (voicesLoaded) return;
            voicesLoaded = true;
            speak("Litheral online. Click the microphone to begin.");
        }
        
        if (synth.getVoices().length > 0) {
            initVoices();
        } else {
            synth.addEventListener('voiceschanged', initVoices);
        }
    </script>
</body>
</html>
