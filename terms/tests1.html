<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in · Asperthan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #DEB887;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
    }

    .back-link {
      color: #2c241e;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .back-link:hover {
      background: rgba(0,0,0,0.05);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #f0e4d6;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .sub {
      color: #6b5a4a;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f1f1f;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.2s;
      background: #fefcf9;
    }

    .password-wrapper input {
      padding-right: 48px;
    }

    input:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.2);
    }

    input:disabled {
      background: #f5f0ea;
      color: #4a3b2c;
      cursor: not-allowed;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: 0;
    }

    .eye-icon {
      width: 22px;
      height: 22px;
      stroke: #8b7a6a;
      stroke-width: 2;
      fill: none;
      transition: stroke 0.2s;
    }

    .toggle-password:hover .eye-icon {
      stroke: #b87c3a;
    }

    .btn-login {
      width: 100%;
      background: #1a1a1a;
      color: #DEB887;
      border: none;
      padding: 14px;
      border-radius: 200px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 24px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #2d2a27;
      transform: scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .signup-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #5e5243;
    }

    .signup-prompt a {
      color: #b87c3a;
      text-decoration: none;
      font-weight: 700;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    .shushi-text {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #b28b60;
      font-weight: 500;
    }

    .role-box {
      background: #f5f0ea;
      border: 1.5px solid #e8dfd5;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      color: #4a3b2c;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #7f6e5c;
      border-top: 1px solid #ece4db;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30, 24, 20, 0.95);
      color: #f5e7d9;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      z-index: 1001;
      backdrop-filter: blur(8px);
      border: 1px solid #dbb67b;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 0;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 550px) {
      .navbar { padding: 16px 24px; }
      .login-card { padding: 32px 24px; }
      h1 { font-size: 1.7rem; }
      .toast { white-space: normal; max-width: 85vw; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="index.html" class="logo">ASPER·THAN</a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
  <div class="container">
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to access your dashboard</p>
      <form id="loginForm">
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@school.edu" required autocomplete="email">
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePassword">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-group">
          <label>Role (auto-detected)</label>
          <div class="role-box" id="roleBox">
            <span id="roleText">—</span>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Log in →</button>
      </form>
      <div class="signup-prompt">
        Don't have an account? <a href="signup.html">Get started</a>
      </div>
      <div class="shushi-text">Shushirolsh</div>
    </div>
  </div>
  <div class="footer">
    Asperthan — immutable trust for K-12
  </div>
  <div id="toast" class="toast"></div>

  <script>
    // Supabase configuration
    const SUPABASE_URL = 'https://aqzwirdiksjswvujtjvp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxendpcmRpa3Nqc3d2dWp0anZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzA5NzEsImV4cCI6MjA5NDI0Njk3MX0.zOrM_95Yj9XWH44V8v6F1eSK49IkPOslCE28zNVNmnY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginForm = document.getElementById('loginForm');
    const roleText = document.getElementById('roleText');
    const toastEl = document.getElementById('toast');
    
    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Change eye icon style
      const eyeIcon = this.querySelector('.eye-icon');
      if (type === 'text') {
        eyeIcon.style.stroke = '#b87c3a';
      } else {
        eyeIcon.style.stroke = '#8b7a6a';
      }
    });
    
    // Auto-detect role as user types email
    let debounceTimer;
    emailInput.addEventListener('input', async function() {
      clearTimeout(debounceTimer);
      const email = this.value.trim();
      
      if (email && email.includes('@')) {
        debounceTimer = setTimeout(async () => {
          await autoDetectRole(email);
        }, 500);
      } else {
        roleText.textContent = '—';
      }
    });
    
    // Function to auto-detect role from email
    async function autoDetectRole(email) {
      try {
        const { data, error } = await supabase
          .from('profiles')
          .select('role')
          .eq('email', email)
          .single();
        
        if (data && !error) {
          const role = data.role;
          // Capitalize first letter
          const formattedRole = role.charAt(0).toUpperCase() + role.slice(1);
          roleText.textContent = formattedRole;
        } else {
          roleText.textContent = '—';
        }
      } catch (error) {
        roleText.textContent = '—';
      }
    }
    
    // Show custom toast message
    function showToast(message, isError = false) {
      toastEl.textContent = message;
      toastEl.style.background = isError ? '#dc2626' : 'rgba(30, 24, 20, 0.95)';
      toastEl.classList.add('show');
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 3000);
    }
    
    // Hash password (same as signup)
    async function hashPassword(password, email) {
      const salt = email.toLowerCase().substring(0, 10);
      const saltedPassword = password + salt;
      const encoder = new TextEncoder();
      const data = encoder.encode(saltedPassword);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // Get device fingerprint
    async function getDeviceFingerprint() {
      const components = {
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        screenResolution: `${screen.width}x${screen.height}`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        hardwareConcurrency: navigator.hardwareConcurrency || 0,
        deviceMemory: navigator.deviceMemory || 0,
        touchPoints: navigator.maxTouchPoints || 0
      };
      return CryptoJS.SHA256(JSON.stringify(components)).toString();
    }
    
    // Get IP address
    async function getIPAddress() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        console.error('Failed to get IP:', error);
        return '0.0.0.0';
      }
    }
    
    // Handle login
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!email || !password) {
        showToast('Please enter both email and password', true);
        return;
      }
      
      // Disable button and show loading
      loginBtn.disabled = true;
      loginBtn.textContent = 'Authenticating...';
      
      try {
        // Hash the password
        const passwordHash = await hashPassword(password, email);
        const deviceId = await getDeviceFingerprint();
        const ipAddress = await getIPAddress();
        
        // Verify credentials
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('email', email)
          .eq('password_hash', passwordHash)
          .single();
        
        if (error || !profile) {
          showToast('Invalid email or password', true);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Log in →';
          return;
        }
        
        if (!profile.is_active) {
          showToast('Account is deactivated. Please contact support.', true);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Log in →';
          return;
        }
        
        // Create session token
        const sessionToken = CryptoJS.SHA256(`${profile.id}|${deviceId}|${Date.now()}|${Math.random()}`).toString();
        
        // Insert session (this will automatically kill other sessions via DB trigger)
        const { error: sessionError } = await supabase
          .from('user_sessions')
          .insert({
            user_id: profile.id,
            session_token: sessionToken,
            device_id: deviceId,
            device_name: navigator.userAgent.substring(0, 255),
            ip_address: ipAddress,
            expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
          });
        
        if (sessionError) throw sessionError;
        
        // Log the login in history
        await supabase.from('session_history').insert({
          user_id: profile.id,
          session_token: sessionToken,
          device_id: deviceId,
          device_name: navigator.userAgent.substring(0, 255),
          ip_address: ipAddress,
          action: 'LOGIN'
        });
        
        // Update last login info
        await supabase.from('profiles')
          .update({ 
            last_login_at: new Date().toISOString(), 
            last_login_ip: ipAddress 
          })
          .eq('id', profile.id);
        
        // Store session in localStorage
        localStorage.setItem('sessionToken', sessionToken);
        localStorage.setItem('userId', profile.id);
        localStorage.setItem('deviceId', deviceId);
        localStorage.setItem('userRole', profile.role);
        
        showToast(`✅ Welcome back, ${profile.full_name}!`);
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
        
      } catch (error) {
        console.error('Login error:', error);
        showToast('Login failed. Please try again.', true);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log in →';
      }
    }
    
    // Check if already logged in
    async function checkExistingSession() {
      const sessionToken = localStorage.getItem('sessionToken');
      const userId = localStorage.getItem('userId');
      
      if (sessionToken && userId) {
        const { data: session } = await supabase
          .from('user_sessions')
          .select('*')
          .eq('session_token', sessionToken)
          .eq('is_active', true)
          .single();
        
        if (session && new Date(session.expires_at) > new Date()) {
          showToast(`🔄 You're already logged in! Redirecting...`);
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        }
      }
    }
    
    // Attach event listener
    loginForm.addEventListener('submit', handleLogin);
    
    // Check existing session on page load
    checkExistingSession();
  </script>
</body>
</html>
