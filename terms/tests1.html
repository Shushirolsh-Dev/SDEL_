<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in · Asperthan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #DEB887;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
    }

    .back-link {
      color: #2c241e;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #f0e4d6;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .sub {
      color: #6b5a4a;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f1f1f;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8dfd5;
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.2s;
      background: #fefcf9;
    }

    input:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.2);
    }

    .btn-login {
      width: 100%;
      background: #1a1a1a;
      color: #DEB887;
      border: none;
      padding: 14px;
      border-radius: 200px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 24px;
      font-family: inherit;
    }

    .btn-login:hover {
      background: #2d2a27;
    }

    .signup-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #5e5243;
    }

    .signup-prompt a {
      color: #b87c3a;
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #7f6e5c;
      border-top: 1px solid #ece4db;
    }

    @media (max-width: 550px) {
      .navbar { padding: 16px 24px; }
      .login-card { padding: 32px 24px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="index.html" class="logo">ASPER·THAN</a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
  <div class="container">
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to access your dashboard</p>
      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@school.edu" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Log in →</button>
      </form>
      <div class="signup-prompt">
        Don't have an account? <a href="signup.html">Get started</a>
      </div>
    </div>
  </div>
  <div class="footer">
    Asperthan — immutable trust for K-12
  </div>
  <script>
    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (email && password) {
        alert(`Welcome back! (Demo login)\nRedirecting to dashboard...`);
        // In real implementation, this would redirect to dashboard
        window.location.href = 'index.html';
      } else {
        alert('Please enter both email and password.');
      }
    }
  </script>
</body>
</html>
