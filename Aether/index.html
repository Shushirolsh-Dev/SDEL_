<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aether — AI</title>
    <style>
        :root {
            --primary-orange: #FF6600;
            --bg-dark: #000000;
            --card-bg: #000000;
            --border-color: #222;
            --text-main: #fff;
            --text-secondary: #666;
            --action-hover: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Menlo', 'Monaco', 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 0;
            margin: 0 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-logo {
            width: 20px;
            height: 20px;
            background: var(--primary-orange);
            border-radius: 2px;
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scrollbar-width: thin;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #111;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary-orange);
            border-radius: 4px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
        }

        .message-username {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .message.aether .message-username {
            color: var(--primary-orange);
        }

        .message.user .message-username {
            color: var(--text-main);
            text-align: right;
        }

        .message-bubble {
            line-height: 1.6;
            font-size: 1rem;
            max-width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-bubble {
            text-align: right;
            color: #ccc;
        }

        /* Action tray — only for Aether messages */
        .message-actions {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .message:hover .message-actions {
            opacity: 1;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .action-btn:hover {
            color: var(--primary-orange);
        }

        /* Loading Dots */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding-top: 4px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background-color: var(--primary-orange);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.1; }
            20% { opacity: 1; }
            100% { opacity: 0.1; }
        }

        .chat-input-area {
            padding: 24px 32px;
            background: var(--bg-dark);
            flex-shrink: 0;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            align-items: center;
        }

        .input-container:focus-within {
            border-color: var(--primary-orange);
        }

        .chat-input {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .send-button {
            background: transparent;
            border: none;
            color: var(--primary-orange);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .send-button:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-logo"></div>
            <h1>Aether</h1>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask Aether...">
                <button class="send-button" id="sendButton">Run</button>
            </div>
        </div>
    </div>

    <script src="aether.js"></script>
    <script src="app.js"></script>
</body>
</html>
