<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether — AI</title>
    <style>
        :root {
            --primary-orange: #FF6600;
            --bg-dark: #000000;
            --card-bg: #000000;
            --border-color: #222;
            --text-main: #fff;
            --text-secondary: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Menlo', 'Monaco', 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 0;
            margin: 0 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 20px;
            height: 20px;
            /* Placeholder for your image URL */
            background-image: url('https://placehold.co/40x40/FF6600/000000?text=A');
            background-size: cover;
            border-radius: 4px;
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scrollbar-width: none;
        }

        .chat-messages::-webkit-scrollbar { display: none; }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
        }

        .message-username {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .message.aether .message-username {
            color: var(--primary-orange);
        }

        .message.user .message-username {
            color: var(--text-main);
            text-align: right;
        }

        .message-bubble {
            line-height: 1.6;
            font-size: 1rem;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            text-align: right;
            color: #ccc;
        }

        /* Loading Dots */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding-top: 4px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background-color: var(--primary-orange);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.1; }
            20% { opacity: 1; }
            100% { opacity: 0.1; }
        }

        .chat-input-area {
            padding: 24px 32px;
            background: var(--bg-dark);
        }

        .input-container {
            display: flex;
            gap: 12px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            align-items: center;
        }

        .input-container:focus-within {
            border-color: var(--primary-orange);
        }

        .chat-input {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        .send-button {
            background: transparent;
            border: none;
            color: var(--primary-orange);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .send-button:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-logo"></div>
            <h1>Aether</h1>
        </div>
        <div class="chat-messages" id="chatMessages">
            </div>
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message...">
                <button class="send-button" id="sendButton">Run</button>
            </div>
        </div>
    </div>

    <script>
        class AetherAI {
            constructor() {
                this.knowledge = {
                    "limit": "A limit is the value a function approaches as the input approaches some value.",
                    "derivative": "The derivative is the instantaneous rate of change of a function.",
                    "integral": "Integration finds the area under a curve, representing accumulation.",
                    "variable": "A variable is a container for data that can change during execution.",
                    "default": "I need more specific input to execute that request."
                }
            }
            ask(q) {
                const lower = q.toLowerCase();
                for (let key in this.knowledge) {
                    if (lower.includes(key)) return this.knowledge[key];
                }
                return this.knowledge.default;
            }
        }

        const ai = new AetherAI();
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        function typeEffect(element, text) {
            let i = 0;
            element.textContent = "";
            const interval = setInterval(() => {
                element.textContent += text[i];
                i++;
                chatMessages.scrollTop = chatMessages.scrollHeight;
                if (i >= text.length) clearInterval(interval);
            }, 20);
        }

        function createMessage(role, isInitial = false) {
            const container = document.createElement('div');
            container.className = `message ${role}`;
            
            const name = document.createElement('div');
            name.className = 'message-username';
            name.textContent = role === 'aether' ? 'Aether' : 'User';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            container.appendChild(name);
            container.appendChild(bubble);
            chatMessages.appendChild(container);
            return bubble;
        }

        function handleSend() {
            const val = chatInput.value.trim();
            if (!val) return;

            chatInput.value = '';
            const userBubble = createMessage('user');
            userBubble.textContent = val;

            // Loading state
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message aether';
            aiDiv.innerHTML = `<div class="message-username">Aether</div><div class="message-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
            chatMessages.appendChild(aiDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            setTimeout(() => {
                chatMessages.removeChild(aiDiv);
                const aiBubble = createMessage('aether');
                typeEffect(aiBubble, ai.ask(val));
            }, 1000);
        }

        sendButton.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        // Start
        const welcome = createMessage('aether');
        typeEffect(welcome, "Aether core initialized. Standing by for input.");
    </script>
</body>
</html>
