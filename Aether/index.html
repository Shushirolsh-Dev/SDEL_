<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether — Thesdel AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #111;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .chat-header {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .chat-header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.user .message-bubble {
            background: #FF6600;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.aether .message-bubble {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .message.user .message-avatar {
            background: #FF6600;
        }
        .chat-input-area {
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .chat-input:focus {
            outline: 2px solid #FF6600;
        }
        .send-button {
            padding: 12px 24px;
            background: #FF6600;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .send-button:hover {
            opacity: 0.8;
        }
        .typing {
            color: #888;
            font-size: 0.85rem;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Aether</h1>
            <p>Thesdel AI — Built from silence</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message aether">
                <div class="message-avatar">✨</div>
                <div class="message-bubble">Hey, I'm Aether. Ask me anything — math, physics, programming, or just talk. I'm here to help you learn.</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask Aether something...">
            <button class="send-button" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        // Aether — Pure AI, No APIs (inlined for simplicity)
        class Aether {
            constructor() {
                this.knowledge = {
                    "limit": "A limit is the value a function approaches as the input approaches some value. Think of getting closer to a point without necessarily reaching it. For example, as x gets closer to 2, (x² - 4)/(x - 2) gets closer to 4.",
                    "derivative": "The derivative measures how a function changes as its input changes. It's like the speed of a function. The derivative of x² is 2x — for every unit you move, the value changes by 2x.",
                    "integral": "Integration is the reverse of differentiation. It finds the area under a curve. If derivative is speed, integral is distance traveled.",
                    "variable": "A variable is like a labeled box where you store information. In programming, you can put things in (assign), take them out (read), and change them (reassign).",
                    "function": "A function is a reusable block of code that does one specific thing. Like a recipe — you give it ingredients (inputs), it does something, and gives you a result (output).",
                    "loop": "A loop repeats a block of code multiple times. For loop: 'do this 10 times'. While loop: 'keep doing this until something changes'.",
                    "thesdel": "Thesdel is the Students Digital Exchange Layer — an ecosystem for students to connect, study, buy/sell, and compete. Built by a student, for students.",
                    "aether": "I'm Aether! I'm the AI assistant for Thesdel. I help students learn, answer questions, and make studying less stressful. I'm still learning, so be patient with me.",
                    "default": "I'm still learning about that. Could you explain what you mean? Or ask me something about math, programming, or Thesdel."
                }
                
                this.triggers = {
                    "what is": "explain",
                    "explain": "explain",
                    "how do i": "explain",
                    "how to": "explain",
                    "meaning of": "explain",
                    "define": "explain",
                    "tell me about": "explain"
                }
            }
            
            ask(question) {
                const lower = question.toLowerCase().trim()
                
                for (const [key, answer] of Object.entries(this.knowledge)) {
                    if (lower.includes(key)) {
                        return answer
                    }
                }
                
                if (lower.includes("hello") || lower.includes("hi") || lower.includes("hey")) {
                    return "Hey! What do you want to learn today?"
                }
                
                if (lower.includes("thank")) {
                    return "You're welcome! Keep asking questions — that's how we learn."
                }
                
                return this.knowledge.default
            }
        }

        // Initialize Aether
        const aether = new Aether()
        
        // DOM elements
        const chatMessages = document.getElementById('chatMessages')
        const chatInput = document.getElementById('chatInput')
        const sendButton = document.getElementById('sendButton')
        
        function addMessage(role, content) {
            const messageDiv = document.createElement('div')
            messageDiv.className = `message ${role}`
            
            const avatar = document.createElement('div')
            avatar.className = 'message-avatar'
            avatar.textContent = role === 'user' ? '👤' : '✨'
            
            const bubble = document.createElement('div')
            bubble.className = 'message-bubble'
            bubble.textContent = content
            
            messageDiv.appendChild(avatar)
            messageDiv.appendChild(bubble)
            
            chatMessages.appendChild(messageDiv)
            chatMessages.scrollTop = chatMessages.scrollHeight
        }
        
        function sendMessage() {
            const question = chatInput.value.trim()
            if (!question) return
            
            chatInput.value = ''
            addMessage('user', question)
            
            // Small delay to feel natural
            setTimeout(() => {
                const answer = aether.ask(question)
                addMessage('aether', answer)
            }, 300)
        }
        
        sendButton.addEventListener('click', sendMessage)
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage()
        })
    </script>
</body>
</html>
