<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aether — AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-logo"></div>
            <h1>Aether</h1>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask Aether...">
                <button class="send-button" id="sendButton">Run</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // AETHER — Calls Supabase Edge Function
        // ============================================
        
        // 🔥 REPLACE WITH YOUR SUPABASE PROJECT REF AND ANON KEY
        const SUPABASE_URL = 'https://lgfyrlfjoazedwymjpfc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw';
        
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        // Typewriter effect
        async function typeEffect(element, text, speed = 18) {
            element.textContent = '';
            for (let i = 0; i < text.length; i++) {
                element.textContent += text[i];
                chatMessages.scrollTop = chatMessages.scrollHeight;
                await new Promise(r => setTimeout(r, speed));
            }
        }

        function addUserMessage(content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'message-username';
            nameDiv.textContent = 'User';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = content;
            
            messageDiv.appendChild(nameDiv);
            messageDiv.appendChild(bubbleDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message aether';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-username">Aether</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendToAether(question) {
            showTypingIndicator();
            
            try {
                // Call Supabase Edge Function
                const response = await fetch(`${SUPABASE_URL}/functions/v1/aether`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                
                // Create empty Aether message
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message aether';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'message-username';
                nameDiv.textContent = 'Aether';
                
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                bubbleDiv.style.color = '#ffffff';
                
                messageDiv.appendChild(nameDiv);
                messageDiv.appendChild(bubbleDiv);
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                messageDiv.appendChild(actionsDiv);
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // Type the answer
                const answer = data.answer || "I'm having trouble thinking right now.";
                await typeEffect(bubbleDiv, answer, 15);
                
                // Add action buttons
                actionsDiv.innerHTML = `
                    <button class="action-btn" data-action="copy">Copy</button>
                    <button class="action-btn" data-action="regenerate">Regenerate</button>
                `;
                actionsDiv.querySelectorAll('.action-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (btn.dataset.action === 'copy') {
                            navigator.clipboard.writeText(answer);
                        } else if (btn.dataset.action === 'regenerate') {
                            messageDiv.remove();
                            const lastUser = document.querySelectorAll('.message.user');
                            if (lastUser.length) {
                                const lastQ = lastUser[lastUser.length - 1].querySelector('.message-bubble').textContent;
                                sendToAether(lastQ);
                            }
                        }
                    });
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
            } catch (error) {
                hideTypingIndicator();
                console.error('Aether error:', error);
                addUserMessage("System");
                const errorMsg = "I'm having trouble connecting. Check console for details.";
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message aether';
                errorDiv.innerHTML = `<div class="message-username">Aether</div><div class="message-bubble">${errorMsg}</div>`;
                chatMessages.appendChild(errorDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function handleSend() {
            const q = chatInput.value.trim();
            if (!q) return;
            chatInput.value = '';
            addUserMessage(q);
            sendToAether(q);
        }

        sendButton.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });

        // Welcome message
        setTimeout(() => {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message aether';
            welcomeDiv.innerHTML = `<div class="message-username">Aether</div><div class="message-bubble">Aether core initialized. Ask me anything — I'm connected to real AI.</div>`;
            chatMessages.appendChild(welcomeDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 500);
    </script>
</body>
</html>
