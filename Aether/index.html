<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aether — AI</title>
    <style>
        :root {
            --primary-orange: #FF6600;
            --bg-dark: #000000;
            --card-bg: #000000;
            --border-color: #222;
            --text-main: #ffffff;
            --text-secondary: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-dark);
        }

        body {
            font-family: 'Inter', 'Menlo', 'Monaco', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 100%;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 0;
            margin: 0 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-logo {
            width: 20px;
            height: 20px;
            background: var(--primary-orange);
            border-radius: 2px;
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            min-height: 0;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
        }

        .message-username {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .message.aether .message-username {
            color: var(--primary-orange);
        }

        .message.user .message-username {
            color: var(--text-main);
            text-align: right;
        }

        .message-bubble {
            line-height: 1.6;
            font-size: 1rem;
            max-width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        .message.user .message-bubble {
            text-align: right;
            color: #cccccc;
        }

        .message-actions {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            transition: opacity 0.2s ease;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 0;
            text-transform: uppercase;
            font-weight: 500;
        }
        .action-btn:hover {
            color: var(--primary-orange);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding-top: 4px;
        }
        .typing-dot {
            width: 4px;
            height: 4px;
            background-color: var(--primary-orange);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.1; }
            20% { opacity: 1; }
            100% { opacity: 0.1; }
        }

        .chat-input-area {
            padding: 24px 32px;
            background: var(--bg-dark);
            flex-shrink: 0;
            border-top: 1px solid var(--border-color);
        }
        .input-container {
            display: flex;
            gap: 12px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            align-items: center;
        }
        .input-container:focus-within {
            border-color: var(--primary-orange);
        }
        .chat-input {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        .chat-input::placeholder {
            color: #444;
        }
        .send-button {
            background: transparent;
            border: none;
            color: var(--primary-orange);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .send-button:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-logo"></div>
            <h1>Aether</h1>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask Aether...">
                <button class="send-button" id="sendButton">Run</button>
            </div>
        </div>
    </div>

    <script>
        // Aether AI — with knowledge base
        class AetherAI {
            constructor() {
                this.knowledge = {
                    "limit": "A limit is the value a function approaches as the input approaches some value. Think of getting closer to a point without reaching it.",
                    "derivative": "The derivative measures how a function changes as its input changes. It's like the speed of a function.",
                    "integral": "Integration finds the area under a curve. It's the reverse of differentiation.",
                    "variable": "A variable is a container for data that can change. Like a labeled box for storing information.",
                    "function": "A function is a reusable block of code that does one specific thing. Like a recipe.",
                    "loop": "A loop repeats a block of code multiple times. 'Do this 10 times'.",
                    "thesdel": "Thesdel is the Students Digital Exchange Layer — an ecosystem for students to connect, study, buy/sell, and compete. Built by a student, for students.",
                    "aether": "I'm Aether. I help students learn without the noise. Ask me about math, programming, or Thesdel.",
                    "intensity": "Intensity usually refers to the amount of energy or power per unit area. In physics, it's power transferred per unit area. In everyday terms, it's the strength or force of something."
                }
            }
            
            ask(question) {
                const lower = question.toLowerCase().trim()
                for (let key in this.knowledge) {
                    if (lower.includes(key)) return this.knowledge[key]
                }
                if (lower.includes("hello") || lower.includes("hi") || lower.includes("hey")) {
                    return "Hey! What do you want to learn today?"
                }
                if (lower.includes("thank")) {
                    return "You're welcome! Keep asking questions — that's how we learn."
                }
                return "I'm still learning about that. Try asking about: limit, derivative, integral, variable, function, loop, thesdel, aether, or intensity."
            }
        }

        const ai = new AetherAI()
        const chatMessages = document.getElementById('chatMessages')
        const chatInput = document.getElementById('chatInput')
        const sendButton = document.getElementById('sendButton')

        // Typewriter effect
        async function typeEffect(element, text, speed = 18) {
            element.textContent = ''
            for (let i = 0; i < text.length; i++) {
                element.textContent += text[i]
                chatMessages.scrollTop = chatMessages.scrollHeight
                await new Promise(r => setTimeout(r, speed))
            }
        }

        function addUserMessage(content) {
            const messageDiv = document.createElement('div')
            messageDiv.className = 'message user'
            
            const nameDiv = document.createElement('div')
            nameDiv.className = 'message-username'
            nameDiv.textContent = 'User'
            
            const bubbleDiv = document.createElement('div')
            bubbleDiv.className = 'message-bubble'
            bubbleDiv.textContent = content
            
            messageDiv.appendChild(nameDiv)
            messageDiv.appendChild(bubbleDiv)
            chatMessages.appendChild(messageDiv)
            chatMessages.scrollTop = chatMessages.scrollHeight
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div')
            typingDiv.className = 'message aether'
            typingDiv.id = 'typingIndicator'
            typingDiv.innerHTML = `
                <div class="message-username">Aether</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `
            chatMessages.appendChild(typingDiv)
            chatMessages.scrollTop = chatMessages.scrollHeight
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator')
            if (el) el.remove()
        }

        async function sendToAether(question) {
            showTypingIndicator()
            await new Promise(r => setTimeout(r, 300))
            hideTypingIndicator()
            
            // Create empty Aether message
            const messageDiv = document.createElement('div')
            messageDiv.className = 'message aether'
            
            const nameDiv = document.createElement('div')
            nameDiv.className = 'message-username'
            nameDiv.textContent = 'Aether'
            
            const bubbleDiv = document.createElement('div')
            bubbleDiv.className = 'message-bubble'
            bubbleDiv.style.color = '#ffffff'
            
            messageDiv.appendChild(nameDiv)
            messageDiv.appendChild(bubbleDiv)
            
            // Add action container (will fill after typing)
            const actionsDiv = document.createElement('div')
            actionsDiv.className = 'message-actions'
            messageDiv.appendChild(actionsDiv)
            
            chatMessages.appendChild(messageDiv)
            chatMessages.scrollTop = chatMessages.scrollHeight
            
            // Get answer and type it
            const answer = ai.ask(question)
            await typeEffect(bubbleDiv, answer, 15)
            
            // Add action buttons after typing
            actionsDiv.innerHTML = `
                <button class="action-btn" data-action="copy">Copy</button>
                <button class="action-btn" data-action="regenerate">Regenerate</button>
            `
            actionsDiv.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation()
                    if (btn.dataset.action === 'copy') {
                        navigator.clipboard.writeText(answer)
                    } else if (btn.dataset.action === 'regenerate') {
                        messageDiv.remove()
                        const lastUser = document.querySelectorAll('.message.user')
                        if (lastUser.length) {
                            const lastQ = lastUser[lastUser.length - 1].querySelector('.message-bubble').textContent
                            sendToAether(lastQ)
                        }
                    }
                })
            })
            chatMessages.scrollTop = chatMessages.scrollHeight
        }

        function handleSend() {
            const q = chatInput.value.trim()
            if (!q) return
            chatInput.value = ''
            addUserMessage(q)
            sendToAether(q)
        }

        sendButton.addEventListener('click', handleSend)
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend() })

        // Welcome
        setTimeout(() => {
            addUserMessage('Hello')
            sendToAether('Hello')
        }, 500)
    </script>
</body>
</html>
