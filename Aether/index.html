<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether — AI</title>
    <style>
        :root {
            --primary-orange: #FF6600;
            --bg-dark: #000000;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Menlo', monospace;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents body bounce on mobile */
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        /* HEADER */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-dark);
        }

        .header-logo {
            width: 24px;
            height: 24px;
            background: var(--primary-orange);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 14px;
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* MESSAGES AREA */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            /* Makes text selectable */
            user-select: text;
            -webkit-user-select: text;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .message-username {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .message.aether .message-username { color: var(--primary-orange); }
        .message.user .message-username { color: #fff; text-align: right; }

        .message-bubble {
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap; /* Preserves code formatting/spacing */
        }

        .message.user .message-bubble { text-align: right; color: #bbb; }

        /* TYPING INDICATOR */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 5px 0;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: var(--primary-orange);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* INPUT AREA - LOCKED TO BOTTOM */
        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-dark);
            padding-bottom: env(safe-area-inset-bottom, 15px); /* iOS notch fix */
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #0d0d0d;
            border: 1px solid var(--primary-orange);
            border-radius: 8px;
            padding: 5px 15px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 0;
            font-size: 1rem;
            outline: none;
        }

        .run-btn {
            background: transparent;
            border: none;
            color: var(--primary-orange);
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        /* Responsive Fix for Keyboard */
        @media (max-height: 500px) {
            .chat-header { display: none; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <header class="chat-header">
        <div class="header-logo">A</div>
        <h1>Aether</h1>
    </header>

    <main class="chat-messages" id="chatWindow">
        <div class="message aether">
            <span class="message-username">Aether</span>
            <div class="message-bubble" id="init-text"></div>
        </div>
    </main>

    <footer class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" class="chat-input" placeholder="Type a message..." autocomplete="off">
            <button class="run-btn" id="sendBtn">Run</button>
        </div>
    </footer>
</div>

<script>
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    const Knowledge = {
        "hello": "Aether core online. Input query.",
        "hi": "Aether core online. Input query.",
        "who are you": "I am Aether. The digital intelligence layer for Thesdel.",
        "default": "I need more specific input to execute that request."
    };

    function typeWriter(element, text, speed = 25) {
        let i = 0;
        element.innerHTML = "";
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                chatWindow.scrollTop = chatWindow.scrollHeight;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function addMessage(role, text, isTyping = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        const name = document.createElement('span');
        name.className = 'message-username';
        name.textContent = role === 'aether' ? 'Aether' : 'User';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        if (isTyping) {
            bubble.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        } else {
            bubble.textContent = text;
        }

        msgDiv.appendChild(name);
        msgDiv.appendChild(bubble);
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        
        return bubble;
    }

    function handleReply(input) {
        const loadingBubble = addMessage('aether', '', true);
        
        setTimeout(() => {
            // Remove the loading dots container
            const parent = loadingBubble.closest('.message');
            chatWindow.removeChild(parent);
            
            // Add the real reply with typewriter
            const response = Knowledge[input.toLowerCase()] || Knowledge["default"];
            const realBubble = addMessage('aether', '');
            typeWriter(realBubble, response);
        }, 1000);
    }

    function process() {
        const text = userInput.value.trim();
        if (!text) return;
        
        userInput.value = '';
        addMessage('user', text);
        handleReply(text);
    }

    sendBtn.addEventListener('click', process);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') process(); });

    // Initial sequence
    window.onload = () => {
        typeWriter(document.getElementById('init-text'), "Aether core initialized. Standing by for input.");
    };
</script>

</body>
                </html>
