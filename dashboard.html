<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"><title>The Vault - Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;background-color:#000;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
#app{position:relative;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.glass-panel{background:rgba(18,18,18,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05)}
.nav-active{color:#ff6600!important}.nav-active i{color:#ff6600!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.animate-fade{animation:fadeIn .4s ease-out}
.animate-slide{animation:slideIn .3s ease-out}
.lecture-card{transition:all 0.3s ease}.lecture-past{opacity:0.5;background:rgba(50,50,50,0.5);border-color:#444}.lecture-card:hover{transform:translateX(5px)}
.tab-active{border-bottom:2px solid #ff6600;color:#ff6600}
.carousel-container{position:relative;overflow:hidden;border-radius:1rem}
.carousel-track{display:flex;transition:transform 0.5s ease-in-out}
.carousel-item{flex:0 0 100%;padding:1rem}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.7);border:none;color:#ff6600;font-size:1.5rem;cursor:pointer;padding:0.5rem 1rem;z-index:10;border-radius:50%;transition:all 0.2s}
.carousel-btn:hover{background:#ff6600;color:#000}
.carousel-prev{left:0}
.carousel-next{right:0}
.carousel-dots{display:flex;justify-content:center;gap:0.5rem;margin-top:1rem}
.dot{width:8px;height:8px;border-radius:50%;background:#444;cursor:pointer;transition:all 0.2s}
.dot.active{background:#ff6600;width:24px;border-radius:4px}

/* AGGRESSIVE MOBILE BOTTOM NAV FIX */
.bottom-nav-fix{position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom, 10px);background:transparent;pointer-events:none}
.bottom-nav-fix .nav-container{pointer-events:auto;width:92%;margin:0 auto 12px auto;background:rgba(18,18,18,.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:10px 16px;display:flex;justify-content:space-around;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.bottom-nav-fix a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:#6b7280;transition:all 0.2s ease}
.bottom-nav-fix a i{font-size:1.25rem}
.bottom-nav-fix a span{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
.bottom-nav-fix a.nav-active{color:#ff6600}
.content-pb{padding-bottom:calc(80px + env(safe-area-inset-bottom, 0px))}
</style></head><body><div id="app" class="content-pb"><div class="p-5"><header class="flex justify-between items-start mb-10"><div><h1 class="text-3xl font-extrabold tracking-tight">Hey, <span class="text-orange-500" id="userFirstName">---</span></h1><p class="text-gray-500 text-sm font-medium uppercase tracking-widest h-5" id="dynamic-greeting"></p></div><div class="glass-panel px-4 py-2 rounded-xl text-right"><p class="text-xl font-black text-white" id="clock">00:00</p></div></header>

<!-- Dynamic Content Area -->
<main class="animate-fade" id="main-content"></main>

<!-- Modals -->
<div id="createModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Create New Class</h3><button onclick="closeCreateModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="createClassForm"><input type="text" id="className" placeholder="Class Name *" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><textarea id="classDescription" placeholder="Class Description" rows="3" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><div class="mb-4 space-y-2"><label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer"><input type="radio" name="joinType" value="open" checked class="mr-3"><span class="text-white">🌍 Anyone can join</span></label><label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer"><input type="radio" name="joinType" value="approval" class="mr-3"><span class="text-white">🔐 Approval required</span></label></div><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Create Class</button></form><div id="createMessage" class="mt-3 text-sm"></div></div></div>

<div id="joinModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Join a Class</h3><button onclick="closeJoinModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><div><input type="text" id="joinClassCode" placeholder="Enter class code" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white font-mono"><button onclick="submitJoin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Join Class</button></div><div id="joinMessage" class="mt-3 text-sm"></div></div></div>

<div id="announcementModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Make Announcement</h3><button onclick="closeAnnouncementModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="announcementForm"><input type="text" id="announcementTitle" placeholder="Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><textarea id="announcementText" rows="3" placeholder="Content" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><input type="datetime-local" id="announcementStart" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="datetime-local" id="announcementEnd" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Post Announcement</button></form><div id="announcementMessage" class="mt-3 text-sm"></div></div></div>

<div id="lectureModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Add Lecture</h3><button onclick="closeLectureModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="lectureForm"><input type="text" id="lectureTitle" placeholder="Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><select id="lectureDay" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><option value="">Select Day</option><option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option></select><input type="time" id="lectureTime" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="lectureDuration" placeholder="Duration" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="lectureVenue" placeholder="Venue" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Add Lecture</button></form><div id="lectureMessage" class="mt-3 text-sm"></div></div></div>

<div id="examModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Schedule Exam</h3><button onclick="closeExamModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="examForm"><input type="text" id="examTitle" placeholder="Exam Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="date" id="examDate" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="time" id="examTime" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="examVenue" placeholder="Venue" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Schedule Exam</button></form><div id="examMessage" class="mt-3 text-sm"></div></div></div>

<div id="renameModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Rename Class</h3><button onclick="closeRenameModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><input type="text" id="newClassName" placeholder="New Class Name" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button onclick="renameClass()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Update Name</button></div></div>

<div id="descriptionModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Edit Description</h3><button onclick="closeDescriptionModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><textarea id="newClassDescription" rows="4" placeholder="Class Description" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><button onclick="updateDescription()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Update Description</button></div></div>

</div></div>

<!-- BOTTOM NAV - AGGRESSIVE MOBILE FIX -->
<div class="bottom-nav-fix"><div class="nav-container" id="bottomNav"></div></div>

<script>
const _URL="https://lgfyrlfjoazedwymjpfc.supabase.co";
const _KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
const sb=supabase.createClient(_URL,_KEY);
let currentUser = null;
let currentClass = null;
let userRole = null;
let currentPage = 'home';
let timetableTab = 'lectures';
let announcements = [];
let carouselIndex = 0;
let carouselInterval = null;

function showToast(msg, type){alert(msg);}
function generateClassCode(){const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';let result='';for(let i=0;i<10;i++){result+=chars.charAt(Math.floor(Math.random()*chars.length));}return'THESDEL-'+result;}

async function loadUserFirstName() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const { data: profile } = await sb.from('profile').select('first_name').eq('id', user.id).single();
    if (profile?.first_name) document.getElementById('userFirstName').innerText = profile.first_name;
    else document.getElementById('userFirstName').innerText = user.email?.split('@')[0] || 'User';
}

function navigateTo(page){
    if(currentPage === page) return;
    currentPage = page;
    const container = document.getElementById('main-content');
    container.style.animation = 'none';
    container.offsetHeight;
    container.style.animation = 'slideIn 0.3s ease-out';
    renderPage();
    updateBottomNavActive();
}

function updateBottomNavActive(){
    document.querySelectorAll('#bottomNav a').forEach(link => {
        const page = link.getAttribute('data-page');
        if(page === currentPage) link.classList.add('nav-active');
        else link.classList.remove('nav-active');
    });
}

function renderPage(){
    const container = document.getElementById('main-content');
    if(currentPage === 'home') container.innerHTML = renderHomePage();
    else if(currentPage === 'timetable') container.innerHTML = renderTimetablePage();
    else if(currentPage === 'tests') container.innerHTML = renderTestsPage();
    else if(currentPage === 'ranks') container.innerHTML = renderRanksPage();
    else if(currentPage === 'profile') container.innerHTML = renderProfilePage();
    attachPageEvents();
}

function renderHomePage(){
    if(userRole === 'rep'){
        return `
            <div class="glass-panel p-6 rounded-3xl mb-6 border-l-4 border-orange-600">
                <div class="flex justify-between items-start flex-wrap gap-4 mb-4">
                    <div><h2 class="text-2xl font-black">${escapeHtml(currentClass?.name || 'Class')}</h2>
                    <div class="flex items-start gap-2 mt-1"><p class="text-gray-400 text-sm">${escapeHtml(currentClass?.description || 'No description')}</p><button onclick="openDescriptionModal()" class="text-xs text-orange-500"><i class="fas fa-edit"></i></button></div></div>
                    <div class="flex gap-2"><code class="text-xs bg-black/50 px-2 py-1 rounded font-mono text-orange-500">${currentClass?.class_code || ''}</code><button onclick="openRenameModal()" class="text-xs bg-white/10 px-2 py-1 rounded hover:bg-white/20"><i class="fas fa-edit"></i></button></div>
                </div>
                <button onclick="openAnnouncementModal()" class="w-full bg-orange-600 text-white font-bold py-2 rounded-xl mb-3"><i class="fas fa-bullhorn"></i> Make Announcement</button>
                <button onclick="shareInviteLink()" class="w-full glass-panel py-2 rounded-xl text-sm"><i class="fas fa-share-alt"></i> Share Invite Link</button>
            </div>
            <div id="announcementsCarousel" class="glass-panel p-4 rounded-3xl mb-6"></div>
            <div class="glass-panel p-6 rounded-3xl"><h3 class="font-bold mb-3"><i class="fas fa-history text-orange-500"></i> Past Announcements</h3><div id="pastAnnouncementsList" class="space-y-3 max-h-64 overflow-y-auto"></div></div>
        `;
    } else if(userRole === 'member'){
        return `
            <div class="glass-panel p-6 rounded-3xl mb-6 border-l-4 border-green-500">
                <div class="flex justify-between items-start"><div><h2 class="text-2xl font-black">${escapeHtml(currentClass?.name || 'Class')}</h2><p class="text-gray-400 text-sm mt-1">${escapeHtml(currentClass?.description || 'No description')}</p><div class="flex gap-2 mt-2"><span class="text-xs bg-green-500/20 text-green-500 px-2 py-1 rounded-full"><i class="fas fa-user-check"></i> Member</span></div></div><button onclick="leaveClass()" class="text-xs bg-red-500/20 text-red-500 px-3 py-1 rounded-full"><i class="fas fa-sign-out-alt"></i> Leave Class</button></div>
            </div>
            <div class="glass-panel p-6 rounded-3xl mb-6"><h3 class="font-bold mb-3">Today's Lectures</h3><div id="lecturesList" class="space-y-3"></div></div>
            <div id="announcementsCarouselMember" class="glass-panel p-4 rounded-3xl mb-6"></div>
            <div class="glass-panel p-6 rounded-3xl"><h3 class="font-bold mb-3">Past Announcements</h3><div id="pastAnnouncementsListMember" class="space-y-3 max-h-64 overflow-y-auto"></div></div>
        `;
    } else {
        return `<div class="glass-panel p-8 rounded-3xl text-center"><div class="w-20 h-20 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-graduation-cap text-3xl text-orange-500"></i></div><h2 class="text-2xl font-black mb-2">Join a Class or Create One</h2><p class="text-gray-400 mb-6">Get started by joining an existing class or creating your own.</p><div class="grid grid-cols-2 gap-4"><button onclick="showJoinModal()" class="bg-blue-600 py-3 rounded-xl font-bold">Join Class</button><button onclick="showCreateModal()" class="bg-orange-600 py-3 rounded-xl font-bold">Create Class</button></div></div>`;
    }
}

function renderTimetablePage(){
    return `<div class="glass-panel p-6 rounded-3xl"><div class="flex gap-4 mb-6 border-b border-white/10"><button onclick="switchTimetableTab('lectures')" id="lecturesTab" class="pb-2 px-4 font-bold tab-active text-white">📚 Lectures</button><button onclick="switchTimetableTab('exams')" id="examsTab" class="pb-2 px-4 font-bold text-gray-400 text-white">📝 Exams</button></div><div id="timetableContent"><div class="text-center text-gray-400 py-8"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div></div>`;
}

function switchTimetableTab(tab){
    timetableTab = tab;
    const lecturesTab = document.getElementById('lecturesTab');
    const examsTab = document.getElementById('examsTab');
    if(tab === 'lectures'){lecturesTab.classList.add('tab-active');lecturesTab.classList.remove('text-gray-400');examsTab.classList.remove('tab-active');examsTab.classList.add('text-gray-400');loadLecturesTimetable();}
    else{examsTab.classList.add('tab-active');examsTab.classList.remove('text-gray-400');lecturesTab.classList.remove('tab-active');lecturesTab.classList.add('text-gray-400');loadExamsTimetable();}
}

function openLectureModal(){document.getElementById('lectureModal').classList.remove('hidden');}
function closeLectureModal(){document.getElementById('lectureModal').classList.add('hidden');document.getElementById('lectureForm').reset();}
function openExamModal(){document.getElementById('examModal').classList.remove('hidden');}
function closeExamModal(){document.getElementById('examModal').classList.add('hidden');document.getElementById('examForm').reset();}
function openRenameModal(){document.getElementById('renameModal').classList.remove('hidden');}
function closeRenameModal(){document.getElementById('renameModal').classList.add('hidden');document.getElementById('newClassName').value='';}
function openDescriptionModal(){document.getElementById('descriptionModal').classList.remove('hidden');document.getElementById('newClassDescription').value=currentClass?.description||'';}
function closeDescriptionModal(){document.getElementById('descriptionModal').classList.add('hidden');}

async function renameClass(){
    const newName = document.getElementById('newClassName').value.trim();
    if(!newName){alert('Enter new class name');return;}
    const { error } = await sb.from('classes').update({ name: newName }).eq('id', currentClass.id);
    if(error){alert('Error: '+error.message);}else{currentClass.name = newName;closeRenameModal();renderPage();showToast('Class renamed!','success');}
}

async function updateDescription(){
    const newDesc = document.getElementById('newClassDescription').value.trim();
    const { error } = await sb.from('classes').update({ description: newDesc }).eq('id', currentClass.id);
    if(error){alert('Error: '+error.message);}else{currentClass.description = newDesc;closeDescriptionModal();renderPage();showToast('Description updated!','success');}
}

async function leaveClass(){
    if(!confirm('Leave this class?')) return;
    const { error } = await sb.from('class_members').delete().eq('class_id', currentClass.id).eq('user_id', currentUser.id);
    if(error){alert('Error: '+error.message);}else{window.location.reload();}
}

document.getElementById('lectureForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('lectureTitle').value.trim();
    const day_of_week = document.getElementById('lectureDay').value;
    const time = document.getElementById('lectureTime').value;
    const duration = document.getElementById('lectureDuration').value.trim();
    const venue = document.getElementById('lectureVenue').value.trim();
    if(!title || !day_of_week || !time || !duration || !venue){document.getElementById('lectureMessage').innerHTML = '<div class="text-red-500">All fields required</div>';return;}
    const { error } = await sb.from('class_lectures').insert([{class_id: currentClass.id, title, day_of_week, time, duration, venue}]);
    if(error){document.getElementById('lectureMessage').innerHTML = '<div class="text-red-500">Error: ' + error.message + '</div>';}
    else{closeLectureModal();if(timetableTab === 'lectures') loadLecturesTimetable();showToast('Lecture added!','success');}
});

document.getElementById('examForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('examTitle').value.trim();
    const exam_date = document.getElementById('examDate').value;
    const time = document.getElementById('examTime').value;
    const venue = document.getElementById('examVenue').value.trim();
    if(!title || !exam_date || !time || !venue){document.getElementById('examMessage').innerHTML = '<div class="text-red-500">All fields required</div>';return;}
    const { error } = await sb.from('class_exams').insert([{class_id: currentClass.id, title, exam_date, time, venue}]);
    if(error){document.getElementById('examMessage').innerHTML = '<div class="text-red-500">Error: ' + error.message + '</div>';}
    else{closeExamModal();if(timetableTab === 'exams') loadExamsTimetable();showToast('Exam scheduled!','success');}
});

async function loadAnnouncements(){
    if(!currentClass) return;
    const now = new Date().toISOString();
    const { data: active } = await sb.from('class_announcements').select('*').eq('class_id', currentClass.id).lte('start_time', now).gte('end_time', now).order('created_at', { ascending: false });
    const { data: past } = await sb.from('class_announcements').select('*').eq('class_id', currentClass.id).lt('end_time', now).order('end_time', { ascending: false });
    if(active && active.length > 0) initCarousel(active);
    if(past && past.length > 0) displayPastAnnouncements(past);
}

function initCarousel(announcementsList){
    announcements = announcementsList;
    carouselIndex = 0;
    if(carouselInterval) clearInterval(carouselInterval);
    const container = document.getElementById(userRole === 'rep' ? 'announcementsCarousel' : 'announcementsCarouselMember');
    if(!container) return;
    if(announcements.length === 0){container.innerHTML = '<div class="text-center text-gray-400 py-4">No active announcements</div>';return;}
    container.innerHTML = `<div class="carousel-container"><div class="carousel-track" id="carouselTrack"></div><button class="carousel-btn carousel-prev" onclick="prevSlide()">❮</button><button class="carousel-btn carousel-next" onclick="nextSlide()">❯</button></div><div class="carousel-dots" id="carouselDots"></div>`;
    const track = document.getElementById('carouselTrack');
    announcements.forEach(ann => {track.innerHTML += `<div class="carousel-item"><div class="bg-orange-500/10 p-4 rounded-xl border-l-4 border-orange-500"><div class="flex justify-between items-start mb-2"><h4 class="font-bold text-orange-500">${escapeHtml(ann.title)}</h4><span class="text-xs text-gray-500">${new Date(ann.start_time).toLocaleString()}</span></div><p class="text-sm">${escapeHtml(ann.content)}</p></div></div>`;});
    const dotsContainer = document.getElementById('carouselDots');
    announcements.forEach((_, i) => {const dot = document.createElement('div');dot.classList.add('dot');if(i === 0) dot.classList.add('active');dot.onclick = () => goToSlide(i);dotsContainer.appendChild(dot);});
    updateCarousel();
    carouselInterval = setInterval(nextSlide, 5000);
}

function updateCarousel(){const track = document.getElementById('carouselTrack');if(track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;document.querySelectorAll('.dot').forEach((dot, i) => {if(i === carouselIndex) dot.classList.add('active');else dot.classList.remove('active');});}
function nextSlide(){if(announcements.length === 0) return;carouselIndex = (carouselIndex + 1) % announcements.length;updateCarousel();}
function prevSlide(){if(announcements.length === 0) return;carouselIndex = (carouselIndex - 1 + announcements.length) % announcements.length;updateCarousel();}
function goToSlide(index){carouselIndex = index;updateCarousel();}

function displayPastAnnouncements(past){
    const container = document.getElementById(userRole === 'rep' ? 'pastAnnouncementsList' : 'pastAnnouncementsListMember');
    if(!container) return;
    if(past.length === 0){container.innerHTML = '<p class="text-gray-500 text-sm">No past announcements</p>';return;}
    container.innerHTML = past.map(ann => `<div class="bg-white/5 p-3 rounded-xl opacity-60"><div class="flex justify-between items-start mb-2"><h4 class="font-bold text-sm">${escapeHtml(ann.title)}</h4><span class="text-xs text-gray-500">Expired: ${new Date(ann.end_time).toLocaleString()}</span></div><p class="text-xs text-gray-400">${escapeHtml(ann.content)}</p></div>`).join('');
}

document.getElementById('announcementForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('announcementTitle').value.trim();
    const content = document.getElementById('announcementText').value.trim();
    const start_time = document.getElementById('announcementStart').value;
    const end_time = document.getElementById('announcementEnd').value;
    if(!title || !content || !start_time || !end_time){document.getElementById('announcementMessage').innerHTML = '<div class="text-red-500">All fields required</div>';return;}
    const { error } = await sb.from('class_announcements').insert([{class_id: currentClass.id, title, content, start_time, end_time, created_by: currentUser.id}]);
    if(error){document.getElementById('announcementMessage').innerHTML = '<div class="text-red-500">Error: ' + error.message + '</div>';}
    else{closeAnnouncementModal();loadAnnouncements();showToast('Announcement posted!','success');}
});

async function loadLecturesTimetable(){
    const container = document.getElementById('timetableContent');
    const { data: lectures } = await sb.from('class_lectures').select('*').eq('class_id', currentClass?.id).order('day_of_week', { ascending: true }).order('time', { ascending: true });
    if(!lectures || lectures.length === 0){container.innerHTML = `<div class="text-center text-gray-400 py-8"><p>No lectures scheduled</p>${userRole === 'rep' ? '<button onclick="openLectureModal()" class="mt-4 bg-orange-600 px-4 py-2 rounded-lg text-sm text-white">+ Add Lecture</button>' : ''}</div>`;return;}
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];let html = '';
    days.forEach(day => {const dayLectures = lectures.filter(l => l.day_of_week === day);if(dayLectures.length > 0){html += `<div class="mb-6"><h3 class="font-bold mb-2 text-orange-500">${day}</h3><div class="space-y-2">`;dayLectures.forEach(lecture => {let displayTime = lecture.time;if(lecture.time && !lecture.time.includes('AM') && !lecture.time.includes('PM')){const [hour, minute] = lecture.time.split(':');let h = parseInt(hour);const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${minute} ${ampm}`;}html += `<div class="glass-panel p-3 rounded-xl flex justify-between items-center"><div><h4 class="font-bold text-sm text-white">${escapeHtml(lecture.title)}</h4><p class="text-xs text-gray-400">${displayTime} • ${lecture.duration} • ${escapeHtml(lecture.venue || 'Online')}</p></div>${userRole === 'rep' ? `<button onclick="deleteLecture(${lecture.id})" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button>` : ''}</div>`;});html += `</div></div>`;}});
    if(userRole === 'rep'){html += `<button onclick="openLectureModal()" class="w-full mt-4 glass-panel py-2 rounded-xl text-orange-500">+ Add Lecture</button>`;}
    container.innerHTML = html;
}

async function loadExamsTimetable(){
    const container = document.getElementById('timetableContent');
    const { data: exams } = await sb.from('class_exams').select('*').eq('class_id', currentClass?.id).order('exam_date', { ascending: true });
    if(!exams || exams.length === 0){container.innerHTML = `<div class="text-center text-gray-400 py-8"><p>No exams scheduled</p>${userRole === 'rep' ? '<button onclick="openExamModal()" class="mt-4 bg-orange-600 px-4 py-2 rounded-lg text-sm text-white">+ Schedule Exam</button>' : ''}</div>`;return;}
    let html = `<div class="space-y-3">`;
    exams.forEach(exam => {const examDate = new Date(exam.exam_date);const isPast = examDate < new Date();let displayTime = exam.time;if(exam.time && !exam.time.includes('AM') && !exam.time.includes('PM')){const [hour, minute] = exam.time.split(':');let h = parseInt(hour);const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${minute} ${ampm}`;}html += `<div class="glass-panel p-4 rounded-xl ${isPast ? 'opacity-50' : 'border-l-4 border-orange-500'}"><div class="flex justify-between items-start"><div><h4 class="font-bold text-white">${escapeHtml(exam.title)}</h4><p class="text-xs text-gray-400 mt-1">📅 ${new Date(exam.exam_date).toLocaleDateString()} • ⏰ ${displayTime} • 📍 ${escapeHtml(exam.venue || 'Online')}</p></div>${userRole === 'rep' ? `<button onclick="deleteExam(${exam.id})" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button>` : ''}</div></div>`;});
    html += `</div>`;
    if(userRole === 'rep'){html += `<button onclick="openExamModal()" class="w-full mt-4 glass-panel py-2 rounded-xl text-orange-500">+ Schedule Exam</button>`;}
    container.innerHTML = html;
}

function deleteLecture(id){if(confirm('Delete this lecture?')){sb.from('class_lectures').delete().eq('id', id).then(() => loadLecturesTimetable());}}
function deleteExam(id){if(confirm('Delete this exam?')){sb.from('class_exams').delete().eq('id', id).then(() => loadExamsTimetable());}}

function renderTestsPage(){return `<div class="glass-panel p-6 rounded-3xl text-center"><i class="fas fa-pen-fancy text-5xl text-orange-500 mb-4"></i><h2 class="text-2xl font-bold mb-2 text-white">Tests Coming Soon</h2><p class="text-gray-400">Your class tests will appear here.</p></div>`;}
function renderRanksPage(){return `<div class="glass-panel p-6 rounded-3xl text-center"><i class="fas fa-trophy text-5xl text-orange-500 mb-4"></i><h2 class="text-2xl font-bold mb-2 text-white">Leaderboard</h2><p class="text-gray-400">Class rankings coming soon.</p></div>`;}

            <div class="w-20 h-20 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-user text-3xl text-orange-500"></i></div>

    `;

async function logout(){
    await sb.auth.signOut();
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = 'login.html';
    window.history.pushState(null, '', 'login.html');
}

function attachPageEvents(){
    if(userRole === 'member') loadTodayLectures();
    if(currentPage === 'timetable') loadLecturesTimetable();
    if(currentClass && (userRole === 'rep' || userRole === 'member')) loadAnnouncements();
}

async function loadTodayLectures(){
    const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
    const { data: lectures } = await sb.from('class_lectures').select('*').eq('class_id', currentClass?.id).eq('day_of_week', today);
    const container = document.getElementById('lecturesList');if(!container) return;
    if(!lectures || lectures.length === 0){container.innerHTML = '<div class="text-center text-gray-400 py-4">No lectures today</div>';return;}
    const now = new Date();const currentHour = now.getHours();const currentMinute = now.getMinutes();
    container.innerHTML = lectures.map(lecture => {let [hour, minute] = lecture.time.split(':');let lectureHour = parseInt(hour);let lectureMinute = parseInt(minute) || 0;let isPast = (lectureHour < currentHour) || (lectureHour === currentHour && lectureMinute < currentMinute);let displayTime = lecture.time;if(lecture.time && !lecture.time.includes('AM') && !lecture.time.includes('PM')){let h = lectureHour;const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${lectureMinute.toString().padStart(2,'0')} ${ampm}`;}return `<div class="lecture-card glass-panel p-4 rounded-xl border-l-4 ${isPast ? 'lecture-past border-gray-500' : 'border-green-500'}"><div class="flex justify-between items-start"><div><h4 class="font-bold text-white">${escapeHtml(lecture.title)}</h4><p class="text-xs text-gray-400 mt-1">${displayTime} • ${lecture.duration} • ${escapeHtml(lecture.venue)}</p></div>${isPast ? '<span class="text-xs text-gray-500"><i class="fas fa-check-circle"></i> Completed</span>' : '<span class="text-xs text-green-500"><i class="fas fa-play-circle"></i> Upcoming</span>'}</div></div>`;}).join('');
}

function openAnnouncementModal(){document.getElementById('announcementModal').classList.remove('hidden');}
function closeAnnouncementModal(){document.getElementById('announcementModal').classList.add('hidden');document.getElementById('announcementForm').reset();}
function shareInviteLink(){if(currentClass){const link=`${window.location.origin}/join.html?code=${currentClass.class_code}`;navigator.clipboard.writeText(link);alert('Invite link copied!');}}
function showCreateModal(){document.getElementById('createModal').classList.remove('hidden');}
function closeCreateModal(){document.getElementById('createModal').classList.add('hidden');document.getElementById('createClassForm').reset();}
function showJoinModal(){document.getElementById('joinModal').classList.remove('hidden');}
function closeJoinModal(){document.getElementById('joinModal').classList.add('hidden');document.getElementById('joinClassCode').value='';}

async function submitJoin(){
    const code=document.getElementById('joinClassCode').value.trim();const msgDiv=document.getElementById('joinMessage');
    if(!code){msgDiv.innerHTML='<div class="text-red-500">Enter class code</div>';return;}
    const{data:classData,error}=await sb.from('classes').select('*').eq('class_code',code).single();
    if(error||!classData){msgDiv.innerHTML='<div class="text-red-500">Invalid class code</div>';return;}
    if(classData.join_type==='open'){
        const{error:joinErr}=await sb.from('class_members').insert([{class_id:classData.id,user_id:currentUser.id,user_email:currentUser.email}]);
        if(joinErr){msgDiv.innerHTML='<div class="text-red-500">Already a member</div>';}
        else{msgDiv.innerHTML='<div class="text-green-500">Joined! Redirecting...</div>';setTimeout(()=>location.reload(),1500);}
    }else{
        await sb.from('class_requests').insert([{class_id:classData.id,user_id:currentUser.id,user_email:currentUser.email,user_name:currentUser.email?.split('@')[0],status:'pending'}]);
        msgDiv.innerHTML='<div class="text-yellow-500">Request sent! Wait for approval.</div>';setTimeout(()=>location.reload(),2000);
    }
}

document.getElementById('createClassForm')?.addEventListener('submit',async(e)=>{
    e.preventDefault();const name=document.getElementById('className').value.trim();const desc=document.getElementById('classDescription').value;const joinType=document.querySelector('input[name="joinType"]:checked').value;
    if(!name){document.getElementById('createMessage').innerHTML='<div class="text-red-500">Class name required</div>';return;}
    const code=generateClassCode();const{error}=await sb.from('classes').insert([{name,description:desc,join_type:joinType,class_code:code,created_by:currentUser.id,created_at:new Date()}]);
    if(error){document.getElementById('createMessage').innerHTML='<div class="text-red-500">Error: '+error.message+'</div>';}
    else{await sb.from('class_members').insert([{class_id:1,user_id:currentUser.id,user_email:currentUser.email}]);alert('Class created!');location.reload();}
});

async function loadUserClass(){
    const{data:{user}}=await sb.auth.getUser();if(!user)return null;
    currentUser=user;
    const{data:createdClass}=await sb.from('classes').select('*').eq('created_by',user.id).maybeSingle();
    if(createdClass){userRole='rep';currentClass=createdClass;return'rep';}
    const{data:memberData}=await sb.from('class_members').select('class_id').eq('user_id',user.id).maybeSingle();
    if(memberData){const{data:classData}=await sb.from('classes').select('*').eq('id',memberData.class_id).single();if(classData){userRole='member';currentClass=classData;return'member';}}
    userRole='none';return'none';
}

function renderBottomNav(){
    const nav = document.getElementById('bottomNav');
    if(userRole === 'rep'){
        nav.innerHTML = `<a href="#" data-page="home"><i class="fas fa-home"></i><span>Home</span></a><a href="#" data-page="timetable"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a><a href="#" data-page="tests"><i class="fas fa-pen-fancy"></i><span>Tests</span></a><a href="#" data-page="ranks"><i class="fas fa-trophy"></i><span>Ranks</span></a><a href="#" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>`;
    } else if(userRole === 'member'){
        nav.innerHTML = `<a href="#" data-page="home"><i class="fas fa-home"></i><span>Home</span></a><a href="#" data-page="timetable"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a><a href="#" data-page="tests"><i class="fas fa-pen-fancy"></i><span>Tests</span></a><a href="#" data-page="ranks"><i class="fas fa-trophy"></i><span>Ranks</span></a><a href="#" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>`;
    } else {
        nav.innerHTML = `<a href="#" data-page="home"><i class="fas fa-home"></i><span>Home</span></a><a href="#" data-page="tests"><i class="fas fa-pen-fancy"></i><span>Tests</span></a><a href="#" data-page="ranks"><i class="fas fa-trophy"></i><span>Ranks</span></a><a href="#" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>`;
    }
    document.querySelectorAll('#bottomNav a').forEach(link => {
        link.addEventListener('click', (e) => {e.preventDefault();const page = link.getAttribute('data-page');navigateTo(page);});
    });
    updateBottomNavActive();
}

function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}

async function init(){
    function updateClock(){document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});const h = new Date().getHours();document.getElementById('dynamic-greeting').innerText = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";}
    updateClock();setInterval(updateClock, 1000);
    const { data: { session } } = await sb.auth.getSession();
    const { data: { user } } = await sb.auth.getUser();
    if (!session || !user) {window.location.href = 'login.html';return;}
    currentUser = user;
    await loadUserFirstName();
    await loadUserClass();
    renderBottomNav();
    renderPage();
}
init();
</script>
