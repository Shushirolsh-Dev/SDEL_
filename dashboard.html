function showToast(msg, type){
    const toast = document.createElement('div');
    toast.className = 'custom-toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function customAlert(message, title = "Notice", onConfirm = null) {
    const overlay = document.createElement('div');
    overlay.className = 'custom-alert-overlay';
    overlay.innerHTML = `
        <div class="custom-alert">
            <h3>${title}</h3>
            <p>${message}</p>
            <button onclick="this.closest('.custom-alert-overlay').remove()">OK</button>
        </div>
    `;
    document.body.appendChild(overlay);
    if (onConfirm) overlay.querySelector('button').onclick = () => { overlay.remove(); onConfirm(); };
}

function customConfirm(message, title = "Confirm", onConfirm, onCancel = null) {
    const overlay = document.createElement('div');
    overlay.className = 'custom-alert-overlay';
    overlay.innerHTML = `
        <div class="custom-alert">
            <h3>${title}</h3>
            <p>${message}</p>
            <button class="confirm-btn">Confirm</button>
            <button class="cancel-btn">Cancel</button>
        </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('.confirm-btn').onclick = () => { overlay.remove(); if(onConfirm) onConfirm(); };
    overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); if(onCancel) onCancel(); };
}

function generateClassCode(){const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';let result='';for(let i=0;i<10;i++){result+=chars.charAt(Math.floor(Math.random()*chars.length));}return'THESDEL-'+result;}

async function loadUserProfile() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const { data: profile } = await sb.from('profile').select('first_name, last_name').eq('id', user.id).single();
    userProfileData = profile;
    if (profile?.first_name) {
        document.getElementById('userFirstName').innerText = profile.first_name;
    } else {
        document.getElementById('userFirstName').innerText = user.email?.split('@')[0] || 'User';
    }
    return profile;
}

function navigateTo(page){
    if(currentPage === page) return;
    currentPage = page;
    const container = document.getElementById('main-content');
    container.style.animation = 'none';
    container.offsetHeight;
    container.style.animation = 'slideIn 0.3s ease-out';
    renderPage();
    updateBottomNavActive();
}

function updateBottomNavActive(){
    document.querySelectorAll('#bottomNav a').forEach(link => {
        const page = link.getAttribute('data-page');
        if(page === currentPage) link.classList.add('nav-active');
        else link.classList.remove('nav-active');
    });
}

function renderPage(){
    const container = document.getElementById('main-content');
    if(currentPage === 'home') container.innerHTML = renderHomePage();
    else if(currentPage === 'timetable') container.innerHTML = renderTimetablePage();
    else if(currentPage === 'tests') container.innerHTML = renderTestsPage();
    else if(currentPage === 'ranks') container.innerHTML = renderRanksPage();
    else if(currentPage === 'profile') container.innerHTML = renderProfilePage();
    attachPageEvents();
}

    document.getElementById('editClassDescription').value = currentClass?.description || '';
    document.getElementById('editClassModal').classList.remove('hidden');
}
function closeEditModal(){document.getElementById('editClassModal').classList.add('hidden');}
function openMembersModal(){document.getElementById('membersModal').classList.remove('hidden');loadMembersList();}
function closeMembersModal(){document.getElementById('membersModal').classList.add('hidden');}

let selectedMemberId = null;
let selectedMemberEmail = null;

function openMemberActionsModal(memberId, memberEmail, isRep = false, isAssistant = false) {
    selectedMemberId = memberId;
    selectedMemberEmail = memberEmail;
    const container = document.getElementById('memberActionsContent');
    let actions = '<div class="space-y-3">';
    if (userRole === 'rep' && memberId !== currentUser?.id) {
        if (!isAssistant) actions += `<button onclick="makeAssistantFromModal()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl"><i class="fas fa-user-shield"></i> Make Assistant Rep</button>`;
        actions += `<button onclick="removeMemberFromModal()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl"><i class="fas fa-user-minus"></i> Remove Member</button>`;
        actions += `<button onclick="transferRepFromModal()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl"><i class="fas fa-crown"></i> Transfer Class Rep</button>`;
    }
    actions += `<button onclick="closeMemberActionsModal()" class="w-full glass-panel py-3 rounded-xl text-gray-400">Cancel</button>`;
    actions += '</div>';
    container.innerHTML = actions;
    document.getElementById('memberActionsModal').classList.remove('hidden');
}

function closeMemberActionsModal() {
    document.getElementById('memberActionsModal').classList.add('hidden');
    selectedMemberId = null;
    selectedMemberEmail = null;
}

async function makeAssistantFromModal() {
    if (!selectedMemberId) return;
    await sb.from('class_assistants').insert([{class_id: currentClass.id, user_id: selectedMemberId, added_by: currentUser.id}]);
    showToast('Assistant rep added!','success');
    closeMemberActionsModal();
    loadMembersList();
}

async function removeMemberFromModal() {
    customConfirm(`Remove ${selectedMemberEmail || 'this member'} from the class?`, "Confirm", async () => {
        await sb.from('class_members').delete().eq('class_id', currentClass.id).eq('user_id', selectedMemberId);
        await sb.from('class_assistants').delete().eq('class_id', currentClass.id).eq('user_id', selectedMemberId);
        showToast('Member removed!','success');
        closeMemberActionsModal();
        loadMembersList();
    });
}

async function transferRepFromModal() {
    customConfirm(`Transfer class rep ownership to ${selectedMemberEmail || 'this member'}? You will become a regular member.`, "Confirm Transfer", async () => {
        await sb.from('classes').update({ created_by: selectedMemberId }).eq('id', currentClass.id);
        await sb.from('class_assistants').delete().eq('class_id', currentClass.id).eq('user_id', selectedMemberId);
        showToast('Rep transferred! Reloading...','success');
        setTimeout(() => location.reload(), 1500);
    });
}

async function saveClassEdits(){
    const newName = document.getElementById('editClassName').value.trim();
    const newDesc = document.getElementById('editClassDescription').value.trim();
    if(!newName){customAlert("Class name required", "Error");return;}
    const { error } = await sb.from('classes').update({ name: newName, description: newDesc }).eq('id', currentClass.id);
    if(error){customAlert('Error: '+error.message, "Error");}
    else{currentClass.name = newName;currentClass.description = newDesc;closeEditModal();renderPage();showToast('Class updated!','success');}
}

async function deleteClass(){
    const { data: members } = await sb.from('class_members').select('*').eq('class_id', currentClass.id);
    if(members && members.length > 0){
        customAlert("Cannot delete class with members. Transfer rep or remove all members first.", "Cannot Delete");
        return;
    }
    customConfirm(`Delete class "${currentClass.name}" permanently?`, "Confirm Delete", async () => {
        await sb.from('classes').delete().eq('id', currentClass.id);
        showToast('Class deleted!','success');
        setTimeout(() => location.reload(), 1500);
    });
}

async function leaveClass(){
    customConfirm('Leave this class? You will need a new invite to rejoin.', "Confirm Leave", async () => {
        await sb.from('class_members').delete().eq('class_id', currentClass.id).eq('user_id', currentUser.id);
        await sb.from('class_assistants').delete().eq('class_id', currentClass.id).eq('user_id', currentUser.id);
        location.reload();
    });
}

async function loadMembersList(){
    const { data: members } = await sb.from('class_members').select('user_id, user_email').eq('class_id', currentClass.id);
    const uniqueMembers = [];
    const seen = new Set();
    for(const member of members || []){
        if(!seen.has(member.user_id)){
            seen.add(member.user_id);
            uniqueMembers.push(member);
        }
    }
    const { data: assistants } = await sb.from('class_assistants').select('user_id').eq('class_id', currentClass.id);
    const assistantIds = new Set(assistants?.map(a => a.user_id) || []);
    const container = document.getElementById('membersListModal');
    const memberCountSpan = document.getElementById('memberCount');
    if(memberCountSpan) memberCountSpan.innerText = `(${uniqueMembers.length})`;
    if(!uniqueMembers || uniqueMembers.length === 0){container.innerHTML = '<p class="text-gray-400">No members yet</p>';return;}
    container.innerHTML = uniqueMembers.map(m => `
        <div class="member-card glass-panel p-4 rounded-xl flex justify-between items-center" onclick="openMemberActionsModal('${m.user_id}', '${escapeHtml(m.user_email)}', ${m.user_id === currentClass?.created_by}, ${assistantIds.has(m.user_id)})">
            <div><p class="font-medium">${escapeHtml(m.user_email?.split('@')[0] || 'User')}</p><p class="text-xs text-gray-500">${escapeHtml(m.user_email)}</p>${m.user_id === currentClass?.created_by ? '<span class="text-xs text-orange-500 mt-1 inline-block"> Class Rep</span>' : (assistantIds.has(m.user_id) ? '<span class="text-xs text-blue-500 mt-1 inline-block"> Assistant Rep</span>' : '')}</div>
            <i class="fas fa-chevron-right text-gray-500"></i>
        </div>
    `).join('');
}

async function deleteAnnouncement(announcementId){
    customConfirm("Delete this announcement?", "Confirm Delete", async () => {
        await sb.from('class_announcements').delete().eq('id', announcementId);
        loadAnnouncements();
        showToast('Announcement deleted!','success');
    });

async function loadAnnouncements(){
    if(!currentClass) return;
    const now = new Date().toISOString();
    const { data: active } = await sb.from('class_announcements').select('*').eq('class_id', currentClass.id).lte('start_time', now).gte('end_time', now).order('created_at', { ascending: false });
    const { data: past } = await sb.from('class_announcements').select('*').eq('class_id', currentClass.id).lt('end_time', now).order('end_time', { ascending: false });
    if(active && active.length > 0) initCarousel(active);
    if(past && past.length > 0) displayPastAnnouncements(past);
    
    if(past && past.length > 0){
        for(const ann of past){
            await sb.from('class_announcements').delete().eq('id', ann.id);
        }
    }
}

function initCarousel(announcementsList){
    announcements = announcementsList;
    carouselIndex = 0;
    if(carouselInterval) clearInterval(carouselInterval);
    const container = document.getElementById(userRole === 'rep' ? 'announcementsCarousel' : 'announcementsCarouselMember');
    if(!container) return;
    if(announcements.length === 0){container.innerHTML = '<div class="text-center text-gray-400 py-4">No active announcements</div>';return;}
    container.innerHTML = `<div class="carousel-container"><div class="carousel-track" id="carouselTrack"></div><button class="carousel-btn carousel-prev" onclick="prevSlide()">❮</button><button class="carousel-btn carousel-next" onclick="nextSlide()">❯</button></div><div class="carousel-dots" id="carouselDots"></div>`;
    const track = document.getElementById('carouselTrack');
    announcements.forEach(ann => {track.innerHTML += `<div class="carousel-item"><div class="bg-orange-500/10 p-4 rounded-xl border-l-4 border-orange-500"><div class="flex justify-between items-start mb-2"><h4 class="font-bold text-orange-500">${escapeHtml(ann.title)}</h4><div class="flex gap-2"><span class="text-xs text-gray-500">${new Date(ann.start_time).toLocaleString()}</span>${userRole === 'rep' ? `<button onclick="event.stopPropagation();deleteAnnouncement(${ann.id})" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>` : ''}</div></div><p class="text-sm">${escapeHtml(ann.content)}</p></div></div>`;});
    const dotsContainer = document.getElementById('carouselDots');
    announcements.forEach((_, i) => {const dot = document.createElement('div');dot.classList.add('dot');if(i === 0) dot.classList.add('active');dot.onclick = () => goToSlide(i);dotsContainer.appendChild(dot);});
    updateCarousel();
    carouselInterval = setInterval(nextSlide, 5000);
}

function updateCarousel(){const track = document.getElementById('carouselTrack');if(track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;document.querySelectorAll('.dot').forEach((dot, i) => {if(i === carouselIndex) dot.classList.add('active');else dot.classList.remove('active');});}
function nextSlide(){if(announcements.length === 0) return;carouselIndex = (carouselIndex + 1) % announcements.length;updateCarousel();}
function prevSlide(){if(announcements.length === 0) return;carouselIndex = (carouselIndex - 1 + announcements.length) % announcements.length;updateCarousel();}
function goToSlide(index){carouselIndex = index;updateCarousel();}

function displayPastAnnouncements(past){
    const container = document.getElementById(userRole === 'rep' ? 'pastAnnouncementsList' : 'pastAnnouncementsListMember');
    if(!container) return;

    container.innerHTML = past.map(ann => `<div class="bg-white/5 p-3 rounded-xl opacity-60"><div class="flex justify-between items-start mb-2"><h4 class="font-bold text-sm">${escapeHtml(ann.title)}</h4><span class="text-xs text-gray-500">Expired: ${new Date(ann.end_time).toLocaleString()}</span></div><p class="text-xs text-gray-400">${escapeHtml(ann.content)}</p></div>`).join('');
}

async function loadLecturesTimetable(){
    const container = document.getElementById('timetableContent');
    const { data: lectures } = await sb.from('class_lectures').select('*').eq('class_id', currentClass?.id).order('day_of_week', { ascending: true }).order('time', { ascending: true });
    if(!lectures || lectures.length === 0){container.innerHTML = `<div class="text-center text-gray-400 py-8"><p>No lectures scheduled</p>${userRole === 'rep' || userRole === 'assistant' ? '<button onclick="openLectureModal()" class="mt-4 bg-orange-600 px-4 py-2 rounded-lg text-sm text-white">+ Add Lecture</button>' : ''}</div>`;return;}
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];let html = '';
    days.forEach(day => {const dayLectures = lectures.filter(l => l.day_of_week === day);if(dayLectures.length > 0){html += `<div class="mb-6"><h3 class="font-bold mb-2 text-orange-500">${day}</h3><div class="space-y-2">`;dayLectures.forEach(lecture => {let displayTime = lecture.time;if(lecture.time && !lecture.time.includes('AM') && !lecture.time.includes('PM')){const [hour, minute] = lecture.time.split(':');let h = parseInt(hour);const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${minute} ${ampm}`;}html += `<div class="glass-panel p-3 rounded-xl flex justify-between items-center"><div><h4 class="font-bold text-sm text-white">${escapeHtml(lecture.title)}</h4><p class="text-xs text-gray-400">${displayTime} • ${lecture.duration} • ${escapeHtml(lecture.venue || 'Online')}</p></div>${userRole === 'rep' || userRole === 'assistant' ? `<button onclick="deleteLecture(${lecture.id})" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button>` : ''}</div>`;});html += `</div></div>`;}});
    if(userRole === 'rep' || userRole === 'assistant'){html += `<button onclick="openLectureModal()" class="w-full mt-4 glass-panel py-2 rounded-xl text-orange-500">+ Add Lecture</button>`;}
    container.innerHTML = html;
}

async function loadExamsTimetable(){
    const container = document.getElementById('timetableContent');
    const { data: exams } = await sb.from('class_exams').select('*').eq('class_id', currentClass?.id).order('exam_date', { ascending: true });
    if(!exams || exams.length === 0){container.innerHTML = `<div class="text-center text-gray-400 py-8"><p>No exams scheduled</p>${userRole === 'rep' || userRole === 'assistant' ? '<button onclick="openExamModal()" class="mt-4 bg-orange-600 px-4 py-2 rounded-lg text-sm text-white">+ Schedule Exam</button>' : ''}</div>`;return;}
    let html = `<div class="space-y-3">`;
    exams.forEach(exam => {const examDate = new Date(exam.exam_date);const isPast = examDate < new Date();let displayTime = exam.time;if(exam.time && !exam.time.includes('AM') && !exam.time.includes('PM')){const [hour, minute] = exam.time.split(':');let h = parseInt(hour);const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${minute} ${ampm}`;}html += `<div class="glass-panel p-4 rounded-xl ${isPast ? 'opacity-50' : 'border-l-4 border-orange-500'}"><div class="flex justify-between items-start"><div><h4 class="font-bold text-white">${escapeHtml(exam.title)}</h4><p class="text-xs text-gray-400 mt-1"> ${new Date(exam.exam_date).toLocaleDateString()} • ⏰ ${displayTime} • 📍 ${escapeHtml(exam.venue || 'Online')}</p></div>${userRole === 'rep' || userRole === 'assistant' ? `<button onclick="deleteExam(${exam.id})" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button>` : ''}</div></div>`;});
    html += `</div>`;
    if(userRole === 'rep' || userRole === 'assistant'){html += `<button onclick="openExamModal()" class="w-full mt-4 glass-panel py-2 rounded-xl text-orange-500">+ Schedule Exam</button>`;}
    container.innerHTML = html;
}

async function updatePassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!newPassword || !confirmPassword) {
        customAlert("Please fill in both fields", "Error");
        return;
    }
    
    if (newPassword !== confirmPassword) {
        customAlert("Passwords do not match", "Error");
        return;
    }
    
    if (newPassword.length < 6) {
        customAlert("Password must be at least 6 characters", "Error");
        return;
    }
    
    const { error } = await sb.auth.updateUser({ password: newPassword });
    
    if (error) {
        customAlert('Error: ' + error.message, "Error");
    } else {
        closeSecurityModal();
        showToast('Password updated successfully!', 'success');
    }
}

async function loadTodayLectures(){
    const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
    const { data: lectures } = await sb.from('class_lectures').select('*').eq('class_id', currentClass?.id).eq('day_of_week', today);
    const container = document.getElementById('lecturesList');if(!container) return;
    if(!lectures || lectures.length === 0){container.innerHTML = '<div class="text-center text-gray-400 py-4">No lectures today</div>';return;}
    const now = new Date();const currentHour = now.getHours();const currentMinute = now.getMinutes();
    container.innerHTML = lectures.map(lecture => {let [hour, minute] = lecture.time.split(':');let lectureHour = parseInt(hour);let lectureMinute = parseInt(minute) || 0;let isPast = (lectureHour < currentHour) || (lectureHour === currentHour && lectureMinute < currentMinute);let displayTime = lecture.time;if(lecture.time && !lecture.time.includes('AM') && !lecture.time.includes('PM')){let h = lectureHour;const ampm = h >= 12 ? 'PM' : 'AM';h = h % 12 || 12;displayTime = `${h}:${lectureMinute.toString().padStart(2,'0')} ${ampm}`;}return `<div class="lecture-card glass-panel p-4 rounded-xl border-l-4 ${isPast ? 'lecture-past border-gray-500' : 'border-green-500'}"><div class="flex justify-between items-start"><div><h4 class="font-bold text-white">${escapeHtml(lecture.title)}</h4><p class="text-xs text-gray-400 mt-1">${displayTime} • ${lecture.duration} • ${escapeHtml(lecture.venue)}</p></div>${isPast ? '<span class="text-xs text-gray-500"><i class="fas fa-check-circle"></i> Completed</span>' : '<span class="text-xs text-green-500"><i class="fas fa-play-circle"></i> Upcoming</span>'}</div></div>`;}).join('');
}

function openAnnouncementModal(){document.getElementById('announcementModal').classList.remove('hidden');}
function closeAnnouncementModal(){document.getElementById('announcementModal').classList.add('hidden');document.getElementById('announcementForm').reset();}
function shareInviteLink(){if(currentClass){const link=`${window.location.origin}/join.html?code=${currentClass.class_code}`;navigator.clipboard.writeText(link);showToast('Invite link copied!','success');}}
function showCreateModal(){document.getElementById('createModal').classList.remove('hidden');}
function closeCreateModal(){document.getElementById('createModal').classList.add('hidden');document.getElementById('createClassForm').reset();}
function showJoinModal(){document.getElementById('joinModal').classList.remove('hidden');}
function closeJoinModal(){document.getElementById('joinModal').classList.add('hidden');document.getElementById('joinClassCode').value='';}

async function submitJoin(){
    const code=document.getElementById('joinClassCode').value.trim();const msgDiv=document.getElementById('joinMessage');
    if(!code){msgDiv.innerHTML='<div class="text-red-500">Enter class code</div>';return;}
    const{data:classData,error}=await sb.from('classes').select('*').eq('class_code',code).single();
    if(error||!classData){msgDiv.innerHTML='<div class="text-red-500">Invalid class code</div>';return;}
    if(classData.join_type==='open'){
        const{error:joinErr}=await sb.from('class_members').insert([{class_id:classData.id,user_id:currentUser.id,user_email:currentUser.email}]);
        if(joinErr){msgDiv.innerHTML='<div class="text-red-500">Already a member</div>';}
        else{msgDiv.innerHTML='<div class="text-green-500">Joined! Redirecting...</div>';setTimeout(()=>location.reload(),1500);}
    }else{
        await sb.from('class_requests').insert([{class_id:classData.id,user_id:currentUser.id,user_email:currentUser.email,user_name:currentUser.email?.split('@')[0],status:'pending'}]);
        msgDiv.innerHTML='<div class="text-yellow-500">Request sent! Wait for approval.</div>';setTimeout(()=>location.reload(),2000);
    }
}

document.getElementById('createClassForm')?.addEventListener('submit',async(e)=>{
    e.preventDefault();const name=document.getElementById('className').value.trim();const desc=document.getElementById('classDescription').value;const joinType=document.querySelector('input[name="joinType"]:checked').value;
    if(!name){document.getElementById('createMessage').innerHTML='<div class="text-red-500">Class name required</div>';return;}
    const code=generateClassCode();const{data:newClass,error}=await sb.from('classes').insert([{name,description:desc,join_type:joinType,class_code:code,created_by:currentUser.id,created_at:new Date()}]).select().single();
    if(error){document.getElementById('createMessage').innerHTML='<div class="text-red-500">Error: '+error.message+'</div>';}
    else{await sb.from('class_members').insert([{class_id:newClass.id,user_id:currentUser.id,user_email:currentUser.email}]);showToast('Class created!','success');location.reload();}
});

async function loadUserClass(){
    const{data:{user}}=await sb.auth.getUser();if(!user)return null;
    currentUser=user;
    const{data:createdClass}=await sb.from('classes').select('*').eq('created_by',user.id).maybeSingle();
    if(createdClass){userRole='rep';currentClass=createdClass;return'rep';}
    const{data:assistantCheck}=await sb.from('class_assistants').select('class_id').eq('user_id',user.id).maybeSingle();
    if(assistantCheck){const{data:classData}=await sb.from('classes').select('*').eq('id',assistantCheck.class_id).single();if(classData){userRole='assistant';currentClass=classData;return'assistant';}}
    const{data:memberData}=await sb.from('class_members').select('class_id').eq('user_id',user.id).maybeSingle();
    if(memberData){const{data:classData}=await sb.from('classes').select('*').eq('id',memberData.class_id).single();if(classData){userRole='member';currentClass=classData;return'member';}}
    userRole='none';return'none';
}

function renderBottomNav(){
    const nav = document.getElementById('bottomNav');
    nav.innerHTML = `<a href="#" data-page="home"><i class="fas fa-home"></i><span>Home</span></a><a href="#" data-page="timetable"><i class="fas fa-calendar-alt"></i><span>Timetable</span></a><a href="#" data-page="tests"><i class="fas fa-pen-fancy"></i><span>Tests</span></a><a href="#" data-page="ranks"><i class="fas fa-trophy"></i><span>Ranks</span></a><a href="#" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>`;
    document.querySelectorAll('#bottomNav a').forEach(link => {
        link.addEventListener('click', (e) => {e.preventDefault();const page = link.getAttribute('data-page');navigateTo(page);});
    });
    updateBottomNavActive();
}

function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}

async function init(){
    function updateClock(){document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});const h = new Date().getHours();document.getElementById('dynamic-greeting').innerText = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";}
    updateClock();setInterval(updateClock, 1000);
    const { data: { session } } = await sb.auth.getSession();
    const { data: { user } } = await sb.auth.getUser();
    if (!session || !user) {window.location.href = 'login.html';return;}
    currentUser = user;
    await loadUserProfile();
    await loadUserClass();
    renderBottomNav();
    renderPage();
}
init();
</script>
</body></html>
