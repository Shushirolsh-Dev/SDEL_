<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'sunlight') document.documentElement.classList.add('sunlight-mode');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesdel · Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        /* GLOBAL NO-SELECT */
        * { 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; outline: none;
        }
        
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #71717a;
            --sdel-orange: #FF6600;
            --star-speed: 20s;
        }

        .sunlight-mode {
            --bg: #ffffff;
            --surface: #f4f4f5;
            --border: #e4e4e7;
            --text-main: #09090b;
            --text-dim: #71717a;
        }

        .glitch-mode {
            --bg: #050505;
            --sdel-orange: #bc13fe;
            --surface: #111;
            --text-main: #d1ff00;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            min-height: 100vh; display: flex; flex-direction: column; 
            transition: background 0.5s; overflow: hidden;
        }

        /* STAR ENGINE */
        #star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: fall var(--star-speed) linear infinite; opacity: 0.5; }
        @keyframes fall { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }

        /* Hyperdrive */
        .hyperdrive .star { height: 150px !important; width: 1px !important; border-radius: 0; opacity: 1; box-shadow: 0 0 10px white; transition: 0.3s; }

        /* ICON BOX & CHARGING */
        .icon-box {
            position: relative; width: 6rem; height: 6rem; border-radius: 2.5rem;
            background: #111; display: flex; align-items: center; justify-content: center;
            border: 4px solid #18181b; cursor: pointer; transition: 0.1s; z-index: 50;
        }
        .loading-ring {
            position: absolute; inset: -4px; border-radius: 2.5rem; border: 4px solid transparent;
            background: conic-gradient(var(--sdel-orange) 0%, transparent 0%) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude;
            pointer-events: none; opacity: 0;
        }
        .charging .loading-ring { opacity: 1; animation: fillRing 0.5s linear forwards; }
        @keyframes fillRing { from { background: conic-gradient(var(--sdel-orange) 0%, transparent 0%) border-box; } to { background: conic-gradient(var(--sdel-orange) 100%, transparent 0%) border-box; } }
        
        .shake { animation: nukeShake 0.05s infinite; }
        @keyframes nukeShake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, 5px); } }
        .rotate-inf { animation: spin 3s linear infinite; transform-origin: center; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* JOKE CARD */
        .joke-wrapper { width: 100%; height: 140px; margin-bottom: 3rem; z-index: 10; position: relative; }
        .joke-container { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; width: 100%; height: 100%; cursor: pointer; display: flex; flex-direction: column; transition: 0.3s; }
        .joke-container.ball-mode { animation: ballMorph 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        .joke-container.ball-mode .joke-content { opacity: 0; visibility: hidden; }
        .joke-container.fly-away { animation: gravityFly 0.7s ease-in forwards; pointer-events: none; }

        @keyframes ballMorph {
            0% { border-radius: 1.5rem; transform: scale(1); }
            15% { border-radius: 50%; width: 55px; height: 55px; background: var(--sdel-orange); margin: 0 auto; }
            100% { border-radius: 1.5rem; transform: scale(1) rotate(-360deg); }
        }
        @keyframes gravityFly { 0% { transform: translateY(0); } 100% { transform: translateY(-120vh) rotate(45deg); opacity: 0; } }

        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: var(--sdel-orange); color: black; padding: 12px 24px; border-radius: 12px; 
            font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.3s; z-index: 9999; 
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .joke-text { font-size: 15px; line-height: 1.5; color: var(--text-dim); font-weight: 500; }
        .joke-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--sdel-orange); margin-bottom: 0.75rem; display: flex; justify-content: space-between; }

        /* NEW EASTER EGG ANIMATIONS */
        @keyframes rainbowFlash {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .rainbow-mode {
            animation: rainbowFlash 0.5s linear infinite !important;
        }
        @keyframes bouncePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background: var(--sdel-orange); color: black; }
            100% { transform: scale(1); }
        }
        .secret-bounce {
            animation: bouncePop 0.4s ease-out;
        }
        @keyframes spinZoom {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(0); opacity: 0; }
        }
        .vanish-spin {
            animation: spinZoom 0.6s forwards !important;
        }
        .easter-egg-glow {
            text-shadow: 0 0 10px var(--sdel-orange), 0 0 20px var(--sdel-orange);
        }
        .pulse-ring {
            animation: pulseRing 0.8s ease-out;
        }
        @keyframes pulseRing {
            0% { box-shadow: 0 0 0 0 var(--sdel-orange); }
            100% { box-shadow: 0 0 0 20px rgba(255,102,0,0); }
        }
        .secret-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }
        .rain-drop {
            position: absolute;
            background: linear-gradient(135deg, #FF6600, #FFAA33);
            width: 3px;
            height: 20px;
            animation: rainFall 1s linear forwards;
            opacity: 0.8;
        }
        @keyframes rainFall {
            0% { transform: translateY(-20px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .konami-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF6600, #FF3366);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10000;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body class="items-center justify-center flex">
    <div id="star-field"></div>
    <div id="toast">✨ CONNECTING</div>

    <div class="text-center p-6 w-full max-w-sm flex flex-col items-center z-10">
        <div class="icon-box mb-10 shadow-2xl" id="sun-trigger">
            <div class="loading-ring"></div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="rotate-inf text-[var(--sdel-orange)]">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v4M4.93 4.93l2.83 2.83M2 12h4M4.93 19.07l2.83-2.83M12 22v-4M19.07 19.07l-2.83-2.83M22 12h-4M19.07 4.93l-2.83 2.83"/>
            </svg>
        </div>
        
        <h1 class="text-5xl font-black uppercase tracking-tighter mb-2 cursor-pointer" id="title-trigger">OFFLINE</h1>
        <p class="text-[11px] text-[var(--text-dim)] font-bold uppercase tracking-[0.2em] mb-14" id="subtitle-trigger">Waiting for network</p>
        
        <div class="joke-wrapper">
            <div class="joke-container" id="joke-card" onclick="handleJokeClick()">
                <div class="joke-content">
                    <div class="joke-label"><span>😂 while you wait</span><span class="opacity-50 text-[8px]">↻ FLIP</span></div>
                    <div class="joke-text" id="joke-display">Loading joke...</div>
                </div>
            </div>
        </div>
        
        <button id="retry-btn" onclick="checkConnection()" class="bg-[var(--sdel-orange)] text-black font-black w-full py-5 rounded-3xl uppercase tracking-widest text-sm active:scale-95 transition shadow-lg">
            TRY AGAIN
        </button>
    </div>

    <script>
        const jokes = [
            "What do you call a boomerang that won't come back? A stick!",
            "Why did the developer go broke? Because he used up all his cache!",
            "What's a computer's favorite beat? An algorithm!",
            "Why did the Wi-Fi break up with the router? No connection!",
            "Why don't scientists trust atoms? They make up everything!",
            "What do you call a belt made of watches? A waist of time!",
            "What do you call a fish with no eyes? A fsh!",
            "Why did the picture go to jail? It was framed!
            "];
        let usedJokes = [], sunClicks = 0, jokeClicks = 0, titleClicks = 0, pressTimer, chargeTimer, retryTimer, detonated = false;
        
        // ========== NEW EASTER EGGS VARIABLES ==========
        let subtitleClicks = 0;
        let konamiIndex = 0;
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'KeyB', 'KeyA'];
        let tripleTapTimer = null;
        let tripleTapCount = 0;
        let rainbowActive = false;
        let eggCounter = 0;
        
        // Secret egg: double tap on background
        let bgTapCount = 0;
        let bgTapTimer = null;
        
        function getRandomJoke() {
            if (usedJokes.length >= jokes.length) usedJokes = [];
            const available = jokes.filter(j => !usedJokes.includes(j));
            const joke = available[Math.floor(Math.random() * available.length)];
            usedJokes.push(joke);
            return joke;
        }
        document.getElementById('joke-display').textContent = getRandomJoke();

        const f = document.getElementById('star-field');
        function initStars(binary = false) {
            f.innerHTML = '';
            for(let i = 0; i < 50; i++) {
                const s = document.createElement('div'); s.className = 'star';
                if(binary) {
                    s.innerText = Math.round(Math.random()); s.style.color = "var(--sdel-orange)";
                    s.style.fontSize = "12px"; s.style.fontWeight = "900"; s.style.background = "none";
                } else { s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px'; }
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDuration = (Math.random() * 3 + (binary ? 1 : 5)) + 's';
                s.style.animationDelay = (Math.random() * 5) + 's';
                f.appendChild(s);
            }
        }
        initStars();

        function handleJokeClick() {
            if (++jokeClicks >= 8) {
                const card = document.getElementById('joke-card');
                card.classList.add('fly-away');
                setTimeout(() => { card.classList.remove('fly-away'); jokeClicks = 0; }, 1500);
            } else { ballMorphJoke(); }
        }

        function ballMorphJoke() {
            const card = document.getElementById('joke-card');
            if (card.classList.contains('ball-mode')) return;
            card.classList.add('ball-mode');
            setTimeout(() => { document.getElementById('joke-display').textContent = getRandomJoke(); }, 600);
            setTimeout(() => { card.classList.remove('ball-mode'); }, 1200);
        }

        document.getElementById('title-trigger').addEventListener('click', () => {
            if (++titleClicks >= 3) { document.body.classList.toggle('glitch-mode'); titleClicks = 0; }
        });
        
        // ========== EASTER EGG 1: Subtitle secret (5 clicks changes text to secret message) ==========
        const subtitle = document.getElementById('subtitle-trigger');
        subtitle.addEventListener('click', () => {
            subtitleClicks++;
            if (subtitleClicks === 5) {
                const originalText = subtitle.innerText;
                subtitle.innerText = "✨ SECRET MODE ✨";
                subtitle.classList.add('easter-egg-glow');
                setTimeout(() => {
                    subtitle.innerText = originalText;
                    subtitle.classList.remove('easter-egg-glow');
                }, 2000);
                // Extra: rainbow confetti
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#FF6600', '#00FF66', '#FF33FF', '#33FF33'] });
                subtitleClicks = 0;
            }
        });
        
        // ========== EASTER EGG 2: Triple tap on any empty area (background) creates rainbow rain ==========
        function createRainbowRain() {
            const container = document.createElement('div');
            container.className = 'secret-rain';
            document.body.appendChild(container);
            for (let i = 0; i < 100; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDelay = Math.random() * 0.5 + 's';
                drop.style.animationDuration = 0.8 + Math.random() * 0.7 + 's';
                drop.style.width = (2 + Math.random() * 4) + 'px';
                drop.style.height = (15 + Math.random() * 20) + 'px';
                container.appendChild(drop);
            }
            setTimeout(() => { container.remove(); }, 1500);
            // Playful confetti burst
            confetti({ particleCount: 300, spread: 120, origin: { y: 0.2 }, startVelocity: 20 });
        }
        
        document.body.addEventListener('click', (e) => {
            // Only trigger on background (not on interactive elements)
            if (e.target === document.body || e.target.id === 'star-field' || e.target === f) {
                if (bgTapTimer) clearTimeout(bgTapTimer);
                bgTapCount++;
                if (bgTapCount === 3) {
                    createRainbowRain();
                    showToastMessage("🌈 RAINBOW STORM! 🌈");
                    bgTapCount = 0;
                }
                bgTapTimer = setTimeout(() => { bgTapCount = 0; }, 800);
            }
        });
        
        // ========== EASTER EGG 3: Konami Code (up, up, down, down, left, right, left, right, B, A) ==========
        document.addEventListener('keydown', (e) => {
            const key = e.code;
            if (key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    // Activate Konami mode: screen flash, all stars turn into rainbow, extra confetti
                    document.body.style.transition = '0.2s';
                    document.body.style.backgroundColor = 'var(--sdel-orange)';
                    setTimeout(() => { document.body.style.backgroundColor = ''; }, 300);
                    // Change all stars to rainbow colors temporarily
                    const stars = document.querySelectorAll('.star');
                    stars.forEach(star => {
                        const originalBg = star.style.background;
                        star.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
                        star.style.boxShadow = '0 0 5px currentColor';
                        setTimeout(() => {
                            star.style.background = originalBg;
                            star.style.boxShadow = '';
                        }, 2000);
                    });
                    confetti({ particleCount: 800, spread: 180, origin: { y: 0.5 }, startVelocity: 40, colors: ['#FF6600', '#FF3366', '#33FF66', '#FFCC33'] });
                    showToastMessage("🎮 KONAMI CODE UNLOCKED! 🎮");
                    // Also create a floating message
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'konami-toast';
                    msgDiv.innerText = "⚡ SECRET UNLOCKED! ⚡";
                    document.body.appendChild(msgDiv);
                    setTimeout(() => msgDiv.remove(), 2000);
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });
        
        // ========== EASTER EGG 4: Secret rainbow mode (click the orange button text 10 times) ==========
        const retryBtn = document.getElementById('retry-btn');
        let retryTextClicks = 0;
        retryBtn.addEventListener('click', (e) => {
            // Count clicks on button for secret rainbow mode (only when checking connection, but we'll count anyway)
            retryTextClicks++;
            if (retryTextClicks === 10) {
                if (!rainbowActive) {
                    document.body.classList.add('rainbow-mode');
                    rainbowActive = true;
                    showToastMessage("🌈 RAINBOW MODE ACTIVATED! 🌈");
                    // Auto disable after 5 seconds
                    setTimeout(() => {
                        document.body.classList.remove('rainbow-mode');
                        rainbowActive = false;
                    }, 5000);
                }
                retryTextClicks = 0;
            }
            // Reset counter after 2 seconds of inactivity
            setTimeout(() => { if (retryTextClicks < 10) retryTextClicks = 0; }, 2000);
        });
        
        // ========== EASTER EGG 5: Secret mouse wheel spin on joke card (spin joke card) ==========
        const jokeCard = document.getElementById('joke-card');
        jokeCard.addEventListener('wheel', (e) => {
            e.preventDefault();
            jokeCard.style.transition = 'transform 0.5s ease';
            jokeCard.style.transform = `rotate(${e.deltaY > 0 ? '360deg' : '-360deg'})`;
            setTimeout(() => { jokeCard.style.transform = ''; }, 500);
            showToastMessage("🌀 SPINNING JOKE! 🌀");
            // Also change joke
            setTimeout(() => {
                document.getElementById('joke-display').textContent = getRandomJoke();
            }, 200);
        });
      // ========== EASTER EGG 6: Secret "7" key press reveals hidden animation (press '7') ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === '7') {
                // Secret number 7: all elements pulse and orange glow
                const allElements = document.querySelectorAll('.icon-box, .joke-container, #retry-btn');
                allElements.forEach(el => {
                    el.classList.add('pulse-ring');
                    setTimeout(() => el.classList.remove('pulse-ring'), 800);
                });
                showToastMessage("✨ LUCKY NUMBER 7! ✨");
                confetti({ particleCount: 400, spread: 100, origin: { y: 0.6 }, startVelocity: 25 });
            }
            
            // Extra: press 'E' for explosion of easter eggs
            if (e.key === 'e' || e.key === 'E') {
                showToastMessage("🐣 EASTER EGG EXPLOSION! 🐣");
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        confetti({ particleCount: 150, spread: 80, origin: { x: Math.random(), y: Math.random() }, colors: ['#FF6600', '#FFAA33', '#FFCC88'] });
                    }, i * 100);
                }
                // create floating egg icons
                for (let i = 0; i < 20; i++) {
                    const egg = document.createElement('div');
                    egg.innerText = '🥚';
                    egg.style.position = 'fixed';
                    egg.style.left = Math.random() * 100 + '%';
                    egg.style.top = Math.random() * 100 + '%';
                    egg.style.fontSize = (20 + Math.random() * 30) + 'px';
                    egg.style.pointerEvents = 'none';
                    egg.style.zIndex = '10000';
                    egg.style.animation = 'bouncePop 0.6s ease-out forwards';
                    document.body.appendChild(egg);
                    setTimeout(() => egg.remove(), 600);
                }
            }
        });
        
        // ========== EASTER EGG 7: Secret double click on the sun icon after nuke does special effect ==========
        let doubleSunClick = 0;
        const sunIcon = document.getElementById('sun-trigger');
        sunIcon.addEventListener('dblclick', () => {
            doubleSunClick++;
            if (doubleSunClick >= 1) {
                // Mega confetti explosion
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        confetti({ particleCount: 500, spread: 360, origin: { y: 0.5 }, startVelocity: 50, colors: ['gold', 'orange', 'red', 'yellow'] });
                    }, i * 100);
                }
                showToastMessage("💥 DOUBLE SUN EXPLOSION! 💥");
                doubleSunClick = 0;
            }
        });
        
        // ========== EASTER EGG 8: Secret "rainbow mode" for stars when you press 'R' ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                const stars = document.querySelectorAll('.star');
                stars.forEach(star => {
                    const randomColor = `hsl(${Math.random() * 360}, 100%, 65%)`;
                    star.style.background = randomColor;
                    star.style.boxShadow = `0 0 8px ${randomColor}`;
                    setTimeout(() => {
                        if (!star.innerText) {
                            star.style.background = 'white';
                        }
                        star.style.boxShadow = '';
                    }, 3000);
                });
                showToastMessage("🌈 RAINBOW STARS! 🌟");
            }
            
            // Press 'C' to clear all easter egg effects
            if (e.key === 'c' || e.key === 'C') {
                document.body.classList.remove('rainbow-mode');
                rainbowActive = false;
                showToastMessage("✨ Effects cleared! ✨");
            }
        });
        
        // Helper function for toast notifications
        function showToastMessage(msg) {
            const toast = document.getElementById('toast');
            const originalText = toast.innerText;
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                if (toast.innerText === msg) {
                    toast.innerText = originalText;
                    setTimeout(() => toast.classList.remove('show'), 500);
                }
            }, 1800);
        }

        // --- SUN BOMB LOGIC (unchanged) ---
        const sun = document.getElementById('sun-trigger');
        const fireNuke = () => {
            confetti({ particleCount: 1000, spread: 360, startVelocity: 60, origin: { y: 0.5 }, colors: ['#FF6600', '#FFFFFF', '#FFCC00'], scalar: 1.2 });
            const end = Date.now() + 1000;
            (function frame() {
                confetti({ particleCount: 20, angle: 60, spread: 90, origin: { x: 0 } });
                confetti({ particleCount: 20, angle: 120, spread: 90, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        };

        const startSunPress = (e) => {
            e.preventDefault(); detonated = false;
            pressTimer = setTimeout(() => {
                sun.classList.add('charging');
                chargeTimer = setTimeout(() => {
                    detonated = true; sun.classList.remove('charging');
                    sun.classList.add('shake'); fireNuke();
                    setTimeout(() => sun.classList.remove('shake'), 1000);
                }, 500);
            }, 500);
        };

        const endSunPress = () => {
            clearTimeout(pressTimer); clearTimeout(chargeTimer);
            sun.classList.remove('charging');
            if (!detonated) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#FF6600', '#FFFFFF'] });
                if (++sunClicks >= 5) {
                    document.body.classList.add('hyperdrive');
                    setTimeout(() => { document.body.classList.remove('hyperdrive'); sunClicks = 0; }, 4000);
                }
            }
        };

        sun.addEventListener('mousedown', startSunPress); sun.addEventListener('mouseup', endSunPress);
        sun.addEventListener('touchstart', startSunPress); sun.addEventListener('touchend', endSunPress);

        // --- BINARY RAIN (unchanged) ---
        const startRetryPress = () => { retryTimer = setTimeout(() => { initStars(true); setTimeout(() => initStars(false), 8000); }, 3000); };
        retryBtn.addEventListener('mousedown', startRetryPress); retryBtn.addEventListener('mouseup', () => clearTimeout(retryTimer));
        retryBtn.addEventListener('touchstart', startRetryPress); retryBtn.addEventListener('touchend', () => clearTimeout(retryTimer));

        function checkConnection() {
            const toast = document.getElementById('toast');
            toast.innerText = "📡 CHECKING"; toast.classList.add('show');
            if (navigator.onLine) {
                toast.innerText = "✅ CONNECTED";
                setTimeout(() => window.location.reload(), 1000);
            } else {
                toast.innerText = "❌ OFFLINE";
                setTimeout(() => toast.classList.remove('show'), 2000);
                ballMorphJoke();
            }
        }
    </script>
</body>
</html>
