<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thesdel CBT - Take Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-5">

<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6">Thesdel <span class="text-orange-500">CBT</span></h1>

    <!-- SETUP -->
    <div id="setup" class="bg-gray-900/50 p-6 rounded-2xl">
        <h2 class="text-xl font-bold mb-4">Exam Setup</h2>
        
        <select id="subject" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-white">
            <option>-- Loading subjects --</option>
        </select>
        
        <input type="number" id="numQ" placeholder="Number of questions" value="2" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-white">
        
        <input type="text" id="name" placeholder="Your name" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-white">
        
        <input type="number" id="time" placeholder="Time limit (minutes)" value="30" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-4 text-white">
        
        <button onclick="startExam()" class="w-full bg-orange-600 py-3 rounded-xl font-bold">Start Exam</button>
        
        <div id="debug" class="mt-3 text-xs text-gray-500"></div>
    </div>

    <!-- EXAM -->
    <div id="exam" class="hidden">
        <div class="bg-gray-900/50 p-4 rounded-2xl mb-4 flex justify-between">
            <span id="subName" class="text-orange-500 font-bold"></span>
            <span id="timer" class="font-mono text-xl">00:00</span>
        </div>
        
        <div class="bg-gray-900/50 p-6 rounded-2xl">
            <p class="text-gray-400 text-sm mb-2" id="qNum">Question 1</p>
            <p class="text-xl font-bold mb-6" id="qText"></p>
            <div id="opts" class="space-y-3 mb-8"></div>
            <div class="flex gap-3">
                <button onclick="prevQ()" class="flex-1 bg-gray-800 py-3 rounded-xl">Previous</button>
                <button onclick="nextQ()" id="nextBtn" class="flex-1 bg-orange-600 py-3 rounded-xl">Next</button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="hidden bg-gray-900/50 p-6 rounded-2xl">
        <h2 class="text-2xl font-bold mb-4">Results</h2>
        <p id="score" class="text-3xl font-bold text-orange-500 mb-6"></p>
        <div id="review" class="space-y-3 max-h-96 overflow-y-auto mb-6"></div>
        <button onclick="location.reload()" class="w-full bg-gray-800 py-3 rounded-xl">New Exam</button>
    </div>
</div>

<script>
const supabase = window.supabase.createClient(
    'https://lgfyrlfjoazedwymjpfc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
);

let questions = [], answers = {}, current = 0, active = false, timerInt = null, secs = 0, sessionId = null;

function log(msg) {
    document.getElementById('debug').innerHTML = msg;
    console.log(msg);
}

async function loadSubjects() {
    log("Loading subjects...");
    const { data, error } = await supabase.from('subjects').select('*');
    if (error) { log("Error: " + error.message); return; }
    log(`Found ${data.length} subjects`);
    
    const select = document.getElementById('subject');
    select.innerHTML = '<option value="">-- Select Subject --</option>';
    data.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${s.subject_name}</option>`;
    });
}

async function startExam() {
    const subjectId = document.getElementById('subject').value;
    const num = parseInt(document.getElementById('numQ').value);
    const studentName = document.getElementById('name').value.trim();
    const mins = parseInt(document.getElementById('time').value);
    
    if (!subjectId) { log("Select a subject"); return; }
    if (!studentName) { log("Enter your name"); return; }
    
    log("Loading questions...");
    const { data, error } = await supabase
        .from('questions')
        .select('*')
        .eq('subject_id', parseInt(subjectId));
    
    if (error) { log("Error: " + error.message); return; }
    log(`Found ${data.length} questions`);
    
    if (data.length === 0) { log("No questions for this subject"); return; }
    
    // Shuffle
    for (let i = data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [data[i], data[j]] = [data[j], data[i]];
    }
    
    questions = data.slice(0, Math.min(num, data.length));
    answers = {};
    current = 0;
    active = true;
    
    // Create session
    const { data: session } = await supabase.from('exam_sessions').insert({
        session_code: 'EXAM-' + Date.now(),
        student_name: studentName,
        subject_id: parseInt(subjectId),
        total_questions: questions.length,
        status: 'in-progress'
    }).select().single();
    sessionId = session?.id;
    
    secs = mins * 60;
    startTimer();
    
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('exam').classList.remove('hidden');
    document.getElementById('subName').innerHTML = document.getElementById('subject').options[document.getElementById('subject').selectedIndex].text;
    
    renderQ();
}

function startTimer() {
    if (timerInt) clearInterval(timerInt);
    timerInt = setInterval(() => {
        if (active && secs > 0) {
            secs--;
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            document.getElementById('timer').innerHTML = `${m}:${s.toString().padStart(2,'0')}`;
            if (secs === 0) submitExam();
        }
    }, 1000);
}

function renderQ() {
    const q = questions[current];
    document.getElementById('qText').innerHTML = q.question_text;
    document.getElementById('qNum').innerHTML = `Question ${current+1} of ${questions.length}`;
    
    const opts = [
        { l: 'A', t: q.option_a },
        { l: 'B', t: q.option_b },
        { l: 'C', t: q.option_c },
        { l: 'D', t: q.option_d }
    ];
    
    let html = '';
    opts.forEach(opt => {
        const selected = answers[q.id] === opt.l;
        html += `
            <div onclick="selectAnswer(${q.id}, '${opt.l}')" 
                class="p-3 rounded-xl border ${selected ? 'border-orange-500 bg-orange-500/20' : 'border-gray-700 bg-gray-800/50'} cursor-pointer">
                <span class="font-bold mr-2">${opt.l}.</span> ${opt.t}
            </div>
        `;
    });
    document.getElementById('opts').innerHTML = html;
    
    const btn = document.getElementById('nextBtn');
    if (current === questions.length - 1) {
        btn.innerHTML = 'SUBMIT';
        btn.classList.add('bg-green-600');
        btn.classList.remove('bg-orange-600');
    } else {
        btn.innerHTML = 'Next';
        btn.classList.remove('bg-green-600');
        btn.classList.add('bg-orange-600');
    }
}

function selectAnswer(id, ans) {
    answers[id] = ans;
    renderQ();
}

function nextQ() {
    if (current < questions.length - 1) {
        current++;
        renderQ();
    } else {
        submitExam();
    }
}

function prevQ() {
    if (current > 0) {
        current--;
        renderQ();
    }
}

async function submitExam() {
    if (!active) return;
    active = false;
    if (timerInt) clearInterval(timerInt);
    
    // Get correct answers
    const ids = questions.map(q => q.id);
    const { data: corrects } = await supabase
        .from('questions')
        .select('id, correct_answer')
        .in('id', ids);
    
    const correctMap = {};
    corrects.forEach(c => { correctMap[c.id] = c.correct_answer; });
    
    let correct = 0;
    const responses = [];
    
    for (const q of questions) {
        const user = answers[q.id];
        const isCorrect = user === correctMap[q.id];
        if (isCorrect) correct++;
        responses.push({
            session_id: sessionId,
            question_id: q.id,
            question_text: q.question_text,
            selected_answer: user,
            is_correct: isCorrect
        });
    }
    
    await supabase.from('exam_responses').insert(responses);
    await supabase.from('exam_sessions').update({
        score: correct,
        percentage: (correct / questions.length) * 100,
        status: 'completed',
        completed_at: new Date().toISOString()
    }).eq('id', sessionId);
    
    // Show results
    document.getElementById('exam').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('score').innerHTML = `${correct}/${questions.length} (${Math.round(correct/questions.length*100)}%)`;
    
    let reviewHtml = '';
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const user = answers[q.id] || 'Not answered';
        const isCorrect = user === correctMap[q.id];
        reviewHtml += `
            <div class="p-3 rounded-xl ${isCorrect ? 'bg-green-500/20' : 'bg-red-500/20'}">
                <p class="font-bold">${i+1}. ${q.question_text}</p>
                <p>Your answer: ${user}</p>
                ${!isCorrect ? `<p class="text-gray-400">Correct: ${correctMap[q.id]}</p>` : ''}
            </div>
        `;
    }
    document.getElementById('review').innerHTML = reviewHtml;
}

loadSubjects();
</script>
</body>
</html>
