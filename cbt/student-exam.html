<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesdel CBT - Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-4">

<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6">Thesdel <span class="text-orange-500">CBT</span></h1>

    <!-- DEBUG PANEL -->
    <div class="bg-gray-900 p-4 rounded-2xl mb-4">
        <p class="text-orange-500 font-bold mb-2">🔍 Debug Info:</p>
        <div id="debugInfo" class="text-xs text-gray-400 space-y-1"></div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setupScreen" class="bg-gray-900 p-6 rounded-2xl">
        <h2 class="text-xl font-bold mb-4">📋 Exam Setup</h2>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-2">Select Subject</label>
            <select id="subjectSelect" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-white">
                <option value="">-- Loading --</option>
            </select>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-2">Number of Questions</label>
            <input type="number" id="questionCount" value="3" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-white">
        </div>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-2">Your Name</label>
            <input type="text" id="studentName" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-white">
        </div>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-2">Time Limit (minutes)</label>
            <input type="number" id="timeLimit" value="10" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-white">
        </div>
        
        <button onclick="startExam()" class="w-full bg-orange-600 py-3 rounded-xl font-bold hover:bg-orange-500">START EXAM</button>
    </div>
</div>

<script>
// Supabase connection
const supabaseUrl = 'https://lgfyrlfjoazedwymjpfc.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw';

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

function addDebug(msg) {
    const debugDiv = document.getElementById('debugInfo');
    debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
    console.log(msg);
}

async function testConnection() {
    addDebug("Testing Supabase connection...");
    addDebug(`URL: ${supabaseUrl}`);
    
    try {
        // Test 1: Simple health check
        addDebug("Test 1: Fetching subjects...");
        const { data, error, status } = await supabase.from('subjects').select('*');
        
        addDebug(`Response status: ${status}`);
        
        if (error) {
            addDebug(`ERROR: ${error.message}`);
            addDebug(`Error details: ${JSON.stringify(error)}`);
            return;
        }
        
        addDebug(`SUCCESS! Found ${data?.length || 0} subjects`);
        
        if (data && data.length > 0) {
            data.forEach(sub => {
                addDebug(`  - ID: ${sub.id}, Name: ${sub.name}`);
            });
            
            // Populate dropdown
            const select = document.getElementById('subjectSelect');
            select.innerHTML = '<option value="">-- Select Subject --</option>';
            data.forEach(sub => {
                select.innerHTML += `<option value="${sub.id}">${sub.name}</option>`;
            });
            addDebug("Dropdown populated successfully!");
        } else {
            addDebug("WARNING: No subjects found in database");
            addDebug("Run this SQL: INSERT INTO subjects (name) VALUES ('Mathematics');");
        }
        
        // Test 2: Check questions
        addDebug("Test 2: Checking questions...");
        const { data: qData, error: qError } = await supabase.from('questions').select('*');
        
        if (qError) {
            addDebug(`Questions error: ${qError.message}`);
        } else {
            addDebug(`Found ${qData?.length || 0} questions total`);
            
            // Group by subject
            const bySubject = {};
            (qData || []).forEach(q => {
                if (!bySubject[q.subject_id]) bySubject[q.subject_id] = 0;
                bySubject[q.subject_id]++;
            });
            addDebug(`Questions per subject: ${JSON.stringify(bySubject)}`);
        }
        
    } catch (err) {
        addDebug(`CATCH ERROR: ${err.message}`);
        addDebug(`Stack: ${err.stack}`);
    }
}

// Manual test function for console
window.testDB = async function() {
    addDebug("=== MANUAL TEST ===");
    const { data, error } = await supabase.from('subjects').select('*');
    if (error) {
        addDebug("Error: " + error.message);
    } else {
        addDebug("Data: " + JSON.stringify(data));
    }
};

// Start exam function
async function startExam() {
    const subjectId = document.getElementById('subjectSelect').value;
    const studentName = document.getElementById('studentName').value.trim();
    
    addDebug(`Start Exam clicked - Subject ID: ${subjectId}, Name: ${studentName}`);
    
    if (!subjectId) {
        addDebug("ERROR: No subject selected");
        alert("Please select a subject");
        return;
    }
    
    if (!studentName) {
        addDebug("ERROR: No name entered");
        alert("Please enter your name");
        return;
    }
    
    addDebug("Fetching questions...");
    const { data, error } = await supabase
        .from('questions')
        .select('*')
        .eq('subject_id', parseInt(subjectId));
    
    if (error) {
        addDebug(`Error fetching questions: ${error.message}`);
        alert("Error: " + error.message);
        return;
    }
    
    addDebug(`Found ${data?.length || 0} questions`);
    alert(`Found ${data?.length || 0} questions! Check debug panel.`);
}

// Run on page load
testConnection();
</script>
</body>
</html>
