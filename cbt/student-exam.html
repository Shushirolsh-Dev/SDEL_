<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesdel CBT - Take Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-6">

<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8">Thesdel <span class="text-orange-500">CBT</span></h1>

    <!-- SETUP -->
    <div id="setup" class="bg-gray-900/50 p-6 rounded-2xl border border-white/10">
        <h2 class="text-xl font-bold mb-4">Exam Setup</h2>
        
        <select id="subject" class="w-full p-3 bg-black border border-white/10 rounded-xl mb-4">
            <option value="">-- Select Subject --</option>
        </select>
        
        <input type="number" id="numQuestions" placeholder="Number of questions" value="5" class="w-full p-3 bg-black border border-white/10 rounded-xl mb-4">
        
        <input type="text" id="studentName" placeholder="Your name" class="w-full p-3 bg-black border border-white/10 rounded-xl mb-4">
        
        <input type="number" id="timeLimit" placeholder="Time limit (minutes)" value="30" class="w-full p-3 bg-black border border-white/10 rounded-xl mb-4">
        
        <button onclick="startExam()" class="w-full bg-orange-600 py-3 rounded-xl font-bold">Start Exam</button>
        
        <!-- Status messages -->
        <div id="status" class="mt-4 text-sm"></div>
    </div>

    <!-- EXAM -->
    <div id="exam" class="hidden">
        <div class="bg-gray-900/50 p-4 rounded-2xl mb-4 flex justify-between">
            <span id="subjectName" class="text-orange-500 font-bold"></span>
            <span id="timer" class="font-mono text-xl">00:00</span>
        </div>
        
        <div class="bg-gray-900/50 p-6 rounded-2xl">
            <p class="text-gray-400 text-sm mb-2" id="qNum">Question 1</p>
            <p class="text-xl font-bold mb-6" id="qText"></p>
            
            <div id="options" class="space-y-3 mb-8"></div>
            
            <div class="flex gap-3">
                <button onclick="prevQ()" class="flex-1 bg-gray-800 py-3 rounded-xl">Previous</button>
                <button onclick="nextQ()" id="nextBtn" class="flex-1 bg-orange-600 py-3 rounded-xl">Next</button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="hidden bg-gray-900/50 p-6 rounded-2xl">
        <h2 class="text-2xl font-bold mb-4">Results</h2>
        <p id="score" class="text-3xl font-bold text-orange-500 mb-6"></p>
        <div id="review" class="space-y-3 max-h-96 overflow-y-auto mb-6"></div>
        <button onclick="location.reload()" class="w-full bg-gray-800 py-3 rounded-xl">Take Another Exam</button>
    </div>
</div>

<script>
const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let questions = [];
let answers = {};
let currentQ = 0;
let timer = null;
let timeLeft = 0;
let sessionId = null;

function setStatus(msg, isError = false) {
    const statusDiv = document.getElementById('status');
    statusDiv.innerHTML = `<div class="${isError ? 'text-red-500' : 'text-green-500'}">${msg}</div>`;
    console.log(msg);
}

async function loadSubjects() {
    setStatus("Loading subjects...");
    
    const { data, error } = await supabase.from('subjects').select('*');
    
    if (error) {
        setStatus("Error: " + error.message, true);
        return;
    }
    
    setStatus(`Found ${data.length} subject(s)`);
    
    if (data.length === 0) {
        setStatus("No subjects found! Please add subjects to database.", true);
        return;
    }
    
    const select = document.getElementById('subject');
    select.innerHTML = '<option value="">-- Select Subject --</option>';
    data.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${s.subject_name}</option>`;
    });
}

async function startExam() {
    const subjectId = document.getElementById('subject').value;
    const numQ = parseInt(document.getElementById('numQuestions').value);
    const studentName = document.getElementById('studentName').value.trim();
    const timeMins = parseInt(document.getElementById('timeLimit').value);
    
    if (!subjectId) { setStatus("Please select a subject", true); return; }
    if (!studentName) { setStatus("Please enter your name", true); return; }
    
    setStatus(`Loading questions for subject ID ${subjectId}...`);
    
    // Fetch questions
    const { data, error } = await supabase
        .from('questions')
        .select('*')
        .eq('subject_id', parseInt(subjectId));
    
    if (error) {
        setStatus("Error loading questions: " + error.message, true);
        return;
    }
    
    setStatus(`Found ${data.length} question(s)`);
    
    if (!data || data.length === 0) {
        setStatus("No questions found for this subject! Please add questions first.", true);
        return;
    }
    
    // Shuffle and take requested number
    for (let i = data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [data[i], data[j]] = [data[j], data[i]];
    }
    
    questions = data.slice(0, Math.min(numQ, data.length));
    answers = {};
    currentQ = 0;
    
    setStatus(`Loaded ${questions.length} question(s) for exam`);
    
    // Create session
    const { data: session, error: sessionError } = await supabase
        .from('exam_sessions')
        .insert({
            session_code: 'EXAM-' + Date.now(),
            student_name: studentName,
            subject_id: parseInt(subjectId),
            total_questions: questions.length,
            status: 'in-progress'
        })
        .select()
        .single();
    
    if (sessionError) {
        setStatus("Warning: Could not save session - " + sessionError.message, true);
    } else {
        sessionId = session.id;
    }
    
    // Setup timer
    timeLeft = timeMins * 60;
    startTimer();
    
    // Show exam
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('exam').classList.remove('hidden');
    
    const subjectName = document.getElementById('subject').options[document.getElementById('subject').selectedIndex].text;
    document.getElementById('subjectName').innerHTML = subjectName;
    
    renderQuestion();
}

function startTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerHTML = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (timeLeft === 0) submitExam();
        }
    }, 1000);
}

function renderQuestion() {
    const q = questions[currentQ];
    document.getElementById('qNum').innerHTML = `Question ${currentQ + 1} of ${questions.length}`;
    document.getElementById('qText').innerHTML = escapeHtml(q.question_text);
    
    const options = [
        { letter: 'A', text: q.option_a },
        { letter: 'B', text: q.option_b },
        { letter: 'C', text: q.option_c },
        { letter: 'D', text: q.option_d }
    ];
    
    let html = '';
    options.forEach(opt => {
        const isSelected = answers[q.id] === opt.letter;
        html += `
            <div onclick="selectAnswer(${q.id}, '${opt.letter}')" 
                class="p-4 rounded-xl border ${isSelected ? 'border-orange-500 bg-orange-500/20' : 'border-white/10 bg-white/5'} cursor-pointer hover:border-orange-500">
                <span class="font-bold mr-3">${opt.letter}.</span> ${escapeHtml(opt.text)}
            </div>
        `;
    });
    document.getElementById('options').innerHTML = html;
    
    const nextBtn = document.getElementById('nextBtn');
    if (currentQ === questions.length - 1) {
        nextBtn.innerHTML = 'SUBMIT';
        nextBtn.classList.add('bg-green-600');
        nextBtn.classList.remove('bg-orange-600');
    } else {
        nextBtn.innerHTML = 'Next';
        nextBtn.classList.remove('bg-green-600');
        nextBtn.classList.add('bg-orange-600');
    }
}

function selectAnswer(qId, answer) {
    answers[qId] = answer;
    renderQuestion();
}

function nextQ() {
    if (currentQ < questions.length - 1) {
        currentQ++;
        renderQuestion();
    } else {
        submitExam();
    }
}

function prevQ() {
    if (currentQ > 0) {
        currentQ--;
        renderQuestion();
    }
}

async function submitExam() {
    if (timer) clearInterval(timer);
    
    setStatus("Submitting exam...");
    
    // Get correct answers
    const { data: correctData } = await supabase
        .from('questions')
        .select('id, correct_answer')
        .in('id', questions.map(q => q.id));
    
    const correctMap = {};
    correctData.forEach(c => { correctMap[c.id] = c.correct_answer; });
    
    let correct = 0;
    const responses = [];
    
    for (const q of questions) {
        const userAnswer = answers[q.id];
        const isCorrect = userAnswer === correctMap[q.id];
        if (isCorrect) correct++;
        
        responses.push({
            session_id: sessionId,
            question_id: q.id,
            question_text: q.question_text,
            selected_answer: userAnswer,
            is_correct: isCorrect
        });
    }
    
    // Save responses
    await supabase.from('exam_responses').insert(responses);
    
    // Update session
    await supabase.from('exam_sessions').update({
        score: correct,
        percentage: (correct / questions.length) * 100,
        status: 'completed',
        completed_at: new Date().toISOString()
    }).eq('id', sessionId);
    
    // Show results
    document.getElementById('exam').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    
    document.getElementById('score').innerHTML = `${correct}/${questions.length} (${Math.round((correct/questions.length)*100)}%)`;
    
    let reviewHtml = '';
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const userAnswer = answers[q.id] || 'Not answered';
        const isCorrect = userAnswer === correctMap[q.id];
        reviewHtml += `
            <div class="p-3 rounded-xl ${isCorrect ? 'bg-green-500/20' : 'bg-red-500/20'}">
                <p class="font-bold text-sm">${i+1}. ${escapeHtml(q.question_text)}</p>
                <p class="text-sm">Your answer: ${userAnswer}</p>
                ${!isCorrect ? `<p class="text-sm text-gray-400">Correct: ${correctMap[q.id]}</p>` : ''}
            </div>
        `;
    }
    document.getElementById('review').innerHTML = reviewHtml;
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadSubjects();
</script>
</body>
</html>
