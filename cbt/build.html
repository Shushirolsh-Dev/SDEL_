<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesdel Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, textarea, select { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #ff6600; }
        .hidden { display: none; }
        .subject-pill { padding: 6px 14px; border-radius: 99px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .subject-active { background: #ff6600; border-color: #ff6600; color: white; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .q-preview-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .q-preview-card:hover { border-color: rgba(255,102,0,0.3); background: rgba(255,102,0,0.05); }
        #toast { transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(150%); }
        #toast.active { transform: translateY(0); }
        .watermark { position: absolute; bottom: 20px; right: 20px; font-size: 12px; font-weight: 900; opacity: 0.2; color: #ff6600; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Option Card Styles */
        .option-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .option-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,102,0,0.5);
            transform: translateY(-2px);
        }
        .option-card.selected {
            background: linear-gradient(135deg, rgba(255,102,0,0.15), rgba(255,102,0,0.05));
            border-color: #ff6600;
            box-shadow: 0 0 0 2px rgba(255,102,0,0.2), 0 4px 15px rgba(255,102,0,0.2);
        }
        .option-card.selected::before {
            content: '✓';
            position: absolute;
            top: 12px;
            right: 12px;
            color: #ff6600;
            font-weight: bold;
            font-size: 14px;
        }
        .option-letter {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            background: rgba(255,102,0,0.2);
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            color: #ff6600;
            margin-right: 12px;
        }
        .option-text {
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
        }
        .option-input {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        .option-input:focus {
            border: none !important;
            outline: none !important;
        }
        
        /* Build Mode Toggle */
        .mode-toggle {
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
        }
        .mode-option {
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-option.active {
            background: #ff6600;
            color: black;
        }
        
        /* Auto-gen panel */
        .auto-gen-panel {
            background: linear-gradient(135deg, rgba(255,102,0,0.1), rgba(255,102,0,0.02));
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 20px;
            padding: 20px;
        }
        
        .question-counter {
            background: rgba(255,102,0,0.2);
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 800;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .generating {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body class="p-5 pb-32">

    <div id="toast" class="fixed bottom-10 left-5 right-5 z-[200] flex justify-center pointer-events-none">
        <div class="glass-panel px-6 py-4 rounded-2xl border-orange-500/50 border shadow-2xl">
            <p id="toast-msg" class="text-xs font-black uppercase tracking-widest text-center text-orange-500"></p>
        </div>
    </div>

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-xl font-black tracking-tighter uppercase">Thesdel <span class="text-orange-500">Studio</span></h1>
        <div class="flex gap-4">
            <button onclick="showSection('create')" id="btn-create" class="text-[10px] font-black uppercase text-orange-500">Create</button>
            <button onclick="showSection('manage')" id="btn-manage" class="text-[10px] font-black uppercase text-gray-500">Vault</button>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 hidden">
        <div class="glass-panel p-8 rounded-[40px] w-full max-w-sm text-center">
            <h2 class="text-2xl font-black uppercase">Finalized!</h2>
            <p id="final-code-display" class="text-2xl font-mono font-bold text-orange-500 mt-4 cursor-pointer" onclick="copyToClipboard(this.innerText)"></p>
            <button onclick="location.reload()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] mt-6">Go to Vault</button>
        </div>
    </div>

    <div id="slide-config">
        <div class="glass-panel p-6 rounded-[32px] space-y-5">
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Exam Title</label>
                <input type="text" id="exam-title" placeholder="e.g. Surgery 101" class="w-full p-4 mt-1">
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Start Time (Optional - Blank for Infinite)</label>
                    <input type="datetime-local" id="start-time" class="w-full p-4 mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Duration (Minutes)</label>
                    <input type="number" id="exam-duration" value="30" class="w-full p-4 mt-1">
                </div>
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Subjects (Max 4)</label>
                <input type="text" id="sub-search" oninput="searchSubs()" placeholder="Search..." class="w-full p-4 mt-1">
            </div>
            <div id="search-results" class="flex flex-wrap gap-2"></div>
            <div id="selected-list" class="flex flex-wrap gap-2 min-h-[30px] border-t border-white/5 pt-3"></div>
            <button onclick="initiateBuild()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] mt-4">Start Building</button>
        </div>
    </div>

    <div id="slide-questions" class="hidden">
        <div id="subject-tabs" class="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-2"></div>
        
        <!-- Build Mode Toggle -->
        <div class="flex justify-between items-center mb-4">
            <div class="mode-toggle">
                <div id="mode-manual" class="mode-option active" onclick="setBuildMode('manual')">✍️ Manual</div>
                <div id="mode-auto" class="mode-option" onclick="setBuildMode('auto')">🤖 Auto-Generate</div>
            </div>
            <div id="question-counter" class="question-counter hidden">0 Questions</div>
        </div>
        
        <!-- Manual Build Panel -->
        <div id="manual-panel" class="glass-panel p-6 rounded-[32px] space-y-4 border-orange-500/20">
            <div class="flex justify-between items-center">
                <span id="cur-sub-label" class="text-orange-500 font-black text-[10px] uppercase"></span>
                <span id="edit-indicator" class="text-white/20 text-[8px] font-black uppercase">New Mode</span>
            </div>
            <textarea id="q-text" placeholder="Question Text..." class="w-full p-4 h-24 text-sm"></textarea>
            
            <!-- Options as Cards (Not Straight Line) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div id="option-card-A" class="option-card" onclick="selectOption('A')">
                    <div class="flex items-start">
                        <span class="option-letter">A</span>
                        <input type="text" id="opt-a" placeholder="Option A" class="option-text option-input" onclick="event.stopPropagation()" oninput="updateOptionPreview('A', this.value)">
                    </div>
                </div>
                <div id="option-card-B" class="option-card" onclick="selectOption('B')">
                    <div class="flex items-start">
                        <span class="option-letter">B</span>
                        <input type="text" id="opt-b" placeholder="Option B" class="option-text option-input" onclick="event.stopPropagation()" oninput="updateOptionPreview('B', this.value)">
                    </div>
                </div>
                <div id="option-card-C" class="option-card" onclick="selectOption('C')">
                    <div class="flex items-start">
                        <span class="option-letter">C</span>
                        <input type="text" id="opt-c" placeholder="Option C" class="option-text option-input" onclick="event.stopPropagation()" oninput="updateOptionPreview('C', this.value)">
                    </div>
                </div>
                <div id="option-card-D" class="option-card" onclick="selectOption('D')">
                    <div class="flex items-start">
                        <span class="option-letter">D</span>
                        <input type="text" id="opt-d" placeholder="Option D" class="option-text option-input" onclick="event.stopPropagation()" oninput="updateOptionPreview('D', this.value)">
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button id="main-save-btn" onclick="saveQuestion(false)" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Save & Next</button>
                <button onclick="saveQuestion(true)" class="flex-1 bg-orange-600 py-4 rounded-xl text-[10px] font-black uppercase">Finish Exam</button>
            </div>
        </div>
        
        <!-- Auto-Generate Panel -->
        <div id="auto-panel" class="auto-gen-panel hidden space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-orange-500 font-black text-sm uppercase">🤖 AI Question Generator</h3>
                <button id="generate-btn" onclick="generateQuestions()" class="bg-orange-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase">Generate Questions</button>
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Number of Questions</label>
                <input type="number" id="num-questions" value="5" min="1" max="20" class="w-full p-4 mt-1">
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Topic Focus (Optional)</label>
                <input type="text" id="topic-focus" placeholder="e.g., cardiovascular system, pharmacology basics" class="w-full p-4 mt-1">
            </div>
            <div class="text-xs text-gray-400">
                <p>💡 Auto-generated questions will be created based on the subject area. You can edit them after generation.</p>
            </div>
        </div>
        
        <div id="q-preview-list" class="mt-8 space-y-4 pb-20"></div>
    </div>

    <div id="view-vault" class="hidden space-y-4 pb-20"></div>

    <div id="view-analytics" class="hidden pb-20 space-y-6">
        <div class="flex justify-between items-center">
            <button onclick="showSection('manage')" class="text-orange-500 font-black text-[10px] uppercase">← Vault</button>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-green-600/10 text-green-500 px-3 py-2 rounded-xl text-[8px] font-black uppercase">Excel</button>
                <button onclick="exportPNG()" class="bg-white/5 text-white px-3 py-2 rounded-xl text-[8px] font-black uppercase">Save PNG</button>
            </div>
        </div>
        <div id="capture-area" class="glass-panel p-8 rounded-[40px] relative overflow-hidden">
            <div class="watermark">Thesdel CBT Vault</div>
            <h2 id="ana-title" class="text-3xl font-black uppercase tracking-tighter text-orange-500"></h2>
            <div class="flex justify-between items-end mb-6">
                <p id="ana-code" class="text-[10px] font-mono text-gray-500"></p>
                <div class="text-right">
                    <p class="text-[8px] text-gray-600 font-black uppercase">Average Score</p>
                    <p id="ana-avg" class="text-lg font-black text-white"></p>
                </div>
            </div>
            <table class="w-full text-left text-[11px]">
                <thead class="border-b border-white/10 text-gray-500 uppercase font-black">
                    <tr><th class="py-3">Homie</th><th class="py-3 text-center">Score</th><th class="py-3 text-right">XP</th></tr>
                </thead>
                <tbody id="analysis-rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        const sb = supabase.createClient(_URL, _KEY);
        const userId = localStorage.getItem('thesdel_user_id');

        let selectedSubs = [];
        let activeSub = "";
        let activeBuildId = null;
        let editingQId = null;
        let currentBuildMode = 'manual'; // 'manual' or 'auto'
        let selectedCorrectOption = null;

        const POOL = ["Anatomy", "Physiology", "Biochemistry", "MTH 101", "GST 101", "Surgery", "Law of Tort", "Pathology"];

        // Sample question bank for auto-generation
        const questionBank = {
            "Anatomy": [
                { text: "Which bone is known as the collarbone?", options: ["Scapula", "Clavicle", "Humerus", "Femur"], correct: "B" },
                { text: "How many bones are in the adult human body?", options: ["206", "208", "210", "204"], correct: "A" },
                { text: "What is the longest bone in the human body?", options: ["Tibia", "Fibula", "Femur", "Humerus"], correct: "C" }
            ],
            "Physiology": [
                { text: "Which hormone regulates blood sugar?", options: ["Insulin", "Adrenaline", "Thyroxine", "Cortisol"], correct: "A" },
                { text: "What is the normal resting heart rate for adults?", options: ["60-100 bpm", "40-60 bpm", "100-120 bpm", "120-140 bpm"], correct: "A" }
            ],
            "Biochemistry": [
                { text: "What is the primary function of hemoglobin?", options: ["Carry oxygen", "Fight infection", "Digest food", "Store energy"], correct: "A" }
            ]
        };

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('start-time').min = now.toISOString().slice(0, 16);

        function notify(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            notify("Copied Code!");
        }

        function searchSubs() {
            const q = document.getElementById('sub-search').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = ""; if(!q) return;
            POOL.filter(s => s.toLowerCase().includes(q)).forEach(s => {
                const d = document.createElement('div');
                d.className = "subject-pill"; d.innerText = s;
                d.onclick = () => { 
                    if(selectedSubs.length >= 4) return notify("Max 4!");
                    if(!selectedSubs.includes(s)) { selectedSubs.push(s); renderSelected(); } 
                };
                res.appendChild(d);
            });
        }

        function renderSelected() {
            document.getElementById('selected-list').innerHTML = selectedSubs.map(s => 
                `<div onclick="removeSub('${s}')" class="subject-pill subject-active">${s} ×</div>`
            ).join('');
        }

        function removeSub(s) {
            selectedSubs = selectedSubs.filter(sub => sub !== s);
            renderSelected();
        }

        function setBuildMode(mode) {
            currentBuildMode = mode;
            document.getElementById('mode-manual').classList.toggle('active', mode === 'manual');
            document.getElementById('mode-auto').classList.toggle('active', mode === 'auto');
            document.getElementById('manual-panel').classList.toggle('hidden', mode !== 'manual');
            document.getElementById('auto-panel').classList.toggle('hidden', mode !== 'auto');
            
            if (mode === 'auto') {
                updateQuestionCounter();
            }
        }

        function updateOptionPreview(letter, value) {
            // Auto-save the option text to the hidden input (already happening)
        }

        function selectOption(option) {
            selectedCorrectOption = option;
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const card = document.getElementById(`option-card-${opt}`);
                if (card) {
                    if (opt === option) {
                        card.classList.add('selected');
                    } else {
                        card.classList.remove('selected');
                    }
                }
            });
            document.getElementById('q-correct-hidden').value = option;
        }

        async function generateQuestions() {
            const numQuestions = parseInt(document.getElementById('num-questions').value) || 5;
            const topicFocus = document.getElementById('topic-focus').value;
            
            notify(`🤖 Generating ${numQuestions} questions...`);
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.classList.add('generating');
            generateBtn.disabled = true;
            
            try {
                // Use sample bank + AI-like generation
                const bank = questionBank[activeSub] || questionBank["Anatomy"];
                const generated = [];
                
                for (let i = 0; i < Math.min(numQuestions, 20); i++) {
                    const template = bank[i % bank.length];
                    const newQuestion = {
                        build_id: activeBuildId,
                        subject_tag: activeSub,
                        question_text: topicFocus ? `${topicFocus}: ${template.text}` : template.text,
                        option_a: template.options[0],
                        option_b: template.options[1],
                        option_c: template.options[2],
                        option_d: template.options[3],
                        correct_answer: template.correct
                    };
                    
                    const { error } = await sb.from('cbt_questions').insert([newQuestion]);
                    if (!error) generated.push(newQuestion);
                }
                
                notify(`✅ Generated ${generated.length} questions successfully!`);
                renderPreviews();
                updateQuestionCounter();
            } catch (err) {
                notify("❌ Generation failed. Try again.");
                console.error(err);
            } finally {
                generateBtn.classList.remove('generating');
                generateBtn.disabled = false;
            }
        }

        async function updateQuestionCounter() {
            if (!activeBuildId) return;
            const { data } = await sb.from('cbt_questions')
                .select('id', { count: 'exact', head: true })
                .eq('build_id', activeBuildId);
            const count = data?.length || 0;
            const counter = document.getElementById('question-counter');
            counter.classList.remove('hidden');
            counter.innerHTML = `${count} Question${count !== 1 ? 's' : ''}`;
        }

        async function initiateBuild() {
            if(!userId) return notify("Login first!");
            const title = document.getElementById('exam-title').value;
            if(!title || selectedSubs.length === 0) return notify("Incomplete Details!");

            const startTimeValue = document.getElementById('start-time').value;
            if (startTimeValue) {
                const selectedDate = new Date(startTimeValue);
                const now = new Date();
                selectedDate.setMinutes(selectedDate.getMinutes() + selectedDate.getTimezoneOffset());
                if (selectedDate < now) {
                    notify("❌ Start time cannot be in the past!");
                    return;
                }
            }

            const firstThree = Math.floor(100 + Math.random() * 900);
            const upper = String.fromCharCode(65 + Math.floor(Math.random() * 26));
            const lower1 = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            const lower2 = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            const lower3 = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            const digit1 = Math.floor(Math.random() * 10);
            const digit2 = Math.floor(Math.random() * 10);
            const lower4 = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            const lower5 = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            const finalDigit = Math.floor(Math.random() * 10);

            const code = `Thesdel-${firstThree}${upper}${lower1}${lower2}${lower3}${digit1}${digit2}${lower4}${lower5}${finalDigit}`;

            const { data, error } = await sb.from('cbt_builds').insert([{
                creator_id: userId, build_name: title, subjects_list: selectedSubs,
                duration_mins: parseInt(document.getElementById('exam-duration').value) || 30,
                join_code: code, start_time: startTimeValue || null
            }]).select().single();

            if (data) {
                activeBuildId = data.id;
                activeSub = selectedSubs[0];
                document.getElementById('slide-config').classList.add('hidden');
                document.getElementById('slide-questions').classList.remove('hidden');
                setupTabs();
                setBuildMode('manual');
            }
        }

        function setupTabs() {
            const nav = document.getElementById('subject-tabs');
            nav.innerHTML = selectedSubs.map(s => `<div onclick="setSub('${s}')" class="subject-pill ${s === activeSub ? 'subject-active' : ''}">${s}</div>`).join('');
            document.getElementById('cur-sub-label').innerText = activeSub;
            renderPreviews();
        }

        function setSub(s) { 
            activeSub = s; 
            clearQForm(); 
            setupTabs(); 
            updateQuestionCounter();
        }

        function clearQForm() {
            editingQId = null;
            selectedCorrectOption = null;
            document.getElementById('edit-indicator').innerText = "New Mode";
            document.getElementById('main-save-btn').innerHTML = "Save & Next";
            document.getElementById('q-text').value = "";
            document.getElementById('opt-a').value = "";
            document.getElementById('opt-b').value = "";
            document.getElementById('opt-c').value = "";
            document.getElementById('opt-d').value = "";
            
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const card = document.getElementById(`option-card-${opt}`);
                if (card) card.classList.remove('selected');
            });
        }

        async function saveQuestion(isFinal) {
            const correctAnswer = selectedCorrectOption;
            if (!correctAnswer) {
                notify("Please select the correct answer by clicking on an option card!");
                return;
            }
            
            const qData = {
                build_id: activeBuildId, subject_tag: activeSub,
                question_text: document.getElementById('q-text').value,
                option_a: document.getElementById('opt-a').value,
                option_b: document.getElementById('opt-b').value,
                option_c: document.getElementById('opt-c').value,
                option_d: document.getElementById('opt-d').value,
                correct_answer: correctAnswer
            };
            
            let error;
            if(editingQId) {
                const { error: err } = await sb.from('cbt_questions').update(qData).eq('id', editingQId);
                error = err;
            } else {
                const { error: err } = await sb.from('cbt_questions').insert([qData]);
                error = err;
            }

            if(!error) {
                if(isFinal) {
                    const { data } = await sb.from('cbt_builds').select('join_code').eq('id', activeBuildId).single();
                    document.getElementById('final-code-display').innerText = data.join_code;
                    document.getElementById('success-modal').classList.remove('hidden');
                } else { 
                    notify("Question Saved!"); 
                    clearQForm();
                    renderPreviews();
                    updateQuestionCounter();
                }
            } else {
                notify("Error saving question!");
            }
        }

        async function renderPreviews() {
            const { data } = await sb.from('cbt_questions')
                .select('*')
                .eq('build_id', activeBuildId)
                .eq('subject_tag', activeSub);
            
            document.getElementById('q-preview-list').innerHTML = (data || []).map((q, i) => `
                <div class="q-preview-card">
                    <div class="flex justify-between mb-2">
                        <p class="text-[9px] font-black text-orange-500 uppercase">Question ${i+1}</p>
                        <button onclick="editQ('${q.id}')" class="text-[8px] font-black text-white/40 uppercase hover:text-orange-500 transition">✏️ Edit</button>
                    </div>
                    <p class="text-xs font-bold mb-3">${q.question_text}</p>
                    <div class="grid grid-cols-2 gap-2 text-[10px]">
                        <p class="${q.correct_answer === 'A' ? 'text-orange-500 font-bold' : ''}">A: ${q.option_a}</p>
                        <p class="${q.correct_answer === 'B' ? 'text-orange-500 font-bold' : ''}">B: ${q.option_b}</p>
                        <p class="${q.correct_answer === 'C' ? 'text-orange-500 font-bold' : ''}">C: ${q.option_c}</p>
                        <p class="${q.correct_answer === 'D' ? 'text-orange-500 font-bold' : ''}">D: ${q.option_d}</p>
                    </div>
                </div>`).join('');
        }

        async function editQ(id) {
            const { data } = await sb.from('cbt_questions').select('*').eq('id', id).single();
            if(data) {
                editingQId = data.id;
                selectedCorrectOption = data.correct_answer;
                document.getElementById('edit-indicator').innerText = "Editing Mode";
                document.getElementById('main-save-btn').innerHTML = "Update Question";
                document.getElementById('q-text').value = data.question_text;
                document.getElementById('opt-a').value = data.option_a;
                document.getElementById('opt-b').value = data.option_b;
                document.getElementById('opt-c').value = data.option_c;
                document.getElementById('opt-d').value = data.option_d;
                
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    const card = document.getElementById(`option-card-${opt}`);
                    if (card) {
                        if (opt === data.correct_answer) {
                            card.classList.add('selected');
                        } else {
                            card.classList.remove('selected');
                        }
                    }
                });
                
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }
        
        async function loadVault() {
            const { data } = await sb.from('cbt_builds').select('*').eq('creator_id', userId).order('created_at', {ascending: false});
            const v = document.getElementById('view-vault');
            
            v.innerHTML = (data || []).map(b => {
                let status = "LIVE";
                let color = "text-green-500";
                
                if(b.start_time) {
                    const start = new Date(b.start_time);
                    const end = new Date(start.getTime() + (b.duration_mins * 60000));
                    const now = new Date();
                    if(now < start) { status = "PENDING"; color = "text-yellow-500"; }
                    else if(now > end) { status = "ENDED"; color = "text-red-500"; }
                }

                return `
                <div class="glass-panel p-8 rounded-[40px]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black ${color} tracking-widest">${status}</span>
                        <button onclick="deleteExam('${b.id}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button>
                    </div>
                    <h2 class="text-2xl font-black uppercase text-white mb-1">${b.build_name}</h2>
                    <p onclick="copyToClipboard('${b.join_code}')" class="text-[10px] font-mono text-orange-500 mb-6 cursor-pointer">CODE: ${b.join_code}</p>
                    <div class="flex gap-2">
                        <button onclick="openAnalysis('${b.id}', '${b.build_name}', '${b.join_code}')" class="flex-[2] bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Analysis</button>
                        <button onclick="shareExam('${b.build_name}', '${b.join_code}')" class="flex-1 bg-orange-600/20 text-orange-500 py-4 rounded-2xl text-[10px] font-black uppercase">Invite</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function deleteExam(id) {
            if(confirm("Strictly delete this exam and all its questions?")) {
                await sb.from('cbt_questions').delete().eq('build_id', id);
                await sb.from('cbt_builds').delete().eq('id', id);
                loadVault();
                notify("Exam Wiped!");
            }
        }
        
        async function openAnalysis(id, name, code) {
            document.getElementById('view-vault').classList.add('hidden');
            document.getElementById('view-analytics').classList.remove('hidden');
            document.getElementById('ana-title').innerText = name;
            document.getElementById('ana-code').innerText = code;
            
            const { data } = await sb.from('cbt_results').select('score, total_questions, profile:user_id (first_name, last_name)').eq('build_id', id);
            if(data) {
                data.sort((a, b) => b.score - a.score);
                const avg = data.length ? (data.reduce((a, b) => a + b.score, 0) / data.length).toFixed(1) : 0;
                document.getElementById('ana-avg').innerHTML = avg;
                document.getElementById('analysis-rows').innerHTML = data.map(r => `
                    <tr class="border-b border-white/5">
                        <td class="py-4 font-bold uppercase text-white">${r.profile ? r.profile.first_name + ' ' + r.profile.last_name : 'Homie'}</td>
                        <td class="py-4 text-center font-black text-orange-500">${r.score}/${r.total_questions}</td>
                        <td class="py-4 text-right text-gray-400 font-mono">${r.score * 10}</td>
                    </tr>`).join('');
            }
        }

        function shareExam(n, c) {
            const text = `🚀 You are warmly invited to participate in a thrilling CBT hosted by Thesdel!

📘 Exam: ${n}
🔑 Join Code: ${c}

Join now: https://thesdel.com/join

New here? Sign up: https://thesdel.com/signup

Prepare thoroughly and perform at your best. ✨`;
            copyToClipboard(text);
        }

        function exportExcel() {
            let csv = "Homie,Score,XP\n";
            document.querySelectorAll("#analysis-rows tr").forEach(tr => {
                const cols = tr.querySelectorAll("td");
                csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Analysis.csv'; a.click();
        }

        function exportPNG() {
            html2canvas(document.querySelector("#capture-area"), { backgroundColor: '#000' }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = 'Thesdel_Result.png';
                a.click();
            });
        }

        function showSection(sec) {
            ['slide-config','slide-questions','view-vault','view-analytics'].forEach(s => document.getElementById(s).classList.add('hidden'));
            if(sec === 'create') document.getElementById('slide-config').classList.remove('hidden');
            else if(sec === 'manage') { document.getElementById('view-vault').classList.remove('hidden'); loadVault(); }
        }
        
        // Add hidden input for correct answer tracking
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.id = 'q-correct-hidden';
        document.body.appendChild(hiddenInput);
    </script>
</body>
</html>
