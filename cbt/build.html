<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesdel Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
        }
        
        .glass-panel { 
            background: rgba(18, 18, 18, 0.8); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        input, textarea, select { 
            background: rgba(255,255,255,0.05) !important; 
            color: white !important; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 0px !important;
            outline: none; 
            transition: 0.3s;
            padding: 12px;
        }
        
        input:focus, textarea:focus { 
            border-color: #ff6600; 
        }
        
        .hidden { display: none; }
        
        .subject-pill { 
            padding: 6px 14px; 
            border-radius: 99px; 
            font-size: 10px; 
            font-weight: 800; 
            border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: 0.2s; 
            white-space: nowrap; 
        }
        
        .subject-active { 
            background: #ff6600; 
            border-color: #ff6600; 
            color: white; 
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3); 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .q-preview-card { 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px; 
            padding: 16px; 
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 12px;
        }
        
        #toast { 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: translateY(150%); 
        }
        
        #toast.active { 
            transform: translateY(0); 
        }
        
        .watermark { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            font-size: 12px; 
            font-weight: 900; 
            opacity: 0.2; 
            color: #ff6600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        
        /* Simple option cards - NO CURVED EDGES */
        .option-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,102,0,0.5);
        }
        
        .option-card.selected {
            border-color: #ff6600;
            background: rgba(255,102,0,0.1);
            border-left: 4px solid #ff6600;
        }
        
        .option-letter {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            background: rgba(255,102,0,0.2);
            border-radius: 0px;
            font-weight: 800;
            font-size: 14px;
            color: #ff6600;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .option-text {
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: normal;
            flex: 1;
        }
        
        .option-input {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 13px;
            width: 100%;
            outline: none;
            resize: vertical;
            word-wrap: break-word;
            white-space: normal;
            border-radius: 0px !important;
        }
        
        textarea.option-input {
            min-height: 50px;
        }
        
        .mode-toggle {
            background: rgba(255,255,255,0.05);
            border-radius: 0px;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
        }
        
        .mode-option {
            padding: 8px 20px;
            border-radius: 0px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .mode-option.active {
            background: #ff6600;
            color: black;
        }
        
        .auto-gen-panel {
            background: rgba(255,102,0,0.05);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 0px;
            padding: 20px;
        }
        
        .question-badge {
            background: rgba(255,102,0,0.2);
            border-radius: 0px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 800;
        }
        
        button {
            border-radius: 0px !important;
        }
        
        .question-list-container {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body class="p-5 pb-32">

    <div id="toast" class="fixed bottom-10 left-5 right-5 z-[200] flex justify-center pointer-events-none">
        <div class="glass-panel px-6 py-4">
            <p id="toast-msg" class="text-xs font-black uppercase tracking-widest text-center text-orange-500"></p>
        </div>
    </div>

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-xl font-black tracking-tighter uppercase">Thesdel <span class="text-orange-500">Studio</span></h1>
        <div class="flex gap-4">
            <button onclick="showSection('create')" id="btn-create" class="text-[10px] font-black uppercase text-orange-500">Create</button>
            <button onclick="showSection('manage')" id="btn-manage" class="text-[10px] font-black uppercase text-gray-500">Vault</button>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 hidden">
        <div class="glass-panel p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-black uppercase">Finalized!</h2>
            <p id="final-code-display" class="text-2xl font-mono font-bold text-orange-500 mt-4 cursor-pointer" onclick="copyToClipboard(this.innerText)"></p>
            <button onclick="location.reload()" class="w-full bg-white text-black font-black py-4 uppercase text-[10px] mt-6">Go to Vault</button>
        </div>
    </div>

    <div id="slide-config">
        <div class="glass-panel p-6 space-y-5">
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Exam Title</label>
                <input type="text" id="exam-title" placeholder="e.g. Surgery 101" class="w-full mt-1">
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Start Time (Optional)</label>
                    <input type="datetime-local" id="start-time" class="w-full mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Duration (Minutes)</label>
                    <input type="number" id="exam-duration" value="30" class="w-full mt-1">
                </div>
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Subjects (Max 4)</label>
                <input type="text" id="sub-search" oninput="searchSubs()" placeholder="Search..." class="w-full mt-1">
            </div>
            <div id="search-results" class="flex flex-wrap gap-2"></div>
            <div id="selected-list" class="flex flex-wrap gap-2 min-h-[30px] border-t border-white/5 pt-3"></div>
            <button onclick="initiateBuild()" class="w-full bg-white text-black font-black py-4 uppercase text-[10px] mt-4">Start Building</button>
        </div>
    </div>

    <div id="slide-questions" class="hidden">
        <div id="subject-tabs" class="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-2"></div>
        
        <!-- Mode Toggle -->
        <div class="flex justify-between items-center mb-4">
            <div class="mode-toggle">
                <div id="mode-manual" class="mode-option active" onclick="setBuildMode('manual')">Manual</div>
                <div id="mode-auto" class="mode-option" onclick="setBuildMode('auto')">Auto-Gen</div>
            </div>
            <div id="question-counter" class="question-badge">0 Questions</div>
        </div>
        
        <!-- Manual Panel -->
        <div id="manual-panel">
            <div class="glass-panel p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <span id="cur-sub-label" class="text-orange-500 font-black text-[10px] uppercase"></span>
                    <span id="edit-indicator" class="text-white/20 text-[8px] font-black uppercase">New</span>
                </div>
                <textarea id="q-text" placeholder="Question Text..." class="w-full h-24 text-sm"></textarea>
                
                <!-- Option Cards - NO CURVED EDGES -->
                <div class="space-y-3">
                    <div id="option-card-A" class="option-card flex items-start gap-2" onclick="selectCorrect('A')">
                        <span class="option-letter">A</span>
                        <textarea id="opt-a" placeholder="Option A (click card to mark as correct)" class="option-input flex-1" rows="2" oninput="autoResize(this)"></textarea>
                    </div>
                    <div id="option-card-B" class="option-card flex items-start gap-2" onclick="selectCorrect('B')">
                        <span class="option-letter">B</span>
                        <textarea id="opt-b" placeholder="Option B (click card to mark as correct)" class="option-input flex-1" rows="2" oninput="autoResize(this)"></textarea>
                    </div>
                    <div id="option-card-C" class="option-card flex items-start gap-2" onclick="selectCorrect('C')">
                        <span class="option-letter">C</span>
                        <textarea id="opt-c" placeholder="Option C (click card to mark as correct)" class="option-input flex-1" rows="2" oninput="autoResize(this)"></textarea>
                    </div>
                    <div id="option-card-D" class="option-card flex items-start gap-2" onclick="selectCorrect('D')">
                        <span class="option-letter">D</span>
                        <textarea id="opt-d" placeholder="Option D (click card to mark as correct)" class="option-input flex-1" rows="2" oninput="autoResize(this)"></textarea>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="main-save-btn" onclick="saveQuestion(false)" class="flex-1 bg-white/5 py-4 text-[10px] font-bold uppercase">Save & Next</button>
                    <button onclick="finishExam()" class="flex-1 bg-orange-600 py-4 text-[10px] font-black uppercase">Finish Exam</button>
                </div>
            </div>
        </div>
        
        <!-- Auto Panel -->
        <div id="auto-panel" class="hidden">
            <div class="auto-gen-panel space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-orange-500 font-black text-sm uppercase">Auto-Generate Questions</h3>
                    <button id="generate-btn" onclick="generateQuestions()" class="bg-orange-600 px-6 py-3 text-[10px] font-black uppercase">Generate</button>
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase">Number of Questions</label>
                    <input type="number" id="num-questions" value="5" min="1" max="20" class="w-full mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase">Topic Focus (Optional)</label>
                    <input type="text" id="topic-focus" placeholder="e.g., cardiovascular system" class="w-full mt-1">
                </div>
                <button onclick="finishExamAuto()" class="w-full bg-orange-600 py-4 text-[10px] font-black uppercase mt-4">Finish Exam (Auto Mode)</button>
                <div class="text-xs text-gray-400">
                    <p>⚠️ Auto-generated questions are saved separately for this subject.</p>
                </div>
            </div>
        </div>
        
        <!-- Question List - ALWAYS VISIBLE BELOW -->
        <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-black text-orange-500 uppercase">Saved Questions</h3>
                <span id="saved-count" class="text-[8px] text-gray-500"></span>
            </div>
            <div id="q-preview-list" class="question-list-container"></div>
        </div>
    </div>

    <div id="view-vault" class="hidden space-y-4 pb-20"></div>

    <div id="view-analytics" class="hidden pb-20 space-y-6">
        <div class="flex justify-between items-center">
            <button onclick="showSection('manage')" class="text-orange-500 font-black text-[10px] uppercase">← Vault</button>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-green-600/10 text-green-500 px-3 py-2 text-[8px] font-black uppercase">Excel</button>
                <button onclick="exportPNG()" class="bg-white/5 text-white px-3 py-2 text-[8px] font-black uppercase">Save PNG</button>
            </div>
        </div>
        <div id="capture-area" class="glass-panel p-8 relative overflow-hidden">
            <div class="watermark">Thesdel CBT Vault</div>
            <h2 id="ana-title" class="text-3xl font-black uppercase tracking-tighter text-orange-500"></h2>
            <div class="flex justify-between items-end mb-6">
                <p id="ana-code" class="text-[10px] font-mono text-gray-500"></p>
                <div class="text-right">
                    <p class="text-[8px] text-gray-600 font-black uppercase">Average Score</p>
                    <p id="ana-avg" class="text-lg font-black text-white"></p>
                </div>
            </div>
            <table class="w-full text-left text-[11px]">
                <thead class="border-b border-white/10 text-gray-500 uppercase font-black">
                    <tr><th class="py-3">Homie</th><th class="py-3 text-center">Score</th><th class="py-3 text-right">XP</th></tr>
                </thead>
                <tbody id="analysis-rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        const sb = supabase.createClient(_URL, _KEY);
        const userId = localStorage.getItem('thesdel_user_id');

        let selectedSubs = [];
        let activeSub = "";
        let activeBuildId = null;
        let editingQId = null;
        let currentBuildMode = 'manual';
        let selectedCorrect = null;

        const POOL = ["Anatomy", "Physiology", "Biochemistry", "MTH 101", "GST 101", "Surgery", "Law of Tort", "Pathology", "Chemistry", "Physics", "Biology"];

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('start-time').min = now.toISOString().slice(0, 16);

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            notify("Copied!");
        }

        function searchSubs() {
            const q = document.getElementById('sub-search').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            if(!q) return;
            POOL.filter(s => s.toLowerCase().includes(q)).forEach(s => {
                const d = document.createElement('div');
                d.className = "subject-pill";
                d.innerText = s;
                d.onclick = () => { 
                    if(selectedSubs.length >= 4) return notify("Max 4 subjects!");
                    if(!selectedSubs.includes(s)) { 
                        selectedSubs.push(s); 
                        renderSelected(); 
                    }
                    document.getElementById('sub-search').value = "";
                    searchSubs();
                };
                res.appendChild(d);
            });
        }

        function renderSelected() {
            document.getElementById('selected-list').innerHTML = selectedSubs.map(s => 
                `<div onclick="removeSub('${s}')" class="subject-pill subject-active">${s} ✕</div>`
            ).join('');
        }

        function removeSub(s) {
            selectedSubs = selectedSubs.filter(sub => sub !== s);
            renderSelected();
        }

        function setBuildMode(mode) {
            currentBuildMode = mode;
            document.getElementById('mode-manual').classList.toggle('active', mode === 'manual');
            document.getElementById('mode-auto').classList.toggle('active', mode === 'auto');
            document.getElementById('manual-panel').classList.toggle('hidden', mode !== 'manual');
            document.getElementById('auto-panel').classList.toggle('hidden', mode !== 'auto');
            clearQForm();
        }

        function selectCorrect(option) {
            selectedCorrect = option;
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const card = document.getElementById(`option-card-${opt}`);
                if(card) {
                    if(opt === option) card.classList.add('selected');
                    else card.classList.remove('selected');
                }
            });
        }

        function clearQForm() {
            editingQId = null;
            selectedCorrect = null;
            document.getElementById('edit-indicator').innerText = "New";
            document.getElementById('main-save-btn').innerHTML = "Save & Next";
            document.getElementById('q-text').value = "";
            document.getElementById('opt-a').value = "";
            document.getElementById('opt-b').value = "";
            document.getElementById('opt-c').value = "";
            document.getElementById('opt-d').value = "";
            
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const card = document.getElementById(`option-card-${opt}`);
                if(card) card.classList.remove('selected');
            });
        }

        async function initiateBuild() {
            if(!userId) return notify("Login required!");
            const title = document.getElementById('exam-title').value;
            if(!title || selectedSubs.length === 0) return notify("Fill all details!");

            const startTimeValue = document.getElementById('start-time').value;
            if (startTimeValue) {
                const selectedDate = new Date(startTimeValue);
                const nowDate = new Date();
                selectedDate.setMinutes(selectedDate.getMinutes() + selectedDate.getTimezoneOffset());
                if (selectedDate < nowDate) {
                    notify("Start time cannot be in the past!");
                    return;
                }
            }

            const code = `TH-${Date.now().toString(36).toUpperCase()}-${Math.random().toString(36).substring(2, 6).toUpperCase()}`;

            const { data, error } = await sb.from('cbt_builds').insert([{
                creator_id: userId,
                build_name: title,
                subjects_list: selectedSubs,
                duration_mins: parseInt(document.getElementById('exam-duration').value) || 30,
                join_code: code,
                start_time: startTimeValue || null
            }]).select().single();

            if (data) {
                activeBuildId = data.id;
                activeSub = selectedSubs[0];
                document.getElementById('slide-config').classList.add('hidden');
                document.getElementById('slide-questions').classList.remove('hidden');
                setupTabs();
                setBuildMode('manual');
            }
        }

        function setupTabs() {
            const nav = document.getElementById('subject-tabs');
            nav.innerHTML = selectedSubs.map(s => 
                `<div onclick="switchSubject('${s}')" class="subject-pill ${s === activeSub ? 'subject-active' : ''}">${s}</div>`
            ).join('');
            document.getElementById('cur-sub-label').innerText = activeSub;
            loadQuestionsForSubject();
        }

        async function switchSubject(s) {
            activeSub = s;
            clearQForm();
            setupTabs();
            await loadQuestionsForSubject();
        }

        async function loadQuestionsForSubject() {
            const { data } = await sb.from('cbt_questions')
                .select('*')
                .eq('build_id', activeBuildId)
                .eq('subject_tag', activeSub)
                .order('created_at', { ascending: true });
            
            const count = data?.length || 0;
            document.getElementById('question-counter').innerHTML = `${count} Question${count !== 1 ? 's' : ''}`;
            document.getElementById('saved-count').innerHTML = `${count} saved`;
            
            renderPreviewList(data || []);
        }

        async function saveQuestion(isFinal) {
            if(!selectedCorrect) {
                notify("Click on the option card that is the correct answer!");
                return;
            }
            
            const qText = document.getElementById('q-text').value;
            const optA = document.getElementById('opt-a').value;
            const optB = document.getElementById('opt-b').value;
            const optC = document.getElementById('opt-c').value;
            const optD = document.getElementById('opt-d').value;
            
            if(!qText || !optA || !optB || !optC || !optD) {
                notify("Fill all fields!");
                return;
            }
            
            const qData = {
                build_id: activeBuildId,
                subject_tag: activeSub,
                question_text: qText,
                option_a: optA,
                option_b: optB,
                option_c: optC,
                option_d: optD,
                correct_answer: selectedCorrect
            };
            
            let error;
            if(editingQId) {
                const { error: err } = await sb.from('cbt_questions').update(qData).eq('id', editingQId);
                error = err;
                if(!error) notify("Question updated!");
            } else {
                const { error: err } = await sb.from('cbt_questions').insert([qData]);
                error = err;
                if(!error) notify("Question saved!");
            }
            
            if(!error) {
                clearQForm();
                await loadQuestionsForSubject();
                if(isFinal) {
                    finishExam();
                }
            } else {
                notify("Error saving!");
            }
        }

        async function finishExam() {
            const { data } = await sb.from('cbt_builds').select('join_code').eq('id', activeBuildId).single();
            if(data) {
                document.getElementById('final-code-display').innerText = data.join_code;
                document.getElementById('success-modal').classList.remove('hidden');
            }
        }
        
        async function finishExamAuto() {
            // Check if any questions exist for this subject
            const { data, count } = await sb.from('cbt_questions')
                .select('*', { count: 'exact', head: true })
                .eq('build_id', activeBuildId)
                .eq('subject_tag', activeSub);
            
            if(count === 0) {
                notify("Generate some questions first!");
                return;
            }
            
            const { data: buildData } = await sb.from('cbt_builds').select('join_code').eq('id', activeBuildId).single();
            if(buildData) {
                document.getElementById('final-code-display').innerText = buildData.join_code;
                document.getElementById('success-modal').classList.remove('hidden');
            }
        }

        async function generateQuestions() {
            const numQuestions = parseInt(document.getElementById('num-questions').value) || 5;
            const topicFocus = document.getElementById('topic-focus').value;
            const generateBtn = document.getElementById('generate-btn');
            
            notify(`Generating ${numQuestions} questions for ${activeSub}...`);
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');
            
            const subjectTemplates = {
                "Anatomy": [
                    { text: "What is the function of the skeletal system?", opts: ["Protection & support", "Digestion", "Circulation", "Respiration"], correct: "A" },
                    { text: "Which bone protects the brain?", opts: ["Skull", "Spine", "Ribs", "Pelvis"], correct: "A" },
                    { text: "How many vertebrae make up the human spine?", opts: ["33", "26", "24", "30"], correct: "A" },
                    { text: "What is the longest bone in the human body?", opts: ["Femur", "Tibia", "Humerus", "Fibula"], correct: "A" },
                    { text: "Which part of the bone produces blood cells?", opts: ["Marrow", "Cortex", "Periosteum", "Cartilage"], correct: "A" }
                ],
                "Physiology": [
                    { text: "What is the main function of red blood cells?", opts: ["Carry oxygen", "Fight infection", "Clot blood", "Produce hormones"], correct: "A" },
                    { text: "Which organ filters blood?", opts: ["Kidney", "Liver", "Heart", "Lungs"], correct: "A" },
                    { text: "What controls body temperature?", opts: ["Hypothalamus", "Thalamus", "Medulla", "Cerebellum"], correct: "A" }
                ],
                "Biochemistry": [
                    { text: "What is the primary energy currency of the cell?", opts: ["ATP", "DNA", "RNA", "ADP"], correct: "A" },
                    { text: "Which enzyme breaks down lactose?", opts: ["Lactase", "Amylase", "Pepsin", "Lipase"], correct: "A" }
                ],
                "MTH 101": [
                    { text: "What is 2 + 2?", opts: ["4", "3", "5", "6"], correct: "A" },
                    { text: "Solve for x: 2x + 3 = 7", opts: ["2", "3", "4", "5"], correct: "A" },
                    { text: "What is the derivative of x²?", opts: ["2x", "x", "2", "x²"], correct: "A" }
                ],
                "Chemistry": [
                    { text: "What is the symbol for gold?", opts: ["Au", "Ag", "Fe", "Cu"], correct: "A" },
                    { text: "What is H2O?", opts: ["Water", "Oxygen", "Hydrogen", "Peroxide"], correct: "A" }
                ],
                "Physics": [
                    { text: "What is Newton's first law about?", opts: ["Inertia", "Force", "Action-Reaction", "Gravity"], correct: "A" },
                    { text: "What is the unit of force?", opts: ["Newton", "Joule", "Watt", "Pascal"], correct: "A" }
                ]
            };
            
            const templates = subjectTemplates[activeSub] || subjectTemplates["Anatomy"];
            let generated = 0;
            
            for(let i = 0; i < Math.min(numQuestions, 20); i++) {
                const template = templates[i % templates.length];
                let questionText = template.text;
                if(topicFocus) {
                    questionText = `${topicFocus}: ${template.text}`;
                }
                
                const qData = {
                    build_id: activeBuildId,
                    subject_tag: activeSub,
                    question_text: questionText,
                    option_a: template.opts[0],
                    option_b: template.opts[1],
                    option_c: template.opts[2],
                    option_d: template.opts[3],
                    correct_answer: template.correct
                };
                
                const { error } = await sb.from('cbt_questions').insert([qData]);
                if(!error) generated++;
            }
            
            notify(`✅ Generated ${generated} questions for ${activeSub}!`);
            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-50');
            await loadQuestionsForSubject();
        }

        function renderPreviewList(questions) {
            const container = document.getElementById('q-preview-list');
            
            if(questions.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 text-xs py-8">No questions yet. Add your first question above ↑</div>`;
                return;
            }
            
            container.innerHTML = questions.map((q, i) => `
                <div class="q-preview-card">
                    <div class="flex justify-between items-start mb-3">
                        <p class="text-[9px] font-black text-orange-500 uppercase">Q${i+1}</p>
                        <div class="flex gap-3">
                            <button onclick="editQuestion('${q.id}')" class="text-[8px] font-black text-white/40 hover:text-white uppercase">Edit</button>
                            <button onclick="deleteQuestion('${q.id}')" class="text-[8px] font-black text-red-500/40 hover:text-red-500 uppercase">Delete</button>
                        </div>
                    </div>
                    <p class="text-sm font-bold mb-3">${escapeHtml(q.question_text)}</p>
                    <div class="grid grid-cols-2 gap-2 text-[10px]">
                        <p class="${q.correct_answer === 'A' ? 'text-orange-500 font-bold' : 'text-gray-400'}">A: ${escapeHtml(q.option_a)}</p>
                        <p class="${q.correct_answer === 'B' ? 'text-orange-500 font-bold' : 'text-gray-400'}">B: ${escapeHtml(q.option_b)}</p>
                        <p class="${q.correct_answer === 'C' ? 'text-orange-500 font-bold' : 'text-gray-400'}">C: ${escapeHtml(q.option_c)}</p>
                        <p class="${q.correct_answer === 'D' ? 'text-orange-500 font-bold' : 'text-gray-400'}">D: ${escapeHtml(q.option_d)}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        async function editQuestion(id) {
            const { data } = await sb.from('cbt_questions').select('*').eq('id', id).single();
            if(data) {
                editingQId = data.id;
                selectedCorrect = data.correct_answer;
                document.getElementById('edit-indicator').innerText = "Editing";
                document.getElementById('main-save-btn').innerHTML = "Update";
                document.getElementById('q-text').value = data.question_text;
                document.getElementById('opt-a').value = data.option_a;
                document.getElementById('opt-b').value = data.option_b;
                document.getElementById('opt-c').value = data.option_c;
                document.getElementById('opt-d').value = data.option_d;
                
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    const card = document.getElementById(`option-card-${opt}`);
                    if(card) {
                        if(opt === data.correct_answer) card.classList.add('selected');
                        else card.classList.remove('selected');
                    }
                });
                
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }
        
        async function deleteQuestion(id) {
            if(confirm("Delete this question?")) {
                await sb.from('cbt_questions').delete().eq('id', id);
                await loadQuestionsForSubject();
                notify("Deleted!");
            }
        }
        
        async function loadVault() {
            const { data } = await sb.from('cbt_builds').select('*').eq('creator_id', userId).order('created_at', {ascending: false});
            const v = document.getElementById('view-vault');
            
            v.innerHTML = (data || []).map(b => {
                let status = "LIVE";
                let color = "text-green-500";
                
                if(b.start_time) {
                    const start = new Date(b.start_time);
                    const end = new Date(start.getTime() + (b.duration_mins * 60000));
                    const now = new Date();
                    if(now < start) { status = "PENDING"; color = "text-yellow-500"; }
                    else if(now > end) { status = "ENDED"; color = "text-red-500"; }
                }
                
                return `
                <div class="glass-panel p-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black ${color} tracking-widest">${status}</span>
                        <button onclick="deleteExam('${b.id}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button>
                    </div>
                    <h2 class="text-xl font-black uppercase text-white mb-1">${escapeHtml(b.build_name)}</h2>
                    <p onclick="copyToClipboard('${b.join_code}')" class="text-[10px] font-mono text-orange-500 mb-4 cursor-pointer">${b.join_code}</p>
                    <div class="flex gap-2">
                        <button onclick="openAnalysis('${b.id}', '${b.build_name}', '${b.join_code}')" class="flex-1 bg-white/5 py-3 text-[9px] font-black">Analysis</button>
                        <button onclick="shareExam('${b.build_name}', '${b.join_code}')" class="flex-1 bg-orange-600/20 text-orange-500 py-3 text-[9px] font-black">Invite</button>
                    </div>
                </div>`;
            }).join('');
        }
        
        async function deleteExam(id) {
            if(confirm("Delete this exam and all its questions?")) {
                await sb.from('cbt_questions').delete().eq('build_id', id);
                await sb.from('cbt_builds').delete().eq('id', id);
                loadVault();
                notify("Deleted!");
            }
        }
        
        async function openAnalysis(id, name, code) {
            document.getElementById('view-vault').classList.add('hidden');
            document.getElementById('view-analytics').classList.remove('hidden');
            document.getElementById('ana-title').innerText = name;
            document.getElementById('ana-code').innerText = code;
            
            const { data } = await sb.from('cbt_results').select('score, total_questions, profile:user_id (first_name, last_name)').eq('build_id', id);
            if(data && data.length) {
                data.sort((a, b) => b.score - a.score);
                const avg = (data.reduce((a, b) => a + b.score, 0) / data.length).toFixed(1);
                document.getElementById('ana-avg').innerHTML = avg;
                document.getElementById('analysis-rows').innerHTML = data.map(r => `
                    <tr class="border-b border-white/5">
                        <td class="py-3 font-bold text-white text-xs">${r.profile ? r.profile.first_name + ' ' + r.profile.last_name : 'Homie'}</td>
                        <td class="py-3 text-center font-black text-orange-500">${r.score}/${r.total_questions}</td>
                        <td class="py-3 text-right text-gray-400">${r.score * 10}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('ana-avg').innerHTML = "0";
                document.getElementById('analysis-rows').innerHTML = '<tr><td colspan="3" class="py-8 text-center text-gray-500">No attempts yet</td></tr>';
            }
        }
        
        function shareExam(n, c) {
            const text = `📘 Exam: ${n}\n🔑 Code: ${c}\n\nJoin at: https://thesdel.com/join`;
            copyToClipboard(text);
        }
        
        function exportExcel() {
            let csv = "Homie,Score,XP\n";
            document.querySelectorAll("#analysis-rows tr").forEach(tr => {
                const cols = tr.querySelectorAll("td");
                if(cols.length === 3) {
                    csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Analysis.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        function exportPNG() {
            html2canvas(document.querySelector("#capture-area"), { backgroundColor: '#000' }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = 'Thesdel_Result.png';
                a.click();
            });
        }
        
        function showSection(sec) {
            ['slide-config','slide-questions','view-vault','view-analytics'].forEach(s => document.getElementById(s).classList.add('hidden'));
            if(sec === 'create') document.getElementById('slide-config').classList.remove('hidden');
            else if(sec === 'manage') { 
                document.getElementById('view-vault').classList.remove('hidden'); 
                loadVault();
            }
        }
    </script>
</body>
</html>
