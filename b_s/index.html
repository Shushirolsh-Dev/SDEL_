<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Thesdel | Class Members</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;min-height:100vh;}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
.star{position:absolute;background:#fff;border-radius:50%;animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(100vh);}}
.text-sdel{color:#FF6600;}
.bg-sdel{background:#FF6600;}
.glass-nav{background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.1);}
.member-row{background:rgba(18,18,18,0.6);border-bottom:1px solid rgba(255,255,255,0.05);transition:all 0.2s ease;}
.member-row-clickable{cursor:pointer;}
.member-row-clickable:hover{background:rgba(255,102,0,0.08);}
.badge-rep{background:#FF6600;color:#000;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;}
.badge-assistant{background:#3b82f6;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,102,0,0.2);border-top-color:#FF6600;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.96);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-content{background:#0a0a0a;border:1px solid rgba(255,102,0,0.3);border-radius:28px;padding:24px;max-width:90%;width:380px;}
.modal-content button{width:100%;padding:14px;border-radius:16px;font-weight:700;margin-bottom:12px;transition:all 0.2s;cursor:pointer;}
.btn-remove{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);color:#ef4444;}
.btn-remove:hover{background:#ef4444;color:#000;}
.btn-assistant{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#3b82f6;}
.btn-assistant:hover{background:#3b82f6;color:#000;}
.btn-transfer{background:rgba(255,102,0,0.15);border:1px solid rgba(255,102,0,0.3);color:#FF6600;}
.btn-transfer:hover{background:#FF6600;color:#000;}
.btn-cancel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;}
.btn-cancel:hover{background:rgba(255,255,255,0.15);color:#fff;}
.access-denied{text-align:center;padding:80px 20px;}
.access-denied svg{width:64px;height:64px;margin-bottom:16px;opacity:0.5;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<nav class="flex justify-between items-center p-6 glass-nav sticky top-0 z-50">
<div class="flex items-center"><a href="dashboard.html" class="text-2xl font-black tracking-tighter"><span class="text-white">T</span><span class="text-sdel">HESDEL</span></a></div>
<div class="flex items-center gap-4"><a href="dashboard.html" class="text-sm font-bold text-gray-400 hover:text-sdel transition">Dashboard</a><a href="login.html" class="text-sm font-bold text-gray-400 hover:text-sdel transition">Log out</a></div>
</nav>

<main class="pt-8 pb-20 px-6 max-w-6xl mx-auto">
<div class="flex justify-between items-center mb-8 flex-wrap gap-4">
<div><h1 class="text-3xl font-black tracking-tight">Class Members</h1><p id="memberCount" class="text-gray-500 text-sm mt-1">Loading...</p></div>
</div>
<div id="membersContainer"><div class="loading-spinner"></div></div>
</main>

<div id="memberModal" class="modal-overlay"><div class="modal-content"><div class="text-center mb-4"><div class="w-16 h-16 bg-sdel/20 rounded-full flex items-center justify-center mx-auto mb-3"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FF6600" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><h3 class="text-xl font-bold text-white" id="modalMemberName">Member Name</h3><p class="text-gray-400 text-sm" id="modalMemberEmail">email@example.com</p></div><div class="space-y-3"><button id="makeAssistantBtn" class="btn-assistant"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg> Make Assistant Rep</button><button id="removeMemberBtn" class="btn-remove"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="17" y1="11" x2="22" y2="16"></line><line x1="22" y1="11" x2="17" y2="16"></line></svg> Remove Member</button><button id="transferRepBtn" class="btn-transfer"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg> Transfer Class Rep</button><button class="btn-cancel" onclick="closeMemberModal()">Cancel</button></div></div></div>

<footer class="border-t border-white/10 mt-20 py-8 bg-black"><div class="max-w-6xl mx-auto px-6 text-center"><div class="flex justify-center space-x-8 mb-4"><a href="https://instagram.com/thesdel" target="_blank" class="opacity-50 hover:opacity-100 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a><a href="https://twitter.com/thesdel" target="_blank" class="opacity-50 hover:opacity-100 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg></a><a href="https://tiktok.com/@thesdel" target="_blank" class="opacity-50 hover:opacity-100 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg></a></div><p class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.2em]">THESDEL · ENGINEERED BY SHUSHIROLSH</p></div></footer>

<script>
const SUPABASE_URL="https://lgfyrlfjoazedwymjpfc.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null,currentClass=null,userRole=null,selectedMember=null;

function showToast(msg){const t=document.createElement('div');t.className='fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-sdel text-black px-5 py-3 rounded-2xl font-bold text-sm z-50 shadow-lg';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function customConfirm(msg,onConfirm){const overlay=document.createElement('div');overlay.className='fixed inset-0 bg-black/95 backdrop-blur-md z-[1100] flex items-center justify-center p-5';overlay.innerHTML=`<div class="bg-[#0a0a0a] border border-sdel/30 rounded-3xl p-6 max-w-sm w-full text-center"><p class="text-white mb-6">${msg}</p><div class="flex gap-3"><button class="confirm-btn flex-1 bg-sdel text-black py-3 rounded-xl font-bold">Confirm</button><button class="cancel-btn flex-1 bg-white/10 text-white py-3 rounded-xl font-bold">Cancel</button></div></div>`;document.body.appendChild(overlay);overlay.querySelector('.confirm-btn').onclick=()=>{overlay.remove();onConfirm();};overlay.querySelector('.cancel-btn').onclick=()=>overlay.remove();}

async function loadUserAndClass(){const{data:{user}}=await sb.auth.getUser();if(!user){window.location.href='login.html';return;}currentUser=user;const{data:createdClass}=await sb.from('classes').select('*').eq('created_by',user.id).maybeSingle();if(createdClass){userRole='rep';currentClass=createdClass;return;}const{data:assistantCheck}=await sb.from('class_assistants').select('class_id').eq('user_id',user.id).maybeSingle();if(assistantCheck){const{data:classData}=await sb.from('classes').select('*').eq('id',assistantCheck.class_id).single();if(classData){userRole='assistant';currentClass=classData;return;}}const{data:memberData}=await sb.from('class_members').select('class_id').eq('user_id',user.id).maybeSingle();if(memberData){const{data:classData}=await sb.from('classes').select('*').eq('id',memberData.class_id).single();if(classData){userRole='member';currentClass=classData;return;}}window.location.href='dashboard.html';}

async function loadMembers(){if(!currentClass){document.getElementById('membersContainer').innerHTML='<div class="text-center py-20 text-gray-500">No class selected</div>';return;}
const{data:members}=await sb.from('class_members').select('user_id,user_email').eq('class_id',currentClass.id);if(!members||members.length===0){document.getElementById('membersContainer').innerHTML='<div class="text-center py-20 text-gray-500"><svg class="mx-auto mb-4" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg><p>No members yet</p></div>';document.getElementById('memberCount').innerHTML='0 members';return;}
const userIds=members.map(m=>m.user_id);const{data:nameData}=await sb.from('name').select('user_id,first_name,last_name').in('user_id',userIds);const nameMap={};if(nameData){nameData.forEach(n=>{nameMap[n.user_id]={first_name:n.first_name||'User',last_name:n.last_name||''};});}
const{data:assistants}=await sb.from('class_assistants').select('user_id').eq('class_id',currentClass.id);const assistantIds=new Set(assistants?.map(a=>a.user_id)||[]);
const memberList=members.map(m=>{const name=nameMap[m.user_id]||{first_name:'User',last_name:''};const fullName=`${name.first_name} ${name.last_name}`.trim()||m.user_email?.split('@')[0]||'Member';return{...m,fullName,isRep:m.user_id===currentClass.created_by,isAssistant:assistantIds.has(m.user_id)};});
const totalMembers=memberList.length;const repCount=memberList.filter(m=>m.isRep).length;const assistantCount=memberList.filter(m=>m.isAssistant&&!m.isRep).length;const memberCountOnly=memberList.filter(m=>!m.isRep&&!m.isAssistant).length;
document.getElementById('memberCount').innerHTML=`${totalMembers} total · ${repCount} rep · ${assistantCount} assistant · ${memberCountOnly} member`;
const canView=(userRole==='rep'||userRole==='assistant');const canManage=userRole==='rep';
if(!canView){document.getElementById('membersContainer').innerHTML=`<div class="access-denied"><svg class="mx-auto mb-4" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15v2m0 0v2m0-2h2m-2 0H9m3-3a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><circle cx="12" cy="12" r="9"/></svg><p class="text-red-500 font-bold text-lg mb-2">Access Denied</p><p class="text-gray-500">Only Class Rep and Assistant Rep can view members.</p></div>`;return;}
let html=`<div class="border-b border-white/10 pb-2 mb-2 flex text-xs font-bold text-gray-500 uppercase tracking-wider px-4"><div class="flex-1">Member</div><div class="w-32 text-right">Role</div></div>`;
memberList.forEach(m=>{const clickable=canManage && !m.isRep && m.user_id!==currentUser.id;html+=`<div class="member-row px-4 py-4 flex items-center justify-between ${clickable?'member-row-clickable':''}" ${clickable?`onclick="openMemberModal('${m.user_id}','${escapeHtml(m.fullName)}','${escapeHtml(m.user_email)}',${m.isRep},${m.isAssistant})"`:''}><div class="flex-1"><div class="font-semibold">${escapeHtml(m.fullName)}${m.user_id===currentUser.id?' <span class="text-gray-500 text-xs">(you)</span>':''}</div><div class="text-gray-500 text-xs">${escapeHtml(m.user_email)}</div></div><div class="w-32 text-right">${m.isRep?'<span class="badge-rep">CLASS REP</span>':(m.isAssistant?'<span class="badge-assistant">ASSISTANT</span>':'<span class="text-gray-600 text-xs">Member</span>')}</div></div>`;});
document.getElementById('membersContainer').innerHTML=html;}

function openMemberModal(userId,name,email,isRep,isAssistant){if(userRole!=='rep'){showToast('Only Class Rep can manage members');return;}if(userId===currentUser?.id){showToast('You cannot manage yourself');return;}if(isRep){showToast('Cannot manage the Class Rep');return;}selectedMember={userId,name,email,isRep,isAssistant};document.getElementById('modalMemberName').innerText=name;document.getElementById('modalMemberEmail').innerText=email;document.getElementById('memberModal').style.display='flex';}
async function makeAssistant(){if(!selectedMember)return;if(selectedMember.isAssistant){showToast(selectedMember.name+' is already an Assistant Rep');closeMemberModal();return;}const{error}=await sb.from('class_assistants').insert([{class_id:currentClass.id,user_id:selectedMember.userId,added_by:currentUser.id}]);if(error){showToast('Error: '+error.message);}else{showToast(selectedMember.name+' is now Assistant Rep');closeMemberModal();loadMembers();}}
async function removeMember(){customConfirm(`Remove ${selectedMember.name} from this class?`,async()=>{await sb.from('class_members').delete().eq('class_id',currentClass.id).eq('user_id',selectedMember.userId);await sb.from('class_assistants').delete().eq('class_id',currentClass.id).eq('user_id',selectedMember.userId);showToast(selectedMember.name+' removed');closeMemberModal();loadMembers();});}
async function transferRep(){customConfirm(`Transfer class ownership to ${selectedMember.name}? You will become a regular member.`,async()=>{await sb.from('classes').update({created_by:selectedMember.userId}).eq('id',currentClass.id);await sb.from('class_assistants').delete().eq('class_id',currentClass.id).eq('user_id',selectedMember.userId);showToast('Class ownership transferred');setTimeout(()=>window.location.href='dashboard.html',1500);});}
function closeMemberModal(){document.getElementById('memberModal').style.display='none';selectedMember=null;}
function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
function createStars(){const c=document.getElementById('stars');for(let i=0;i<120;i++){const s=document.createElement('div');s.classList.add('star');const sz=Math.random()*2+1;s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.animationDuration=Math.random()*100+60+'s';c.appendChild(s);}}createStars();
document.getElementById('makeAssistantBtn').onclick=makeAssistant;document.getElementById('removeMemberBtn').onclick=removeMember;document.getElementById('transferRepBtn').onclick=transferRep;
async function init(){await loadUserAndClass();await loadMembers();}
init();
</script>
</body>
</html>
