<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){const savedTheme=localStorage.getItem('theme');if(savedTheme==='sunlight'){document.documentElement.classList.add('sunlight-mode')}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sdel | Gist — Seamless Replies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
        body{background-color:#000;color:#fff;overscroll-behavior-y:contain;transition:background-color .3s}
        .text-sdel{color:#FF6600}.bg-sdel{background-color:#FF6600}
        .comment-card{background:rgba(18,18,18,.4);border:1px solid rgba(255,255,255,.05);border-left:3px solid #FF6600;border-radius:16px;padding:16px;transition:all .2s;user-select:none;word-wrap:break-word;overflow-wrap:break-word;word-break:break-word}
        .comment-card:active{background:rgba(255,102,0,.05)}
        .comment-card p{word-wrap:break-word;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap;max-width:100%}
        #comment-input{resize:none;background:#111;border:1px solid #222;outline:0;width:100%;color:#fff;font-size:14px;border-radius:24px;padding:12px 18px;transition:border .3s;max-height:120px;word-wrap:break-word}
        #comment-input:focus{border-color:#FF6600}
        .spinner{animation:spin 1s linear infinite}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        #action-sheet,#edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:flex-end;backdrop-filter:blur(5px)}
        .sheet-content{background:#111;width:100%;border-radius:24px 24px 0 0;padding:20px;border-top:1px solid #222;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        #edit-modal{align-items:center;justify-content:center;padding:20px}
        .modal-content{background:#111;width:100%;max-width:400px;border-radius:24px;padding:24px;border:1px solid #222;box-shadow:0 20px 40px rgba(0,0,0,.5)}
        #edit-textarea{background:#000;border:1px solid #222;border-radius:16px;width:100%;color:#fff;padding:15px;font-size:14px;outline:0;margin:15px 0;resize:none;word-wrap:break-word}
        #edit-textarea:focus{border-color:#FF6600}
        .username-link{color:#FF6600;font-weight:700;cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:.02em;font-size:13px}
        .original-post-container{background:rgba(18,18,18,.7);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:20px;margin-bottom:16px;word-wrap:break-word}
        .comments-section{display:flex;flex-direction:column;gap:12px}
        .send-button{background:#FF6600;color:#000;width:44px;height:44px;border-radius:30px;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 5px 15px rgba(255,102,0,.2);border:none;cursor:pointer;flex-shrink:0;position:relative}
        .send-button:active{transform:scale(.92);background:#e55a00}
        .input-container{display:flex;align-items:flex-end;gap:8px;background:#111;border:1px solid #222;border-radius:30px;padding:4px;transition:border .2s;width:100%}
        .input-container:focus-within{border-color:#FF6600}
        #comment-input{background:transparent;border:none;padding:12px 16px;flex:1}
        #comment-input:focus{border:none;outline:0}
        .time-badge{font-size:10px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px;background:rgba(255,255,255,.03);padding:4px 8px;border-radius:20px;display:inline-block}
        /* sunlight mode */
        .sunlight-mode body{background-color:#f8f8fa;color:#121212}
        .sunlight-mode nav{background-color:rgba(255,255,255,.95)!important;border-color:#e4e4e7!important}
        .sunlight-mode .fixed.bottom-0{background-color:rgba(255,255,255,.95)!important;border-color:#e4e4e7!important}
        .sunlight-mode .input-container{background:#f4f4f5;border-color:#e4e4e7}
        .sunlight-mode #comment-input{color:#121212}
        .sunlight-mode .sheet-content{background:#fff;border-color:#eee}
        .sunlight-mode .modal-content{background:#fff;border-color:#eee;color:#121212}
        .sunlight-mode #edit-textarea{background:#f4f4f5;border-color:#e4e4e7;color:#121212}
        .sunlight-mode .comment-card{background:rgba(240,240,245,.7);border:1px solid rgba(0,0,0,.05);border-left:3px solid #FF6600}
        .sunlight-mode .time-badge{background:rgba(0,0,0,.03);color:#52525b}
        /* sync indicator - subtle, no badge on comments */
        .sync-status{position:fixed;bottom:80px;right:16px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:6px 12px;border-radius:40px;font-size:10px;color:#FF6600;z-index:100;display:flex;align-items:center;gap:6px;pointer-events:none;font-weight:500}
        .sunlight-mode .sync-status{background:rgba(255,255,255,.8);color:#FF6600}
    </style>
</head>
<body class="pb-24">
    <div id="action-sheet" onclick="closeSheet()"><div class="sheet-content" onclick="event.stopPropagation()"><div class="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-6"></div><div id="edit-option"><button id="edit-btn" class="w-full py-4 text-left font-medium border-b border-white/5 flex items-center gap-3"><i data-lucide="edit-3" size="18"></i> Edit Reply</button></div><button id="burn-btn" class="w-full py-4 text-left font-medium text-red-500 flex items-center gap-3"><i data-lucide="flame" size="18"></i> Burn Reply</button><button onclick="closeSheet()" class="w-full py-4 mt-2 text-center text-zinc-500 font-medium text-xs">Cancel</button></div></div>
    <div id="edit-modal"><div class="modal-content"><h3 class="font-bold text-lg text-sdel tracking-tighter">Edit your reply</h3><textarea id="edit-textarea" rows="4"></textarea><div class="flex gap-3"><button onclick="closeEditModal()" class="flex-1 py-3 bg-zinc-900 rounded-xl font-medium text-xs">Cancel</button><button id="save-edit-btn" class="flex-1 py-3 bg-sdel text-black rounded-xl font-bold text-xs">Update</button></div></div></div>

    <nav class="sticky top-0 bg-black/90 backdrop-blur-xl z-50 border-b border-white/5"><div class="px-4 py-4 flex items-center gap-4"><button onclick="history.back()" class="p-2 -ml-2"><i data-lucide="arrow-left"></i></button><h1 class="text-xl font-bold tracking-tight">The <span class="text-sdel">Gist</span></h1></div></nav>

    <main id="gist-thread" class="p-4 flex flex-col gap-6"><div id="main-post-loader" class="py-20 text-center"><i data-lucide="loader-2" class="spinner text-sdel inline-block"></i></div></main>

    <div class="fixed bottom-0 inset-x-0 bg-black/95 border-t border-white/10 p-4 pb-env(safe-area-inset-bottom) z-50"><div class="input-container"><textarea id="comment-input" placeholder="Drop a reply..." rows="1" oninput="autoResize(this)"></textarea><button id="sendButton" class="send-button"><i data-lucide="send" size="18"></i></button></div></div>
    <div id="syncStatus" class="sync-status" style="display: none;"><i data-lucide="cloud" size="12"></i> <span>Syncing...</span></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        const supabase = createClient(
            'https://lgfyrlfjoazedwymjpfc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
        );
        
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        let userProfile = null;
        let pressTimer;
        
        // --- Optimistic UI + Offline Queue (NO "Sending..." badge on comments) ---
        let pendingComments = []; // { id, content, tempId, createdAt, username, isOfficial, isVerified }
        let syncInProgress = false;
        let syncRetryTimeout = null;
        
        // Generate temp IDs for optimistic comments
        function generateTempId() { return `temp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`; }
        
        // Load pending queue from localStorage
        function loadPendingQueue() {
            const stored = localStorage.getItem('gist_pending_comments');
            if (stored) {
                try { pendingComments = JSON.parse(stored); } catch(e) { pendingComments = []; }
            } else { pendingComments = []; }
        }
        
        function savePendingQueue() {
            localStorage.setItem('gist_pending_comments', JSON.stringify(pendingComments));
            updateSyncIndicator();
        }
        
        function updateSyncIndicator() {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            if (pendingComments.length > 0 || syncInProgress) {
                el.style.display = 'flex';
                const span = el.querySelector('span');
                if (span) span.innerText = pendingComments.length > 0 ? `Syncing (${pendingComments.length})` : 'Syncing...';
                lucide.createIcons();
            } else {
                el.style.display = 'none';
            }
        }
        
        // Optimistic insert: add comment to UI instantly - NO BADGE
        function addOptimisticComment(content) {
            const tempId = generateTempId();
            const now = new Date().toISOString();
            const optimisticComment = {
                id: tempId,
                tempId: tempId,
                content: content,
                created_at: now,
                user_id: userProfile?.id,
                profile: {
                    username: userProfile?.username || 'homie',
                    is_official: userProfile?.is_official || false,
                    is_verified: userProfile?.is_verified || false
                },
                pending: true  // internal flag only, no visual badge
            };
            
            // Store in pending queue
            pendingComments.push({
                tempId: tempId,
                content: content,
                createdAt: now,
                username: userProfile?.username || 'homie',
                isOfficial: userProfile?.is_official || false,
                isVerified: userProfile?.is_verified || false
            });
            savePendingQueue();
            
            // Render comment into the DOM - NO "Sending..." badge, looks like a normal comment
            appendCommentToDOM(optimisticComment);
            
            // Auto-scroll to new comment
            setTimeout(() => {
                const newCommentEl = document.querySelector(`.comment-card[data-temp-id="${tempId}"]`);
                if (newCommentEl) newCommentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
            
            // Trigger background sync
            triggerSync();
            
            return tempId;
        }
        
        function appendCommentToDOM(comment) {
            const commentsContainer = document.querySelector('.comments-section');
            if (!commentsContainer) return;
            
            const badge = getBadgeHTML(comment.profile?.is_official, comment.profile?.is_verified);
            // NO pending badge, just a normal-looking comment
            const timeDisplay = formatTimeAgo(comment.created_at);
            
            const commentHtml = `
                <div class="comment-card" data-temp-id="${comment.tempId || comment.id}" data-comment-id="${comment.id}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span onclick="location.href='profile.html?u=${escapeHTML(comment.profile?.username || '')}'" class="username-link text-xs">@${escapeHTML(comment.profile?.username || 'homie')}</span>
                            ${badge}
                        </div>
                        <span class="time-badge text-[9px]">${timeDisplay}</span>
                    </div>
                    <p class="text-sm text-zinc-300">${escapeHTML(comment.content)}</p>
                </div>
            `;
            commentsContainer.insertAdjacentHTML('beforeend', commentHtml);
            lucide.createIcons();
        }
        
        // Sync: try to send all pending comments to server - NO ALERTS, NO BADGES
        async function triggerSync() {
            if (syncInProgress) return;
            if (pendingComments.length === 0) return;
            if (!userProfile) return;
            
            syncInProgress = true;
            updateSyncIndicator();
            
            // Process queue sequentially
            while (pendingComments.length > 0) {
                const pending = pendingComments[0];
                if (!pending) break;
                
                try {
                    const { error } = await supabase.from('posts').insert({
                        user_id: userProfile.id,
                        content: pending.content,
                        parent_id: postId,
                        post_type: 'comment',
                        school_name: 'Gist'
                    });
                    
                    if (!error) {
                        // Success: remove from queue
                        pendingComments.shift();
                        savePendingQueue();
                        
                        // Update comment count
                        supabase.rpc('increment_stat', { post_id: postId, field: 'comments_count' }).catch(() => {});
                        
                        // Update the comment in DOM with real ID (just remove temp-id, no visual change)
                        const tempElement = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                        if (tempElement) {
                            tempElement.removeAttribute('data-temp-id');
                            // No badge to remove, no visual change at all
                        }
                    } else {
                        throw new Error(error.message);
                    }
                } catch (err) {
                    console.warn("Sync failed, will retry later", err);
                    // exponential backoff - NO ALERT
                    if (!pending.retryCount) pending.retryCount = 0;
                    pending.retryCount++;
                    if (pending.retryCount >= 10) {
                        // Too many failures, drop it silently
                        pendingComments.shift();
                        savePendingQueue();
                        // remove the failed comment silently
                        const failedEl = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                        if (failedEl) failedEl.remove();
                    } else {
                        const delay = Math.min(60000, 1000 * Math.pow(2, pending.retryCount));
                        if (syncRetryTimeout) clearTimeout(syncRetryTimeout);
                        syncRetryTimeout = setTimeout(() => {
                            syncInProgress = false;
                            triggerSync();
                        }, delay);
                        syncInProgress = false;
                        updateSyncIndicator();
                        return;
                    }
                }
            }
            syncInProgress = false;
            updateSyncIndicator();
            if (syncRetryTimeout) clearTimeout(syncRetryTimeout);
        }
        
        // Network listeners: auto-sync when back online
        window.addEventListener('online', () => {
            if (pendingComments.length > 0) triggerSync();
        });
        
        // ---- core app logic ----
        window.closeSheet = () => document.getElementById('action-sheet').style.display = 'none';
        window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';
        
        window.startPress = (id, userId, content, time) => {
            if (userProfile?.id !== userId) return;
            pressTimer = setTimeout(() => {
                const sheet = document.getElementById('action-sheet');
                const editOpt = document.getElementById('edit-option');
                const editBtn = document.getElementById('edit-btn');
                const commentTime = new Date(time).getTime();
                const diffMinutes = (Date.now() - commentTime) / (1e3 * 60);
                editOpt.style.display = diffMinutes < 20 ? 'block' : 'none';
                sheet.style.display = 'flex';
                editBtn.onclick = () => openEditModal(id, content);
                document.getElementById('burn-btn').onclick = () => burnComment(id);
                lucide.createIcons();
            }, 500);
        };
        window.endPress = () => clearTimeout(pressTimer);
        
        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffSeconds = Math.floor((now - date) / 1e3);
            if (diffSeconds < 60) return 'just now';
            const diffMinutes = Math.floor(diffSeconds / 60);
            if (diffMinutes < 60) return `${diffMinutes} min${diffMinutes > 1 ? 's' : ''} ago`;
            const diffHours = Math.floor(diffMinutes / 60);
            if (diffHours < 24) return `${diffHours} hr${diffHours > 1 ? 's' : ''} ago`;
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            return date.toLocaleDateString();
        }
        
        async function init() {
            if (!postId) return window.location.replace('explore.html');
            if (!/^[a-zA-Z0-9-]+$/.test(postId)) return window.location.replace('explore.html');
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.replace('login.html');
            const { data: profile } = await supabase.from('profile').select('*').eq('id', session.user.id).single();
            userProfile = profile;
            loadPendingQueue();
            await loadGist();
            // Re-append pending comments that aren't in DOM (no badge)
            if (pendingComments.length > 0) {
                for (const pending of pendingComments) {
                    const exists = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                    if (!exists) {
                        const optimistic = {
                            id: pending.tempId,
                            tempId: pending.tempId,
                            content: pending.content,
                            created_at: pending.createdAt,
                            profile: {
                                username: pending.username,
                                is_official: pending.isOfficial,
                                is_verified: pending.isVerified
                            },
                            pending: true
                        };
                        appendCommentToDOM(optimistic);
                    }
                }
                lucide.createIcons();
                triggerSync();
            }
            updateSyncIndicator();
        }
        
        const harmfulPatterns = [/porn/i, /xxx/i, /adult/i, /sex/i, /nude/i, /onlyfans/i, /fansly/i, /gambling/i, /casino/i, /bet/i, /betting/i, /poker/i, /slot/i, /crypto/i, /bitcoin/i, /investment/i, /forex/i, /drug/i, /weed/i, /cannabis/i, /marijuana/i, /hack/i, /cheat/i, /crack/i, /violence/i, /gore/i, /kill/i, /viagra/i, /cialis/i, /free money/i, /work from home/i, /get rich/i];
        
        function sanitizeInput(input) {
            if (!input) return '';
            input = input.replace(/<[^>]*>/g, '');
            input = input.replace(/(javascript|data|vbscript):/gi, 'blocked:');
            return input.trim().substring(0, 2000);
        }
        
        function scanContent(content) {
            const urlRegex = /(https?:\/\/[^\s<>"']+)|(www\.[^\s<>"']+\.[^\s<>"']+)/gi;
            const urls = content.match(urlRegex) || [];
            if (urls.length > 3) return { safe: false, reason: "Too many links" };
            const lowerContent = content.toLowerCase();
            for (const pattern of harmfulPatterns) {
                if (pattern.test(lowerContent)) return { safe: false, reason: "Content blocked" };
            }
            return { safe: true };
        }
        
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        async function loadGist() {
            const container = document.getElementById('gist-thread');
            const { data: post, error } = await supabase.from('posts').select('*, profile:user_id(username, is_official, is_verified)').eq('id', postId).single();
            if (error || !post) {
                container.innerHTML = `<div class="text-center py-20 opacity-50 font-medium">Gist not found</div>`;
                return;
            }
            const { data: comments } = await supabase.from('posts').select('*, profile:user_id(username, is_official, is_verified)').eq('parent_id', postId).order('created_at', { ascending: true });
            const profile = post.profile || {};
            const badge = getBadgeHTML(profile.is_official, profile.is_verified);
            let html = `<div class="original-post-container"><div class="flex items-center gap-3 mb-4"><div onclick="location.href='profile.html?u=${escapeHTML(profile.username || '')}'" class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center font-bold text-sdel border border-white/10 uppercase cursor-pointer">${escapeHTML(profile.username?.[0] || 'H')}</div><div><div class="flex items-center gap-1.5"><span onclick="location.href='profile.html?u=${escapeHTML(profile.username || '')}'" class="username-link">@${escapeHTML(profile.username || 'homie')}</span>${badge}</div><span class="time-badge">${formatTimeAgo(post.created_at)}</span></div></div><p class="text-base text-zinc-100 leading-relaxed mb-4">${escapeHTML(post.content)}</p><div class="flex items-center gap-6 text-zinc-500 border-y border-white/5 py-3"><div class="flex items-center gap-1.5"><span class="font-medium text-white">${post.likes_count || 0}</span> <span class="text-xs">Likes</span></div><div class="flex items-center gap-1.5"><span class="font-medium text-white" id="replyCountDisplay">${post.comments_count || 0}</span> <span class="text-xs">Replies</span></div></div></div><div class="mt-2"><h2 class="text-xs font-medium uppercase text-zinc-600 tracking-wider mb-4">Replies · <span id="replyCountHeader">${comments?.length || 0}</span></h2><div class="comments-section">${comments?.length ? comments.map(c => renderCommentHtml(c)).join('') : '<p class="text-center py-8 text-zinc-600 text-sm">No replies yet</p>'}</div></div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }
        
        function renderCommentHtml(comment) {
            const profile = comment.profile || {};
            const badge = getBadgeHTML(profile.is_official, profile.is_verified);
            return `
                <div class="comment-card" data-comment-id="${comment.id}" ontouchstart="startPress('${comment.id}','${comment.user_id}',\`${escapeHTML(comment.content)}\`,'${comment.created_at}')" ontouchend="endPress()" onmousedown="startPress('${comment.id}','${comment.user_id}',\`${escapeHTML(comment.content)}\`,'${comment.created_at}')" onmouseup="endPress()">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span onclick="location.href='profile.html?u=${escapeHTML(profile.username || '')}'" class="username-link text-xs">@${escapeHTML(profile.username || 'homie')}</span>
                            ${badge}
                        </div>
                        <span class="time-badge text-[9px]">${formatTimeAgo(comment.created_at)}</span>
                    </div>
                    <p class="text-sm text-zinc-300">${escapeHTML(comment.content)}</p>
                </div>
            `;
        }
        
        function getBadgeHTML(official, verified) {
            if (official) return `<div class="bg-sdel rounded-full p-[2px] w-[14px] h-[14px] flex items-center justify-center"><i data-lucide="check" class="text-white" size="10" stroke-width="4"></i></div>`;
            if (verified) return `<div class="bg-zinc-500 rounded-full p-[2px] w-[14px] h-[14px] flex items-center justify-center"><i data-lucide="check" class="text-white" size="10" stroke-width="4"></i></div>`;
            return '';
        }
        
        window.openEditModal = (id, oldContent) => {
            closeSheet();
            const modal = document.getElementById('edit-modal');
            const textarea = document.getElementById('edit-textarea');
            const saveBtn = document.getElementById('save-edit-btn');
            textarea.value = oldContent;
            modal.style.display = 'flex';
            saveBtn.onclick = async () => {
                let newContent = textarea.value.trim();
                newContent = sanitizeInput(newContent);
                if (newContent && newContent !== oldContent) {
                    await supabase.from('posts').update({ content: newContent }).eq('id', id);
                    closeEditModal();
                    loadGist();
                } else {
                    closeEditModal();
                }
            };
        };
        
        async function burnComment(id) {
            closeSheet();
            await supabase.from('posts').delete().eq('id', id);
            await supabase.rpc('decrement_stat', { post_id: postId, field: 'comments_count' }).catch(() => {});
            loadGist();
        }
        
        // POST with optimistic UI - IMMEDIATE DISPLAY, NO BADGES, NO ALERTS
        window.postComment = async () => {
            const input = document.getElementById('comment-input');
            let content = input.value.trim();
            if (!content) return;
            
            content = sanitizeInput(content);
            const scanResult = scanContent(content);
            if (!scanResult.safe) {
                // Silent fail - just clear input
                input.value = '';
                input.style.height = 'auto';
                return;
            }
            
            // Add optimistic comment instantly - looks like a normal comment, no badge
            addOptimisticComment(content);
            
            // Clear input field
            input.value = '';
            input.style.height = 'auto';
            
            // NO ALERTS, NO BADGES, NO TOASTS
        };
        
        window.autoResize = (el) => {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        };
        
        // Bind send button
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('sendButton');
            if (btn) btn.addEventListener('click', (e) => { e.preventDefault(); window.postComment(); });
        });
        
        init();
    </script>
</body>
</html>
