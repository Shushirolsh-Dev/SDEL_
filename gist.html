<body class="pb-24">

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        const supabase = createClient(
            'https://lgfyrlfjoazedwymjpfc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
        );
        
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        let userProfile = null;
        let pressTimer = null;
        let currentPressTarget = null;
        
        // Pagination state
        const COMMENTS_PER_PAGE = 25;
        let currentPage = 0;
        let isLoading = false;
        let hasMoreComments = true;
        let totalCommentsCount = 0;
        let postData = null;
        
        // --- Optimistic UI + Offline Queue ---
        let pendingComments = [];
        let syncInProgress = false;
        let syncRetryTimeout = null;
        
        function showToastMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function generateTempId() { return `temp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`; }
        
        function loadPendingQueue() {
            const stored = localStorage.getItem('gist_pending_comments');
            if (stored) {
                try { pendingComments = JSON.parse(stored); } catch(e) { pendingComments = []; }
            } else { pendingComments = []; }
        }
        
        function savePendingQueue() {
            localStorage.setItem('gist_pending_comments', JSON.stringify(pendingComments));
        }
        
        function addOptimisticComment(content) {
            const tempId = generateTempId();
            const now = new Date().toISOString();
            
            pendingComments.push({
                tempId: tempId,
                content: content,
                createdAt: now,
                username: userProfile?.username || 'homie',
                isOfficial: userProfile?.is_official || false,
                isVerified: userProfile?.is_verified || false
            });
            savePendingQueue();
            
            const optimisticComment = {
                id: tempId,
                tempId: tempId,
                content: content,
                created_at: now,
                user_id: userProfile?.id,
                profile: {
                    username: userProfile?.username || 'homie',
                    is_official: userProfile?.is_official || false,
                    is_verified: userProfile?.is_verified || false
                }
            };
            
            appendCommentToDOM(optimisticComment);
            
            setTimeout(() => {
                const newCommentEl = document.querySelector(`.comment-card[data-temp-id="${tempId}"]`);
                if (newCommentEl) newCommentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
            
            // Update reply count optimistically AND update database
            const replyCountDisplay = document.getElementById('replyCountDisplay');
            const replyCountHeader = document.getElementById('replyCountHeader');
            const newCount = (parseInt(replyCountDisplay?.innerText) || 0) + 1;
            if (replyCountDisplay) replyCountDisplay.innerText = newCount;
            if (replyCountHeader) replyCountHeader.innerText = newCount;
            
            // Also update the post's comments_count in database immediately
            supabase.rpc('increment_stat', { post_id: postId, field: 'comments_count' }).catch(() => {});
            
            triggerSync();
            return tempId;
        }
        
        function appendCommentToDOM(comment, prepend = false) {
            const commentsContainer = document.querySelector('.comments-section');
            if (!commentsContainer) return;
            
            const badge = getBadgeHTML(comment.profile?.is_official, comment.profile?.is_verified);
            const timeDisplay = formatTimeAgo(comment.created_at);
            const commentTime = new Date(comment.created_at).getTime();
            const now = Date.now();
            const canEdit = (now - commentTime) < 15 * 60 * 1000;
            
            const commentHtml = `
                <div class="comment-card" data-temp-id="${comment.tempId || comment.id}" data-comment-id="${comment.id}" data-user-id="${comment.user_id}" data-created-at="${comment.created_at}" data-content="${escapeHTML(comment.content)}" oncontextmenu="return false;" ontouchstart="startPressComment(event, '${comment.id}', '${comment.user_id}', '${escapeHTML(comment.content)}', '${comment.created_at}')" ontouchend="endPress()" onmousedown="startPressComment(event, '${comment.id}', '${comment.user_id}', '${escapeHTML(comment.content)}', '${comment.created_at}')" onmouseup="endPress()">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span onclick="location.href='profile.html?u=${escapeHTML(comment.profile?.username || '')}'" class="username-link text-xs">@${escapeHTML(comment.profile?.username || 'homie')}</span>
                            ${badge}
                        </div>
                        <span class="time-badge text-[9px]">${timeDisplay}</span>
                    </div>
                    <p class="text-sm text-zinc-300">${escapeHTML(comment.content)}</p>
                </div>
            `;
            
            if (prepend) {
                commentsContainer.insertAdjacentHTML('afterbegin', commentHtml);
            } else {
                commentsContainer.insertAdjacentHTML('beforeend', commentHtml);
            }
            lucide.createIcons();
        }
        
        function renderSkeletonLoaders(count = 3) {
            const commentsContainer = document.querySelector('.comments-section');
            if (!commentsContainer) return;
            for (let i = 0; i < count; i++) {
                const skeletonHtml = `
                    <div class="skeleton-card skeleton-loader">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-line" style="width: 80px;"></div>
                        </div>
                        <div class="skeleton-line" style="width: 100%;"></div>
                        <div class="skeleton-line" style="width: 85%;"></div>
                    </div>
                `;
                commentsContainer.insertAdjacentHTML('beforeend', skeletonHtml);
            }
        }
        
        function removeSkeletonLoaders() {
            const skeletons = document.querySelectorAll('.skeleton-loader');
            skeletons.forEach(s => s.remove());
        }
        
        async function loadMoreComments() {
            if (isLoading || !hasMoreComments) return;
            isLoading = true;
            
            renderSkeletonLoaders(3);
            
            try {
                const start = currentPage * COMMENTS_PER_PAGE;
                const { data: comments, error } = await supabase
                    .from('posts')
                    .select('*, profile:user_id(username, is_official, is_verified)')
                    .eq('parent_id', postId)
                    .order('created_at', { ascending: true })
                    .range(start, start + COMMENTS_PER_PAGE - 1);
                
                if (error) throw error;
                
                removeSkeletonLoaders();
                
                if (comments && comments.length > 0) {
                    const commentsContainer = document.querySelector('.comments-section');
                    const noRepliesMsg = commentsContainer?.querySelector('.no-replies-placeholder');
                    if (noRepliesMsg) noRepliesMsg.remove();
                    
                    comments.forEach(comment => {
                        appendCommentToDOM(comment);
                    });
                    currentPage++;
                    hasMoreComments = comments.length === COMMENTS_PER_PAGE;
                } else {
                    hasMoreComments = false;
                }
                
                if (!hasMoreComments && currentPage > 0) {
                    const commentsContainer = document.querySelector('.comments-section');
                    const existingEnd = commentsContainer?.querySelector('.end-message');
                    if (!existingEnd && commentsContainer && commentsContainer.children.length > 0) {
                        commentsContainer.insertAdjacentHTML('beforeend', '<div class="end-message">✨ No more replies — you\'ve reached the end ✨</div>');
                    }
                }
            } catch (err) {
                console.error('Error loading comments:', err);
                removeSkeletonLoaders();
            } finally {
                isLoading = false;
            }
        }
        
        let observer = null;
        function setupInfiniteScroll() {
            if (observer) observer.disconnect();
            
            const loadTrigger = document.createElement('div');
            loadTrigger.className = 'loading-trigger';
            loadTrigger.id = 'load-more-trigger';
            loadTrigger.innerHTML = '<i data-lucide="loader-2" class="spinner inline-block mr-2" size="14"></i> Loading more...';
            loadTrigger.style.display = 'none';
            
            const commentsContainer = document.querySelector('.comments-section');
            if (commentsContainer && !document.getElementById('load-more-trigger')) {
                commentsContainer.insertAdjacentElement('afterend', loadTrigger);
            }
            
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && hasMoreComments && !isLoading && currentPage > 0) {
                        loadMoreComments();
                    }
                });
            }, { threshold: 0.1 });
            
            const trigger = document.getElementById('load-more-trigger');
            if (trigger) observer.observe(trigger);
        }
        
        async function triggerSync() {
            if (syncInProgress) return;
            if (pendingComments.length === 0) return;
            if (!userProfile) return;
            
            syncInProgress = true;
            
            while (pendingComments.length > 0) {
                const pending = pendingComments[0];
                if (!pending) break;
                
                try {
                    const { error } = await supabase.from('posts').insert({
                        user_id: userProfile.id,
                        content: pending.content,
                        parent_id: postId,
                        post_type: 'comment',
                        school_name: 'Gist'
                    });
                    
                    if (!error) {
                        pendingComments.shift();
                        savePendingQueue();
                        await supabase.rpc('increment_stat', { post_id: postId, field: 'comments_count' }).catch(() => {});
                        
                        const tempElement = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                        if (tempElement) {
                            tempElement.removeAttribute('data-temp-id');
                        }
                    } else {
                        throw new Error(error.message);
                    }
                } catch (err) {
                    console.warn("Sync failed, will retry later", err);
                    if (!pending.retryCount) pending.retryCount = 0;
                    pending.retryCount++;
                    if (pending.retryCount >= 10) {
                        pendingComments.shift();
                        savePendingQueue();
                        const failedEl = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                        if (failedEl) failedEl.remove();
                    } else {
                        const delay = Math.min(60000, 1000 * Math.pow(2, pending.retryCount));
                        if (syncRetryTimeout) clearTimeout(syncRetryTimeout);
                        syncRetryTimeout = setTimeout(() => {
                            syncInProgress = false;
                            triggerSync();
                        }, delay);
                        syncInProgress = false;
                        return;
                    }
                }
            }
            syncInProgress = false;
            if (syncRetryTimeout) clearTimeout(syncRetryTimeout);
        }
        
        window.addEventListener('online', () => {
            if (pendingComments.length > 0) triggerSync();
        });
        
        window.closeSheet = () => {
            const sheet = document.getElementById('action-sheet');
            if (sheet) sheet.style.display = 'none';
            if (pressTimer) clearTimeout(pressTimer);
        };
        window.closeEditModal = () => {
            const modal = document.getElementById('edit-modal');
            if (modal) modal.style.display = 'none';
        };
        
        function startPressComment(e, id, userId, content, createdAt) {
            if (userProfile?.id !== userId) return;
            e.preventDefault();
            currentPressTarget = { id, userId, content, createdAt };
            pressTimer = setTimeout(() => {
                const sheet = document.getElementById('action-sheet');
                const editOpt = document.getElementById('edit-option');
                const editBtn = document.getElementById('edit-btn');
                const commentTime = new Date(createdAt).getTime();
                const diffMinutes = (Date.now() - commentTime) / (1000 * 60);
                
                if (diffMinutes < 15) {
                    editOpt.style.display = 'block';
                    editBtn.onclick = () => openEditModal(id, content);
                } else {
                    editOpt.style.display = 'none';
                }
                
                document.getElementById('burn-btn').onclick = () => burnComment(id);
                sheet.style.display = 'flex';
                lucide.createIcons();
            }, 500);
        }
        
        function endPress() { 
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            currentPressTarget = null;
        }
        
        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffSeconds = Math.floor((now - date) / 1e3);
            if (diffSeconds < 60) return 'just now';
            const diffMinutes = Math.floor(diffSeconds / 60);
            if (diffMinutes < 60) return `${diffMinutes} min${diffMinutes > 1 ? 's' : ''} ago`;
            const diffHours = Math.floor(diffMinutes / 60);
            if (diffHours < 24) return `${diffHours} hr${diffHours > 1 ? 's' : ''} ago`;
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            return date.toLocaleDateString();
        }
        
        async function init() {
            if (!postId) return window.location.replace('explore.html');
            if (!/^[a-zA-Z0-9-]+$/.test(postId)) return window.location.replace('explore.html');
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.replace('login.html');
            const { data: profile } = await supabase.from('profile').select('*').eq('id', session.user.id).single();
            userProfile = profile;
            loadPendingQueue();
            await loadGist();
            
            if (pendingComments.length > 0) {
                for (const pending of pendingComments) {
                    const exists = document.querySelector(`.comment-card[data-temp-id="${pending.tempId}"]`);
                    if (!exists) {
                        const optimistic = {
                            id: pending.tempId,
                            tempId: pending.tempId,
                            content: pending.content,
                            created_at: pending.createdAt,
                            profile: {
                                username: pending.username,
                                is_official: pending.isOfficial,
                                is_verified: pending.isVerified
                            }
                        };
                        appendCommentToDOM(optimistic);
                    }
                }
                lucide.createIcons();
                triggerSync();
            }
            
            await loadMoreComments();
            setupInfiniteScroll();

        const harmfulPatterns = [/porn/i, /xxx/i, /adult/i, /sex/i, /nude/i, /onlyfans/i, /fansly/i, /gambling/i, /casino/i, /bet/i, /betting/i, /poker/i, /slot/i, /crypto/i, /bitcoin/i, /investment/i, /forex/i, /drug/i, /weed/i, /cannabis/i, /marijuana/i, /hack/i, /cheat/i, /crack/i, /violence/i, /gore/i, /kill/i, /viagra/i, /cialis/i, /free money/i, /work from home/i, /get rich/i];
        
        function sanitizeInput(input) {
            if (!input) return '';
            input = input.replace(/<[^>]*>/g, '');
            input = input.replace(/(javascript|data|vbscript):/gi, 'blocked:');
            return input.trim().substring(0, 2000);
        }
        
        function scanContent(content) {
            const urlRegex = /(https?:\/\/[^\s<>"']+)|(www\.[^\s<>"']+\.[^\s<>"']+)/gi;
            const urls = content.match(urlRegex) || [];
            if (urls.length > 3) return { safe: false, reason: "Too many links" };
            const lowerContent = content.toLowerCase();
            for (const pattern of harmfulPatterns) {
                if (pattern.test(lowerContent)) return { safe: false, reason: "Content blocked" };
            }
            return { safe: true };
        }
        
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        async function loadGist() {
            const container = document.getElementById('gist-thread');
            const { data: post, error } = await supabase.from('posts').select('*, profile:user_id(username, is_official, is_verified)').eq('id', postId).single();
            if (error || !post) {
                container.innerHTML = `<div class="text-center py-20 opacity-50 font-medium">Gist not found</div>`;
                return;
            }
            
            postData = post;
            
            const { count } = await supabase
                .from('posts')
                .select('*', { count: 'exact', head: true })
                .eq('parent_id', postId);
            totalCommentsCount = count || 0;
            
            // Sync comments_count if out of sync
            if (post.comments_count !== totalCommentsCount) {
                await supabase.from('posts').update({ comments_count: totalCommentsCount }).eq('id', postId);
                post.comments_count = totalCommentsCount;
            }
            
            const profile = post.profile || {};
            const badge = getBadgeHTML(profile.is_official, profile.is_verified);
            const postTime = new Date(post.created_at).getTime();
            const canEditOriginal = (Date.now() - postTime) < 15 * 60 * 1000;
            
            let html = `
                <div class="original-post-card" data-post-id="${post.id}" data-user-id="${post.user_id}" data-created-at="${post.created_at}" oncontextmenu="return false;" ontouchstart="startPressOriginal(event, '${post.id}', '${post.user_id}', '${escapeHTML(post.content)}', '${post.created_at}')" ontouchend="endPress()" onmousedown="startPressOriginal(event, '${post.id}', '${post.user_id}', '${escapeHTML(post.content)}', '${post.created_at}')" onmouseup="endPress()">
                    <div class="flex items-center gap-3 mb-4">
                        <div onclick="location.href='profile.html?u=${escapeHTML(profile.username || '')}'" class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center font-bold text-sdel border border-white/10 uppercase cursor-pointer">${escapeHTML(profile.username?.[0] || 'H')}</div>
                        <div>
                            <div class="flex items-center gap-1.5">
                                <span onclick="location.href='profile.html?u=${escapeHTML(profile.username || '')}'" class="username-link">@${escapeHTML(profile.username || 'homie')}</span>
                                ${badge}
                            </div>
                            <span class="time-badge">${formatTimeAgo(post.created_at)}</span>
                        </div>
                    </div>
                    <p class="text-base text-zinc-100 leading-relaxed mb-4">${escapeHTML(post.content)}</p>
                    <div class="flex items-center gap-6 text-zinc-500 border-y border-white/5 py-3">
                        <div class="flex items-center gap-1.5">
                            <span class="font-medium text-white">${post.likes_count || 0}</span> <span class="text-xs">Likes</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="font-medium text-white" id="replyCountDisplay">${totalCommentsCount}</span> <span class="text-xs">Replies</span>
                        </div>
                    </div>
                </div>
                <div class="mt-2">
                    <h2 class="text-xs font-medium uppercase text-zinc-600 tracking-wider mb-4">Replies · <span id="replyCountHeader">${totalCommentsCount}</span></h2>
                    <div class="comments-section">${totalCommentsCount === 0 ? '<p class="text-center py-8 text-zinc-600 text-sm no-replies-placeholder">No replies yet</p>' : ''}</div>
                </div>
            `;
            container.innerHTML = html;
            lucide.createIcons();
        }
        
        // Long press for original post
        window.startPressOriginal = (e, id, userId, content, createdAt) => {
            if (userProfile?.id !== userId) return;
            e.preventDefault();
            pressTimer = setTimeout(() => {
                const sheet = document.getElementById('action-sheet');
                const editOpt = document.getElementById('edit-option');
                const editBtn = document.getElementById('edit-btn');
                const postTime = new Date(createdAt).getTime();
                const diffMinutes = (Date.now() - postTime) / (1000 * 60);
                
                if (diffMinutes < 15) {
                    editOpt.style.display = 'block';
                    editBtn.innerHTML = '<i data-lucide="edit-3" size="18"></i> Edit Gist (15min)';
                    editBtn.onclick = () => openEditOriginalModal(id, content);
                } else {
                    editOpt.style.display = 'none';
                }
                
                document.getElementById('burn-btn').innerHTML = '<i data-lucide="flame" size="18"></i> Burn Gist';
                document.getElementById('burn-btn').onclick = () => burnOriginalPost(id);
                sheet.style.display = 'flex';
                lucide.createIcons();
            }, 500);
        };
        
        async function openEditOriginalModal(id, oldContent) {
            closeSheet();
            const modal = document.getElementById('edit-modal');
            const textarea = document.getElementById('edit-textarea');
            const saveBtn = document.getElementById('save-edit-btn');
            textarea.value = oldContent;
            modal.style.display = 'flex';
            saveBtn.onclick = async () => {
                let newContent = textarea.value.trim();
                newContent = sanitizeInput(newContent);
                if (newContent && newContent !== oldContent) {
                    const { error } = await supabase.from('posts').update({ content: newContent }).eq('id', id);
                    if (!error) {
                        showToastMessage("Gist updated!");
                        closeEditModal();
                        await loadGist();
                        await loadMoreComments();
                        setupInfiniteScroll();
                    } else {
                        showToastMessage("Failed to update");
                    }
                } else {
                    closeEditModal();
                }
            };
        }
        
        async function burnOriginalPost(id) {
            closeSheet();
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if (!error) {
                showToastMessage("Gist burned!");
                setTimeout(() => {
                    window.location.href = 'explore.html';
                }, 1000);
            } else {
                showToastMessage("Failed to burn gist");
            }
        }
        
        function getBadgeHTML(official, verified) {
            if (official) return `<div class="bg-sdel rounded-full p-[2px] w-[14px] h-[14px] flex items-center justify-center"><i data-lucide="check" class="text-white" size="10" stroke-width="4"></i></div>`;
            if (verified) return `<div class="bg-zinc-500 rounded-full p-[2px] w-[14px] h-[14px] flex items-center justify-center"><i data-lucide="check" class="text-white" size="10" stroke-width="4"></i></div>`;
            return '';
        }
        
        window.openEditModal = (id, oldContent) => {
            closeSheet();
            const modal = document.getElementById('edit-modal');
            const textarea = document.getElementById('edit-textarea');
            const saveBtn = document.getElementById('save-edit-btn');
            textarea.value = oldContent;
            modal.style.display = 'flex';
            saveBtn.onclick = async () => {
                let newContent = textarea.value.trim();
                newContent = sanitizeInput(newContent);
                if (newContent && newContent !== oldContent) {
                    const { error } = await supabase.from('posts').update({ content: newContent }).eq('id', id);
                    if (!error) {
                        showToastMessage("Reply updated!");
                        closeEditModal();
                        currentPage = 0;
                        hasMoreComments = true;
                        const commentsContainer = document.querySelector('.comments-section');
                        if (commentsContainer) commentsContainer.innerHTML = '';
                        await loadMoreComments();
                        setupInfiniteScroll();
                    } else {
                        showToastMessage("Failed to update");
                    }
                } else {
                    closeEditModal();
                }
            };
        };
        
        async function burnComment(id) {
            closeSheet();
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if (!error) {
                showToastMessage("Reply burned!");
                await supabase.rpc('decrement_stat', { post_id: postId, field: 'comments_count' }).catch(() => {});
                
                currentPage = 0;
                hasMoreComments = true;
                const commentsContainer = document.querySelector('.comments-section');
                if (commentsContainer) commentsContainer.innerHTML = '';
                await loadMoreComments();
                setupInfiniteScroll();
                
                const { count } = await supabase
                    .from('posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('parent_id', postId);
                const newCount = count || 0;
                
                const replyCountDisplay = document.getElementById('replyCountDisplay');
                const replyCountHeader = document.getElementById('replyCountHeader');
                if (replyCountDisplay) replyCountDisplay.innerText = newCount;
                if (replyCountHeader) replyCountHeader.innerText = newCount;
                
                // Also update the post's comments_count in database
                await supabase.from('posts').update({ comments_count: newCount }).eq('id', postId);
            } else {
                showToastMessage("Failed to burn reply");
            }
        }
        
        window.postComment = async () => {
            const input = document.getElementById('comment-input');
            let content = input.value.trim();
            if (!content) return;
            
            content = sanitizeInput(content);
            const scanResult = scanContent(content);
            if (!scanResult.safe) {
                input.value = '';
                input.style.height = 'auto';
                showToastMessage("Content blocked");
                return;
            }
            
            addOptimisticComment(content);
            input.value = '';
            input.style.height = 'auto';
        };
        
        window.autoResize = (el) => {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('sendButton');
            if (btn) btn.addEventListener('click', (e) => { e.preventDefault(); window.postComment(); });
        });
        
        // Make functions global
        window.startPressOriginal = startPressOriginal;
        window.startPressComment = startPressComment;
        window.endPress = endPress;
        window.closeSheet = closeSheet;
        window.closeEditModal = closeEditModal;
        window.openEditModal = openEditModal;
        
        init();
    </script>
</body>
</html>
