<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Class - SIMPLE TEST</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Create Class - Test Version</h1>
    
    <input type="text" id="className" placeholder="Class Name" style="width: 100%; padding: 10px; margin: 10px 0;">
    <button id="createBtn">Create Class</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

    <script>
        const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const resultDiv = document.getElementById('result');
        
        function log(message, isError = false) {
            resultDiv.innerHTML += `<div style="color: ${isError ? 'red' : 'green'}; margin: 5px 0;">${message}</div>`;
            console.log(message);
        }
        
        document.getElementById('createBtn').onclick = async () => {
            resultDiv.innerHTML = '';
            log('Button clicked - starting...');
            
            try {
                log('Getting user...');
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                
                if (userError) {
                    log('ERROR getting user: ' + userError.message, true);
                    return;
                }
                
                if (!user) {
                    log('No user logged in!', true);
                    return;
                }
                
                log('User ID: ' + user.id);
                
                const className = document.getElementById('className').value;
                if (!className) {
                    log('Please enter a class name', true);
                    return;
                }
                
                log('Creating class: ' + className);
                
                const { data: classData, error: classError } = await supabase
                    .from('classes')
                    .insert({
                        name: className,
                        rep_id: user.id,
                        join_mode: 'open'
                    })
                    .select();
                
                if (classError) {
                    log('ERROR creating class: ' + classError.message, true);
                    return;
                }
                
                log('SUCCESS! Class created with ID: ' + classData[0].id);
                log('Class data: ' + JSON.stringify(classData[0]));
                
            } catch (err) {
                log('CATCH ERROR: ' + err.message, true);
            }
        };
        
        // Check auth on page load
        (async () => {
            log('Page loaded - checking auth...');
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                log('✅ Logged in! User ID: ' + session.user.id);
            } else {
                log('❌ Not logged in!', true);
            }
        })();
    </script>
</body>
</html>
