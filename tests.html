<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CBT Practice Hub | Computer-Based Test Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* main card container */
        .cbt-container {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* header section */
        .cbt-header {
            background: #0f2b3d;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .cbt-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cbt-header h1 span {
            background: #ffb347;
            font-size: 1.3rem;
            padding: 4px 12px;
            border-radius: 40px;
            color: #1e2f3a;
        }

        .sub {
            margin-top: 8px;
            opacity: 0.85;
            font-weight: 500;
        }

        /* control bar */
        .quiz-controls {
            background: #f8fafc;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #cbd5e1;
        }

        .question-pool-badge {
            background: #e2e8f0;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #0f3b4f;
        }

        .fetch-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .fetch-area label {
            font-weight: 600;
            color: #1e293b;
        }

        #numQuestions {
            width: 80px;
            padding: 8px 10px;
            border-radius: 28px;
            border: 1px solid #cbd5e1;
            font-weight: 600;
            text-align: center;
            background: white;
            font-size: 1rem;
        }

        button {
            background: #2c5f8a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #1e405e;
            transform: scale(0.97);
        }

        .reset-btn {
            background: #475569;
        }

        .reset-btn:hover {
            background: #1e293b;
        }

        /* question area */
        .quiz-main {
            padding: 2rem 2rem 1.5rem;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .q-counter {
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0c4e6e;
        }

        .score-badge {
            background: #d9f0ec;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #1f6e5c;
        }

        .question-text {
            font-size: 1.55rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 2rem;
            color: #0a1927;
            background: #fefce8;
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
            border-left: 7px solid #ffb347;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 2rem;
        }

        .option {
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .option:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateX(4px);
        }

        .option.selected {
            background: #e6f7ff;
            border-color: #2c5f8a;
            box-shadow: 0 5px 12px rgba(44,95,138,0.15);
        }

        .prefix {
            font-weight: 800;
            background: #eef2ff;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #1e4a76;
        }

        .option-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: #1e2a3a;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-btn {
            background: #cbd5e1;
            color: #1e293b;
            flex: 1;
            text-align: center;
        }

        .nav-btn.primary {
            background: #2c5f8a;
            color: white;
        }

        .submit-area {
            margin-top: 20px;
            text-align: center;
        }

        .submit-test {
            background: #e67e22;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 80%;
        }

        .result-card {
            margin-top: 25px;
            background: #f0f9f4;
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid #b9e0cf;
        }

        .result-card h3 {
            color: #2b6e4e;
        }

        .feedback {
            font-size: 0.9rem;
            margin-top: 12px;
            color: #2c3e50;
        }

        footer {
            background: #f1f5f9;
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: #475569;
            border-top: 1px solid #d1dbe8;
        }

        @media (max-width: 620px) {
            body { padding: 0.8rem; }
            .question-text { font-size: 1.2rem; }
            .option-text { font-size: 0.9rem; }
            .quiz-controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="cbt-container" id="cbtApp">
    <div class="cbt-header">
        <h1>📋 CBT Simulator <span>smart drill</span></h1>
        <div class="sub">adaptive question pool • random fetch • track your score</div>
    </div>

    <div class="quiz-controls">
        <div class="question-pool-badge" id="poolSizeDisplay">📚 Pool: 12 questions</div>
        <div class="fetch-area">
            <label>🔢 Fetch questions:</label>
            <input type="number" id="numQuestions" min="1" max="20" value="5" step="1">
            <button id="fetchBtn">🔄 FETCH & START</button>
            <button id="resetBtn" class="reset-btn">⟳ Reset Session</button>
        </div>
    </div>

    <div class="quiz-main" id="quizMain">
        <div class="progress">
            <div class="q-counter" id="questionCounter">Question 0 / 0</div>
            <div class="score-badge" id="liveScore">⭐ Score: 0 / 0</div>
        </div>
        <div id="questionArea">
            <!-- dynamic question and options injected -->
            <div class="question-text" id="questionText">Select number of questions and click FETCH</div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn">◀ PREV</button>
                <button id="nextBtn" class="nav-btn primary">NEXT ▶</button>
            </div>
            <div class="submit-area">
                <button id="submitQuizBtn" class="submit-test">✅ SUBMIT TEST & VIEW RESULT</button>
            </div>
            <div id="resultPanel" class="result-card" style="display: none;"></div>
        </div>
    </div>
    <footer>
        💡 CBT pool mode — each fetch picks random subset. Answer all, then submit to see detailed score & review.
    </footer>
</div>

<script>
    // ---------- MASTER QUESTION POOL (12 high-quality QA pairs) ----------
    const MASTER_POOL = [
        { id: 1, text: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Lisbon"], correct: "Paris" },
        { id: 2, text: "Which planet is known as the Red Planet?", options: ["Mars", "Jupiter", "Venus", "Saturn"], correct: "Mars" },
        { id: 3, text: "Who wrote 'Romeo and Juliet'?", options: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"], correct: "William Shakespeare" },
        { id: 4, text: "What is the square root of 64?", options: ["6", "7", "8", "9"], correct: "8" },
        { id: 5, text: "Which HTML tag is used to define an unordered list?", options: ["<ol>", "<ul>", "<li>", "<list>"], correct: "<ul>" },
        { id: 6, text: "What does CPU stand for?", options: ["Central Processing Unit", "Computer Personal Unit", "Central Program Utility", "Core Processing Unit"], correct: "Central Processing Unit" },
        { id: 7, text: "Who painted the Mona Lisa?", options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], correct: "Da Vinci" },
        { id: 8, text: "Which ocean is the deepest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: "Pacific" },
        { id: 9, text: "What is the chemical symbol for Gold?", options: ["Go", "Gd", "Au", "Ag"], correct: "Au" },
        { id: 10, text: "Which country gifted the Statue of Liberty to the USA?", options: ["England", "Spain", "France", "Germany"], correct: "France" },
        { id: 11, text: "What is the largest mammal on Earth?", options: ["Elephant", "Blue Whale", "Giraffe", "Great White Shark"], correct: "Blue Whale" },
        { id: 12, text: "Which programming language is known for web development & 'npm'?", options: ["Python", "Java", "JavaScript", "C++"], correct: "JavaScript" }
    ];

    // ---------- APP STATE ----------
    let currentQuestions = [];       // array of question objects (subset from pool)
    let userAnswers = [];            // array of strings (selected answer text) same length as currentQuestions
    let currentIndex = 0;            // 0-based index
    let quizSubmitted = false;        // flag to disable changes after final submit? we'll allow re-submit after reset or refetch
    let totalPoolSize = MASTER_POOL.length;

    // DOM elements
    const numQuestionsInput = document.getElementById("numQuestions");
    const fetchBtn = document.getElementById("fetchBtn");
    const resetBtn = document.getElementById("resetBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitQuizBtn = document.getElementById("submitQuizBtn");
    const questionTextDiv = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const questionCounterSpan = document.getElementById("questionCounter");
    const liveScoreSpan = document.getElementById("liveScore");
    const resultPanel = document.getElementById("resultPanel");
    const poolSizeDisplay = document.getElementById("poolSizeDisplay");

    // helper: update pool display
    function updatePoolDisplay() {
        poolSizeDisplay.innerText = `📚 Pool: ${totalPoolSize} questions`;
    }

    // fetch random subset from master pool, based on desired count (max pool length)
    function fetchRandomQuestions(count) {
        let desired = Math.min(count, MASTER_POOL.length);
        if (desired <= 0) desired = 1;
        // shuffle copy of master pool (Fisher-Yates)
        const shuffled = [...MASTER_POOL];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, desired);
    }

    // reset session state: clear answers, reset index, hide result, set quizSubmitted false
    function resetSessionState(questionsArray) {
        currentQuestions = [...questionsArray];
        const qlen = currentQuestions.length;
        // init userAnswers with null / empty string for each question
        userAnswers = new Array(qlen).fill("");
        currentIndex = 0;
        quizSubmitted = false;
        resultPanel.style.display = "none";
        resultPanel.innerHTML = "";
        // remove any global submission styles
        renderCurrentQuestion();
        updateProgressAndScore();
    }

    // update score display (how many correctly answered among answered questions)
    function computeCurrentScore() {
        if (!currentQuestions.length) return { correct: 0, total: 0 };
        let correctCount = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            const userAns = userAnswers[i];
            if (userAns && userAns !== "") {
                if (userAns === currentQuestions[i].correct) {
                    correctCount++;
                }
            }
        }
        return { correct: correctCount, total: currentQuestions.length };
    }

    function updateProgressAndScore() {
        if (!currentQuestions.length) {
            questionCounterSpan.innerText = `Question 0 / 0`;
            liveScoreSpan.innerText = `⭐ Score: 0 / 0`;
            return;
        }
        const qlen = currentQuestions.length;
        questionCounterSpan.innerText = `Question ${currentIndex+1} / ${qlen}`;
        const scoreObj = computeCurrentScore();
        liveScoreSpan.innerText = `⭐ Score: ${scoreObj.correct} / ${scoreObj.total}`;
    }

    // render current question + highlight selected option
    function renderCurrentQuestion() {
        if (!currentQuestions.length) {
            questionTextDiv.innerText = "⚠️ No questions loaded. Click FETCH to begin.";
            optionsContainer.innerHTML = "";
            return;
        }
        const q = currentQuestions[currentIndex];
        questionTextDiv.innerText = q.text;
        // generate options
        const letters = ["A", "B", "C", "D"];
        const currentSelected = userAnswers[currentIndex] || "";
        let optionsHtml = "";
        q.options.forEach((opt, idx) => {
            const isSelected = (currentSelected === opt);
            const selectedClass = isSelected ? "selected" : "";
            optionsHtml += `
                <div class="option ${selectedClass}" data-opt-value="${escapeHtml(opt)}">
                    <div class="prefix">${letters[idx]}</div>
                    <div class="option-text">${escapeHtml(opt)}</div>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;
        
        // attach event listeners to each option div
        const optionDivs = document.querySelectorAll(".option");
        optionDivs.forEach(div => {
            div.addEventListener("click", (e) => {
                if (quizSubmitted) {
                    // tiny feedback: cannot change after submission, but we also allow reset/fetch anyway
                    showTemporaryMessage("Test already submitted! Press FETCH or RESET for new session.", 1500);
                    return;
                }
                const selectedValue = div.getAttribute("data-opt-value");
                // update answers array for current question
                userAnswers[currentIndex] = selectedValue;
                // re-render to update selection style
                renderCurrentQuestion();   // re-render to reflect selected option
                updateProgressAndScore();
                // auto-save, no further action
            });
        });
        updateProgressAndScore();
    }

    // small helper for escape html
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // show temporary message inside result panel without breaking UI
    let tempTimeout;
    function showTemporaryMessage(msg, duration = 1800) {
        if (tempTimeout) clearTimeout(tempTimeout);
        const originalDisplay = resultPanel.style.display;
        const originalHTML = resultPanel.innerHTML;
        resultPanel.style.display = "block";
        resultPanel.innerHTML = `<div class="feedback">💬 ${msg}</div>`;
        tempTimeout = setTimeout(() => {
            if (!quizSubmitted) {
                resultPanel.style.display = "none";
                resultPanel.innerHTML = "";
            } else {
                // if submitted, keep final result; don't overwrite unless new fetch/reset
                if (!quizSubmitted) {
                    resultPanel.style.display = "none";
                    resultPanel.innerHTML = "";
                }
            }
        }, duration);
    }

    // handle navigation
    function goPrev() {
        if (quizSubmitted) {
            showTemporaryMessage("Test already finished. Click FETCH or RESET to start new quiz.", 1500);
            return;
        }
        if (!currentQuestions.length) return;
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            showTemporaryMessage("🔙 Already at first question", 800);
        }
    }

    function goNext() {
        if (quizSubmitted) {
            showTemporaryMessage("Test already submitted. Use FETCH for a new set.", 1500);
            return;
        }
        if (!currentQuestions.length) return;
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            showTemporaryMessage("📌 This is the last question. Press SUBMIT to see your score!", 1200);
        }
    }

    // submit quiz: compute final detailed result and show analysis
    function submitQuiz() {
        if (!currentQuestions.length) {
            showTemporaryMessage("No active questions! Please fetch questions first.", 1500);
            return;
        }
        if (quizSubmitted) {
            showTemporaryMessage("Quiz already submitted! Reset or fetch new questions to retake.", 1500);
            return;
        }
        // check if any unanswered questions, but we don't force mandatory; we just compute final
        let totalAnswered = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] !== "") totalAnswered++;
        }
        const unansweredCount = currentQuestions.length - totalAnswered;
        let finalCorrect = 0;
        const details = [];
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const userChoice = userAnswers[i] || "(Not answered)";
            const isCorrect = (userChoice === q.correct);
            if (isCorrect) finalCorrect++;
            details.push({
                questionText: q.text,
                userAnswer: userChoice,
                correctAnswer: q.correct,
                isCorrect: isCorrect
            });
        }
        const percentage = Math.round((finalCorrect / currentQuestions.length) * 100);
        // build result HTML
        let resultHtml = `<h3>📊 Final Score: ${finalCorrect} / ${currentQuestions.length} (${percentage}%)</h3>`;
        if (unansweredCount > 0) {
            resultHtml += `<div class="feedback">⚠️ You left ${unansweredCount} question(s) unanswered.</div>`;
        } else {
            resultHtml += `<div class="feedback">✅ All questions answered! Great job.</div>`;
        }
        resultHtml += `<div style="margin-top: 12px; text-align: left; max-height: 220px; overflow-y: auto; border-top: 1px solid #cbd5e1; padding-top: 12px;">`;
        details.forEach((det, idx) => {
            const statusIcon = det.isCorrect ? "✅" : "❌";
            const userShow = det.userAnswer === "(Not answered)" ? "<i>no answer</i>" : escapeHtml(det.userAnswer);
            resultHtml += `
                <div style="margin-bottom: 12px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;">
                    <strong>${idx+1}. ${escapeHtml(det.questionText)}</strong><br>
                    <span style="color: #334155;">Your answer: ${userShow}</span><br>
                    <span style="color: #2c5f8a;">✔ Correct: ${escapeHtml(det.correctAnswer)}</span> ${statusIcon}
                </div>
            `;
        });
        resultHtml += `</div><button id="closeResultBtn" style="margin-top: 15px; background:#2c5f8a;">Close & Keep</button>`;
        resultPanel.innerHTML = resultHtml;
        resultPanel.style.display = "block";
        quizSubmitted = true;

        // attach close button event after render
        const closeBtn = document.getElementById("closeResultBtn");
        if (closeBtn) {
            closeBtn.addEventListener("click", () => {
                resultPanel.style.display = "none";
            });
        }
        updateProgressAndScore();
    }

    // main fetch routine: get number from input, fetch random subset, reset state, render
    function handleFetch() {
        let requested = parseInt(numQuestionsInput.value, 10);
        if (isNaN(requested) || requested < 1) requested = 1;
        const maxFetch = MASTER_POOL.length;
        if (requested > maxFetch) {
            showTemporaryMessage(`⚠️ Pool has only ${maxFetch} questions. Using max available.`, 1500);
            requested = maxFetch;
            numQuestionsInput.value = maxFetch;
        }
        const freshQuestions = fetchRandomQuestions(requested);
        resetSessionState(freshQuestions);
        // after reset, also scroll to top gently
        document.querySelector(".quiz-main")?.scrollIntoView({ behavior: "smooth", block: "start" });
        showTemporaryMessage(`✨ Loaded ${freshQuestions.length} random questions from pool!`, 1500);
    }

    function handleReset() {
        if (currentQuestions.length === 0) {
            // if empty, fetch default 5 questions
            handleFetch();
            return;
        }
        // reset current session without refetching (preserve same question set but clear answers)
        const sameQuestions = [...currentQuestions];
        userAnswers = new Array(sameQuestions.length).fill("");
        currentIndex = 0;
        quizSubmitted = false;
        resultPanel.style.display = "none";
        resultPanel.innerHTML = "";
        renderCurrentQuestion();
        showTemporaryMessage("🔄 Session reset. All answers cleared. You can reattempt same set.", 1200);
    }

    // init event listeners
    function bindEvents() {
        fetchBtn.addEventListener("click", handleFetch);
        resetBtn.addEventListener("click", handleReset);
        prevBtn.addEventListener("click", goPrev);
        nextBtn.addEventListener("click", goNext);
        submitQuizBtn.addEventListener("click", submitQuiz);
    }

    // initial load: default fetch 5 questions on page load
    function init() {
        updatePoolDisplay();
        bindEvents();
        // default fetch 5 random questions from pool as initial state
        const defaultQuestions = fetchRandomQuestions(5);
        resetSessionState(defaultQuestions);
        renderCurrentQuestion();
    }

    init();
</script>
</body>
</html>
