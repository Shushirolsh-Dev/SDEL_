<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sdel | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #000;
            color: #fff;
            padding-bottom: 70px;
        }
        
        /* Light mode */
        body.light-mode {
            background-color: #fff;
            color: #000;
        }
        
        body.light-mode nav,
        body.light-mode .bottom-nav {
            background: rgba(255,255,255,0.98);
            border-color: #e5e5e5;
        }
        
        body.light-mode .post-card {
            background: #fff;
            border-bottom-color: #efefef;
        }
        
        body.light-mode .post-card .text-zinc-200 {
            color: #1a1a1a;
        }
        
        body.light-mode .action-btn:active {
            background: rgba(0,0,0,0.05);
        }
        
        body.light-mode .tab-btn {
            color: #000;
        }
        
        body.light-mode .tab-active {
            color: #FF6600;
        }
        
        body.light-mode .mention-link {
            color: #FF6600;
        }
        
        /* Post Card */
        .post-card {
            background: #0a0a0a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: background 0.15s;
            padding: 16px;
            cursor: pointer;
        }
        
        .post-card:hover {
            background: rgba(255,255,255,0.03);
        }
        
        /* Like Button */
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: all 0.15s ease;
            background: transparent;
            cursor: pointer;
            min-width: 52px;
        }
        
        .like-btn i {
            width: 20px;
            height: 20px;
            transition: transform 0.12s cubic-bezier(0.34, 1.2, 0.64, 1);
            flex-shrink: 0;
        }
        
        .like-btn:active i {
            transform: scale(1.2);
        }
        
        .like-btn.liked i {
            color: #FF6600;
            fill: #FF6600;
        }
        
        .like-btn span {
            font-size: 13px;
            font-weight: 600;
            min-width: 28px;
            color: #71717a;
        }
        
        .like-btn.liked span {
            color: #FF6600;
        }
        
        /* Action buttons */
        .action-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 40px;
            transition: background 0.15s;
            cursor: pointer;
            background: transparent;
        }
        
        .action-btn:active {
            background: rgba(255,255,255,0.05);
        }
        
        .action-btn i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: #71717a;
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
            color: #71717a;
        }
        
        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 0;
        }
        
        .tab-btn {
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 12px 24px;
        }
        
        .tab-active {
            color: #FF6600;
            border-bottom: 2px solid #FF6600;
            opacity: 1;
        }
        
        /* Feed Container */
        .feed-container {
            height: calc(100vh - 120px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .feed-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .feed-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .feed-container::-webkit-scrollbar-thumb {
            background: #FF6600;
            border-radius: 10px;
        }
        
        /* Post Image */
        .post-image {
            border-radius: 16px;
            max-height: 300px;
            width: 100%;
            object-fit: cover;
            margin-top: 12px;
            cursor: pointer;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: #111;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            border: 1px solid #222;
        }
        
        body.light-mode .modal-content {
            background: #fff;
            border-color: #e5e5e5;
        }
        
        body.light-mode .modal-content textarea {
            background: #f5f5f5 !important;
            color: #000 !important;
            border-color: #e5e5e5 !important;
        }
        
        /* Action Sheet */
        .action-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            z-index: 3000;
            padding: 20px;
            border-top: 1px solid #222;
        }
        
        .action-sheet.open {
            transform: translateY(0);
        }
        
        body.light-mode .action-sheet {
            background: #fff;
            border-top-color: #e5e5e5;
        }
        
        /* Bottom Nav - Same as Dashboard */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        
        .bottom-nav-inner {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: opacity 0.15s;
            padding: 4px 12px;
        }
        
        .bottom-nav-item:active {
            opacity: 0.6;
        }
        
        .mention-link {
            color: #FF6600;
            font-weight: 600;
            text-decoration: none;
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #FF6600;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- Header -->
<nav class="sticky top-0 bg-black/95 backdrop-blur-xl border-b border-white/10 z-50">
    <div class="px-4 py-3 flex items-center justify-between">
        <h1 class="text-xl font-black tracking-tight">
            sdel<span class="text-[#FF6600]">.</span>
        </h1>
        <div class="flex items-center gap-4">
            <i data-lucide="sun" size="20" onclick="toggleTheme()" style="cursor: pointer;"></i>
            <i data-lucide="search" size="20" onclick="toggleSearch()" style="cursor: pointer;"></i>
            <i data-lucide="bell" size="20" onclick="location.href='messages.html'" style="cursor: pointer;"></i>
        </div>
    </div>
    
    <!-- Search Bar -->
    <div id="search-bar" class="px-4 pb-3 hidden">
        <div class="bg-[#111] rounded-full px-4 py-2 flex items-center gap-3 border border-white/10">
            <i data-lucide="search" size="18" class="text-zinc-500"></i>
            <input type="text" id="search-input" placeholder="Search users or posts..." class="bg-transparent flex-1 outline-none text-sm" oninput="handleSearch(this.value)">
            <i data-lucide="x" size="18" class="text-zinc-500 cursor-pointer" onclick="toggleSearch()"></i>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs-container">
        <button id="tab-campus" onclick="switchTab('campus')" class="tab-btn tab-active">CAMPUS</button>
        <button id="tab-universe" onclick="switchTab('universe')" class="tab-btn">UNIVERSE</button>
    </div>
</nav>

<!-- Feed Container -->
<div id="feed-container" class="feed-container">
    <div id="feed-content"></div>
</div>

<!-- Bottom Navigation - Same as Dashboard (No Center Button) -->
<div class="bottom-nav">
    <div class="bottom-nav-inner">
        <div class="bottom-nav-item" onclick="location.href='dashboard.html'">
            <i data-lucide="home" size="22" class="text-zinc-500"></i>
        </div>
        <div class="bottom-nav-item" onclick="location.href='explore.html'">
            <i data-lucide="compass" size="22" class="text-[#FF6600]"></i>
        </div>
        <div class="bottom-nav-item" onclick="openPostModal()">
            <i data-lucide="plus" size="22" class="text-sdel"></i>
        </div>
        <div class="bottom-nav-item" onclick="location.href='market.html'">
            <i data-lucide="shopping-cart" size="22" class="text-zinc-500"></i>
        </div>
        <div class="bottom-nav-item" onclick="location.href='profile.html'">
            <i data-lucide="user" size="22" class="text-zinc-500"></i>
        </div>
    </div>
</div>

<!-- Post Modal -->
<div id="post-modal" class="modal-overlay" onclick="closePostModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg" id="post-modal-title">Create post</h3>
            <i data-lucide="x" size="20" onclick="closePostModal()" style="cursor: pointer;"></i>
        </div>
        <textarea id="modal-post-input" placeholder="What's happening?" class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none resize-none min-h-[120px] text-sm"></textarea>
        
        <!-- Image Upload -->
        <div class="mt-3">
            <input type="file" id="post-image-input" accept="image/*" class="hidden" onchange="previewImage()">
            <button onclick="document.getElementById('post-image-input').click()" class="text-sdel text-sm font-medium flex items-center gap-2">
                <i data-lucide="image" size="18"></i> Add image
            </button>
            <div id="image-preview-container" class="mt-2 hidden relative">
                <img id="image-preview" class="rounded-xl max-h-48 w-full object-cover">
                <button onclick="removeImage()" class="absolute top-2 right-2 bg-black/70 rounded-full p-1">
                    <i data-lucide="x" size="14" class="text-white"></i>
                </button>
            </div>
        </div>
        
        <div class="flex gap-3 mt-4">
            <button onclick="closePostModal()" class="flex-1 py-2.5 rounded-full border border-white/10 font-medium text-sm">Cancel</button>
            <button id="modal-post-btn" onclick="submitPost()" class="flex-1 py-2.5 rounded-full bg-[#FF6600] text-black font-bold text-sm">Post</button>
        </div>
    </div>
</div>

<!-- Image Preview Modal -->
<div id="image-modal" class="modal-overlay" onclick="closeImageModal()">
    <div class="flex items-center justify-center w-full h-full" onclick="event.stopPropagation()">
        <img id="fullscreen-image" class="max-w-full max-h-full rounded-2xl">
        <button onclick="closeImageModal()" class="absolute top-5 right-5 bg-black/50 rounded-full p-2">
            <i data-lucide="x" size="24" class="text-white"></i>
        </button>
    </div>
</div>

<!-- Action Sheet -->
<div id="action-sheet" class="action-sheet" onclick="event.stopPropagation()">
    <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-5"></div>
    <div id="action-options" class="space-y-2"></div>
    <button onclick="closeActionSheet()" class="w-full mt-3 py-3 text-zinc-500 font-medium text-sm">Cancel</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://lgfyrlfjoazedwymjpfc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
);

let currentUser = null;
let currentTab = 'campus';
let campusPosts = [];
let universePosts = [];
let likedPosts = new Set();
let repostedPosts = new Set();
let isLoading = false;
let hasMore = true;
let page = 0;
let searchQuery = '';
let currentEditPostId = null;
let selectedImageFile = null;

const feedContent = document.getElementById('feed-content');

function formatNumber(num) {
    if (!num) return '0';
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return `${seconds}s`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d`;
    return new Date(date).toLocaleDateString();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatContent(text) {
    if (!text) return '';
    let formatted = escapeHtml(text);
    formatted = formatted.replace(/@(\w+)/g, '<span class="mention-link">@$1</span>');
    formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="#" onclick="event.stopPropagation(); window.open(\'$1\', \'_blank\')" class="mention-link">$1</a>');
    return formatted;
}

async function getCurrentUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'login.html';
        return null;
    }
    const { data: profile } = await supabase.from('profile').select('*').eq('id', session.user.id).single();
    if (profile?.is_banned) {
        window.location.href = 'banned.html';
        return null;
    }
    return profile;
}

async function loadPosts(reset = false) {
    if (isLoading) return;
    
    if (reset) {
        page = 0;
        if (currentTab === 'campus') campusPosts = [];
        else universePosts = [];
        hasMore = true;
    }
    
    if (!hasMore) return;
    
    isLoading = true;
    page++;
    
    try {
        let query = supabase
            .from('posts')
            .select('*, profile:user_id(username, is_verified, is_official, school_name, avatar_url)')
            .eq('post_type', 'post')
            .order('created_at', { ascending: false })
            .range((page - 1) * 15, page * 15 - 1);
        
        if (currentTab === 'campus' && currentUser?.school_name) {
            query = query.eq('school_name', currentUser.school_name);
        }
        
        if (searchQuery) {
            query = query.ilike('content', `%${searchQuery}%`);
        }
        
        const { data: newPosts, error } = await query;
        
        if (error) throw error;
        
        if (!newPosts || newPosts.length === 0) {
            hasMore = false;
            isLoading = false;
            renderFeed();
            return;
        }
        
        if (currentUser) {
            const { data: likes } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'like');
            likedPosts = new Set(likes?.map(l => l.post_id) || []);
            
            const { data: reposts } = await supabase
                .from('interactions')
                .select('post_id')
                .eq('user_id', currentUser.id)
                .eq('interaction_type', 'repost');
            repostedPosts = new Set(reposts?.map(r => r.post_id) || []);
        }
        
        if (currentTab === 'campus') campusPosts = [...campusPosts, ...newPosts];
        else universePosts = [...universePosts, ...newPosts];
        
        renderFeed();
        
    } catch (error) {
        console.error(error);
    }
    
    isLoading = false;
}

function openImageModal(imageUrl) {
    const modal = document.getElementById('image-modal');
    const fullImg = document.getElementById('fullscreen-image');
    fullImg.src = imageUrl;
    modal.style.display = 'flex';
}

function closeImageModal() {
    document.getElementById('image-modal').style.display = 'none';
}

function renderFeed() {
    const posts = currentTab === 'campus' ? campusPosts : universePosts;
    
    if (posts.length === 0 && !isLoading) {
        feedContent.innerHTML = `
            <div class="flex flex-col items-center justify-center h-80 px-6 text-center">
                <i data-lucide="inbox" size="48" class="text-zinc-700 mb-3"></i>
                <p class="text-zinc-500 text-sm">No posts yet</p>
                <button onclick="openPostModal()" class="mt-4 px-5 py-2 bg-[#FF6600] text-black rounded-full font-bold text-sm">Create first post</button>
            </div>
        `;
        lucide.createIcons();
        return;
    }
    
    feedContent.innerHTML = posts.map(post => {
        const profile = post.profile;
        const username = profile?.username || 'anon';
        const isLiked = likedPosts.has(post.id);
        const hasReposted = repostedPosts.has(post.id);
        
        let badge = '';
        if (profile?.is_official) {
            badge = '<span class="bg-[#FF6600] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        } else if (profile?.is_verified) {
            badge = '<span class="bg-[#1da1f2] rounded-full w-4 h-4 inline-flex items-center justify-center ml-1"><i data-lucide="check" size="10" class="text-white"></i></span>';
        }
        
        const schoolTag = (currentTab === 'universe' && post.school_name) ? 
            `<span class="text-[10px] text-zinc-500 ml-2">🏛️ ${escapeHtml(post.school_name)}</span>` : '';
        
        const imageHtml = post.image_url ? 
            `<img src="${post.image_url}" class="post-image" onclick="event.stopPropagation(); openImageModal('${post.image_url}')">` : '';
        
        return `
            <div class="post-card" data-post-id="${post.id}" ondblclick="handleLike('${post.id}')">
                <div class="flex gap-3">
                    <div onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                         class="w-11 h-11 rounded-full bg-gradient-to-br from-[#FF6600] to-[#FF9940] flex items-center justify-center text-white font-bold text-base cursor-pointer flex-shrink-0">
                        ${username.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center flex-wrap gap-1 mb-1">
                            <span onclick="event.stopPropagation(); location.href='profile.html?u=${username}'" 
                                  class="font-bold text-sm cursor-pointer hover:underline">${escapeHtml(username)}</span>
                            ${badge}
                            <span class="text-xs text-zinc-500">${timeAgo(post.created_at)}</span>
                            ${schoolTag}
                        </div>
                        <div class="text-sm text-zinc-200 leading-relaxed break-words">
                            ${formatContent(post.content)}
                        </div>
                        ${imageHtml}
                        <div class="action-buttons">
                            <button onclick="event.stopPropagation(); handleLike('${post.id}')" 
                                    class="action-btn like-btn ${isLiked ? 'liked' : ''}">
                                <i data-lucide="heart" size="18" ${isLiked ? 'fill="#FF6600"' : ''}></i>
                                <span>${formatNumber(post.likes_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); location.href='gist.html?id=${post.id}'" 
                                    class="action-btn">
                                <i data-lucide="message-circle" size="18"></i>
                                <span>${formatNumber(post.comments_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleRepost('${post.id}', '${username}')" 
                                    class="action-btn ${hasReposted ? 'opacity-50' : ''}">
                                <i data-lucide="repeat" size="18"></i>
                                <span>${formatNumber(post.reposts_count)}</span>
                            </button>
                            <button onclick="event.stopPropagation(); handleShare('${post.id}', '${username}')" 
                                    class="action-btn">
                                <i data-lucide="share-2" size="18"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    lucide.createIcons();
    
    // Infinite scroll
    if (hasMore && !isLoading) {
        const sentinel = document.createElement('div');
        sentinel.className = 'loading-spinner';
        feedContent.appendChild(sentinel);
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && hasMore && !isLoading) {
                observer.disconnect();
                loadPosts();
            }
        });
        observer.observe(sentinel);
    }
}

async function handleLike(postId) {
    const isLiked = likedPosts.has(postId);
    
    if (isLiked) {
        likedPosts.delete(postId);
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
    } else {
        likedPosts.add(postId);
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.likes_count = (post.likes_count || 0) + 1;
    }
    
    renderFeed();
    
    if (isLiked) {
        await supabase.from('interactions').delete().eq('user_id', currentUser.id).eq('post_id', postId).eq('interaction_type', 'like');
        await supabase.rpc('decrement_stat', { post_id: postId, field: 'likes_count' });
    } else {
        await supabase.from('interactions').upsert({ user_id: currentUser.id, post_id: postId, interaction_type: 'like' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'likes_count' });
    }
}

async function handleRepost(postId, username) {
    if (username === currentUser?.username) return;
    if (repostedPosts.has(postId)) return;
    
    const originalPost = campusPosts.find(p => p.id === postId) || universePosts.find(p => p.id === postId);
    if (!originalPost) return;
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: `Reposted from @${username}: ${originalPost.content.substring(0, 100)}`,
        school_name: currentUser.school_name || 'Global',
        post_type: 'repost'
    });
    
    if (!error) {
        await supabase.from('interactions').insert({ user_id: currentUser.id, post_id: postId, interaction_type: 'repost' });
        await supabase.rpc('increment_stat', { post_id: postId, field: 'reposts_count' });
        repostedPosts.add(postId);
        
        let post = campusPosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        post = universePosts.find(p => p.id === postId);
        if (post) post.reposts_count = (post.reposts_count || 0) + 1;
        
        renderFeed();
    }
}

async function handleShare(postId, username) {
    const url = `${window.location.origin}/gist.html?id=${postId}`;
    if (navigator.share) {
        try {
            await navigator.share({ title: 'Sdel', text: `@${username}`, url });
        } catch(e) { copyToClipboard(url); }
    } else {
        copyToClipboard(url);
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    showToast('Link copied!');
}

function showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(100px);background:#FF6600;color:black;padding:10px 20px;border-radius:30px;font-weight:700;font-size:12px;z-index:9999;transition:transform .3s';
        document.body.appendChild(toast);
    }
    toast.innerText = msg;
    setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(0)', 10);
    setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(100px)', 2000);
}

function openPostModal(editPost = null) {
    const modal = document.getElementById('post-modal');
    const input = document.getElementById('modal-post-input');
    const title = document.getElementById('post-modal-title');
    const btn = document.getElementById('modal-post-btn');
    
    if (editPost) {
        currentEditPostId = editPost.id;
        title.innerText = 'Edit post';
        input.value = editPost.content;
        btn.innerText = 'Update';
    } else {
        currentEditPostId = null;
        title.innerText = 'Create post';
        input.value = '';
        btn.innerText = 'Post';
    }
    
    modal.style.display = 'flex';
    input.focus();
}

function closePostModal() {
    document.getElementById('post-modal').style.display = 'none';
    currentEditPostId = null;
    removeImage();
}

function previewImage() {
    const file = document.getElementById('post-image-input').files[0];
    if (file) {
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('image-preview');
            const container = document.getElementById('image-preview-container');
            preview.src = e.target.result;
            container.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
}

function removeImage() {
    selectedImageFile = null;
    document.getElementById('post-image-input').value = '';
    document.getElementById('image-preview-container').classList.add('hidden');
}

async function submitPost() {
    const content = document.getElementById('modal-post-input').value.trim();
    if (!content && !selectedImageFile) return;
    
    let imageUrl = null;
    
    if (selectedImageFile) {
        const fileName = `${currentUser.id}/${Date.now()}.jpg`;
        const { data, error } = await supabase.storage
            .from('post-images')
            .upload(fileName, selectedImageFile);
        
        if (!error) {
            imageUrl = supabase.storage.from('post-images').getPublicUrl(fileName).data.publicUrl;
        }
    }
    
    if (currentEditPostId) {
        const { error } = await supabase.from('posts').update({ content, image_url: imageUrl }).eq('id', currentEditPostId);
        if (!error) {
            closePostModal();
            loadPosts(true);
        }
        return;
    }
    
    const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id,
        content: content,
        image_url: imageUrl,
        school_name: currentUser.school_name || 'Global',
        post_type: 'post'
    });
    
    if (!error) {
        closePostModal();
        loadPosts(true);
    }
}

function switchTab(tab) {
    if (tab === currentTab) return;
    currentTab = tab;
    page = 0;
    hasMore = true;
    
    const campusTab = document.getElementById('tab-campus');
    const universeTab = document.getElementById('tab-universe');
    
    if (tab === 'campus') {
        campusTab.classList.add('tab-active');
        universeTab.classList.remove('tab-active');
    } else {
        universeTab.classList.add('tab-active');
        campusTab.classList.remove('tab-active');
    }
    
    renderFeed();
    loadPosts(true);
}

function toggleSearch() {
    const bar = document.getElementById('search-bar');
    bar.classList.toggle('hidden');
    if (!bar.classList.contains('hidden')) {
        document.getElementById('search-input').focus();
    } else {
        searchQuery = '';
        loadPosts(true);
    }
}

function handleSearch(val) {
    searchQuery = val;
    loadPosts(true);
}

function toggleTheme() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
}

async function init() {
    currentUser = await getCurrentUser();
    if (!currentUser) return;
    
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    
    await loadPosts();
    
    supabase.channel('posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
        loadPosts(true);
    }).subscribe();
}

// Make functions global
window.openPostModal = openPostModal;
window.closePostModal = closePostModal;
window.submitPost = submitPost;
window.switchTab = switchTab;
window.toggleSearch = toggleSearch;
window.handleSearch = handleSearch;
window.toggleTheme = toggleTheme;
window.handleLike = handleLike;
window.handleRepost = handleRepost;
window.handleShare = handleShare;
window.openImageModal = openImageModal;
window.closeImageModal = closeImageModal;

init();
</script>
