<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - THESDEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-style: normal !important;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #000;
            color: white;
            margin: 0;
            min-height: 100vh;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
        .forgot-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 420px;
            width: 90%;
            margin: 20px auto;
        }
        .btn-orange {
            background: #FF6600;
            color: black;
            font-weight: 900;
            padding: 16px;
            border-radius: 40px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-orange:hover:not(:disabled) {
            background: #ff7722;
            transform: scale(0.98);
        }
        .btn-orange:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        input {
            background: #161616;
            border: 1px solid #333;
            border-radius: 0px;
            padding: 16px;
            width: 100%;
            color: white;
            outline: none;
        }
        input:focus {
            border-color: #FF6600;
        }
        .funny-message {
            background: #1a1a1a;
            border-left: 4px solid #FF6600;
            padding: 24px;
            border-radius: 0px;
            margin-top: 24px;
            font-size: 14px;
            line-height: 1.6;
        }
        .hidden {
            display: none;
        }
        .back-link {
            font-size: 10px;
            font-weight: 900;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link:hover {
            color: #FF6600;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="stars" id="star-field"></div>
    
    <div class="forgot-card">
        <a href="signup.html" class="back-link">← BACK</a>
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black uppercase tracking-wider">
                <span class="text-white">FORGOT</span>
                <span class="text-[#FF6600]"> PASSWORD?</span>
            </h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-2">WE'LL TRY TO HELP</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[11px] font-black uppercase text-gray-400 block mb-2">Email Address</label>
                <input type="email" id="reset-email" placeholder="you@example.com">
            </div>
            
            <button onclick="attemptReset()" id="reset-btn" class="btn-orange">Reset Password</button>
        </div>

        <div id="message-area" class="hidden"></div>
    </div>

    <script>
        // Starfield
        const starField = document.getElementById('star-field');
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 20 + 20) + 's';
            star.style.animationDelay = (Math.random() * 10) + 's';
            starField.appendChild(star);
        }

        window.attemptReset = function() {
            const email = document.getElementById('reset-email').value;
            const btn = document.getElementById('reset-btn');
            const messageArea = document.getElementById('message-area');
            
            if (!email) {
                const simpleMsg = document.createElement('div');
                simpleMsg.className = 'funny-message';
                simpleMsg.innerHTML = `<span style="color: #FF6600; font-weight: bold;">→</span> Type your email address first.`;
                messageArea.innerHTML = '';
                messageArea.appendChild(simpleMsg);
                messageArea.classList.remove('hidden');
                return;
            }
            
            btn.disabled = true;
            btn.innerText = "Checking...";
            
            setTimeout(() => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'funny-message';
                msgDiv.innerHTML = `
                    <div style="margin-bottom: 16px;">
                        <span style="color: #FF6600; font-weight: bold;">→</span> Forgot your password? Incredible. Truly a groundbreaking achievement.
                    </div>
                    <div style="margin-bottom: 16px;">
                        Your account will be deleted after 30 days of inactivity, so go ahead and create a new one.
                    </div>
                    <div>
                        And this time, write your password down somewhere safe. Maybe not your brain. That system appears to be under maintenance.
                    </div>
                    <div style="margin-top: 20px;">
                        <button onclick="redirectToSignup()" style="background: #FF6600; color: black; font-weight: 900; padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-size: 12px; text-transform: uppercase; width: 100%;">Create New Account</button>
                    </div>
                `;
                
                messageArea.innerHTML = '';
                messageArea.appendChild(msgDiv);
                messageArea.classList.remove('hidden');
                
                btn.innerText = "Reset Password";
                btn.disabled = false;
                
                msgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 500);
        };
        
        window.redirectToSignup = function() {
            window.location.href = 'signup.html';
        };
    </script>
</body>
</html>
