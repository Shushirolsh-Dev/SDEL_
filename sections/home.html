<!-- Home page for Class Rep -->
<div id="repView" class="hidden">
    <div class="glass-panel p-6 rounded-3xl mb-6 border-l-4 border-orange-600">
        <div class="flex justify-between items-start flex-wrap gap-4 mb-4">
            <div>
                <h2 class="text-2xl font-black" id="repClassName"></h2>
                <div class="flex items-start gap-2 mt-1">
                    <p class="text-gray-400 text-sm" id="repClassDesc"></p>
                    <button onclick="openDescriptionModal()" class="text-xs text-orange-500"><i class="fas fa-edit"></i></button>
                </div>
            </div>
            <div class="flex gap-2">
                <code class="text-xs bg-black/50 px-2 py-1 rounded font-mono text-orange-500" id="repClassCode"></code>
                <button onclick="openRenameModal()" class="text-xs bg-white/10 px-2 py-1 rounded hover:bg-white/20"><i class="fas fa-edit"></i></button>
            </div>
        </div>
        <div class="flex gap-2 mb-3">
            <button onclick="openMembersModal()" class="flex-1 glass-panel py-2 rounded-xl text-sm"><i class="fas fa-users"></i> Manage Members</button>
            <button onclick="openAnnouncementModal()" class="flex-1 bg-orange-600 text-white font-bold py-2 rounded-xl text-sm"><i class="fas fa-bullhorn"></i> Announce</button>
        </div>
        <button onclick="shareInviteLink()" class="w-full glass-panel py-2 rounded-xl text-sm"><i class="fas fa-share-alt"></i> Share Invite Link</button>
    </div>
    <div id="announcementsCarousel" class="glass-panel p-4 rounded-3xl mb-6"></div>
    <div class="glass-panel p-6 rounded-3xl">
        <h3 class="font-bold mb-3"><i class="fas fa-history text-orange-500"></i> Past Announcements</h3>
        <div id="pastAnnouncementsList" class="space-y-3 max-h-64 overflow-y-auto"></div>
    </div>
</div>

<!-- Home page for Member -->
<div id="memberView" class="hidden">
    <div class="glass-panel p-6 rounded-3xl mb-6 border-l-4 border-green-500">
        <div class="flex justify-between items-start">
            <div>
                <h2 class="text-2xl font-black" id="memberClassName"></h2>
                <p class="text-gray-400 text-sm mt-1" id="memberClassDesc"></p>
                <div class="flex gap-2 mt-2">
                    <span class="text-xs bg-green-500/20 text-green-500 px-2 py-1 rounded-full"><i class="fas fa-user-check"></i> Member</span>
                </div>
            </div>
            <button onclick="leaveClass()" class="text-xs bg-red-500/20 text-red-500 px-3 py-1 rounded-full"><i class="fas fa-sign-out-alt"></i> Leave Class</button>
        </div>
    </div>
    <div class="glass-panel p-6 rounded-3xl mb-6">
        <h3 class="font-bold mb-3">Today's Lectures</h3>
        <div id="lecturesList" class="space-y-3"></div>
    </div>
    <div id="announcementsCarouselMember" class="glass-panel p-4 rounded-3xl mb-6"></div>
    <div class="glass-panel p-6 rounded-3xl">
        <h3 class="font-bold mb-3">Past Announcements</h3>
        <div id="pastAnnouncementsListMember" class="space-y-3 max-h-64 overflow-y-auto"></div>
    </div>
</div>

<!-- Home page for No Class -->
<div id="noClassView" class="glass-panel p-8 rounded-3xl text-center">
    <div class="w-20 h-20 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-graduation-cap text-3xl text-orange-500"></i>
    </div>
    <h2 class="text-2xl font-black mb-2">Join a Class or Create One</h2>
    <p class="text-gray-400 mb-6">Get started by joining an existing class or creating your own.</p>
    <div class="grid grid-cols-2 gap-4">
        <button onclick="showJoinModal()" class="bg-blue-600 py-3 rounded-xl font-bold">Join Class</button>
        <button onclick="showCreateModal()" class="bg-orange-600 py-3 rounded-xl font-bold">Create Class</button>
    </div>
</div>
