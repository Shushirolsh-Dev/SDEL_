<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THSDEL Login | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        /* Reset & base styling - NO ITALICS anywhere */
        * { 
            font-style: normal !important; 
        }
        body { 
            background: #000000; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            overflow: hidden;
            font-style: normal;
        }
        .stars { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            pointer-events: none; 
        }
        .star { 
            position: absolute; 
            background: white; 
            border-radius: 50%; 
            animation: fall linear infinite; 
        }
        
        @keyframes fall { 
            0% { transform: translateY(-10vh); opacity: 0; } 
            10% { opacity: 1; } 
            90% { opacity: 1; } 
            100% { transform: translateY(110vh); opacity: 0; } 
        }
        
        .login-card { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            border-radius: 24px; 
            padding: 40px; 
            width: 90%; 
            max-width: 400px; 
            position: relative; 
            z-index: 10; 
            backdrop-filter: blur(2px);
        }
        .sdel-input { 
            background: #161616; 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 16px; 
            width: 100%; 
            color: white; 
            outline: none; 
            font-weight: 500;
            font-style: normal;
        }
        .sdel-input:focus {
            border-color: #FF6600;
            box-shadow: 0 0 0 2px rgba(255,102,0,0.2);
        }
        .btn-orange { 
            background: #FF6600; 
            color: black; 
            font-weight: 900; 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            font-style: normal;
        }
        .btn-orange:hover:not(:disabled) {
            background: #ff7722;
            transform: scale(0.98);
        }
        .btn-orange:disabled { 
            background: #555; 
            cursor: not-allowed; 
        }
        .eye-box { 
            position: absolute; 
            right: 10px; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            z-index: 100; 
            padding: 10px; 
        }
        .hidden { 
            display: none !important; 
        }
        /* Override any potential italic elements */
        h1, h2, h3, p, span, a, button, input, div {
            font-style: normal;
        }
        .sdel-logo-text {
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        .subtext-clean {
            font-size: 10px;
            font-weight: bold;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-style: normal;
        }
        a {
            transition: color 0.2s;
            font-style: normal;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="stars" id="star-field"></div>

    <a href="index.html" class="absolute top-8 left-8 text-[10px] font-black text-gray-500 hover:text-white uppercase tracking-[0.3em] transition no-italic">← BACK</a>

    <div class="login-card">
        <div class="text-center mb-8">
            <!-- LOGIN TO YOUR CLASS ACCOUNT - removed italics, plain text -->
            <!-- Special THSDEL split: T white, HESDEL orange, LOGIN all white as per requirement -->
            <div class="mb-2">
                <h1 class="text-3xl font-black uppercase tracking-tighter sdel-logo-text">
                    <span class="text-white">T</span><span class="text-[#FF6600]">HESDEL</span>
                </h1>
            </div>
            <!-- "LOGIN" text as white, no italics -->
            <div class="text-white font-black text-xl uppercase tracking-widest mt-1">LOGIN</div>
            <!-- Subline modified to "LOGIN TO YOUR CLASS ACCOUNT" (no italics) -->
            <p class="subtext-clean mt-3">LOGIN TO YOUR CLASS ACCOUNT</p>
        </div>
        
        <div id="err" class="hidden p-3 mb-4 rounded bg-red-900/20 text-red-500 border border-red-500/30 text-xs font-bold text-center uppercase"></div>

        <div class="space-y-4">
            <input type="text" id="identifier" placeholder="EMAIL OR USERNAME" class="sdel-input" oninput="this.value = this.value.toLowerCase()">

            <div class="relative">
                <input type="password" id="pass" placeholder="PASSWORD" class="sdel-input pr-12">
                <div class="eye-box" onclick="toggleView()">
                    <svg id="on" class="w-5 h-5 stroke-current text-gray-500" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="off" class="w-5 h-5 stroke-current text-gray-500 hidden" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </div>
            </div>

            <button onclick="startLogin()" id="l-btn" class="btn-orange">LOG IN</button>

            <div class="flex justify-between items-center mt-4">
                <a href="forgot-password.html" class="text-[10px] font-bold text-gray-500 hover:text-[#FF6600] uppercase tracking-tighter">FORGOT PASSWORD?</a>
                <a href="signup.html" class="text-[10px] font-bold text-[#FF6600] hover:underline uppercase tracking-tighter">CREATE ACCOUNT</a>
            </div>
        </div>
    </div>

    <script>
        // Star field animation - creates immersive background
        const starField = document.getElementById('star-field');
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = (Math.random() * 20 + 25) + 's'; 
            star.style.animationDelay = (Math.random() * 10) + 's';
            starField.appendChild(star);
        }

        // Supabase client config (using existing credentials)
        const supabaseClient = window.supabase.createClient(
            'https://lgfyrlfjoazedwymjpfc.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
        );

        // Toggle password visibility
        function toggleView() {
            const passwordField = document.getElementById('pass');
            const eyeOnIcon = document.getElementById('on');
            const eyeOffIcon = document.getElementById('off');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeOnIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordField.type = 'password';
                eyeOnIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }

        // Show error message with uppercase styling
        function displayError(message) {
            const errorDiv = document.getElementById('err');
            errorDiv.innerText = message.toUpperCase();
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 4000);
        }

        // Main login function with username resolution and security checks
        async function startLogin() {
            const identifierInput = document.getElementById('identifier').value.trim();
            const passwordInput = document.getElementById('pass').value;
            const loginButton = document.getElementById('l-btn');

            if (!identifierInput || !passwordInput) {
                displayError("ENTER ALL DETAILS");
                return;
            }

            loginButton.innerText = "VERIFYING...";
            loginButton.disabled = true;

            let resolvedEmail = identifierInput;

            // 1. If input is username (no '@'), resolve to email from profile table
            if (!identifierInput.includes('@')) {
                const { data: profileData, error: usernameLookupError } = await supabaseClient
                    .from('profile')
                    .select('email')
                    .eq('username', identifierInput)
                    .single();
                
                if (usernameLookupError || !profileData || !profileData.email) {
                    loginButton.innerText = "LOG IN";
                    loginButton.disabled = false;
                    displayError("USERNAME NOT FOUND");
                    return;
                }
                resolvedEmail = profileData.email;
            }

            // 2. Attempt sign in with Supabase Auth
            const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
                email: resolvedEmail,
                password: passwordInput
            });

            if (signInError || !signInData.user) {
                let errorMsg = signInError?.message || "INVALID CREDENTIALS";
                if (errorMsg.toLowerCase().includes("invalid login credentials")) errorMsg = "INCORRECT EMAIL OR PASSWORD";
                displayError(errorMsg);
                loginButton.innerText = "LOG IN";
                loginButton.disabled = false;
                return;
            }

            const currentUser = signInData.user;

            // 3. Aggressive security & ban/suspension check from profile
            const { data: profileRecord, error: profileFetchError } = await supabaseClient
                .from('profile')
                .select('account_status, is_banned')
                .eq('id', currentUser.id)
                .single();

            if (profileFetchError || !profileRecord) {
                // Sign out immediately if profile inconsistent
                await supabaseClient.auth.signOut();
                displayError("PROFILE ERROR - CONTACT SUPPORT");
                loginButton.innerText = "LOG IN";
                loginButton.disabled = false;
                return;
            }

            // Check banned flag (strict)
            if (profileRecord.is_banned === true) {
                await supabaseClient.auth.signOut();
                // Redirect to banned page without preserving history
                window.location.replace('banned.html');
                return;
            }

            // Check account suspension status
            if (profileRecord.account_status === 'suspended') {
                await supabaseClient.auth.signOut();
                window.location.replace('suspended.html');
                return;
            }

            // 4. Success - navigate to dashboard
            window.location.replace('dashboard.html');
        }

        // Optional: Additional style to ensure no stray italics from browser or tailwind
        document.querySelectorAll('*').forEach(el => {
            if (el.style.fontStyle === 'italic') el.style.fontStyle = 'normal';
        });
    </script>
</body>
</html>
