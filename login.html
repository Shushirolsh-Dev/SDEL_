<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THSDEL Login | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET: NO ITALICS ANYWHERE ---------- */
        *,
        *::before,
        *::after {
            font-style: normal !important;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #000000;
            color: white;
            margin: 0;
            overflow: hidden;
            font-style: normal;
            font-weight: 400;
        }
        /* immersive starfield */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.8) 80%);
            border-radius: 50%;
            animation: fall linear infinite;
            box-shadow: 0 0 2px rgba(255,255,255,0.6);
        }
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* modern card */
        .login-card {
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 102, 0, 0.25);
            border-radius: 32px;
            padding: 38px 32px;
            width: 90%;
            max-width: 440px;
            transition: all 0.2s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8);
        }
        .sdel-input {
            background: #111111;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 16px 18px;
            width: 100%;
            color: #f0f0f0;
            outline: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        .sdel-input:focus {
            border-color: #FF6600;
            box-shadow: 0 0 0 3px rgba(255,102,0,0.25);
            background: #0c0c0c;
        }
        .btn-orange {
            background: #FF6600;
            color: black;
            font-weight: 900;
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255,102,0,0.2);
        }
        .btn-orange:hover:not(:disabled) {
            background: #ff7a1e;
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255,102,0,0.4);
        }
        .btn-orange:disabled {
            background: #4a4a4a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .eye-box {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            background: transparent;
            transition: all 0.1s;
        }
        .eye-box svg {
            width: 20px;
            height: 20px;
            stroke: #9ca3af;
            stroke-width: 1.8;
            fill: none;
        }
        .eye-box:hover svg {
            stroke: #FF6600;
        }
        .hidden {
            display: none !important;
        }
        /* remove any potential italic from tailwind or browser defaults */
        h1, h2, h3, p, span, a, button, input, div, label {
            font-style: normal;
        }
        /* back link */
        .back-link {
            position: absolute;
            top: 28px;
            left: 28px;
            font-size: 10px;
            font-weight: 800;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.2s;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 20;
        }
        .back-link:hover {
            color: #FF6600;
        }
        /* ---- SAME LINE LAYOUT: T + HESDEL + LOGIN on ONE LINE ---- */
        .brand-same-line {
            display: flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            row-gap: 4px;
            margin-bottom: 12px;
        }
        .th-sdel-group {
            display: inline-flex;
            align-items: baseline;
            gap: 0px;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        .th-sdel-group .th-sdel-text {
            font-size: 2.4rem;
            line-height: 1.2;
        }
        .text-white-th {
            color: white;
        }
        .text-orange-sdel {
            color: #FF6600;
        }
        .login-inline {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            color: white;
            margin-left: 6px;
            display: inline-block;
            text-transform: uppercase;
            background: none;
            line-height: 1.2;
        }
        /* Adjust for mobile: keep same line but maybe scale down slightly */
        @media (max-width: 480px) {
            .th-sdel-group .th-sdel-text {
                font-size: 1.8rem;
            }
            .login-inline {
                font-size: 1.7rem;
            }
            .brand-same-line {
                gap: 4px;
            }
            .login-card {
                padding: 30px 22px;
            }
        }
        /* secondary subline */
        .sub-caps {
            font-size: 10px;
            font-weight: 800;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 10px;
            text-align: center;
        }
        .error-message {
            background: rgba(220,38,38,0.15);
            border-left: 3px solid #ff4d4d;
            padding: 12px;
            border-radius: 16px;
            font-weight: 700;
        }
        a {
            text-decoration: none;
        }
        .forgot-link, .create-link {
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- star background -->
    <div class="stars" id="star-field"></div>

    <!-- back link -->
    <a href="index.html" class="back-link">← BACK</a>

    <!-- main login card -->
    <div class="login-card">
        <!-- ========== BRAND + LOGIN ON THE SAME LINE ========== -->
        <div class="brand-same-line">
            <!-- T+HESDEL without space, exactly like "THESDEL" but T white & HESDEL orange -->
            <div class="th-sdel-group">
                <span class="text-white-th th-sdel-text">T</span>
                <span class="text-orange-sdel th-sdel-text">HESDEL</span>
            </div>
            <!-- "LOGIN" immediately on the same line, no line break -->
            <span class="login-inline">LOGIN</span>
        </div>
        
        <!-- subtitle: "TO YOUR CLASS ACCOUNT" (clean & no italics) -->
        <div class="sub-caps">TO YOUR CLASS ACCOUNT</div>
        
        <!-- error container -->
        <div id="err" class="hidden mt-4 mb-3 p-3 rounded-xl bg-red-900/20 text-red-400 border border-red-500/40 text-xs font-black text-center uppercase tracking-wide"></div>

        <!-- form fields -->
        <div class="space-y-5 mt-6">
            <input type="text" id="identifier" placeholder="EMAIL OR USERNAME" class="sdel-input" autocomplete="username" oninput="this.value = this.value.toLowerCase()">

            <div class="relative">
                <input type="password" id="pass" placeholder="PASSWORD" class="sdel-input pr-14" autocomplete="current-password">
                <div class="eye-box" onclick="toggleView()">
                    <svg id="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg id="off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>

            <button onclick="startLogin()" id="l-btn" class="btn-orange">LOG IN</button>

            <div class="flex justify-between items-center mt-5">
                <a href="forgot-password.html" class="forgot-link text-gray-400 hover:text-[#FF6600] transition">FORGOT PASSWORD?</a>
                <a href="signup.html" class="create-link text-[#FF6600] hover:text-orange-400 transition">CREATE ACCOUNT</a>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // STARFIELD GENERATOR (immersive)
        // --------------------------------------------------------------
        const starContainer = document.getElementById('star-field');
        function generateStars() {
            starContainer.innerHTML = '';
            const starCount = 140;
            for(let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.5 + 0.8;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const duration = Math.random() * 18 + 15;
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = (Math.random() * 8) + 's';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                starContainer.appendChild(star);
            }
        }
        generateStars();
        
        // --------------------------------------------------------------
        // SUPABASE CLIENT (existing credentials, strict)
        // --------------------------------------------------------------
        const supabase = window.supabase.createClient(
            'https://lgfyrlfjoazedwymjpfc.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw'
        );
        
        // password visibility toggle
        window.toggleView = function() {
            const passField = document.getElementById('pass');
            const eyeOn = document.getElementById('on');
            const eyeOff = document.getElementById('off');
            if (passField.type === 'password') {
                passField.type = 'text';
                eyeOn.classList.add('hidden');
                eyeOff.classList.remove('hidden');
            } else {
                passField.type = 'password';
                eyeOn.classList.remove('hidden');
                eyeOff.classList.add('hidden');
            }
        };
        
        // display error uppercase style
        function displayError(msg) {
            const errDiv = document.getElementById('err');
            errDiv.innerText = msg.toUpperCase();
            errDiv.classList.remove('hidden');
            setTimeout(() => {
                errDiv.classList.add('hidden');
            }, 4500);
        }
        
        // main login function: resolve username -> email, auth, ban/suspension check
        window.startLogin = async function() {
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('pass').value;
            const loginBtn = document.getElementById('l-btn');
            const originalBtnText = "LOG IN";
            
            if (!identifier || !password) {
                displayError("ENTER ALL DETAILS");
                return;
            }
            
            // Disable button and show processing state
            loginBtn.innerText = "VERIFYING...";
            loginBtn.disabled = true;
            
            let resolvedEmail = identifier;
            
            // Step 1: if identifier does not contain '@', treat as username → fetch email from 'profile' table
            if (!identifier.includes('@')) {
                const { data: profileData, error: usernameError } = await supabase
                    .from('profile')
                    .select('email')
                    .eq('username', identifier)
                    .maybeSingle();   // using maybeSingle to avoid 406 error if no rows
                    
                if (usernameError || !profileData || !profileData.email) {
                    loginBtn.innerText = originalBtnText;
                    loginBtn.disabled = false;
                    displayError("USERNAME NOT FOUND");
                    return;
                }
                resolvedEmail = profileData.email;
            }
            
            // Step 2: Attempt sign in with supabase auth
            const { data: authData, error: signError } = await supabase.auth.signInWithPassword({
                email: resolvedEmail,
                password: password
            });
            
            if (signError || !authData.user) {
                let errorMsg = signError?.message || "INVALID CREDENTIALS";
                if (errorMsg.toLowerCase().includes("invalid login credentials")) errorMsg = "INCORRECT EMAIL OR PASSWORD";
                displayError(errorMsg);
                loginBtn.innerText = originalBtnText;
                loginBtn.disabled = false;
                return;
            }
            
            const currentUser = authData.user;
            
            // Step 3: security check – fetch account status & banned flag from profile
            const { data: userProfile, error: profileFetchErr } = await supabase
                .from('profile')
                .select('account_status, is_banned')
                .eq('id', currentUser.id)
                .single();
                
            if (profileFetchErr || !userProfile) {
                // critical inconsistency: sign out immediately
                await supabase.auth.signOut();
                displayError("PROFILE ERROR • CONTACT SUPPORT");
                loginBtn.innerText = originalBtnText;
                loginBtn.disabled = false;
                return;
            }
            
            // Banned logic: strict
            if (userProfile.is_banned === true) {
                await supabase.auth.signOut();
                // redirect to banned page without back history
                window.location.replace('banned.html');
                return;
            }
            
            // Suspension logic
            if (userProfile.account_status === 'suspended') {
                await supabase.auth.signOut();
                window.location.replace('suspended.html');
                return;
            }
            
            // Step 4: all checks passed → dashboard
            window.location.replace('dashboard.html');
        };
        
        // Additional small brute-force guard: prevent multiple rapid clicks
        let loginInProgress = false;
        const originalLoginHandler = window.startLogin;
        window.startLogin = function() {
            if (loginInProgress) return;
            loginInProgress = true;
            originalLoginHandler().finally(() => {
                setTimeout(() => { loginInProgress = false; }, 1500);
            });
        };
        
        // Ensure no stray italics after dynamic rendering (extra safety)
        document.querySelectorAll('*').forEach(el => {
            if (getComputedStyle(el).fontStyle === 'italic') {
                el.style.fontStyle = 'normal';
            }
        });
        
        // Additional style override for any tailwind italic class
        const styleOverride = document.createElement('style');
        styleOverride.textContent = `i, em, .italic, [style*="italic"] { font-style: normal !important; }`;
        document.head.appendChild(styleOverride);
    </script>
</body>
</html>
