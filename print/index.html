<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sdel Print | Premium Document Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- UI & Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Real-time Conversion Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: #050508; 
            color: white; 
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Sunlight Mode */
        html.sunlight-mode body {
            background-color: #F8FAFC;
            color: #0F172A;
        }
        
        html.sunlight-mode .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
            color: #0F172A;
        }
        
        html.sunlight-mode .glass-panel-dark {
            background: #FFFFFF;
            border-color: rgba(255,102,0,0.3);
            color: #0F172A;
            box-shadow: 0 10px 40px rgba(255,102,0,0.05);
        }
        
        html.sunlight-mode .text-gray-400 { color: #64748b; }
        html.sunlight-mode .text-gray-500 { color: #94a3b8; }
        html.sunlight-mode .text-white { color: #0F172A; }
        html.sunlight-mode .bg-zinc-800 { background-color: #f1f5f9; }
        html.sunlight-mode .bg-zinc-900 { background-color: #e2e8f0; }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(18, 18, 25, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-panel-dark {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 102, 0, 0.25);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .text-sdel { color: #FF6600; }
        .bg-sdel { background-color: #FF6600; }
        .border-sdel { border-color: #FF6600; }

        .active-scale:active { transform: scale(0.97); }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Custom Select Styling */
        .custom-select-wrapper {
            position: relative;
        }
        .custom-select {
            appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            color: inherit;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        html.sunlight-mode .custom-select {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .custom-select:focus, .custom-select:hover { 
            border-color: #FF6600; 
            background: rgba(255, 102, 0, 0.05);
        }
        .custom-select-wrapper::after {
            content: '\25BC';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 10px;
            color: #FF6600;
        }

        /* Print Option Active State */
        .print-option {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .print-option.selected {
            border-color: #FF6600;
            background: rgba(255, 102, 0, 0.1);
            box-shadow: 0 4px 20px rgba(255,102,0,0.15);
            transform: translateY(-2px);
        }
        html.sunlight-mode .print-option.selected {
            background: #FFF5F0;
        }
        .print-option.selected i {
            transform: scale(1.1);
        }

        /* Background glow */
        .bg-glow {
            position: fixed;
            top: 10%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,102,0,0.1) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
        html.sunlight-mode .bg-glow {
            background: radial-gradient(circle, rgba(255,102,0,0.05) 0%, rgba(255,255,255,0) 70%);
        }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="pb-28">
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5 shadow-sm">
        <a href="../planets.html" class="bg-zinc-900/50 p-3 rounded-full flex items-center justify-center active-scale transition-colors hover:bg-zinc-800">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-xl font-black uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="printer" class="text-sdel w-5 h-5"></i>
            Print<span class="text-sdel">.</span>
        </h1>
        <button onclick="toggleTheme()" class="bg-zinc-900/50 p-3 rounded-full flex items-center justify-center active-scale transition-colors hover:bg-zinc-800" id="themeToggleBtn">
            <i data-lucide="sun" class="w-5 h-5 hidden text-amber-500" id="sunIcon"></i>
            <i data-lucide="moon" class="w-5 h-5 text-indigo-400" id="moonIcon"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto space-y-8 px-6 pt-8">
        
        <!-- Upload Section -->
        <section class="animate-fade-up" style="animation-delay: 0.1s;">
            <div class="flex justify-between items-end mb-3">
                <h3 class="text-sm font-black uppercase tracking-widest text-gray-400">1. Select File</h3>
                <span class="text-[10px] font-bold text-sdel bg-sdel/10 px-2 py-1 rounded-md uppercase">Max: 8MB</span>
            </div>
            
            <input type="file" id="fileInput" class="hidden" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.ppt,.pptx">
            
            <div id="uploadArea" class="glass-panel-dark p-8 rounded-3xl border-dashed border-2 hover:border-sdel transition-all cursor-pointer text-center group active-scale relative overflow-hidden" onclick="document.getElementById('fileInput').click()">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-sdel/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="w-16 h-16 bg-zinc-900 group-hover:bg-sdel/10 text-sdel rounded-full flex items-center justify-center mx-auto mb-4 transition-colors relative z-10 shadow-inner">
                    <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-black mb-1 relative z-10" id="uploadTitle">Tap to Upload</h2>
                <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest relative z-10" id="uploadSubtitle">PDF, DOCX, JPEG, PNG</p>
                <p id="errorText" class="text-xs text-red-500 font-bold mt-3 hidden relative z-10"></p>
            </div>
        </section>

        <!-- Document Swap / Convert Tool -->
        <section class="animate-fade-up" style="animation-delay: 0.2s;">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-6 h-6 rounded bg-sdel/20 flex items-center justify-center text-sdel">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                </div>
                <h3 class="text-sm font-black uppercase tracking-widest text-gray-400">2. Format Swap</h3>
            </div>
            
            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-sdel"></div>
                
                <div class="flex flex-col gap-4">
                    <div class="flex-1">
                        <p class="text-[10px] text-gray-500 font-black uppercase mb-2 pl-1 tracking-wider">Convert From</p>
                        <div class="custom-select-wrapper opacity-50">
                            <select id="swapFrom" class="custom-select" disabled>
                                <option value="Current Format">Auto-Detect</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-center -my-2 relative z-10">
                        <div class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-sdel shadow-lg border border-white/5">
                            <i data-lucide="arrow-down" class="w-5 h-5"></i>
                        </div>
                    </div>
                    
                    <div class="flex-1">
                        <p class="text-[10px] text-gray-500 font-black uppercase mb-2 pl-1 tracking-wider">Target Format</p>
                        <div class="custom-select-wrapper">
                            <select id="swapTo" class="custom-select">
                                <option value="PDF">PDF Document</option>
                                <option value="JPEG">JPEG Image</option>
                                <option value="PNG">PNG Image</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button onclick="downloadConverted(event)" class="w-full mt-5 bg-zinc-800 text-white font-black py-3 rounded-xl active-scale transition-all uppercase text-[10px] tracking-widest hover:border-sdel border border-transparent flex justify-center items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4 text-sdel"></i>
                    Download Swapped Doc
                </button>
            </div>
        </section>

        <!-- Print Options -->
        <section class="animate-fade-up" style="animation-delay: 0.3s;">
            <h3 class="text-sm font-black uppercase tracking-widest text-gray-400 mb-3">3. Print Settings</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div id="btnBW" class="print-option glass-panel p-5 rounded-2xl flex flex-col items-center justify-center cursor-pointer border border-transparent selected" onclick="selectPrintOption('B&W')">
                    <div class="w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center mb-3">
                        <i data-lucide="file-text" class="w-6 h-6 text-gray-400 transition-transform"></i>
                    </div>
                    <h4 class="font-black text-sm uppercase">B & W</h4>
                    <p class="text-[10px] text-gray-500 font-bold mt-1 tracking-widest">₦20 / Page</p>
                </div>
                <div id="btnColor" class="print-option glass-panel p-5 rounded-2xl flex flex-col items-center justify-center cursor-pointer border border-transparent" onclick="selectPrintOption('Color')">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center mb-3">
                        <i data-lucide="image" class="w-6 h-6 text-blue-500 transition-transform"></i>
                    </div>
                    <h4 class="font-black text-sm uppercase">Color</h4>
                    <p class="text-[10px] text-gray-500 font-bold mt-1 tracking-widest">₦50 / Page</p>
                </div>
            </div>
            
            <div class="glass-panel p-4 rounded-2xl">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-[10px] text-gray-500 font-black uppercase mb-2 pl-1 tracking-wider">Number of Pages</p>
                        <input type="number" id="numPages" min="1" placeholder="e.g. 5" class="w-full bg-zinc-900/50 text-white p-3 rounded-xl border border-white/10 outline-none text-sm font-bold placeholder-zinc-700 focus:border-sdel transition-colors">
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 font-black uppercase mb-2 pl-1 tracking-wider">Number of Copies</p>
                        <div class="flex items-center bg-zinc-900/50 rounded-xl border border-white/10 focus-within:border-sdel transition-colors">
                            <button onclick="changeCopies(-1)" class="px-3 py-3 text-gray-400 hover:text-white transition-colors border-r border-white/10"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            <input type="number" id="numCopies" min="1" value="1" class="w-full bg-transparent text-white text-center font-bold text-sm outline-none border-none py-3">
                            <button onclick="changeCopies(1)" class="px-3 py-3 text-gray-400 hover:text-white transition-colors border-l border-white/10"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
    </main>

    <!-- Floating Action Area -->
    <div class="fixed bottom-0 left-0 w-full p-6 glass-panel border-t border-white/5 animate__animated animate__fadeInUp z-50">
        <div class="max-w-md mx-auto">
            <button onclick="sendToPrinter()" class="w-full bg-sdel text-black font-black py-4 rounded-2xl active-scale transition-all uppercase text-sm tracking-widest shadow-[0_0_20px_rgba(255,102,0,0.3)] hover:shadow-[0_0_30px_rgba(255,102,0,0.5)] flex justify-center items-center gap-2">
                <i data-lucide="send" class="w-5 h-5"></i>
                Send to Printer
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. Upload Logic
        const fileInput = document.getElementById('fileInput');
        const uploadTitle = document.getElementById('uploadTitle');
        const uploadSubtitle = document.getElementById('uploadSubtitle');
        const errorText = document.getElementById('errorText');
        const uploadArea = document.getElementById('uploadArea');
        const swapFrom = document.getElementById('swapFrom');
        const MAX_SIZE = 8 * 1024 * 1024; // 8MB

        let uploadedFiles = [];

        function handleFiles(files) {
            errorText.classList.add('hidden');
            if (!files || files.length === 0) return;
            
            const newFiles = Array.from(files);
            let hasError = false;

            for (let f of newFiles) {
                if (f.size > MAX_SIZE) {
                    hasError = true;
                    break;
                }
            }

            if (hasError) {
                errorText.textContent = "One or more files exceed the 8MB limit. Please choose smaller files.";
                errorText.classList.remove('hidden');
                uploadTitle.textContent = "Upload Failed";
                uploadTitle.classList.add('text-red-500');
                uploadArea.classList.remove('border-sdel');
                uploadArea.classList.add('border-red-500');
            } else {
                uploadedFiles = newFiles;
                
                if (uploadedFiles.length === 1) {
                    let fname = uploadedFiles[0].name;
                    if(fname.length > 20) fname = fname.substring(0,10) + '...' + fname.substring(fname.length-7);
                    
                    uploadTitle.textContent = fname;
                    
                    const sizeMB = (uploadedFiles[0].size / (1024*1024)).toFixed(2);
                    uploadSubtitle.textContent = `File ready • ${sizeMB} MB`;
                    
                    const ext = uploadedFiles[0].name.split('.').pop().toUpperCase();
                    swapFrom.innerHTML = `<option value="${ext}">${ext} Document</option>`;
                } else {
                    uploadTitle.textContent = `${uploadedFiles.length} Files Selected`;
                    
                    const totalSize = uploadedFiles.reduce((acc, curr) => acc + curr.size, 0);
                    const sizeMB = (totalSize / (1024*1024)).toFixed(2);
                    uploadSubtitle.textContent = `Files ready • ${sizeMB} MB Total`;
                    
                    swapFrom.innerHTML = `<option value="MIXED">Mixed Formats</option>`;
                }

                uploadTitle.classList.remove('text-red-500');
                uploadTitle.classList.add('text-sdel');
                uploadArea.classList.add('border-sdel');
                uploadArea.classList.remove('border-red-500');
            }
        }

        fileInput.addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        // Drag and Drop Listeners
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadArea.classList.add('border-sdel', 'bg-sdel/5');
        });

        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('border-sdel', 'bg-sdel/5');
            if (uploadedFiles.length > 0) uploadArea.classList.add('border-sdel');
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('bg-sdel/5');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
                e.dataTransfer.clearData();
            }
        });

        // Helper
        function fileToDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 2. Download Logic (Real Conversion)
        window.downloadConverted = async function(event) {
            if (!uploadedFiles || uploadedFiles.length === 0) {
                uploadArea.classList.add('animate__animated', 'animate__headShake');
                errorText.textContent = "Please upload a document to convert.";
                errorText.classList.remove('hidden');
                setTimeout(() => uploadArea.classList.remove('animate__animated', 'animate__headShake'), 1000);
                return;
            }

            if (uploadedFiles.length > 1) {
                alert("Batch conversion is not supported yet. Please upload files one by one to convert locally, or send them all directly to the printer.");
                return;
            }

            const uploadedFile = uploadedFiles[0];
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 text-sdel animate-spin"></i> Converting...`;
            btn.disabled = true;
            lucide.createIcons();
            
            try {
                const swapTo = document.getElementById('swapTo').value.toUpperCase();
                const fileType = uploadedFile.type;
                const fileName = uploadedFile.name.toLowerCase();
                const baseName = fileName.split('.').slice(0, -1).join('.');

                if (swapTo === 'PDF') {
                    if (fileType.startsWith('image/')) {
                        // Image to PDF using jsPDF
                        const imgData = await fileToDataURL(uploadedFile);
                        const img = new Image();
                        img.src = imgData;
                        await new Promise(r => img.onload = r);
                        
                        const { jsPDF } = window.jspdf;
                        const doc = new jsPDF({
                            orientation: img.width > img.height ? "landscape" : "portrait",
                            unit: "px",
                            format: [img.width, img.height]
                        });
                        doc.addImage(imgData, 'JPEG', 0, 0, img.width, img.height);
                        doc.save(`${baseName}_sdel.pdf`);
                        
                    } else if (fileName.endsWith('.docx')) {
                        // DOCX to PDF using mammoth + html2pdf
                        const arrayBuffer = await uploadedFile.arrayBuffer();
                        const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
                        
                        // Create temporary container for html2pdf
                        const container = document.createElement('div');
                        container.innerHTML = `<div style="padding: 30px; font-family: sans-serif; color: black; background: white;">${result.value}</div>`;
                        
                        const opt = {
                            margin:       10,
                            filename:     `${baseName}_sdel.pdf`,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2 },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                        };
                        
                        await html2pdf().set(opt).from(container).save();
                    } else {
                        throw new Error('Unsupported source format for PDF conversion.');
                    }
                } 
                else if (swapTo === 'JPEG' || swapTo === 'PNG') {
                    if (fileType.startsWith('image/')) {
                        // Image to Image using Canvas
                        const imgData = await fileToDataURL(uploadedFile);
                        const img = new Image();
                        img.src = imgData;
                        await new Promise(r => img.onload = r);

                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        
                        if (swapTo === 'JPEG') {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.drawImage(img, 0, 0);
                        
                        const mime = swapTo === 'JPEG' ? 'image/jpeg' : 'image/png';
                        const outData = canvas.toDataURL(mime, 0.95);
                        
                        const link = document.createElement('a');
                        link.download = `${baseName}_sdel.${swapTo.toLowerCase()}`;
                        link.href = outData;
                        link.click();
                    } else {
                        throw new Error('Can only convert images to JPEG/PNG directly in browser.');
                    }
                }

                // Success State
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-500"></i> Success`;
            } catch (err) {
                console.error("Conversion Error:", err);
                btn.innerHTML = `<i data-lucide="x" class="w-4 h-4 text-red-500"></i> Conversion Failed`;
            }

            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }, 3000);
        }

        // 3. Print Options Logic
        let currentPrintOption = 'B&W';
        const btnBW = document.getElementById('btnBW');
        const btnColor = document.getElementById('btnColor');

        window.selectPrintOption = function(option) {
            currentPrintOption = option;
            if(option === 'B&W') {
                btnBW.classList.add('selected');
                btnColor.classList.remove('selected');
            } else {
                btnColor.classList.add('selected');
                btnBW.classList.remove('selected');
            }
        }

        window.changeCopies = function(delta) {
            const input = document.getElementById('numCopies');
            let val = parseInt(input.value) || 1;
            val += delta;
            if (val < 1) val = 1;
            input.value = val;
        }

        // 4. Send To Printer (WhatsApp Integration)
        window.sendToPrinter = function() {
            if (!uploadedFiles || uploadedFiles.length === 0) {
                uploadArea.classList.add('animate__animated', 'animate__headShake');
                errorText.textContent = "Please upload at least one document.";
                errorText.classList.remove('hidden');
                setTimeout(() => uploadArea.classList.remove('animate__animated', 'animate__headShake'), 1000);
                return;
            }

            const swapTo = document.getElementById('swapTo').value;
            const numPages = document.getElementById('numPages').value || 'Unknown';
            const numCopies = document.getElementById('numCopies').value || 1;
            
            const totalSize = uploadedFiles.reduce((acc, curr) => acc + curr.size, 0);
            const sizeMB = (totalSize / (1024*1024)).toFixed(2) + ' MB';
            
            const fileNames = uploadedFiles.map(f => f.name).join(', ');
            
            const message = `Hello Sdel Print! 🖨️\n\nI have document(s) ready for printing.\n\n*File Name(s):* ${fileNames}\n*Target Format:* ${swapTo}\n*Total Size:* ${sizeMB}\n*Number of Pages:* ${numPages}\n*Print Format:* ${currentPrintOption}\n*Print Amount:* ${numCopies} Copies\n\n_I will send the document(s) directly in this chat._`;
            const whatsappURL = `https://wa.me/2349033976630?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappURL, '_blank');
        }

        // 5. Theme Toggle Logic
        const html = document.documentElement;
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        function updateThemeUI() {
            if (html.classList.contains('sunlight-mode')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
                document.querySelector('.bg-glow').style.background = 'radial-gradient(circle, rgba(255,102,0,0.05) 0%, rgba(255,255,255,0) 70%)';
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
                document.querySelector('.bg-glow').style.background = 'radial-gradient(circle, rgba(255,102,0,0.1) 0%, rgba(0,0,0,0) 70%)';
            }
        }

        window.toggleTheme = function() {
            html.classList.toggle('sunlight-mode');
            const theme = html.classList.contains('sunlight-mode') ? 'sunlight' : 'dark';
            localStorage.setItem('theme', theme);
            updateThemeUI();
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'sunlight') {
            html.classList.add('sunlight-mode');
        }
        updateThemeUI();
    </script>
</body>
</html>
