<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Thesdel · Radial Menu | Premium Interactive Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #0A0A0F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        /* Sunlight Mode Premium */
        .sunlight-mode body {
            background: #F5F7FF;
        }
        .sunlight-mode .star {
            background: rgba(0,0,0,0.25) !important;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }
        .sunlight-mode .outer-btn {
            background: rgba(255, 255, 255, 0.96);
            color: #1A1A2E;
            border-color: rgba(255,102,0,0.4);
            box-shadow: 0 15px 30px -8px rgba(0,0,0,0.1);
        }
        .sunlight-mode .outer-btn:hover {
            background: #FF6600;
            color: #0A0A0F;
        }
        .sunlight-mode .back-button {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            color: #FF6600;
            border-color: rgba(255,102,0,0.5);
        }
        .sunlight-mode .star-word-container {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            border-color: rgba(255,102,0,0.3);
        }

        /* Stars Background - pure white elegance */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: floatStar linear infinite;
            opacity: 0;
        }
        @keyframes floatStar {
            0% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) scale(1);
                opacity: 0;
            }
        }

        /* Star Word Formation - Professional Animated Text */
        .star-word-container {
            position: fixed;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 50;
            pointer-events: none;
            font-family: 'Poppins', sans-serif;
        }
        .star-word {
            display: inline-block;
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #FF6600, #FFA500, #FF7700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,102,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.6s ease;
            white-space: nowrap;
            padding: 0.5rem 1.5rem;
            backdrop-filter: blur(15px);
            background-color: rgba(0,0,0,0.3);
            border-radius: 60px;
            border: 1px solid rgba(255,102,0,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .star-word.visible {
            opacity: 1;
            transform: translateY(0);
            animation: gentlePulse 2s ease infinite;
        }
        @keyframes gentlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(255,102,0,0.3); }
            50% { text-shadow: 0 0 35px rgba(255,102,0,0.7); }
        }

        /* Radial Menu Container */
        .radial-menu {
            position: relative;
            width: 420px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        /* Center Circle - Premium Thesdel */
        .center-circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(145deg, #FF6600, #FF4500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 45px rgba(255,102,0,0.4), 0 0 0 6px rgba(255,102,0,0.2), 0 0 0 12px rgba(255,102,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30;
            cursor: pointer;
            border: none;
        }
        .center-circle:hover {
            transform: scale(1.08);
            box-shadow: 0 30px 55px rgba(255,102,0,0.6), 0 0 0 8px rgba(255,102,0,0.3);
        }
        .center-circle:active { transform: scale(0.96); }
        .circle-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            color: #FFFFFF;
            font-weight: 900;
            font-size: 1.6rem;
            text-transform: uppercase;
            background: transparent;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .circle-link span { font-size: 1.3rem; letter-spacing: 1px; }

        /* Outer Buttons - Sleek Glassmorphism */
        .outer-btn {
            position: absolute;
            width: 115px;
            height: 115px;
            border-radius: 32px;
            background: rgba(20, 20, 35, 0.92);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255,102,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
            cursor: pointer;
            text-decoration: none;
            color: #FFF;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            z-index: 25;
        }
        .outer-btn span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-weight: 700;
        }
        .outer-btn:hover {
            border: 1.5px solid #FF6600;
            box-shadow: 0 20px 35px -5px #FF6600, 0 0 0 3px rgba(255,102,0,0.4);
            background: rgba(255,102,0,0.35);
            color: #FFE6CC;
            transform: rotate(var(--rotation)) translate(var(--radius)) rotate(calc(-1 * var(--rotation))) scale(1.12) !important;
        }
        .outer-btn:active {
            transform: rotate(var(--rotation)) translate(var(--radius)) rotate(calc(-1 * var(--rotation))) scale(0.96) !important;
        }

        /* Back Button Premium */
        .back-button {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255,102,0,0.5);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: #FF6600;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .back-button:hover {
            background: #FF6600;
            color: #0A0A0F;
            transform: translateX(-6px);
            border-color: #FFAA55;
            box-shadow: 0 12px 28px rgba(255,102,0,0.5);
        }
        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        /* Signature */
        .signature-line {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: auto;
            z-index: 100;
            cursor: pointer;
        }
        #dynamicSignature {
            display: inline-block;
            transition: opacity 0.35s ease;
            background: rgba(255,102,0,0.15);
            backdrop-filter: blur(10px);
            padding: 6px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255,102,0,0.4);
            font-weight: 800;
            color: #FF6600;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 520px) {
            .radial-menu { width: 320px; height: 320px; }
            .outer-btn { width: 90px; height: 90px; font-size: 0.75rem; }
            .center-circle { width: 120px; height: 120px; }
            .circle-link { font-size: 1.2rem; }
            .back-button { top: 16px; left: 16px; padding: 8px 18px; font-size: 0.8rem; }
            .star-word { font-size: 0.9rem; white-space: nowrap; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<canvas id="confetti-canvas"></canvas>

<!-- Premium Back Button -->
<div class="back-button" id="backButton">
    <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
    <span>Navigate Back</span>
</div>

<!-- Star Word Animation Display -->
<div class="star-word-container">
    <div class="star-word" id="starWordDisplay">✨ Thesdel - Powered by Shushirolsh ✨</div>
</div>

<div class="radial-menu">
    <div class="center-circle" id="centerButton">
        <span class="circle-link">●<span>Thesdel</span></span>
    </div>
    <a href="/laundry/index.html" target="_blank" class="outer-btn" id="btn1"><span>🧺 Laundry</span></a>
    <a href="/grooming/index.html" target="_blank" class="outer-btn" id="btn2"><span>✂️ Grooming</span></a>
    <a href="/cbt/index.html" target="_blank" class="outer-btn" id="btn3"><span>📚 Study</span></a>
    <a href="/print/index.html" target="_blank" class="outer-btn" id="btn4"><span>🖨️ Print</span></a>
    <a href="/food/index.html" target="_blank" class="outer-btn" id="btn5"><span>🍲 Food</span></a>
</div>

<div class="signature-line"><span id="dynamicSignature">THESDEL ELITE</span></div>

<script>
(function() {
    // ============================================================
    // 1. PREMIUM STARFIELD (White stars only)
    // ============================================================
    const starsContainer = document.getElementById('stars');
    function initStars() {
        starsContainer.innerHTML = '';
        const starCount = 180;
        for(let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 4 + 1.2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const duration = Math.random() * 18 + 8;
            star.style.animationDuration = duration + 's';
            star.style.animationDelay = Math.random() * 12 + 's';
            star.style.opacity = Math.random() * 0.7 + 0.3;
            starsContainer.appendChild(star);
        }
    }
    initStars();

    // ============================================================
    // 2. STAR WORD FORMATION: "Thesdel - Powered by Shushirolsh"
    //    fades in left to right every 5 seconds, professional
    // ============================================================
    const starWordEl = document.getElementById('starWordDisplay');
    const fullWordText = "✦ Thesdel — Powered by Shushirolsh ✦";
    
    // Reset animation: clear, then rebuild character by character (left to right fade)
    let animationInterval;
    let currentCharIndex = 0;
    let isAnimating = false;
    
    function resetWordDisplay() {
        if (animationInterval) clearInterval(animationInterval);
        starWordEl.textContent = '';
        starWordEl.classList.remove('visible');
        currentCharIndex = 0;
        isAnimating = false;
        // start fresh
        startWordFormation();
    }
    
    function startWordFormation() {
        if (isAnimating) return;
        isAnimating = true;
        starWordEl.textContent = '';
        starWordEl.style.opacity = '1';
        currentCharIndex = 0;
        
        function addNextChar() {
            if (currentCharIndex <= fullWordText.length) {
                let partial = fullWordText.slice(0, currentCharIndex);
                starWordEl.textContent = partial;
                // subtle glow update
                if (currentCharIndex === fullWordText.length) {
                    starWordEl.classList.add('visible');
                    isAnimating = false;
                    // hold full text for 4 sec then restart cycle
                    setTimeout(() => {
                        resetWordDisplay();
                    }, 4200);
                    return;
                }
                currentCharIndex++;
                setTimeout(addNextChar, 65); // smooth typewriter fade left->right
            } else {
                starWordEl.classList.add('visible');
                isAnimating = false;
                setTimeout(() => {
                    resetWordDisplay();
                }, 4200);
            }
        }
        addNextChar();
    }
    
    // initial launch: wait 1.2 sec then start infinite 5-second cycle (word forms left to right)
    setTimeout(() => {
        startWordFormation();
    }, 800);
    
    // also ensure that every full cycle restarts (resetWordDisplay handles recursion)
    
    // ============================================================
    // 3. RADIAL MENU ROTATION (ultra smooth)
    // ============================================================
    const btns = document.querySelectorAll('.outer-btn');
    const baseAngles = [0, 72, 144, 216, 288];
    let rotationOffset = 0;
    let lastTimestamp = 0;
    const ROT_SPEED = 0.018;
    
    const hoverScaleMap = new Map();
    btns.forEach(btn => {
        hoverScaleMap.set(btn, 1);
        btn.addEventListener('mouseenter', () => hoverScaleMap.set(btn, 1.12));
        btn.addEventListener('mouseleave', () => hoverScaleMap.set(btn, 1));
        // touch
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); hoverScaleMap.set(btn, 1.12); });
        btn.addEventListener('touchend', () => hoverScaleMap.set(btn, 1));
    });
    
    function getRadius() { return window.innerWidth <= 520 ? 120 : 155; }
    
    function animateRotation(time) {
        if(lastTimestamp) {
            const delta = Math.min(50, time - lastTimestamp);
            rotationOffset = (rotationOffset + ROT_SPEED * delta) % 360;
        }
        lastTimestamp = time;
        const radius = getRadius();
        btns.forEach((btn, idx) => {
            const angle = (baseAngles[idx] + rotationOffset) % 360;
            const scaleVal = hoverScaleMap.get(btn) || 1;
            btn.style.setProperty('--rotation', angle + 'deg');
            btn.style.setProperty('--radius', radius + 'px');
            btn.style.transform = `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg) scale(${scaleVal})`;
        });
        requestAnimationFrame(animateRotation);
    }
    requestAnimationFrame(animateRotation);
    
    // ============================================================
    // 4. BUTTONS FULLY WORKING: LINKS OPEN (no blocking)
    // ============================================================
    btns.forEach(btn => {
        // remove any legacy preventDefault and make sure links work
        btn.addEventListener('click', (e) => {
            // do NOT prevent default — let the href navigate
            // but we add a nice visual feedback without breaking navigation
            const linkUrl = btn.getAttribute('href');
            if (linkUrl && linkUrl !== '#') {
                // visual flash, link will open normally (target _blank or same)
                btn.style.filter = 'brightness(1.3)';
                setTimeout(() => { btn.style.filter = ''; }, 120);
                // optional console log for debug
                console.log(`🔗 Navigating to: ${linkUrl}`);
                // No e.preventDefault() — navigation proceeds
                return true;
            } else {
                e.preventDefault();
                console.warn('No valid link set for this button');
            }
        });
    });
    
    // ============================================================
    // 5. CONFETTI & CELEBRATION (center button)
    // ============================================================
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame = null;
    let animActiveFlag = false;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    class ParticleEffect {
        constructor(x, y, isFireworkFragment = false) {
            this.x = x;
            this.y = y;
            this.isFire = isFireworkFragment;
            const orangePalette = [15, 25, 35, 45, 10];
            const hue = orangePalette[Math.floor(Math.random() * orangePalette.length)];
            this.color = `hsl(${hue}, 100%, 58%)`;
            if(isFireworkFragment) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.2 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 3 + Math.random() * 5;
                this.life = 1;
                this.decay = 0.014 + Math.random() * 0.018;
                this.gravity = 0.1;
            } else {
                this.vx = (Math.random() - 0.5) * 9;
                this.vy = (Math.random() - 0.5) * 9 - 4.5;
                this.size = 5 + Math.random() * 8;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.012;
                this.gravity = 0.22;
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 6;
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            if(!this.isFire) this.rotation += this.rotSpeed;
            this.life -= this.decay;
            return this.life > 0.02;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            if(!this.isFire) ctx.rotate(this.rotation * Math.PI/180);
            ctx.globalAlpha = this.life * 0.9;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#FF6600';
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }
    
    function burstConfetti(cx, cy) {
        for(let i=0;i<150;i++) particles.push(new ParticleEffect(cx, cy, false));
    }
    function burstFirework(cx, cy) {
        for(let i=0;i<70;i++) particles.push(new ParticleEffect(cx, cy, true));
        for(let wave=0; wave<3; wave++) {
            setTimeout(() => {
                let offX = cx + (Math.random() - 0.5) * 150;
                let offY = cy + (Math.random() - 0.5) * 150;
                for(let k=0;k<30;k++) particles.push(new ParticleEffect(offX, offY, true));
            }, wave * 90);
        }
    }
    
    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.update());
        particles.forEach(p => p.draw());
        if(particles.length > 0) {
            animFrame = requestAnimationFrame(animateConfetti);
        } else {
            animActiveFlag = false;
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = null;
        }
    }
    
    function startCelebration() {
        const center = document.getElementById('centerButton');
        const rect = center.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        particles = [];
        burstConfetti(centerX, centerY);
        burstFirework(centerX, centerY);
        if(!animActiveFlag) {
            animActiveFlag = true;
            if(animFrame) cancelAnimationFrame(animFrame);
            animateConfetti();
        }
    }
    
    const centerBtnElem = document.getElementById('centerButton');
    centerBtnElem.addEventListener('click', (e) => {
        e.preventDefault();
        startCelebration();
        centerBtnElem.style.transform = 'scale(0.92)';
        setTimeout(() => { if(centerBtnElem) centerBtnElem.style.transform = ''; }, 200);
    });
    
    // ============================================================
    // 6. BACK BUTTON with history navigation
    // ============================================================
    const backBtn = document.getElementById('backButton');
    function goBackSafe() {
        if(window.history.length > 1) {
            window.history.back();
        } else {
            // elegant fallback message
            const toast = document.createElement('div');
            toast.innerText = '⟵ No previous page in history';
            toast.style.position = 'fixed';
            toast.style.bottom = '100px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = 'rgba(0,0,0,0.85)';
            toast.style.backdropFilter = 'blur(20px)';
            toast.style.color = '#FFAA55';
            toast.style.padding = '10px 26px';
            toast.style.borderRadius = '50px';
            toast.style.fontSize = '0.85rem';
            toast.style.fontWeight = '600';
            toast.style.zIndex = '10000';
            toast.style.border = '1px solid #FF6600';
            toast.style.fontFamily = 'Poppins, sans-serif';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1800);
            if(navigator.vibrate) navigator.vibrate(40);
        }
        backBtn.style.transform = 'translateX(-3px) scale(0.97)';
        setTimeout(() => { if(backBtn) backBtn.style.transform = ''; }, 150);
    }
    
    backBtn.addEventListener('click', (e) => {
        e.preventDefault();
        goBackSafe();
    });
    
    // Keyboard support
    window.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' || (e.key === 'Backspace' && !e.target.matches('input, textarea'))) {
            e.preventDefault();
            goBackSafe();
        }
    });
    
    // ============================================================
    // 7. Theme Toggle (Sunlight/Dark) via signature double-click
    // ============================================================
    (function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'sunlight') document.documentElement.classList.add('sunlight-mode');
        window.toggleTheme = function() {
            const htmlElem = document.documentElement;
            if(htmlElem.classList.contains('sunlight-mode')) {
                htmlElem.classList.remove('sunlight-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElem.classList.add('sunlight-mode');
                localStorage.setItem('theme', 'sunlight');
            }
        };
        const signatureDiv = document.querySelector('.signature-line');
        signatureDiv.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            window.toggleTheme();
            const sigSpan = document.getElementById('dynamicSignature');
            sigSpan.style.transform = 'scale(1.05)';
            setTimeout(() => sigSpan.style.transform = '', 200);
        });
    })();
    
    // Dynamic signature rotation
    const dynamicSig = document.getElementById('dynamicSignature');
    const taglines = ['THESDEL STUDIO', 'RADIAL VISION', 'POWERED BY SHUSHIROLSH'];
    let tagIdx = 0;
    function rotateSignature() {
        dynamicSig.style.opacity = '0';
        setTimeout(() => {
            tagIdx = (tagIdx + 1) % taglines.length;
            dynamicSig.textContent = taglines[tagIdx];
            dynamicSig.style.opacity = '1';
        }, 280);
    }
    dynamicSig.style.transition = 'opacity 0.3s';
    dynamicSig.textContent = taglines[0];
    setInterval(rotateSignature, 3200);
    
    // additional polish: ensure stars stay white
    window.addEventListener('resize', () => {});
})();
</script>
</body>
</html>
