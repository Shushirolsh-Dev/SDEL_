<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thesdel · Radial Menu | 360° Rotation Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0A0A0F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease;
            overflow: hidden;
            position: relative;
            touch-action: pan-x pan-y;
        }

        /* Sunlight Mode */
        .sunlight-mode body {
            background: #F5F7FF;
        }
        .sunlight-mode .star {
            background: rgba(0,0,0,0.25) !important;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }
        .sunlight-mode .outer-btn {
            background: rgba(255, 255, 255, 0.96);
            color: #1A1A2E;
            border-color: rgba(255,102,0,0.4);
        }
        .sunlight-mode .outer-btn:hover {
            background: #FF6600;
            color: #0A0A0F;
        }

        /* Stars Background - Optimized for performance */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255,255,255,0.6);
            animation: floatStar linear infinite;
            opacity: 0;
            will-change: transform;
        }
        @keyframes floatStar {
            0% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) scale(1);
                opacity: 0;
            }
        }

        /* Star Word Formation */
        .star-word-container {
            position: fixed;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        .star-word {
            display: inline-block;
            font-size: clamp(0.9rem, 3.5vw, 1.8rem);
            font-weight: 800;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #FF6600, #FFA500, #FF7700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,102,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s ease;
            white-space: nowrap;
            padding: 0.5rem 1.5rem;
            backdrop-filter: blur(12px);
            background-color: rgba(0,0,0,0.25);
            border-radius: 60px;
            border: 1px solid rgba(255,102,0,0.4);
        }
        .star-word.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Radial Menu Container */
        .radial-menu {
            position: relative;
            width: 420px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        /* Center Circle */
        .center-circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(145deg, #FF6600, #FF4500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 45px rgba(255,102,0,0.4), 0 0 0 6px rgba(255,102,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30;
            cursor: pointer;
            border: none;
            will-change: transform;
        }
        .center-circle:active {
            transform: scale(0.96);
        }
        .circle-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            color: #FFFFFF;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            background: transparent;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .circle-link span { font-size: 1.2rem; letter-spacing: 1px; }

        /* Outer Buttons - Ultra smooth 360° rotation */
        .outer-btn {
            position: absolute;
            width: 115px;
            height: 115px;
            border-radius: 32px;
            background: rgba(20, 20, 35, 0.92);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255,102,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
            cursor: pointer;
            text-decoration: none;
            color: #FFF;
            font-weight: 700;
            font-size: 0.92rem;
            text-align: center;
            transition: filter 0.1s ease, border 0.2s ease;
            will-change: transform;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            z-index: 25;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            /* Hardware acceleration for smooth rotation */
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        .outer-btn span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            pointer-events: none;
        }
        .outer-btn:active {
            filter: brightness(0.92);
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            padding: 10px 22px;
            border-radius: 60px;
            border: 1px solid rgba(255,102,0,0.5);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: #FF6600;
            transition: all 0.2s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
            -webkit-tap-highlight-color: transparent;
        }
        .back-button:active {
            transform: scale(0.96);
            background: #FF6600;
            color: #0A0A0F;
        }
        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        /* Signature */
        .signature-line {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.75;
            pointer-events: auto;
            z-index: 100;
            cursor: pointer;
        }
        #dynamicSignature {
            display: inline-block;
            transition: opacity 0.35s ease;
            background: rgba(255,102,0,0.15);
            backdrop-filter: blur(8px);
            padding: 5px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,102,0,0.4);
            font-weight: 800;
            color: #FF6600;
            font-size: 0.75rem;
            pointer-events: none;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 520px) {
            .radial-menu { width: 320px; height: 320px; }
            .outer-btn { width: 88px; height: 88px; font-size: 0.68rem; }
            .center-circle { width: 115px; height: 115px; }
            .circle-link { font-size: 1.2rem; }
            .circle-link span { font-size: 0.95rem; }
            .back-button { top: 16px; left: 16px; padding: 7px 16px; font-size: 0.75rem; }
            .star-word { font-size: 0.65rem; padding: 0.35rem 1rem; }
        }
        @media (max-width: 380px) {
            .outer-btn { width: 78px; height: 78px; font-size: 0.62rem; }
            .radial-menu { width: 280px; height: 280px; }
            .center-circle { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<canvas id="confetti-canvas"></canvas>

<div class="back-button" id="backButton">
    <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
    <span>Back</span>
</div>

<div class="star-word-container">
    <div class="star-word" id="starWordDisplay">✨ Thesdel — Powered by Shushirolsh ✨</div>
</div>

<div class="radial-menu">
    <div class="center-circle" id="centerButton">
        <span class="circle-link">●<span>Thesdel</span></span>
    </div>
    <!-- WORKING LINKS - 360° rotation preserved -->
    <a href="/laundry/index.html" class="outer-btn" id="btn1"><span>🧺 Laundry</span></a>
    <a href="/grooming/index.html" class="outer-btn" id="btn2"><span>✂️ Grooming</span></a>
    <a href="/cbt/index.html" class="outer-btn" id="btn3"><span>📚 Study</span></a>
    <a href="/print/index.html" class="outer-btn" id="btn4"><span>🖨️ Print</span></a>
    <a href="/food/index.html" class="outer-btn" id="btn5"><span>🍲 Food</span></a>
</div>

<div class="signature-line"><span id="dynamicSignature">THESDEL 360°</span></div>

<script>
(function() {
    // ============================================================
    // OPTIMIZED STARFIELD - Reduced count for mobile smoothness
    // ============================================================
    const starsContainer = document.getElementById('stars');
    function initStars() {
        starsContainer.innerHTML = '';
        // Reduced to 100 stars for buttery smooth performance on mobile
        const starCount = window.innerWidth < 600 ? 65 : 100;
        for(let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const duration = Math.random() * 14 + 9;
            star.style.animationDuration = duration + 's';
            star.style.animationDelay = Math.random() * 10 + 's';
            star.style.opacity = Math.random() * 0.6 + 0.3;
            starsContainer.appendChild(star);
        }
    }
    initStars();
    window.addEventListener('resize', () => { initStars(); });

    // ============================================================
    // STAR WORD ANIMATION - Left to right typewriter
    // ============================================================
    const starWordEl = document.getElementById('starWordDisplay');
    const fullWordText = "✦ Thesdel — Powered by Shushirolsh ✦";
    let currentCharIndex = 0;
    let isAnimating = false;
    let animationTimeout = null;
    
    function startWordFormation() {
        if (isAnimating) return;
        isAnimating = true;
        starWordEl.textContent = '';
        starWordEl.classList.remove('visible');
        currentCharIndex = 0;
        
        function addNextChar() {
            if (currentCharIndex <= fullWordText.length) {
                starWordEl.textContent = fullWordText.slice(0, currentCharIndex);
                if (currentCharIndex === fullWordText.length) {
                    starWordEl.classList.add('visible');
                    isAnimating = false;
                    setTimeout(() => {
                        startWordFormation();
                    }, 4500);
                    return;
                }
                currentCharIndex++;
                setTimeout(addNextChar, 58);
            }
        }
        addNextChar();
    }
    setTimeout(() => startWordFormation(), 500);
    
    // ============================================================
    // 360° CONTINUOUS ROTATION - ULTRA SMOOTH (restored signature effect)
    // All buttons rotate in a full circle continuously
    // ============================================================
    const btns = document.querySelectorAll('.outer-btn');
    const baseAngles = [0, 72, 144, 216, 288];
    let rotationOffset = 0;
    let lastTimestamp = 0;
    // Slightly slower for smoother visual on mobile
    const ROT_SPEED = 0.014; // degrees per millisecond
    
    // Simple scale tracking for hover/tap without breaking smoothness
    const scaleMap = new Map();
    btns.forEach(btn => {
        scaleMap.set(btn, 1);
        btn.addEventListener('mouseenter', () => { scaleMap.set(btn, 1.08); });
        btn.addEventListener('mouseleave', () => { scaleMap.set(btn, 1); });
        btn.addEventListener('touchstart', (e) => {
            scaleMap.set(btn, 1.05);
        });
        btn.addEventListener('touchend', () => {
            scaleMap.set(btn, 1);
        });
    });
    
    function getRadius() { 
        return window.innerWidth <= 520 ? 118 : 152; 
    }
    
    // Optimized animation loop with requestAnimationFrame
    function animateRotation(timestamp) {
        if(lastTimestamp) {
            const delta = Math.min(32, timestamp - lastTimestamp);
            rotationOffset = (rotationOffset + ROT_SPEED * delta) % 360;
        }
        lastTimestamp = timestamp;
        const radius = getRadius();
        
        // Batch DOM updates for performance
        for(let idx = 0; idx < btns.length; idx++) {
            const btn = btns[idx];
            const angle = (baseAngles[idx] + rotationOffset) % 360;
            const scaleVal = scaleMap.get(btn) || 1;
            const rad = radius;
            // Full 360 rotation transform
            btn.style.transform = `rotate(${angle}deg) translate(${rad}px) rotate(-${angle}deg) scale(${scaleVal})`;
        }
        requestAnimationFrame(animateRotation);
    }
    requestAnimationFrame(animateRotation);
    
    // ============================================================
    // WORKING LINKS - No blocking, pure navigation
    // ============================================================
    btns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            const linkUrl = btn.getAttribute('href');
            if (linkUrl && linkUrl !== '#' && linkUrl !== 'javascript:void(0)') {
                // Visual feedback only
                btn.style.filter = 'brightness(1.25)';
                setTimeout(() => { btn.style.filter = ''; }, 120);
                // Haptic feedback on mobile
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(12);
                }
                // Let the link work naturally
                return true;
            } else {
                e.preventDefault();
                btn.style.filter = 'brightness(0.8)';
                setTimeout(() => { btn.style.filter = ''; }, 150);
            }
        });
    });
    
    // ============================================================
    // CONFETTI - Optimized for mobile performance
    // ============================================================
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame = null;
    let animActive = false;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    class Particle {
        constructor(x, y, isFire = false) {
            this.x = x;
            this.y = y;
            this.isFire = isFire;
            const hues = [20, 30, 40, 15];
            this.color = `hsl(${hues[Math.floor(Math.random() * hues.length)]}, 100%, 58%)`;
            if(isFire) {
                const angle = Math.random() * Math.PI * 2;
                const spd = 1.8 + Math.random() * 4;
                this.vx = Math.cos(angle) * spd;
                this.vy = Math.sin(angle) * spd;
                this.size = 3 + Math.random() * 4;
                this.life = 0.95;
                this.decay = 0.012 + Math.random() * 0.018;
                this.gravity = 0.08;
            } else {
                this.vx = (Math.random() - 0.5) * 7;
                this.vy = (Math.random() - 0.5) * 7 - 3;
                this.size = 4 + Math.random() * 6;
                this.life = 1;
                this.decay = 0.007 + Math.random() * 0.01;
                this.gravity = 0.18;
                this.rot = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 5;
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            if(!this.isFire) this.rot += this.rotSpeed;
            this.life -= this.decay;
            return this.life > 0.02;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            if(!this.isFire) ctx.rotate(this.rot * Math.PI/180);
            ctx.globalAlpha = this.life * 0.85;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#FF6600';
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }
    
    function burstConfetti(cx, cy) {
        for(let i=0;i<100;i++) particles.push(new Particle(cx, cy, false));
    }
    function burstFirework(cx, cy) {
        for(let i=0;i<45;i++) particles.push(new Particle(cx, cy, true));
        for(let w=0; w<2; w++) {
            setTimeout(() => {
                let offX = cx + (Math.random() - 0.5) * 120;
                let offY = cy + (Math.random() - 0.5) * 120;
                for(let k=0;k<20;k++) particles.push(new Particle(offX, offY, true));
            }, w * 70);
        }
    }
    
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.update());
        particles.forEach(p => p.draw());
        if(particles.length > 0) {
            animFrame = requestAnimationFrame(animateParticles);
        } else {
            animActive = false;
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = null;
        }
    }
    
    function startCelebration() {
        const center = document.getElementById('centerButton');
        const rect = center.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        particles = [];
        burstConfetti(centerX, centerY);
        burstFirework(centerX, centerY);
        if(!animActive) {
            animActive = true;
            if(animFrame) cancelAnimationFrame(animFrame);
            animateParticles();
        }
    }
    
    const centerBtn = document.getElementById('centerButton');
    centerBtn.addEventListener('click', (e) => {
        e.preventDefault();
        startCelebration();
        centerBtn.style.transform = 'scale(0.94)';
        setTimeout(() => { centerBtn.style.transform = ''; }, 150);
        if(navigator.vibrate) navigator.vibrate(20);
    });
    
    // ============================================================
    // BACK BUTTON
    // ============================================================
    const backBtn = document.getElementById('backButton');
    function goBack() {
        if(window.history.length > 1) {
            window.history.back();
        } else {
            const toast = document.createElement('div');
            toast.textContent = '← No previous page';
            toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);color:#FFAA55;padding:8px 20px;border-radius:50px;font-size:0.75rem;font-weight:600;z-index:10000;border:1px solid #FF6600;font-family:Poppins,sans-serif;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }
    }
    backBtn.addEventListener('click', (e) => {
        e.preventDefault();
        goBack();
    });
    
    // ============================================================
    // THEME TOGGLE & SIGNATURE ROTATOR
    // ============================================================
    (function initTheme() {
        const saved = localStorage.getItem('theme');
        if(saved === 'sunlight') document.documentElement.classList.add('sunlight-mode');
        window.toggleTheme = function() {
            const html = document.documentElement;
            if(html.classList.contains('sunlight-mode')) {
                html.classList.remove('sunlight-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.add('sunlight-mode');
                localStorage.setItem('theme', 'sunlight');
            }
        };
        const sigLine = document.querySelector('.signature-line');
        sigLine.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            window.toggleTheme();
            const sigSpan = document.getElementById('dynamicSignature');
            sigSpan.style.transform = 'scale(1.05)';
            setTimeout(() => sigSpan.style.transform = '', 180);
        });
    })();
    
    const dynamicSig = document.getElementById('dynamicSignature');
    const tags = ['THESDEL PLANET', 'ONE FOR ALL AND ALL FOR ONE', 'POWERED BY SHUSHIROLSH'];
    let tagIndex = 0;
    function rotateSig() {
        dynamicSig.style.opacity = '0';
        setTimeout(() => {
            tagIndex = (tagIndex + 1) % tags.length;
            dynamicSig.textContent = tags[tagIndex];
            dynamicSig.style.opacity = '1';
        }, 280);
    }
    dynamicSig.style.transition = 'opacity 0.3s';
    dynamicSig.textContent = tags[0];
    setInterval(rotateSig, 3200);
    
    // Mobile optimization: prevent scroll on touch
    document.body.addEventListener('touchmove', (e) => {
        if(e.target.closest('.radial-menu')) {
            // Allow menu interaction without page scroll
        }
    }, { passive: false });
    
    console.log('✅ 360° rotation active — smooth as silk on mobile');
})();
</script>
</body>
</html>
