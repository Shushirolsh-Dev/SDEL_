<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-5">

<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-4">Create a Class</h1>
    
    <input type="text" id="className" placeholder="Class Name" class="w-full p-3 rounded bg-gray-800 mb-3">
    <textarea id="classDesc" placeholder="Description" class="w-full p-3 rounded bg-gray-800 mb-3"></textarea>
    
    <button id="createBtn" class="bg-orange-500 w-full p-3 rounded font-bold">Create Class</button>
    
    <div id="message" class="mt-4 p-3 rounded hidden"></div>
</div>

<script>
    const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const createBtn = document.getElementById('createBtn');
    const messageDiv = document.getElementById('message');
    
    function showMessage(msg, isError = false) {
        messageDiv.textContent = msg;
        messageDiv.className = `mt-4 p-3 rounded ${isError ? 'bg-red-500' : 'bg-green-500'}`;
        messageDiv.classList.remove('hidden');
        setTimeout(() => messageDiv.classList.add('hidden'), 5000);
    }
    
    createBtn.addEventListener('click', async () => {
        const name = document.getElementById('className').value.trim();
        const description = document.getElementById('classDesc').value.trim();
        
        if (!name) {
            showMessage('Class name is required', true);
            return;
        }
        
        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';
        
        try {
            // Get session
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                showMessage('Please login first', true);
                window.location.href = 'https://thesdel.com';
                return;
            }
            
            // Call edge function
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-class`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${session.access_token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, description, custom_slug: null })
            });
            
            const result = await response.json();
            console.log('Response:', response.status, result);
            
            if (response.ok && result.success) {
                showMessage(`Class "${name}" created! Link: ${result.class.custom_link}`);
                setTimeout(() => {
                    window.location.href = 'class.html';
                }, 2000);
            } else {
                showMessage(result.error || 'Failed to create class', true);
                createBtn.disabled = false;
                createBtn.textContent = 'Create Class';
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage(error.message, true);
            createBtn.disabled = false;
            createBtn.textContent = 'Create Class';
        }
    });
</script>
</body>
</html>
