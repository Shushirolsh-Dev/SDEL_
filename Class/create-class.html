<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Class - The Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-orange {
            background: #ff6600;
            transition: all 0.2s;
        }
        .btn-orange:hover {
            background: #ff5500;
            transform: scale(0.98);
        }
        .btn-orange:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .input-focus:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 0 2px rgba(255, 102, 0, 0.2);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
    </style>
</head>
<body class="p-5">

    <div class="max-w-md mx-auto animate-fade">
        <a href="class.html" class="text-orange-500 mb-4 inline-flex items-center gap-2 hover:text-orange-400 transition-colors">
            <i class="fas fa-arrow-left"></i> Back to Class
        </a>
        
        <div class="glass-panel p-6 rounded-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-plus-circle text-2xl text-orange-500"></i>
                </div>
                <h1 class="text-2xl font-black">Create a Class</h1>
                <p class="text-gray-400 text-sm mt-1">You'll become the Class Representative</p>
            </div>
            
            <form id="create-class-form">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Class Name *</label>
                    <input 
                        type="text" 
                        id="class-name" 
                        required 
                        class="w-full p-3 rounded-xl bg-black/50 border border-white/10 text-white input-focus transition-all"
                        placeholder="e.g., Computer Science 101"
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">Description (Optional)</label>
                    <textarea 
                        id="class-desc" 
                        rows="3" 
                        class="w-full p-3 rounded-xl bg-black/50 border border-white/10 text-white input-focus transition-all"
                        placeholder="What's this class about?"
                    ></textarea>
                </div>
                
                <button type="submit" id="create-btn" class="btn-orange w-full py-4 rounded-xl font-black uppercase tracking-wider flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> Create Class
                </button>
            </form>
        </div>
        
        <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 hidden">
            <div id="toast" class="glass-panel px-6 py-3 rounded-xl flex items-center gap-3 shadow-2xl border border-white/10">
                <i id="toast-icon" class="fas fa-check-circle text-green-500"></i>
                <span id="toast-message" class="text-sm font-medium"></span>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let redirectInProgress = false;
        
        function showToast(message, type = 'error') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');
            
            switch(type) {
                case 'error':
                    toastIcon.className = 'fas fa-exclamation-circle text-red-500';
                    break;
                case 'success':
                    toastIcon.className = 'fas fa-check-circle text-green-500';
                    break;
                case 'warning':
                    toastIcon.className = 'fas fa-exclamation-triangle text-yellow-500';
                    break;
            }
            
            toastMessage.innerText = message;
            toastContainer.classList.remove('hidden');
            
            setTimeout(() => {
                toastContainer.classList.add('hidden');
            }, 4000);
        }
        
        async function getUserClass() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return null;
            
            const { data: asRep } = await supabase
                .from('classes')
                .select('id, name, custom_link')
                .eq('rep_id', user.id)
                .maybeSingle();
            
            if (asRep) return asRep;
            
            const { data: asMember } = await supabase
                .from('class_members')
                .select('class:classes(id, name, custom_link)')
                .eq('user_id', user.id)
                .eq('status', 'approved')
                .maybeSingle();
            
            if (asMember?.class) return asMember.class;
            
            return null;
        }
        
        async function createClassDirectly(name, description) {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                throw new Error('Please login first');
            }
            
            // Insert the class
            const { data: classData, error: classError } = await supabase
                .from('classes')
                .insert({
                    name: name.trim(),
                    description: description?.trim() || '',
                    rep_id: user.id,
                    join_mode: 'open'
                })
                .select()
                .single();
            
            if (classError) {
                throw new Error(classError.message);
            }
            
            // Add user as member
            const { error: memberError } = await supabase
                .from('class_members')
                .insert({
                    class_id: classData.id,
                    user_id: user.id,
                    status: 'approved'
                });
            
            if (memberError) {
                // Rollback: delete the class
                await supabase.from('classes').delete().eq('id', classData.id);
                throw new Error('Failed to add you as a member');
            }
            
            return { success: true, class: classData };
        }
        
        document.getElementById('create-class-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (redirectInProgress) return;
            
            const className = document.getElementById('class-name').value.trim();
            const classDesc = document.getElementById('class-desc').value.trim();
            const createBtn = document.getElementById('create-btn');
            
            if (!className) {
                showToast('Please enter a class name', 'error');
                return;
            }
            
            const existingClass = await getUserClass();
            if (existingClass) {
                showToast(`You already have a class: "${existingClass.name}". Redirecting...`, 'warning');
                setTimeout(() => {
                    window.location.href = 'class.html';
                }, 2000);
                return;
            }
            
            const originalBtnHtml = createBtn.innerHTML;
            createBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            createBtn.disabled = true;
            redirectInProgress = true;
            
            try {
                const result = await createClassDirectly(className, classDesc);
                
                if (result.success) {
                    showToast('Class created successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'class.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Create error:', error);
                showToast(error.message || 'Failed to create class', 'error');
                createBtn.innerHTML = originalBtnHtml;
                createBtn.disabled = false;
                redirectInProgress = false;
            }
        });
        
        async function checkExistingClass() {
            const existingClass = await getUserClass();
            if (existingClass) {
                showToast(`Note: You already have a class "${existingClass.name}"`, 'warning');
                const createBtn = document.getElementById('create-btn');
                createBtn.disabled = true;
                createBtn.classList.add('opacity-50', 'cursor-not-allowed');
                createBtn.innerHTML = '<i class="fas fa-ban"></i> Already Have a Class';
                
                const form = document.getElementById('create-class-form');
                if (!document.querySelector('.go-to-class-btn')) {
                    const goToClassBtn = document.createElement('a');
                    goToClassBtn.href = 'class.html';
                    goToClassBtn.className = 'btn-orange w-full py-4 rounded-xl font-black uppercase tracking-wider flex items-center justify-center gap-2 mt-4 go-to-class-btn';
                    goToClassBtn.innerHTML = '<i class="fas fa-graduation-cap"></i> Go to My Class';
                    form.appendChild(goToClassBtn);
                }
            }
        }
        
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                showToast('Please login first', 'warning');
                setTimeout(() => {
                    window.location.href = 'https://thesdel.com';
                }, 1500);
                return false;
            }
            return true;
        }
        
        async function init() {
            const isAuthed = await checkAuth();
            if (isAuthed) {
                await checkExistingClass();
            }
        }
        
        init();
    </script>
</body>
</html>
