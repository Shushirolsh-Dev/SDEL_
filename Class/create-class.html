<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Manager - Join Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto">

    <!-- FORM: Create New Class -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
        <h2 class="text-xl font-bold mb-4">🏫 Create New Class</h2>
        <form id="classForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Class Name *</label>
                <input type="text" id="className" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Class Description</label>
                <textarea id="classDescription" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Join Settings</label>
                <div class="mt-2 space-x-4">
                    <label class="inline-flex items-center">
                        <input type="radio" name="joinType" value="open" checked class="mr-2"> 
                        🌍 Anyone can join
                    </label>
                    <label class="inline-flex items-center">
                        <input type="radio" name="joinType" value="approval" class="mr-2"> 
                        🔐 Approve requests
                    </label>
                </div>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">➕ Create Class</button>
        </form>
    </div>

    <!-- TABLE: All Classes -->
    <div class="bg-white rounded-lg shadow overflow-hidden mb-8">
        <h2 class="text-xl font-bold p-6 pb-0">📚 All Classes</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Class</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Join Setting</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Members</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pending Requests</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="classTableBody">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- PENDING REQUESTS SECTION (appears when a class has requests) -->
    <div id="requestsPanel" class="bg-white rounded-lg shadow p-6 hidden">
        <h2 class="text-xl font-bold mb-4">⏳ Pending Join Requests</h2>
        <div id="requestsList"></div>
    </div>
</div>

<script>
    // Data structure
    let classes = [
        {
            id: 1,
            name: "Introduction to Programming",
            description: "Learn coding basics with Python",
            joinType: "open",
            members: ["alice@example.com", "bob@example.com"],
            requests: [] // stores { email, userName, requestedAt }
        },
        {
            id: 2,
            name: "Advanced Web Development",
            description: "React, Node.js, and MongoDB",
            joinType: "approval",
            members: ["charlie@example.com"],
            requests: [
                { id: 101, email: "david@example.com", userName: "David Chen", requestedAt: new Date().toISOString() },
                { id: 102, email: "emma@example.com", userName: "Emma Watson", requestedAt: new Date().toISOString() }
            ]
        }
    ];

    let nextClassId = 3;
    let nextRequestId = 103;

    // Helper: Escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Render main classes table
    function renderClassesTable() {
        const tbody = document.getElementById('classTableBody');
        tbody.innerHTML = '';
        
        classes.forEach(cls => {
            const row = tbody.insertRow();
            const pendingCount = cls.requests.length;
            const joinSettingDisplay = cls.joinType === 'open' ? 
                '<span class="text-green-600">🌍 Anyone can join</span>' : 
                '<span class="text-yellow-600">🔐 Approval required</span>';
            
            row.innerHTML = `
                <td class="px-6 py-4 align-top font-medium">${escapeHtml(cls.name)}</td>
                <td class="px-6 py-4 align-top text-gray-600">${escapeHtml(cls.description || '-')}</td>
                <td class="px-6 py-4 align-top">${joinSettingDisplay}</td>
                <td class="px-6 py-4 align-top">${cls.members.length} members</td>
                <td class="px-6 py-4 align-top">
                    ${cls.joinType === 'approval' && pendingCount > 0 ? 
                        `<button onclick="showRequests(${cls.id})" class="bg-orange-500 text-white px-2 py-1 rounded text-sm">${pendingCount} pending</button>` : 
                        pendingCount === 0 ? '0 pending' : '-'
                    }
                </td>
                <td class="px-6 py-4 align-top space-x-2">
                    <button onclick="joinClass(${cls.id})" class="text-blue-600 hover:text-blue-800 text-sm">Join</button>
                    <button onclick="deleteClass(${cls.id})" class="text-red-600 hover:text-red-800 text-sm ml-2">Delete</button>
                </td>
            `;
        });
    }

    // Show requests for a specific class
    function showRequests(classId) {
        const cls = classes.find(c => c.id === classId);
        if (!cls || cls.joinType !== 'approval') return;
        
        const panel = document.getElementById('requestsPanel');
        const container = document.getElementById('requestsList');
        
        if (cls.requests.length === 0) {
            panel.classList.add('hidden');
            return;
        }
        
        container.innerHTML = `
            <div class="border rounded-lg overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 font-semibold">${escapeHtml(cls.name)} - Join Requests</div>
                ${cls.requests.map(req => `
                    <div class="border-t px-4 py-3 flex justify-between items-center">
                        <div>
                            <div class="font-medium">${escapeHtml(req.userName)}</div>
                            <div class="text-sm text-gray-500">${escapeHtml(req.email)}</div>
                            <div class="text-xs text-gray-400">Requested: ${new Date(req.requestedAt).toLocaleString()}</div>
                        </div>
                        <div class="space-x-2">
                            <button onclick="approveRequest(${cls.id}, ${req.id})" class="bg-green-600 text-white px-3 py-1 rounded text-sm">Approve</button>
                            <button onclick="denyRequest(${cls.id}, ${req.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm">Deny</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
        panel.classList.remove('hidden');
    }

    // Approve a join request
    function approveRequest(classId, requestId) {
        const cls = classes.find(c => c.id === classId);
        if (!cls) return;
        
        const requestIndex = cls.requests.findIndex(r => r.id === requestId);
        if (requestIndex === -1) return;
        
        const request = cls.requests[requestIndex];
        // Add to members
        cls.members.push(request.email);
        // Remove from requests
        cls.requests.splice(requestIndex, 1);
        
        renderClassesTable();
        
        // Refresh requests panel if still open
        if (cls.requests.length > 0) {
            showRequests(classId);
        } else {
            document.getElementById('requestsPanel').classList.add('hidden');
        }
        
        alert(`Approved ${request.userName} to join the class!`);
    }

    // Deny a join request
    function denyRequest(classId, requestId) {
        const cls = classes.find(c => c.id === classId);
        if (!cls) return;
        
        const requestIndex = cls.requests.findIndex(r => r.id === requestId);
        if (requestIndex === -1) return;
        
        const request = cls.requests[requestIndex];
        cls.requests.splice(requestIndex, 1);
        
        renderClassesTable();
        
        if (cls.requests.length > 0) {
            showRequests(classId);
        } else {
            document.getElementById('requestsPanel').classList.add('hidden');
        }
        
        alert(`Denied ${request.userName}'s request.`);
    }

    // Join class (handles open vs approval)
    function joinClass(classId) {
        const cls = classes.find(c => c.id === classId);
        if (!cls) return;
        
        const userEmail = prompt("Enter your email address:", "student@example.com");
        if (!userEmail) return;
        
        const userName = prompt("Enter your name:", "Student Name");
        if (!userName) return;
        
        if (cls.joinType === 'open') {
            // Auto-join
            if (cls.members.includes(userEmail)) {
                alert("You're already a member of this class!");
                return;
            }
            cls.members.push(userEmail);
            renderClassesTable();
            alert(`Welcome to ${cls.name}! You've been automatically added.`);
        } else {
            // Requires approval - add to requests
            // Check if already requested
            const alreadyRequested = cls.requests.some(r => r.email === userEmail);
            if (alreadyRequested) {
                alert("You've already requested to join this class. Please wait for approval.");
                return;
            }
            
            // Check if already a member
            if (cls.members.includes(userEmail)) {
                alert("You're already a member of this class!");
                return;
            }
            
            cls.requests.push({
                id: nextRequestId++,
                email: userEmail,
                userName: userName,
                requestedAt: new Date().toISOString()
            });
            
            renderClassesTable();
            
            // Show notification that request was sent
            alert(`Request sent to join ${cls.name}. The class admin will approve or deny your request.`);
            
            // If this class's requests panel is open, refresh it
            const panel = document.getElementById('requestsPanel');
            if (!panel.classList.contains('hidden')) {
                // Check which class is currently shown (simple approach: find any class with pending)
                const anyClassWithRequests = classes.find(c => c.requests.length > 0);
                if (anyClassWithRequests) {
                    showRequests(anyClassWithRequests.id);
                }
            }
        }
    }

    // Delete a class
    function deleteClass(classId) {
        if (confirm("Are you sure you want to delete this class? All members and requests will be removed.")) {
            classes = classes.filter(c => c.id !== classId);
            renderClassesTable();
            
            // Hide requests panel if no classes have pending requests
            const hasRequests = classes.some(c => c.requests.length > 0);
            if (!hasRequests) {
                document.getElementById('requestsPanel').classList.add('hidden');
            }
        }
    }

    // Create new class from form
    document.getElementById('classForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('className').value.trim();
        if (!name) {
            alert("Class name is required");
            return;
        }
        
        const description = document.getElementById('classDescription').value;
        const joinType = document.querySelector('input[name="joinType"]:checked').value;
        
        const newClass = {
            id: nextClassId++,
            name: name,
            description: description,
            joinType: joinType,
            members: [],
            requests: []
        };
        
        classes.push(newClass);
        renderClassesTable();
        e.target.reset();
        // Reset radio to default
        document.querySelector('input[value="open"]').checked = true;
        
        alert(`Class "${name}" created successfully!`);
    });

    // Initial render
    renderClassesTable();
</script>

</body>
</html>
