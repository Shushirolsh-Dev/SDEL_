<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{background-color:#000;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
        .glass-panel{background:rgba(18,18,18,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05)}
        .code-box{background:#000;border:1px solid #ff6600;border-radius:12px;padding:8px 12px;font-family:monospace;font-size:14px;letter-spacing:1px}
        .copy-btn:hover{background:#ff6600;color:#000;transition:all 0.2s}
    </style>
</head>
<body class="p-5 pb-32">

<div class="max-w-4xl mx-auto">
    <header class="mb-10">
        <h1 class="text-3xl font-extrabold">Class <span class="text-orange-500">Manager</span></h1>
        <p class="text-gray-500 text-sm">Create classes with unique join codes</p>
    </header>

    <!-- Create Class Form -->
    <div class="glass-panel p-6 rounded-3xl mb-8">
        <h2 class="text-xl font-bold mb-4">📚 Create New Class</h2>
        
        <div id="message" class="hidden mb-4 p-3 rounded-xl"></div>
        
        <form id="classForm">
            <input type="text" id="className" placeholder="Class Name *" required 
                   class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white">
            
            <textarea id="classDescription" placeholder="Class Description" rows="3" 
                      class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea>
            
            <div class="mb-4 space-y-2">
                <label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer">
                    <input type="radio" name="joinType" value="open" checked class="mr-3">
                    <span>🌍 Anyone can join (open enrollment)</span>
                </label>
                <label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer">
                    <input type="radio" name="joinType" value="approval" class="mr-3">
                    <span>🔐 Approval required (must approve requests)</span>
                </label>
            </div>
            
            <button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700">
                <i class="fas fa-plus"></i> Create Class
            </button>
        </form>
    </div>

    <!-- Classes List -->
    <div class="glass-panel p-6 rounded-3xl">
        <h2 class="text-xl font-bold mb-4"><i class="fas fa-list"></i> My Classes</h2>
        <div id="classesList">
            <div class="text-center text-gray-500 py-8">
                <i class="fas fa-spinner fa-spin"></i> Loading classes...
            </div>
        </div>
    </div>

    <!-- Pending Requests Section -->
    <div id="requestsSection" class="glass-panel p-6 rounded-3xl mt-8 hidden">
        <h2 class="text-xl font-bold mb-4"><i class="fas fa-clock"></i> Pending Join Requests</h2>
        <div id="requestsList"></div>
    </div>
</div>

<script>
    const _SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
    const _SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
    
    const supabaseClient = supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);
    let currentUser = null;

    // Generate unique class code
    function generateClassCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < 10; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return 'THESDEL-' + result;
    }

    function showMessage(text, type = 'success') {
        const msgDiv = document.getElementById('message');
        msgDiv.className = `mb-4 p-3 rounded-xl ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        msgDiv.innerHTML = text;
        msgDiv.classList.remove('hidden');
        setTimeout(() => msgDiv.classList.add('hidden'), 3000);
    }

    function copyToClipboard(text, fieldName) {
        navigator.clipboard.writeText(text);
        showMessage(`${fieldName} copied to clipboard!`, 'success');
    }

    // Load classes
    async function loadClasses() {
        console.log('Loading classes...');
        
        try {
            // Get current user
            const { data: { user } } = await supabaseClient.auth.getUser();
            currentUser = user;
            
            let query = supabaseClient.from('classes').select('*');
            
            // If logged in, show their created classes
            if (currentUser) {
                query = query.eq('created_by', currentUser.id);
            }
            
            const { data: classes, error } = await query.order('created_at', { ascending: false });
            
            if (error) throw error;
            
            if (!classes || classes.length === 0) {
                document.getElementById('classesList').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-info-circle"></i><br>
                        No classes yet.<br>
                        <span class="text-sm">Create your first class using the form above!</span>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const cls of classes) {
                const joinLink = `${window.location.origin}/join.html?code=${cls.class_code}`;
                
                html += `
                    <div class="bg-black/30 p-4 rounded-xl mb-3 border-l-4 border-orange-500">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <h3 class="font-bold text-lg">${escapeHtml(cls.name)}</h3>
                                <p class="text-gray-400 text-sm mt-1">${escapeHtml(cls.description || 'No description')}</p>
                            </div>
                            <button onclick="deleteClass(${cls.id})" class="text-red-500 hover:text-red-400 ml-4">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        
                        <!-- Class Code Section -->
                        <div class="bg-black/50 p-3 rounded-xl mb-3">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs text-gray-400 uppercase tracking-wider">Class Code</span>
                                <button onclick="copyToClipboard('${cls.class_code}', 'Class code')" class="copy-btn text-xs text-orange-500 hover:text-white">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                            </div>
                            <div class="code-box flex justify-between items-center">
                                <code class="text-orange-500">${cls.class_code}</code>
                                <a href="${joinLink}" target="_blank" class="text-xs bg-orange-600 px-2 py-1 rounded hover:bg-orange-700">
                                    <i class="fas fa-external-link-alt"></i> Join Link
                                </a>
                            </div>
                        </div>
                        
                        <div class="flex gap-3 text-xs">
                            <span class="text-gray-500"><i class="fas fa-users"></i> ${cls.member_count || 0} members</span>
                            <span class="text-gray-500">${cls.join_type === 'open' ? '🌍 Open' : '🔐 Approval Required'}</span>
                            ${cls.join_type === 'approval' ? 
                                `<button onclick="showRequests(${cls.id})" class="text-orange-500 hover:text-orange-400">
                                    <i class="fas fa-clock"></i> View Requests
                                </button>` : ''}
                        </div>
                    </div>
                `;
            }
            document.getElementById('classesList').innerHTML = html;
        } catch (err) {
            console.error('Error:', err);
            document.getElementById('classesList').innerHTML = `
                <div class="text-center text-red-500 py-8">
                    <i class="fas fa-exclamation-triangle"></i><br>
                    Error: ${err.message}
                </div>
            `;
        }
    }

    // Create new class
    document.getElementById('classForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('className').value.trim();
        if (!name) {
            showMessage('Class name is required!', 'error');
            return;
        }
        
        const description = document.getElementById('classDescription').value;
        const joinType = document.querySelector('input[name="joinType"]:checked').value;
        const classCode = generateClassCode();
        
        // Get current user
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        if (!user) {
            showMessage('You must be logged in to create a class!', 'error');
            return;
        }
        
        try {
            const { data, error } = await supabaseClient
                .from('classes')
                .insert([{
                    name: name,
                    description: description,
                    join_type: joinType,
                    class_code: classCode,
                    created_by: user.id,
                    created_at: new Date()
                }])
                .select();
            
            if (error) throw error;
            
            showMessage(`✅ Class "${name}" created! Class code: ${classCode}`, 'success');
            document.getElementById('classForm').reset();
            document.querySelector('input[value="open"]').checked = true;
            await loadClasses();
        } catch (err) {
            showMessage('Error: ' + err.message, 'error');
        }
    });

    // Show pending requests
    window.showRequests = async (classId) => {
        const { data: requests, error } = await supabaseClient
            .from('class_requests')
            .select('*')
            .eq('class_id', classId)
            .eq('status', 'pending');
        
        if (error || !requests || requests.length === 0) {
            document.getElementById('requestsSection').classList.add('hidden');
            return;
        }
        
        const { data: classData } = await supabaseClient
            .from('classes')
            .select('name')
            .eq('id', classId)
            .single();
        
        let html = `<div class="mb-4 text-orange-500 font-bold">📖 ${classData.name}</div>`;
        
        for (const req of requests) {
            html += `
                <div class="bg-black/30 p-4 rounded-xl mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${escapeHtml(req.user_name || 'Student')}</p>
                        <p class="text-xs text-gray-500">${escapeHtml(req.user_email)}</p>
                        <p class="text-xs text-gray-600">Requested: ${new Date(req.requested_at).toLocaleString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveRequest(${classId}, ${req.id})" class="bg-green-600 px-3 py-1 rounded text-sm">
                            <i class="fas fa-check"></i> Approve
                        </button>
                        <button onclick="denyRequest(${classId}, ${req.id})" class="bg-red-600 px-3 py-1 rounded text-sm">
                            <i class="fas fa-times"></i> Deny
                        </button>
                    </div>
                </div>
            `;
        }
        
        document.getElementById('requestsList').innerHTML = html;
        document.getElementById('requestsSection').classList.remove('hidden');
    };

    // Approve request
    window.approveRequest = async (classId, requestId) => {
        await supabaseClient
            .from('class_requests')
            .update({ status: 'approved' })
            .eq('id', requestId);
        
        alert('✅ Student approved!');
        document.getElementById('requestsSection').classList.add('hidden');
        loadClasses();
    };

    // Deny request
    window.denyRequest = async (classId, requestId) => {
        await supabaseClient
            .from('class_requests')
            .update({ status: 'denied' })
            .eq('id', requestId);
        
        alert('❌ Request denied');
        document.getElementById('requestsSection').classList.add('hidden');
        loadClasses();
    };

    // Delete class
    window.deleteClass = async (classId) => {
        if (!confirm('Delete this class? All members and requests will be removed.')) return;
        
        const { error } = await supabaseClient
            .from('classes')
            .delete()
            .eq('id', classId);
        
        if (error) {
            showMessage('Error: ' + error.message, 'error');
        } else {
            showMessage('Class deleted!', 'success');
            loadClasses();
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadClasses();
</script>

</body>
</html>
