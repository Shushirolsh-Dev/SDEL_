<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class - Simple Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .class-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .class-info.show {
            display: block;
        }
        
        .class-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .class-info p {
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
            word-break: break-all;
        }
        
        .class-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Create a New Class</h1>
        <p class="subtitle">Fill in the details below to create your class</p>
        
        <form id="createClassForm">
            <div class="form-group">
                <label for="className">Class Name *</label>
                <input 
                    type="text" 
                    id="className" 
                    name="className" 
                    required 
                    placeholder="e.g., Computer Science 101"
                    autocomplete="off"
                >
            </div>
            
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <textarea 
                    id="description" 
                    name="description" 
                    placeholder="What is this class about?"
                ></textarea>
            </div>
            
            <button type="submit" id="submitBtn">
                ✨ Create Class
            </button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="classInfo" class="class-info"></div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const form = document.getElementById('createClassForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const classInfoDiv = document.getElementById('classInfo');
        
        // Show message helper
        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
                setTimeout(() => {
                    messageDiv.className = 'message';
                }, 300);
            }, 5000);
        }
        
        // Show class info on success
        function showClassInfo(classData) {
            classInfoDiv.innerHTML = `
                <h3>✅ Class Created Successfully!</h3>
                <p><strong>Name:</strong> ${classData.name}</p>
                <p><strong>Custom Link:</strong> ${classData.custom_link || 'Generating...'}</p>
                <p><strong>Class ID:</strong> ${classData.id}</p>
                <p><strong>Join Mode:</strong> ${classData.join_mode}</p>
                <hr style="margin: 10px 0; border-color: #ddd;">
                <p style="font-size: 12px; color: #888;">
                    🔗 Share this class with students using the custom link above
                </p>
            `;
            classInfoDiv.classList.add('show');
        }
        
        // Create class function
        async function createClass(className, description) {
            // Get current user
            const { data: { user }, error: userError } = await supabase.auth.getUser();
            
            if (userError || !user) {
                throw new Error('Please login first. User not authenticated.');
            }
            
            console.log('Creating class for user:', user.id);
            
            // Insert class
            const { data: classData, error: classError } = await supabase
                .from('classes')
                .insert({
                    name: className,
                    description: description || null,
                    rep_id: user.id,
                    join_mode: 'open'
                })
                .select()
                .single();
            
            if (classError) {
                throw new Error(`Class creation failed: ${classError.message}`);
            }
            
            // Add creator as member
            const { error: memberError } = await supabase
                .from('class_members')
                .insert({
                    class_id: classData.id,
                    user_id: user.id,
                    status: 'approved'
                });
            
            if (memberError) {
                console.warn('Member add failed, but class was created:', memberError);
                // Don't throw - class still exists
            }
            
            return classData;
        }
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const className = document.getElementById('className').value.trim();
            const description = document.getElementById('description').value.trim();
            
            // Validate
            if (!className) {
                showMessage('Please enter a class name', 'error');
                return;
            }
            
            if (className.length > 255) {
                showMessage('Class name is too long (max 255 characters)', 'error');
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Creating Class...';
            
            // Hide previous messages/info
            messageDiv.style.display = 'none';
            classInfoDiv.classList.remove('show');
            
            try {
                const newClass = await createClass(className, description);
                
                // Success!
                showMessage(`✨ Class "${newClass.name}" created successfully!`, 'success');
                showClassInfo(newClass);
                
                // Reset form
                form.reset();
                
                // Optional: Redirect after 3 seconds
                // setTimeout(() => {
                //     window.location.href = 'class.html';
                // }, 3000);
                
            } catch (error) {
                console.error('Creation error:', error);
                showMessage(error.message || 'Failed to create class. Please try again.', 'error');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Create Class';
            }
        });
        
        // Check authentication on page load
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                showMessage('⚠️ Please login to create a class. Redirecting...', 'error');
                setTimeout(() => {
                    window.location.href = 'https://thesdel.com';
                }, 2000);
                submitBtn.disabled = true;
            } else {
                console.log('✅ Authenticated user:', session.user.email);
                showMessage('✓ Ready to create your class!', 'success');
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
            }
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
