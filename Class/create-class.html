<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{background-color:#000;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
        .glass-panel{background:rgba(18,18,18,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05)}
        .nav-active{color:#ff6600!important}
    </style>
</head>
<body class="p-5 pb-32">

<header class="flex justify-between items-start mb-10">
    <div>
        <h1 class="text-3xl font-extrabold">Class <span class="text-orange-500">Manager</span></h1>
        <p class="text-gray-500 text-sm" id="userName"></p>
    </div>
    <div class="glass-panel px-4 py-2 rounded-xl">
        <p class="text-xl font-black" id="clock">00:00</p>
    </div>
</header>

<!-- Create Class Form -->
<div class="glass-panel p-6 rounded-3xl mb-8">
    <h2 class="text-2xl font-bold mb-4">📚 Create New Class</h2>
    <form id="classForm">
        <input type="text" id="className" placeholder="Class Name" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white">
        <textarea id="classDescription" placeholder="Description" rows="3" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea>
        
        <div class="mb-4 space-y-2">
            <label class="flex items-center p-3 bg-black/30 rounded-xl">
                <input type="radio" name="joinType" value="open" checked class="mr-3">
                <span>🌍 Anyone can join (no approval needed)</span>
            </label>
            <label class="flex items-center p-3 bg-black/30 rounded-xl">
                <input type="radio" name="joinType" value="approval" class="mr-3">
                <span>🔐 Approval required (you approve requests)</span>
            </label>
        </div>
        
        <button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">
            <i class="fas fa-plus"></i> Create Class
        </button>
    </form>
</div>

<!-- My Classes List -->
<div class="glass-panel p-6 rounded-3xl">
    <h2 class="text-2xl font-bold mb-4"><i class="fas fa-chalkboard"></i> My Classes</h2>
    <div id="classesList">
        <div class="text-center text-gray-500 py-8">Loading...</div>
    </div>
</div>

<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] glass-panel rounded-2xl p-3 flex justify-around">
    <a href="index.html" class="text-gray-500"><i class="fas fa-home text-xl"></i></a>
    <a href="build.html" class="text-gray-500"><i class="fas fa-layer-group text-xl"></i></a>
    <a href="classes.html" class="nav-active"><i class="fas fa-chalkboard text-xl"></i></a>
    <a href="ranks.html" class="text-gray-500"><i class="fas fa-trophy text-xl"></i></a>
    <a href="profile.html" class="text-gray-500"><i class="fas fa-user text-xl"></i></a>
</nav>

<script>
    const supabase = supabase.createClient(
        "https://lgfyrlfjoazedwymjpfc.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw"
    );

    let currentUser = null;

    // Display classes from database
    async function loadClasses() {
        const { data: classes, error } = await supabase
            .from('classes')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error('Error:', error);
            document.getElementById('classesList').innerHTML = `
                <div class="text-center text-red-500 py-8">
                    <i class="fas fa-exclamation-triangle"></i> Error: Table 'classes' doesn't exist yet.<br>
                    <span class="text-sm">Please run the CREATE TABLE SQL in Supabase first.</span>
                </div>
            `;
            return;
        }
        
        if (!classes || classes.length === 0) {
            document.getElementById('classesList').innerHTML = `
                <div class="text-center text-gray-500 py-8">
                    <i class="fas fa-info-circle"></i> No classes created yet.<br>
                    <span class="text-sm">Create your first class above!</span>
                </div>
            `;
            return;
        }
        
        let html = '';
        for (const cls of classes) {
            // Get member count
            const { count: memberCount } = await supabase
                .from('class_members')
                .select('*', { count: 'exact', head: true })
                .eq('class_id', cls.id);
            
            html += `
                <div class="bg-black/30 p-4 rounded-xl mb-3 border-l-4 border-orange-500">
                    <div class="flex justify-between">
                        <div>
                            <h3 class="font-bold text-lg">${escapeHtml(cls.name)}</h3>
                            <p class="text-gray-400 text-sm mt-1">${escapeHtml(cls.description || 'No description')}</p>
                            <div class="flex gap-3 mt-2 text-xs">
                                <span class="text-gray-500"><i class="fas fa-users"></i> ${memberCount || 0} members</span>
                                <span class="text-gray-500">${cls.join_type === 'open' ? '🌍 Open' : '🔐 Approval'}</span>
                                <span class="text-gray-500">📅 ${new Date(cls.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <button onclick="deleteClass(${cls.id})" class="text-red-500 hover:text-red-400">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        }
        document.getElementById('classesList').innerHTML = html;
    }

    // Create new class
    document.getElementById('classForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('className').value.trim();
        if (!name) {
            alert('Class name required');
            return;
        }
        
        const description = document.getElementById('classDescription').value;
        const joinType = document.querySelector('input[name="joinType"]:checked').value;
        
        const { data, error } = await supabase
            .from('classes')
            .insert([{
                name: name,
                description: description,
                join_type: joinType,
                created_by: currentUser?.id || null
            }]);
        
        if (error) {
            alert('Error: ' + error.message);
            console.error(error);
            return;
        }
        
        alert('✅ Class created successfully!');
        document.getElementById('classForm').reset();
        document.querySelector('input[value="open"]').checked = true;
        loadClasses(); // Refresh the list
    });

    // Delete class
    window.deleteClass = async (classId) => {
        if (!confirm('Delete this class?')) return;
        
        const { error } = await supabase
            .from('classes')
            .delete()
            .eq('id', classId);
        
        if (error) {
            alert('Error: ' + error.message);
        } else {
            alert('Class deleted');
            loadClasses();
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Check auth and initialize
    async function init() {
        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
        
        // Check login
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            document.getElementById('userName').innerText = `Welcome, ${user.email}`;
        } else {
            document.getElementById('userName').innerHTML = '<span class="text-orange-500">⚠️ Not logged in</span>';
        }
        
        loadClasses();
    }
    
    init();
</script>

</body>
</html>
