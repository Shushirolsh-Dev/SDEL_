<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class - The Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="class.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(18,18,18,0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.06); }
        .btn-orange { background: #ff6600; transition: all 0.2s; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-md mx-auto">
        <a href="class.html" class="text-orange-500 mb-4 inline-block">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        
        <div class="glass-panel p-6 rounded-2xl">
            <h1 class="text-2xl font-black mb-2">Create a Class</h1>
            <p class="text-gray-400 text-sm mb-6">You'll become the Class Representative</p>
            
            <form id="create-class-form">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Class Name *</label>
                    <input type="text" id="class-name" required class="w-full p-3 rounded-xl bg-black/50 border border-white/10 text-white">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Description</label>
                    <textarea id="class-desc" rows="3" class="w-full p-3 rounded-xl bg-black/50 border border-white/10 text-white"></textarea>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">Custom Link (Optional)</label>
                    <input type="text" id="custom-slug" placeholder="THESDEL-xxxxx" class="w-full p-3 rounded-xl bg-black/50 border border-white/10 text-white font-mono">
                    <p class="text-xs text-gray-500 mt-1">Leave empty for auto-generation</p>
                </div>
                
                <button type="submit" class="btn-orange w-full py-4 rounded-xl font-black uppercase tracking-wider">
                    Create Class
                </button>
            </form>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('create-class-form');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('class-name').value;
            const description = document.getElementById('class-desc').value;
            const customSlug = document.getElementById('custom-slug').value || null;
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            submitBtn.disabled = true;
            
            try {
                const result = await window.classApp.createClass(name, description, customSlug);
                alert(result.message);
                window.location.href = 'class.html';
            } catch (error) {
                alert('Error: ' + error.message);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
