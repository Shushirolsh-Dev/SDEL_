<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Class - The Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-orange {
            background: #ff6600;
            transition: all 0.2s;
        }
        .btn-orange:hover {
            background: #ff5500;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff6600;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .code-box {
            background: #000;
            border: 1px solid #ff6600;
            border-radius: 12px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="p-5">

    <div class="max-w-4xl mx-auto animate-fade">
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="text-orange-500 hover:text-orange-400 transition-colors">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            <button id="logout-btn" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div id="loading-state" class="text-center py-20">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-400">Loading your class...</p>
        </div>

        <div id="no-class-state" class="hidden">
            <div class="glass-panel p-8 rounded-2xl text-center">
                <div class="w-20 h-20 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-graduation-cap text-3xl text-orange-500"></i>
                </div>
                <h2 class="text-2xl font-black mb-2">No Class Found</h2>
                <p class="text-gray-400 mb-6">You haven't joined or created any class yet.</p>
                <a href="classes.html" class="btn-orange inline-flex px-6 py-3 rounded-xl font-bold items-center gap-2">
                    <i class="fas fa-plus-circle"></i> Create a Class
                </a>
            </div>
        </div>

        <div id="class-content" class="hidden">
            <div class="glass-panel p-6 rounded-2xl mb-6">
                <div class="flex justify-between items-start flex-wrap gap-4">
                    <div>
                        <h1 id="class-name" class="text-3xl font-black mb-2">Loading...</h1>
                        <p id="class-description" class="text-gray-400">Loading...</p>
                        <div class="flex items-center gap-3 mt-3 flex-wrap">
                            <span id="rep-badge" class="text-xs bg-orange-500/20 text-orange-500 px-2 py-1 rounded-full hidden">
                                <i class="fas fa-crown"></i> Class Creator
                            </span>
                            <span id="member-badge" class="text-xs bg-green-500/20 text-green-500 px-2 py-1 rounded-full">
                                <i class="fas fa-user-check"></i> Member
                            </span>
                        </div>
                    </div>
                    <button id="share-btn" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                        <i class="fas fa-share-alt"></i> Share Invite Link
                    </button>
                </div>
                
                <!-- Class Code Display -->
                <div class="mt-4 pt-4 border-t border-white/10">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400 uppercase tracking-wider">Class Code</span>
                        <button id="copy-code-btn" class="text-xs text-orange-500 hover:text-orange-400">
                            <i class="fas fa-copy"></i> Copy Code
                        </button>
                    </div>
                    <div class="code-box mt-2 flex justify-between items-center">
                        <code id="class-code-display" class="text-orange-500 font-mono text-sm">---</code>
                        <a id="join-link-preview" href="#" target="_blank" class="text-xs bg-orange-600 px-2 py-1 rounded hover:bg-orange-700">
                            <i class="fas fa-external-link-alt"></i> Join Link
                        </a>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="glass-panel p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-orange-500/20 rounded-full flex items-center justify-center">
                            <i class="fas fa-users text-orange-500"></i>
                        </div>
                        <div>
                            <p class="text-2xl font-bold" id="member-count">0</p>
                            <p class="text-xs text-gray-400">Members</p>
                        </div>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-orange-500/20 rounded-full flex items-center justify-center">
                            <i class="fas fa-lock text-orange-500"></i>
                        </div>
                        <div>
                            <p class="text-xl font-bold" id="join-mode">Open</p>
                            <p class="text-xs text-gray-400">Join Mode</p>
                        </div>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-orange-500/20 rounded-full flex items-center justify-center">
                            <i class="fas fa-calendar text-orange-500"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold" id="created-date">--</p>
                            <p class="text-xs text-gray-400">Created</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-users text-orange-500"></i> Class Members
                </h2>
                <div id="members-list" class="space-y-2">
                    <!-- Members will be loaded here -->
                </div>
            </div>

            <!-- Pending Requests (only for class creator) -->
            <div id="requests-section" class="glass-panel p-6 rounded-2xl mt-6 hidden">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-clock text-orange-500"></i> Pending Join Requests
                </h2>
                <div id="requests-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 hidden">
            <div id="toast" class="glass-panel px-6 py-3 rounded-xl flex items-center gap-3 shadow-2xl border border-white/10">
                <i id="toast-icon" class="fas fa-check-circle text-green-500"></i>
                <span id="toast-message" class="text-sm font-medium"></span>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentClass = null;
        let isCreator = false;

        function showToast(message, type = 'error') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');
            
            switch(type) {
                case 'error':
                    toastIcon.className = 'fas fa-exclamation-circle text-red-500';
                    break;
                case 'success':
                    toastIcon.className = 'fas fa-check-circle text-green-500';
                    break;
                case 'warning':
                    toastIcon.className = 'fas fa-exclamation-triangle text-yellow-500';
                    break;
            }
            
            toastMessage.innerText = message;
            toastContainer.classList.remove('hidden');
            
            setTimeout(() => {
                toastContainer.classList.add('hidden');
            }, 4000);
        }

        async function getCurrentUser() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (error || !user) {
                return null;
            }
            return user;
        }

        async function getUserClassAndRole() {
            const user = await getCurrentUser();
            if (!user) return { class: null, role: null };
            
            // Check if user is creator of any class
            const { data: createdClass } = await supabaseClient
                .from('classes')
                .select('*')
                .eq('created_by', user.id)
                .maybeSingle();
            
            if (createdClass) {
                return { class: createdClass, role: 'creator' };
            }
            
            // Check if user is member
            const { data: memberData } = await supabaseClient
                .from('class_members')
                .select('class_id')
                .eq('user_id', user.id)
                .maybeSingle();
            
            if (memberData) {
                const { data: classData } = await supabaseClient
                    .from('classes')
                    .select('*')
                    .eq('id', memberData.class_id)
                    .single();
                return { class: classData, role: 'member' };
            }
            
            return { class: null, role: null };
        }

        async function loadMembers(classId) {
            const { data: members, error } = await supabaseClient
                .from('class_members')
                .select('user_id, user_email, joined_at')
                .eq('class_id', classId);
            
            if (error) {
                console.error('Error loading members:', error);
                return [];
            }
            
            return members;
        }

        async function loadPendingRequests(classId) {
            if (!isCreator) return;
            
            const { data: requests, error } = await supabaseClient
                .from('class_requests')
                .select('*')
                .eq('class_id', classId)
                .eq('status', 'pending');
            
            if (error) {
                console.error('Error loading requests:', error);
                return;
            }
            
            const requestsSection = document.getElementById('requests-section');
            const requestsList = document.getElementById('requests-list');
            
            if (!requests || requests.length === 0) {
                requestsSection.classList.add('hidden');
                return;
            }
            
            requestsSection.classList.remove('hidden');
            
            requestsList.innerHTML = requests.map(req => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                    <div>
                        <p class="font-medium">${escapeHtml(req.user_name || req.user_email?.split('@')[0] || 'Student')}</p>
                        <p class="text-xs text-gray-400">${escapeHtml(req.user_email)}</p>
                        <p class="text-xs text-gray-500">Requested: ${new Date(req.requested_at).toLocaleString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveRequest(${req.id}, ${classId})" class="bg-green-600 px-3 py-1 rounded text-sm hover:bg-green-700">
                            <i class="fas fa-check"></i> Approve
                        </button>
                        <button onclick="denyRequest(${req.id}, ${classId})" class="bg-red-600 px-3 py-1 rounded text-sm hover:bg-red-700">
                            <i class="fas fa-times"></i> Deny
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.approveRequest = async (requestId, classId) => {
            // Get request details first
            const { data: request } = await supabaseClient
                .from('class_requests')
                .select('*')
                .eq('id', requestId)
                .single();
            
            if (!request) return;
            
            // Add to members
            await supabaseClient
                .from('class_members')
                .insert([{
                    class_id: classId,
                    user_id: request.user_id,
                    user_email: request.user_email
                }]);
            
            // Update request status
            await supabaseClient
                .from('class_requests')
                .update({ status: 'approved' })
                .eq('id', requestId);
            
            showToast('✅ Student approved!', 'success');
            loadMembers(classId);
            loadPendingRequests(classId);
        };

        window.denyRequest = async (requestId, classId) => {
            await supabaseClient
                .from('class_requests')
                .update({ status: 'denied' })
                .eq('id', requestId);
            
            showToast('❌ Request denied', 'warning');
            loadPendingRequests(classId);
        };

        function displayMembers(members) {
            const membersList = document.getElementById('members-list');
            document.getElementById('member-count').textContent = members.length;
            
            if (members.length === 0) {
                membersList.innerHTML = '<p class="text-gray-400 text-center py-4">No members yet. Share the invite link!</p>';
                return;
            }
            
            membersList.innerHTML = members.map(member => `
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-orange-500/20 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-orange-500 text-sm"></i>
                        </div>
                        <div>
                            <p class="font-medium">
                                ${member.user_email?.split('@')[0] || 'User'}
                            </p>
                            <p class="text-xs text-gray-400">${member.user_email || ''}</p>
                        </div>
                    </div>
                    <i class="fas fa-user-check text-green-500 text-sm"></i>
                </div>
            `).join('');
        }

        function displayClass(classData, role) {
            document.getElementById('class-name').textContent = classData.name;
            document.getElementById('class-description').textContent = classData.description || 'No description provided';
            document.getElementById('class-code-display').textContent = classData.class_code;
            document.getElementById('join-mode').textContent = classData.join_type === 'open' ? '🌍 Open (Anyone can join)' : '🔐 Approval Required';
            
            const createdDate = new Date(classData.created_at).toLocaleDateString();
            document.getElementById('created-date').textContent = createdDate;
            
            // Show appropriate badges
            document.getElementById('rep-badge').classList.add('hidden');
            document.getElementById('member-badge').classList.add('hidden');
            
            if (role === 'creator') {
                document.getElementById('rep-badge').classList.remove('hidden');
                isCreator = true;
            } else {
                document.getElementById('member-badge').classList.remove('hidden');
                isCreator = false;
            }
        }

        async function loadClassData() {
            try {
                const { class: classData, role } = await getUserClassAndRole();
                
                if (!classData) {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('no-class-state').classList.remove('hidden');
                    document.getElementById('class-content').classList.add('hidden');
                    return;
                }
                
                currentClass = classData;
                displayClass(classData, role);
                
                const members = await loadMembers(classData.id);
                displayMembers(members);
                
                if (isCreator && classData.join_type === 'approval') {
                    await loadPendingRequests(classData.id);
                }
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('no-class-state').classList.add('hidden');
                document.getElementById('class-content').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading class:', error);
                showToast('Failed to load class data', 'error');
            }
        }

        async function shareInvite() {
            if (!currentClass) return;
            
            const inviteLink = `${window.location.origin}/join.html?code=${currentClass.class_code}`;
            
            try {
                await navigator.clipboard.writeText(inviteLink);
                showToast('Invite link copied to clipboard!', 'success');
            } catch (err) {
                showToast('Share this link: ' + inviteLink, 'warning');
            }
        }

        async function copyClassCode() {
            if (!currentClass) return;
            
            try {
                await navigator.clipboard.writeText(currentClass.class_code);
                showToast('Class code copied!', 'success');
            } catch (err) {
                showToast('Could not copy code', 'error');
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        async function checkAuth() {
            const user = await getCurrentUser();
            if (!user) {
                showToast('Please login first', 'warning');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return false;
            }
            currentUser = user;
            return true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('share-btn')?.addEventListener('click', shareInvite);
        document.getElementById('copy-code-btn')?.addEventListener('click', copyClassCode);
        document.getElementById('logout-btn')?.addEventListener('click', logout);

        async function init() {
            const isAuthed = await checkAuth();
            if (isAuthed) {
                await loadClassData();
            }
        }
        
        init();
    </script>
</body>
</html>
