<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-5">

<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-4">Class Board</h1>
    
    <div id="content">
        <div class="text-center py-10">Loading...</div>
    </div>
    
    <div class="mt-8 flex gap-3">
        <a href="create-class.html" id="createLink" class="bg-orange-500 flex-1 text-center p-3 rounded font-bold">Create Class</a>
        <a href="join-class.html" id="joinLink" class="bg-gray-700 flex-1 text-center p-3 rounded font-bold">Join Class</a>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lgfyrlfjoazedwymjpfc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw";
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function checkClass() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            document.getElementById('content').innerHTML = '<div class="glass-panel p-5 rounded">Please login</div>';
            return;
        }
        
        // Get user's email
        const email = session.user.email;
        document.getElementById('content').innerHTML = `<div class="glass-panel p-5 rounded">Logged in as: ${email}<br>Checking your class...</div>`;
        
        // Check if user is a class rep
        const { data: asRep } = await supabase
            .from('classes')
            .select('name, custom_link')
            .eq('rep_id', session.user.id)
            .maybeSingle();
        
        if (asRep) {
            document.getElementById('content').innerHTML = `
                <div class="glass-panel p-5 rounded">
                    <h2 class="text-xl font-bold mb-2">${asRep.name}</h2>
                    <p class="text-gray-400">Your Link: ${asRep.custom_link}</p>
                    <p class="text-orange-500 mt-2">You are the Class Representative 👑</p>
                </div>
            `;
            document.getElementById('createLink').classList.add('hidden');
            document.getElementById('joinLink').classList.add('hidden');
            return;
        }
        
        // Check if user is a class member
        const { data: asMember } = await supabase
            .from('class_members')
            .select('class:classes(name, custom_link)')
            .eq('user_id', session.user.id)
            .eq('status', 'approved')
            .maybeSingle();
        
        if (asMember?.class) {
            document.getElementById('content').innerHTML = `
                <div class="glass-panel p-5 rounded">
                    <h2 class="text-xl font-bold mb-2">${asMember.class.name}</h2>
                    <p class="text-gray-400">Class Link: ${asMember.class.custom_link}</p>
                    <p class="text-blue-500 mt-2">You are a Member</p>
                </div>
            `;
            document.getElementById('createLink').classList.add('hidden');
            document.getElementById('joinLink').classList.add('hidden');
            return;
        }
        
        // No class
        document.getElementById('content').innerHTML = `
            <div class="glass-panel p-5 rounded text-center">
                <p class="mb-2">You haven't joined any class yet</p>
                <p class="text-gray-500 text-sm">Create a new class or join with a custom link</p>
            </div>
        `;
    }
    
    checkClass();
</script>
</body>
</html>
