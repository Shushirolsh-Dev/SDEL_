<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Join Class</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{background-color:#000;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
        .glass-panel{background:rgba(18,18,18,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05)}
    </style>
</head>
<body class="p-5">

<div class="max-w-md mx-auto mt-20">
    <div class="glass-panel p-8 rounded-3xl text-center">
        <i class="fas fa-chalkboard-user text-5xl text-orange-500 mb-4"></i>
        <h1 class="text-2xl font-bold mb-2">Join a Class</h1>
        <p class="text-gray-400 text-sm mb-6">Enter the class code to join</p>
        
        <input type="text" id="classCode" placeholder="THESDEL-xxxxxxxxxx" 
               class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-4 text-white text-center font-mono">
        
        <button onclick="joinClass()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700">
            <i class="fas fa-sign-in-alt"></i> Join Class
        </button>
        
        <div id="result" class="mt-4"></div>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        "https://lgfyrlfjoazedwymjpfc.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw"
    );

    // Get code from URL if present
    const urlParams = new URLSearchParams(window.location.search);
    const codeFromUrl = urlParams.get('code');
    if (codeFromUrl) {
        document.getElementById('classCode').value = codeFromUrl;
    }

    async function joinClass() {
        const classCode = document.getElementById('classCode').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!classCode) {
            resultDiv.innerHTML = '<div class="text-red-500">Please enter a class code</div>';
            return;
        }
        
        // Get current user
        const { data: { user } } = await supabase.auth.getUser();
        
        if (!user) {
            resultDiv.innerHTML = '<div class="text-red-500">Please login first <a href="cbt-login.html" class="text-orange-500">Login here</a></div>';
            return;
        }
        
        // Find class by code
        const { data: classData, error: classError } = await supabase
            .from('classes')
            .select('*')
            .eq('class_code', classCode)
            .single();
        
        if (classError || !classData) {
            resultDiv.innerHTML = '<div class="text-red-500">Invalid class code</div>';
            return;
        }
        
        // Check if already a member
        const { data: existingMember } = await supabase
            .from('class_members')
            .select('*')
            .eq('class_id', classData.id)
            .eq('user_id', user.id)
            .single();
        
        if (existingMember) {
            resultDiv.innerHTML = '<div class="text-yellow-500">You are already a member of this class!</div>';
            return;
        }
        
        if (classData.join_type === 'open') {
            // Auto-join
            const { error: joinError } = await supabase
                .from('class_members')
                .insert([{
                    class_id: classData.id,
                    user_id: user.id,
                    user_email: user.email
                }]);
            
            if (joinError) {
                resultDiv.innerHTML = '<div class="text-red-500">Error joining class</div>';
            } else {
                resultDiv.innerHTML = `<div class="text-green-500">✅ Successfully joined ${classData.name}!</div>`;
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        } else {
            // Approval required - create request
            const { error: requestError } = await supabase
                .from('class_requests')
                .insert([{
                    class_id: classData.id,
                    user_id: user.id,
                    user_email: user.email,
                    user_name: user.email?.split('@')[0] || 'Student',
                    status: 'pending'
                }]);
            
            if (requestError) {
                resultDiv.innerHTML = '<div class="text-red-500">Error sending request</div>';
            } else {
                resultDiv.innerHTML = `<div class="text-yellow-500">⏳ Request sent to join ${classData.name}. Wait for approval!</div>`;
            }
        }
    }
</script>

</body>
</html>
