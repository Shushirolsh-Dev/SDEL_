<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
    <title>Thesdel - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
</head>
<body>
    <div id="app" class="content-pb">
        <div class="p-5">
            <!-- Header will be loaded here -->
            <div id="header-container"></div>
            
            <!-- Main content changes per page -->
            <main class="animate-fade" id="main-content"></main>
            
            <!-- Modals (hidden by default) -->
            <div id="createModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Create New Class</h3><button onclick="closeCreateModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="createClassForm"><input type="text" id="className" placeholder="Class Name *" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><textarea id="classDescription" placeholder="Class Description" rows="3" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><div class="mb-4 space-y-2"><label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer"><input type="radio" name="joinType" value="open" checked class="mr-3"><span class="text-white">🌍 Anyone can join</span></label><label class="flex items-center p-3 bg-black/30 rounded-xl cursor-pointer"><input type="radio" name="joinType" value="approval" class="mr-3"><span class="text-white">🔐 Approval required</span></label></div><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Create Class</button></form><div id="createMessage" class="mt-3 text-sm"></div></div></div>
            
            <div id="joinModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Join a Class</h3><button onclick="closeJoinModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><div><input type="text" id="joinClassCode" placeholder="Enter class code" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white font-mono"><button onclick="submitJoin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Join Class</button></div><div id="joinMessage" class="mt-3 text-sm"></div></div></div>
            
            <div id="announcementModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Make Announcement</h3><button onclick="closeAnnouncementModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="announcementForm"><input type="text" id="announcementTitle" placeholder="Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><textarea id="announcementText" rows="3" placeholder="Content" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><input type="datetime-local" id="announcementStart" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="datetime-local" id="announcementEnd" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Post Announcement</button></form><div id="announcementMessage" class="mt-3 text-sm"></div></div></div>
            
            <div id="lectureModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Add Lecture</h3><button onclick="closeLectureModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="lectureForm"><input type="text" id="lectureTitle" placeholder="Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><select id="lectureDay" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><option value="">Select Day</option><option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option></select><input type="time" id="lectureTime" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="lectureDuration" placeholder="Duration" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="lectureVenue" placeholder="Venue" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Add Lecture</button></form><div id="lectureMessage" class="mt-3 text-sm"></div></div></div>
            
            <div id="examModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Schedule Exam</h3><button onclick="closeExamModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><form id="examForm"><input type="text" id="examTitle" placeholder="Exam Title" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="date" id="examDate" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="time" id="examTime" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><input type="text" id="examVenue" placeholder="Venue" required class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button type="submit" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Schedule Exam</button></form><div id="examMessage" class="mt-3 text-sm"></div></div></div>
            
            <div id="renameModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Rename Class</h3><button onclick="closeRenameModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><input type="text" id="newClassName" placeholder="New Class Name" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"><button onclick="renameClass()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Update Name</button></div></div>
            
            <div id="descriptionModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Edit Description</h3><button onclick="closeDescriptionModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><textarea id="newClassDescription" rows="4" placeholder="Class Description" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 mb-3 text-white"></textarea><button onclick="updateDescription()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl">Update Description</button></div></div>
            
            <div id="membersModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden"><div class="glass-panel p-6 rounded-2xl max-w-md w-full max-h-[80vh] overflow-y-auto"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-white">Class Members</h3><button onclick="closeMembersModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button></div><div id="membersListModal" class="space-y-2"></div></div></div>
        </div>
    </div>
    
    <div class="bottom-nav-fix"><div class="nav-container" id="bottomNav"></div></div>
    
    <script type="module" src="/js/app.js"></script>
</body>
</html>
