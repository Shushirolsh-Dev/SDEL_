<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'sunlight') document.documentElement.classList.add('sunlight-mode');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sdel | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: white; overflow-x: hidden; transition: background-color 0.3s; }
        .text-sdel { color: #FF6600; }
        .bg-sdel { background-color: #FF6600; }
        .card-zinc { background: rgba(18, 18, 18, 0.7); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        
        .sunlight-mode body { background-color: #ffffff; color: #121212; }
        .sunlight-mode .card-zinc { background: #f4f4f5; border-color: #e4e4e7; }
        .sunlight-mode .bg-black\/50 { background: rgba(0,0,0,0.05); }
        
        .product-card { cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background-color: rgba(255,255,255,0.3); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .sunlight-mode .star { background-color: rgba(0,0,0,0.1); }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(20px);
        }
        .sunlight-mode .modal { background: rgba(255,255,255,0.95); }
        .modal-content { max-width: 400px; width: 100%; max-height: 85vh; overflow-y: auto; border-radius: 32px; }
        .modal::-webkit-scrollbar { display: none; }
        
        .share-btn {
            background: rgba(255, 102, 0, 0.1);
            border: 1px solid rgba(255, 102, 0, 0.3);
            color: #FF6600;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .rating-star { color: #FF6600; }
        .rating-star.empty { color: #3f3f46; }
        .sunlight-mode .rating-star.empty { color: #d4d4d8; }
        
        .skeleton-card {
            background: rgba(18, 18, 18, 0.7);
            border-radius: 16px;
            overflow: hidden;
        }
        .skeleton-image { height: 160px; background: rgba(255,255,255,0.05); animation: pulse 1.5s infinite; }
        .skeleton-line { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 8px; animation: pulse 1.5s infinite; }
        .sunlight-mode .skeleton-image, .sunlight-mode .skeleton-line { background: #e4e4e7; }
        @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="pb-24">
    <div class="stars" id="stars"></div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- Navigation -->
    <nav class="p-4 flex items-center justify-between border-b border-white/10 sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <button onclick="window.history.back()" class="text-gray-400 p-2">
            <i data-lucide="arrow-left" size="20"></i>
        </button>
        <h1 class="text-base font-black uppercase tracking-tighter italic">Store <span class="text-sdel">Profile</span></h1>
        <div class="w-10"></div>
    </nav>

    <!-- Store Header (Dynamic) -->
    <div id="store-header" class="relative">
        <div class="h-32 bg-gradient-to-r from-sdel/20 to-transparent"></div>
        <div class="px-6 -mt-12">
            <div class="flex items-end justify-between">
                <div class="w-24 h-24 rounded-2xl bg-sdel/20 border-4 border-black flex items-center justify-center text-sdel">
                    <i data-lucide="store" size="40"></i>
                </div>
                <button id="follow-btn" onclick="toggleFollow()" class="px-4 py-2 rounded-xl bg-zinc-900 text-[10px] font-black uppercase tracking-wider">
                    <i data-lucide="heart" size="14" class="inline mr-1"></i> Follow
                </button>
            </div>
            <div class="mt-3">
                <h2 id="store-name" class="text-xl font-black uppercase italic tracking-tighter">Loading...</h2>
                <p id="store-category" class="text-[9px] text-sdel font-black uppercase tracking-widest mt-1">Loading</p>
                <div class="flex items-center gap-4 mt-2">
                    <div class="flex items-center gap-1">
                        <i data-lucide="star" size="12" class="text-sdel fill-sdel"></i>
                        <span id="store-rating" class="text-[10px] font-bold">0.0</span>
                        <span class="text-[8px] text-zinc-500">(0 reviews)</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <i data-lucide="package" size="12" class="text-zinc-500"></i>
                        <span id="product-count" class="text-[10px] font-bold">0</span>
                        <span class="text-[8px] text-zinc-500">products</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <i data-lucide="users" size="12" class="text-zinc-500"></i>
                        <span id="follower-count" class="text-[10px] font-bold">0</span>
                        <span class="text-[8px] text-zinc-500">followers</span>
                    </div>
                </div>
                <p id="store-bio" class="text-[10px] text-zinc-400 mt-3 leading-relaxed">Loading store information...</p>
                <div id="contact-info" class="flex gap-3 mt-3">
                    <button onclick="contactSeller()" class="flex-1 bg-sdel text-black py-2 rounded-xl font-black uppercase text-[9px] tracking-wider">Contact Seller</button>
                    <button onclick="shareStore()" class="px-4 py-2 rounded-xl border border-white/10 text-[9px] font-black uppercase">Share</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Tabs -->
    <div class="px-6 mt-6 flex space-x-2 overflow-x-auto no-scrollbar border-b border-white/10 pb-2">
        <button onclick="filterStoreProducts('All', event)" class="store-filter active px-3 py-1.5 rounded-xl text-[9px] font-black uppercase whitespace-nowrap">All Products</button>
    </div>

    <!-- Products Grid -->
    <main class="px-4 mt-4 grid grid-cols-2 gap-3" id="products-list">
        <div class="skeleton-card"><div class="skeleton-image"></div><div class="p-3"><div class="skeleton-line w-2/3"></div><div class="skeleton-line w-1/2"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-image"></div><div class="p-3"><div class="skeleton-line w-2/3"></div><div class="skeleton-line w-1/2"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-image"></div><div class="p-3"><div class="skeleton-line w-2/3"></div><div class="skeleton-line w-1/2"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-image"></div><div class="p-3"><div class="skeleton-line w-2/3"></div><div class="skeleton-line w-1/2"></div></div></div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://lgfyrlfjoazedwymjpfc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw');

        let currentUserId = null;
        let storeOwnerId = null;
        let storeProducts = [];
        let storeInfo = null;
        let userCart = {};
        let isFollowing = false;

        // Get vendor ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        storeOwnerId = urlParams.get('vendor_id');

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) currentUserId = session.user.id;
            
            await fetchUserCart();
            await loadStoreInfo();
            await loadStoreProducts();
            await checkFollowStatus();
            createStars();
            lucide.createIcons();
        }

        async function fetchUserCart() {
            if (!currentUserId) return;
            const { data } = await supabase.from('cart').select('product_id, quantity').eq('user_id', currentUserId);
            userCart = {};
            if (data) data.forEach(item => userCart[item.product_id] = item.quantity);
        }

        async function loadStoreInfo() {
            if (!storeOwnerId) {
                window.location.href = 'market.html';
                return;
            }

            // Get vendor info
            const { data: vendor } = await supabase
                .from('vendors')
                .select('*')
                .eq('user_id', storeOwnerId)
                .single();

            if (!vendor || vendor.status !== 'verified') {
                document.getElementById('products-list').innerHTML = `<div class="col-span-full text-center py-20"><p class="text-[10px] font-black uppercase text-zinc-500">Store not found or not verified</p></div>`;
                return;
            }

            // Get profile info (school, name)
            const { data: profile } = await supabase
                .from('profile')
                .select('school_name, full_name, avatar_url')
                .eq('id', storeOwnerId)
                .single();

            // Get product count
            const { count: productCount } = await supabase
                .from('products')
                .select('*', { count: 'exact', head: true })
                .eq('vendor_id', storeOwnerId);

            // Get follower count
            const { count: followerCount } = await supabase
                .from('store_followers')
                .select('*', { count: 'exact', head: true })
                .eq('vendor_id', storeOwnerId);

            storeInfo = {
                business_name: vendor.business_name,
                category: vendor.category,
                school: profile?.school_name || 'Unknown School',
                bio: `${vendor.business_name} sells ${vendor.category} items on Sdel Campus Market.`,
                productCount: productCount || 0,
                followerCount: followerCount || 0,
                rating: 4.5 // Placeholder - can implement reviews later
            };

            document.getElementById('store-name').innerText = storeInfo.business_name;
            document.getElementById('store-category').innerText = storeInfo.category;
            document.getElementById('store-bio').innerHTML = `🏫 Selling to <span class="text-sdel">${storeInfo.school}</span> students only<br>📦 ${storeInfo.productCount} products available`;
            document.getElementById('product-count').innerText = storeInfo.productCount;
            document.getElementById('follower-count').innerText = storeInfo.followerCount;
            document.getElementById('store-rating').innerText = storeInfo.rating;
        }

        async function loadStoreProducts() {
            const { data } = await supabase
                .from('products')
                .select('*')
                .eq('vendor_id', storeOwnerId)
                .order('created_at', { ascending: false });

            storeProducts = data || [];
            renderProducts(storeProducts);
            
            // Load categories from products
            const categories = [...new Set(storeProducts.map(p => p.category))];
            const container = document.querySelector('#products-list').parentElement.querySelector('.store-filter');
            if (container && categories.length > 0) {
                const tabContainer = document.querySelector('.flex.space-x-2');
                tabContainer.innerHTML = `<button onclick="filterStoreProducts('All', event)" class="store-filter active px-3 py-1.5 rounded-xl text-[9px] font-black uppercase whitespace-nowrap">All Products</button>` +
                    categories.map(cat => `<button onclick="filterStoreProducts('${cat}', event)" class="store-filter px-3 py-1.5 rounded-xl text-[9px] font-black uppercase whitespace-nowrap">${cat}</button>`).join('');
            }
        }

        async function checkFollowStatus() {
            if (!currentUserId) return;
            const { data } = await supabase
                .from('store_followers')
                .select('*')
                .eq('vendor_id', storeOwnerId)
                .eq('user_id', currentUserId)
                .single();
            
            isFollowing = !!data;
            const btn = document.getElementById('follow-btn');
            if (isFollowing) {
                btn.innerHTML = '<i data-lucide="heart" size="14" class="inline mr-1 fill-sdel"></i> Following';
                btn.classList.add('bg-sdel/20', 'text-sdel');
            } else {
                btn.innerHTML = '<i data-lucide="heart" size="14" class="inline mr-1"></i> Follow';
                btn.classList.remove('bg-sdel/20', 'text-sdel');
            }
            lucide.createIcons();
        }

        window.toggleFollow = async () => {
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }
            
            if (isFollowing) {
                await supabase.from('store_followers').delete().eq('vendor_id', storeOwnerId).eq('user_id', currentUserId);
                showToast("Unfollowed store");
            } else {
                await supabase.from('store_followers').insert({ vendor_id: storeOwnerId, user_id: currentUserId });
                showToast("Following store");
            }
            isFollowing = !isFollowing;
            await loadStoreInfo();
            checkFollowStatus();
        };

        window.contactSeller = () => {
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }
            window.location.href = `chat.html?user_id=${storeOwnerId}`;
        };

        window.shareStore = () => {
            const url = `${window.location.origin}/store.html?vendor_id=${storeOwnerId}`;
            navigator.clipboard.writeText(url);
            showToast("Store link copied!");
        };

        window.filterStoreProducts = (cat, e) => {
            document.querySelectorAll('.store-filter').forEach(p => p.classList.remove('active', 'bg-sdel', 'text-black'));
            e.currentTarget.classList.add('active', 'bg-sdel', 'text-black');
            const filtered = cat === 'All' ? storeProducts : storeProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        };

        function renderProducts(items) {
            const list = document.getElementById('products-list');
            if (items.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-20"><p class="text-[10px] font-black uppercase text-zinc-500">No products in this category</p></div>`;
                return;
            }

            list.innerHTML = items.map(item => {
                const inCart = userCart[item.id];
                const stock = item.stock || 0;
                let stockText = stock > 0 ? `${stock} left` : 'Out';
                let stockColor = stock > 0 ? 'text-green-500' : 'text-red-500';
                
                return `
                    <div class="card-zinc rounded-xl overflow-hidden product-card" onclick="openProductModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        <div class="relative h-32">
                            <img src="${item.image_url}" class="object-cover w-full h-full" onerror="this.src='https://placehold.co/400x400/121212/FF6600?text=No+Preview'">
                            <div class="absolute top-2 left-2 bg-black/60 backdrop-blur-md px-2 py-0.5 rounded-lg">
                                <p class="text-[6px] text-sdel font-black uppercase">${item.category}</p>
                            </div>
                        </div>
                        <div class="p-3">
                            <h3 class="font-black text-[11px] uppercase truncate">${item.name}</h3>
                            <p class="font-black text-xs text-sdel mt-1">₦${item.price.toLocaleString()}</p>
                            <p class="text-[8px] ${stockColor} font-bold mt-1">${stockText}</p>
                            ${!inCart && stock > 0 ? `
                                <button onclick="event.stopPropagation(); addToCart('${item.id}')" class="w-full bg-white text-black py-1.5 rounded-lg font-black uppercase text-[7px] tracking-wider mt-2">Add to Cart</button>
                            ` : inCart ? `
                                <button onclick="event.stopPropagation(); window.location.href='cart.html'" class="w-full bg-sdel text-black py-1.5 rounded-lg font-black uppercase text-[7px] tracking-wider mt-2">In Cart</button>
                            ` : `
                                <button disabled class="w-full bg-zinc-800 text-zinc-500 py-1.5 rounded-lg font-black uppercase text-[7px] tracking-wider mt-2">Out of Stock</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        window.openProductModal = (product) => {
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            const inCart = userCart[product.id];
            const stock = product.stock || 0;
            
            modalContent.innerHTML = `
                <div class="card-zinc rounded-3xl overflow-hidden">
                    <div class="relative">
                        <img src="${product.image_url}" class="w-full h-64 object-cover">
                        <button onclick="closeModal()" class="absolute top-3 right-3 bg-black/50 p-2 rounded-full"><i data-lucide="x" size="18"></i></button>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start">
                            <h2 class="font-black text-xl uppercase">${product.name}</h2>
                            <p class="font-black text-2xl text-sdel">₦${product.price.toLocaleString()}</p>
                        </div>
                        <p class="text-xs text-zinc-400 mt-2">${product.description || 'No description'}</p>
                        <p class="text-[9px] text-zinc-500 mt-2">🏫 Sold by: ${storeInfo?.business_name}</p>
                        <div class="mt-4">
                            ${inCart ? `
                                <div class="flex gap-2">
                                    <div class="flex items-center bg-zinc-900 rounded-2xl flex-1">
                                        <button onclick="updateQty('${product.id}', -1)" class="px-4 py-3"><i data-lucide="minus" size="14"></i></button>
                                        <span class="text-sm font-black w-8 text-center">${inCart}</span>
                                        <button onclick="updateQty('${product.id}', 1)" class="px-4 py-3"><i data-lucide="plus" size="14"></i></button>
                                    </div>
                                    <button onclick="window.location.href='cart.html'" class="flex-1 bg-sdel text-black py-3 rounded-2xl font-black text-[10px]">View Cart</button>
                                </div>
                            ` : stock > 0 ? `
                                <button onclick="addToCart('${product.id}')" class="w-full bg-sdel text-black py-3 rounded-2xl font-black text-[10px]">Add to Cart</button>
                            ` : `
                                <button disabled class="w-full bg-zinc-800 text-zinc-500 py-3 rounded-2xl font-black text-[10px]">Out of Stock</button>
                            `}
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
            lucide.createIcons();
        };

        window.addToCart = async (id) => {
            if (!currentUserId) { window.location.href = 'login.html'; return; }
            const product = storeProducts.find(p => p.id === id);
            if (!product || (product.stock || 0) < 1) return showToast("Out of stock!");
            
            userCart[id] = 1;
            await supabase.from('cart').insert([{ user_id: currentUserId, product_id: id, quantity: 1 }]);
            showToast("Added to cart!");
            renderProducts(document.querySelector('.store-filter.active')?.innerText === 'All Products' ? storeProducts : storeProducts.filter(p => p.category === document.querySelector('.store-filter.active')?.innerText));
        };

        window.updateQty = async (id, change) => {
            let newQty = (userCart[id] || 0) + change;
            if (newQty < 1) return;
            userCart[id] = newQty;
            await supabase.from('cart').update({ quantity: newQty }).eq('user_id', currentUserId).eq('product_id', id);
            closeModal();
            renderProducts(document.querySelector('.store-filter.active')?.innerText === 'All Products' ? storeProducts : storeProducts.filter(p => p.category === document.querySelector('.store-filter.active')?.innerText));
        };

        window.closeModal = () => document.getElementById('product-modal').style.display = 'none';

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:#FF6600;color:black;padding:10px 20px;border-radius:30px;font-weight:700;font-size:12px;z-index:9999;transition:transform .3s';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(0)', 10);
            setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(100px)', 2000);
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div'); star.classList.add('star');
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                star.style.left = (Math.random() * 100) + 'vw';
                star.style.top = (Math.random() * 100) + 'vh';
                star.style.animationDuration = (Math.random() * 20 + 20) + 's';
                container.appendChild(star);
            }
        }

        init();
    </script>
</body>
</html>
