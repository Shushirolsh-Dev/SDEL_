<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Register Your School · Asperthan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6f2;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .navbar {
      background: #DEB887;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .help-link {
      color: #2c241e;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .help-link:hover {
      text-decoration: underline;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.3);
      border-radius: 40px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .registration-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .registration-header {
      margin-bottom: 32px;
    }

    .registration-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1a1a1a;
    }

    .registration-header p {
      color: #5f5548;
      margin-top: 8px;
      font-size: 0.875rem;
    }

    .progress-steps {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      background: white;
      border-radius: 12px;
      padding: 8px 24px;
      border: 1px solid #ede4d9;
    }

    .step {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      color: #b4a592;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .step.active {
      color: #1a472a;
    }

    .step.completed {
      color: #b87c3a;
    }

    .step-number {
      width: 28px;
      height: 28px;
      background: #f0ebe4;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .step.active .step-number {
      background: #1a472a;
      color: white;
    }

    .step.completed .step-number {
      background: #b87c3a;
      color: white;
    }

    .form-section {
      background: white;
      border-radius: 20px;
      margin-bottom: 24px;
      border: 1px solid #ede4d9;
      overflow: hidden;
    }

    .section-header {
      padding: 20px 28px;
      border-bottom: 1px solid #f0ebe4;
      background: #fefcf9;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-header p {
      font-size: 0.75rem;
      color: #8f806e;
      margin-top: 4px;
    }

    .section-body {
      padding: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field.full-width {
      grid-column: span 2;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #4a3b32;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    label .required {
      color: #c47a2e;
      margin-left: 2px;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1.5px solid #e2d5c8;
      border-radius: 12px;
      font-size: 0.875rem;
      font-family: inherit;
      transition: all 0.2s;
      background: #fefcf9;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.2);
    }

    .phone-single {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fefcf9;
      border: 1.5px solid #e2d5c8;
      border-radius: 12px;
      padding: 0 8px;
    }

    .phone-single select {
      border: none;
      background: transparent;
      width: auto;
      padding: 12px 4px 12px 0;
    }

    .phone-single input {
      border: none;
      flex: 1;
      padding: 12px 8px;
    }

    .phone-single:focus-within {
      border-color: #DEB887;
      box-shadow: 0 0 0 3px rgba(222,184,135,0.2);
    }

    .capacity-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .capacity-select {
      flex: 2;
    }

    .capacity-custom {
      flex: 1;
      display: none;
    }

    .capacity-custom.active {
      display: block;
    }

    .billing-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: #f0ebe4;
      padding: 6px;
      border-radius: 48px;
      width: fit-content;
    }

    .billing-option {
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: #4a3b32;
    }

    .billing-option.active {
      background: #1a472a;
      color: white;
    }

    .pricing-preview {
      background: #fefcf9;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid #ede4d9;
    }

    .pricing-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 0.875rem;
    }

    .pricing-row.total {
      border-top: 2px solid #ede4d9;
      margin-top: 8px;
      padding-top: 14px;
      font-weight: 700;
      font-size: 1rem;
      color: #b87c3a;
    }

    .pricing-note {
      font-size: 0.7rem;
      color: #8f806e;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #ede4d9;
    }

    .parent-premium-card {
      background: #fefaf5;
      border: 1px solid #ede4d9;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .disclaimer {
      font-size: 0.65rem;
      color: #8f806e;
      margin-top: 16px;
      padding: 12px;
      background: #fefaf5;
      border-radius: 12px;
      border-left: 3px solid #b87c3a;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: #b87c3a;
    }

    .checkbox-row label {
      text-transform: none;
      font-weight: normal;
      font-size: 0.8rem;
      color: #4a3b32;
    }

    .checkbox-row a {
      color: #b87c3a;
      text-decoration: none;
    }

    .checkbox-row a:hover {
      text-decoration: underline;
    }

    .submit-area {
      background: white;
      border-radius: 20px;
      padding: 24px 28px;
      border: 1px solid #ede4d9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid #e2d5c8;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: #4a3b32;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: #f0ebe4;
    }

    .btn-primary {
      background: #1a472a;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #0e3622;
    }

    .alert {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.875rem;
      margin-top: 20px;
    }

    .alert-error {
      background: #fef2f2;
      border-left: 3px solid #ef4444;
      color: #b91c1c;
    }

    .alert-success {
      background: #f0fdf4;
      border-left: 3px solid #10b981;
      color: #166534;
    }

    .alert-info {
      background: #fefce8;
      border-left: 3px solid #eab308;
      color: #854d0e;
    }

    /* Processing Page Styles */
    .processing-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 48px 32px;
      background: white;
      border-radius: 32px;
      border: 1px solid #ede4d9;
      text-align: center;
    }

    .processing-icon {
      width: 80px;
      height: 80px;
      background: #fefaf5;
      border-radius: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 3rem;
    }

    .processing-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .processing-message {
      color: #5f5548;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .timeline {
      background: #f8f6f2;
      border-radius: 20px;
      padding: 24px;
      margin: 32px 0;
      text-align: left;
    }

    .timeline-item {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #ede4d9;
    }

    .timeline-item:last-child {
      border-bottom: none;
    }

    .timeline-day {
      width: 120px;
      font-weight: 700;
      color: #b87c3a;
    }

    .timeline-text {
      flex: 1;
    }

    @media (max-width: 700px) {
      .navbar { padding: 14px 20px; }
      .registration-container { padding: 24px 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-field.full-width { grid-column: span 1; }
      .progress-steps { display: none; }
      .billing-toggle { width: 100%; justify-content: center; }
      .timeline-item { flex-direction: column; gap: 8px; }
      .timeline-day { width: auto; }
    }
  </style>
</head>

<script>
  // YOUR SUPABASE CREDENTIALS
  const SUPABASE_URL = 'https://aqzwirdiksjswvujtjvp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxendpcmRpa3Nqc3d2dWp0anZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzA5NzEsImV4cCI6MjA5NDI0Njk3MX0.zOrM_95Yj9XWH44V8v6F1eSK49IkPOslCE28zNVNmnY';
  
  // Initialize Supabase client
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // Global state
  let currentBilling = 'term';
  let currentRegistrationId = null;
  
  // Pricing data (will be fetched from DB)
  let pricingData = {
    pricePerBlock: 8000,
    sessionPremium: 10,
    parentPremiumNgn: 500
  };
  
  // Countries data
  let countriesData = [];
  
  // Helper functions
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Fetch countries from Supabase
  async function fetchCountries() {
    try {
      const { data, error } = await supabase.from('countries').select('*').eq('is_active', true);
      if (error) throw error;
      if (data && data.length > 0) {
        countriesData = data;
      } else {
        // Fallback data
        countriesData = [
          { code: 'NG', name: 'Nigeria', currency_code: 'NGN', currency_symbol: '₦', phone_code: '+234' },
          { code: 'MZ', name: 'Mozambique', currency_code: 'MZN', currency_symbol: 'MT', phone_code: '+258' },
          { code: 'KE', name: 'Kenya', currency_code: 'KES', currency_symbol: 'KSh', phone_code: '+254' },
          { code: 'GH', name: 'Ghana', currency_code: 'GHS', currency_symbol: '₵', phone_code: '+233' },
          { code: 'ZA', name: 'South Africa', currency_code: 'ZAR', currency_symbol: 'R', phone_code: '+27' }
        ];
      }
      return true;
    } catch (error) {
      console.error('Error fetching countries:', error);
      // Fallback data
      countriesData = [
        { code: 'NG', name: 'Nigeria', currency_code: 'NGN', currency_symbol: '₦', phone_code: '+234' },
        { code: 'MZ', name: 'Mozambique', currency_code: 'MZN', currency_symbol: 'MT', phone_code: '+258' },
        { code: 'KE', name: 'Kenya', currency_code: 'KES', currency_symbol: 'KSh', phone_code: '+254' }
      ];
      return true;
    }
  }
  
  // Fetch pricing from Supabase reg_fee table
  async function fetchPricing() {
    try {
      const { data, error } = await supabase.from('reg_fee').select('*').eq('is_active', true).order('student_range_min');
      if (error) throw error;
      if (data && data.length > 0) {
        pricingData.pricePerBlock = data[0].price_per_100_ngn || 8000;
        pricingData.sessionPremium = data[0].session_premium_percent || 10;
        pricingData.parentPremiumNgn = data[0].parent_premium_monthly_ngn || 500;
      }
    } catch (error) {
      console.error('Error fetching pricing, using defaults:', error);
    }
  }
  
  // Calculate term price
  function calculateTermPrice(studentCount) {
    const blocks = Math.ceil(studentCount / 100);
    return blocks * pricingData.pricePerBlock;
  }
  
  // Calculate session price
  function calculateSessionPrice(studentCount) {
    const termPrice = calculateTermPrice(studentCount);
    return Math.round(termPrice * 3 * (1 + pricingData.sessionPremium / 100));
  }
  
  // Show Help Centre
  function showHelpCentre() {
    document.getElementById('appRoot').innerHTML = `
      <div class="processing-container">
        <div class="processing-icon">📖</div>
        <h1 class="processing-title">Help Centre</h1>
        <p class="processing-message">Find answers to common questions about registration, pricing, and platform features.</p>
        
        <div class="timeline" style="text-align: left;">
          <div class="timeline-item">

            <div class="timeline-text"><strong>How long does verification take?</strong><br>Typically within 7 working days. Some applications are approved same-day.</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-day">Pricing</div>
            <div class="timeline-text"><strong>How is pricing calculated?</strong><br>₦${pricingData.pricePerBlock.toLocaleString()} per 100 students per term. Session (9 months) includes ${pricingData.sessionPremium}% premium.</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-day">Support</div>
            <div class="timeline-text"><strong>Need immediate assistance?</strong><br>Email: support@asperthan.com<br>WhatsApp: +234 801 234 5678</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-day">Documents</div>
            <div class="timeline-text"><strong>Required documents for verification</strong><br>• School registration certificate<br>• Tax identification number<br>• Authorized signatory ID</div>
          </div>
        </div>
        
        <div class="disclaimer" style="margin-top: 24px;">
          <strong>Can't find what you're looking for?</strong><br>
          Contact our support team directly at <a href="mailto:support@asperthan.com">support@asperthan.com</a>
        </div>
        
        <div style="margin-top: 32px;">
          <button class="btn-secondary" onclick="showRegistrationForm()">Back to Registration</button>
        </div>
      </div>
    `;
  }
  
  // Show processing page after successful registration
  function showProcessingPage(registrationId, adminEmail, schoolName) {
    const expectedDate = new Date();
    expectedDate.setDate(expectedDate.getDate() + 7);
    const formattedDate = expectedDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    
    document.getElementById('appRoot').innerHTML = `
      <div class="processing-container">
        <div class="processing-icon">📋</div>
        <h1 class="processing-title">Registration Received</h1>
        <p class="processing-message">
          Thank you for registering <strong>${escapeHtml(schoolName)}</strong> with Asperthan.<br>
          Your application is now under review.
        </p>
        
        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-day">Today</div>
            <div class="timeline-text"><strong>Application submitted</strong><br>We've received your registration and sent a confirmation to ${escapeHtml(adminEmail)}</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-day">Within 7 working days</div>
            <div class="timeline-text"><strong>Team review</strong><br>Our compliance team will verify your institution's information</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-day">After approval</div>
            <div class="timeline-text"><strong>Dashboard access granted</strong><br>You'll receive an email with login instructions</div>
          </div>
        </div>
        
        <div class="alert alert-info">
          <strong>What happens next?</strong><br><br>
          • Our team will review your application within <strong>7 working days</strong><br>
          • You will receive an email notification once a decision is made<br>
          • If approved, you'll get immediate access to your admin dashboard<br>
          • If we need more information, we'll contact you at ${escapeHtml(adminEmail)}<br>
          • Approval can happen the same day depending on verification speed
        </div>
        
        <div class="disclaimer" style="margin-top: 24px; text-align: left;">
          <strong>Need help?</strong> Contact our support team at <a href="mailto:support@asperthan.com">support@asperthan.com</a> or visit our <a href="#" id="helpLinkInline">Help Centre</a>.
        </div>
        
        <div style="margin-top: 32px;">
          <button class="btn-secondary" onclick="checkStatus('${registrationId}')">Check Status</button>
          <button class="btn-primary" onclick="window.location.href='index.html'" style="margin-left: 12px;">Return Home</button>
        </div>
      </div>
    `;
    
    document.getElementById('helpLinkInline')?.addEventListener('click', (e) => {
      e.preventDefault();
      showHelpCentre();
    });
  }
  
  // Check registration status
  async function checkStatus(registrationId) {
    if (!registrationId) {
      const email = prompt('Enter the email address used for registration:');
      if (email) {
        const { data, error } = await supabase
          .from('school_registrations')
          .select('id, review_status, school_name')
          .eq('admin_email', email)
          .order('created_at', { ascending: false })
          .limit(1);
        
        if (error || !data || data.length === 0) {
          alert('No registration found with that email address.');
          return;
        }
        
        if (data[0].review_status === 'approved') {
          alert(`Your application for ${data[0].school_name} has been APPROVED! You can now log in.`);
        } else if (data[0].review_status === 'rejected') {
          alert(`Your application for ${data[0].school_name} was not approved. Please contact support.`);
        } else {
          alert(`Your application is ${data[0].review_status?.replace('_', ' ') || 'pending review'}. We'll email you once verified.`);
        }
      }
      return;
    }
    
    const { data, error } = await supabase
      .from('school_registrations')
      .select('review_status, school_name')
      .eq('id', registrationId)
      .single();
    
    if (error) {
      alert('Unable to fetch status. Please try again.');
      return;
    }
    
    if (data.review_status === 'approved') {
      alert(`CONGRATULATIONS! ${data.school_name} has been APPROVED! You can now log in to your dashboard.`);
    } else if (data.review_status === 'rejected') {
      alert(`Your application for ${data.school_name} was not approved. Please check your email for details.`);
    } else {
      alert(`Status: ${data.review_status?.replace('_', ' ') || 'Pending review'}. You will receive an email once verified.`);
    }
  }
  
  // Get student count from form
  function getStudentCount() {
    const select = document.getElementById('studentRangeSelect');
    if (!select) return 100;
    const selectedValue = select.value;
    if (selectedValue === 'custom') {
      let customVal = parseInt(document.getElementById('customStudentCount')?.value);
      return (!isNaN(customVal) && customVal > 0) ? customVal : 100;
    }
    const rangeMap = {
      '0-100': 100, '101-200': 200, '201-300': 300, '301-400': 400,
      '401-500': 500, '501-600': 600, '601-700': 700, '701-800': 800,
      '801-900': 900, '901-1000': 1000, '1000+': 1200
    };
    return rangeMap[selectedValue] || 100;
  }
  
  // Update pricing display
  function updatePricingDisplay() {
    const studentCount = getStudentCount();
    const blocks = Math.ceil(studentCount / 100);
    const termPrice = calculateTermPrice(studentCount);
    const sessionPrice = calculateSessionPrice(studentCount);
    const displayAmount = currentBilling === 'term' ? termPrice : sessionPrice;
    
    const baseFeeSpan = document.getElementById('baseFeeDisplay');
    const blocksSpan = document.getElementById('blocksCount');
    const totalSpan = document.getElementById('totalDisplay');
    const periodSpan = document.getElementById('periodLabel');
    const parentSpan = document.getElementById('parentPremiumDisplay');
    
    if (baseFeeSpan) baseFeeSpan.innerHTML = `₦${pricingData.pricePerBlock.toLocaleString()}`;
    if (blocksSpan) blocksSpan.innerText = blocks;
    if (totalSpan) totalSpan.innerHTML = `₦${displayAmount.toLocaleString()}`;
    if (periodSpan) periodSpan.innerText = currentBilling === 'term' ? 'term' : 'session';
    if (parentSpan) parentSpan.innerHTML = `₦${pricingData.parentPremiumNgn.toLocaleString()}`;
    
    const noteSpan = document.getElementById('pricingNote');
    if (noteSpan) {
      if (currentBilling === 'session') {
        noteSpan.innerHTML = `<strong>Session pricing (9 months):</strong> ${blocks} block(s) × ₦${pricingData.pricePerBlock.toLocaleString()} per block per term × 3 terms = ₦${(blocks * pricingData.pricePerBlock * 3).toLocaleString()} + ${pricingData.sessionPremium}% premium = ₦${sessionPrice.toLocaleString()} for the full session.`;
      } else {
        noteSpan.innerHTML = `<strong>Term pricing (3 months):</strong> ${blocks} block(s) of 100 students × ₦${pricingData.pricePerBlock.toLocaleString()} = ₦${termPrice.toLocaleString()} per term.`;
      }
    }
  }
  
  // Toggle custom capacity input
  function toggleCustomCapacity() {
    const select = document.getElementById('studentRangeSelect');
    const customDiv = document.getElementById('customCapacityDiv');
    if (select && customDiv) {
      if (select.value === 'custom') {
        customDiv.classList.add('active');
      } else {
        customDiv.classList.remove('active');
      }
    }
    updatePricingDisplay();
  }
  
  // Populate country dropdowns
  function populateCountrySelects() {
    const countrySelect = document.getElementById('country');
    const phoneCodeSelect = document.getElementById('phoneCode');
    
    if (!countrySelect || !phoneCodeSelect) return;
    
    countrySelect.innerHTML = '<option value="">Select country</option>';
    phoneCodeSelect.innerHTML = '';
    
    countriesData.forEach(country => {
      countrySelect.innerHTML += `<option value="${country.code}" data-phone="${country.phone_code}" data-symbol="${country.currency_symbol}">${country.name}</option>`;
      phoneCodeSelect.innerHTML += `<option value="${country.phone_code}">${country.phone_code}</option>`;
    });
    
    if (countriesData.length > 0) {
      phoneCodeSelect.value = countriesData[0].phone_code;
    }
  }
  
  // Update progress steps
  function updateProgressStep() {
    let filledCount = 0;
    const schoolName = document.getElementById('schoolName')?.value.trim();
    const region = document.getElementById('region')?.value;
    const country = document.getElementById('country')?.value;
    const adminName = document.getElementById('adminName')?.value.trim();
    const adminTitle = document.getElementById('adminTitle')?.value;
    const adminEmail = document.getElementById('adminEmail')?.value.trim();
    
    if (schoolName && region && country) filledCount++;
    filledCount++;
    if (adminName && adminTitle && adminEmail && adminEmail.includes('@')) filledCount++;
    if (document.getElementById('agreeAccuracy')?.checked && document.getElementById('agreePricing')?.checked && document.getElementById('agreeTerms')?.checked) filledCount++;
    
    [1, 2, 3, 4].forEach((step, idx) => {
      const stepEl = document.getElementById(`step${step}`);
      if (stepEl) {
        if (idx < filledCount) {
          stepEl.classList.add('completed');
          stepEl.classList.remove('active');
        } else if (idx === filledCount) {
          stepEl.classList.add('active');
          stepEl.classList.remove('completed');
        } else {
          stepEl.classList.remove('active', 'completed');
        }
      }
    });
  }
  
  // Handle form submission
  async function handleSubmit(event) {
    event.preventDefault();
    
    const schoolName = document.getElementById('schoolName')?.value.trim();
    const region = document.getElementById('region')?.value;
    const countryCode = document.getElementById('country')?.value;
    const address = document.getElementById('address')?.value;
    const phoneCode = document.getElementById('phoneCode')?.value;
    const phoneNumber = document.getElementById('phoneNumber')?.value.trim();
    const emailDomain = document.getElementById('emailDomain')?.value;
    const adminName = document.getElementById('adminName')?.value.trim();
    const adminTitle = document.getElementById('adminTitle')?.value;
    const adminEmail = document.getElementById('adminEmail')?.value.trim();
    const agreeAccuracy = document.getElementById('agreeAccuracy')?.checked;
    const agreePricingCheck = document.getElementById('agreePricing')?.checked;
    const agreeTerms = document.getElementById('agreeTerms')?.checked;
    
    if (!schoolName) { showError('Please enter your school name.'); return; }
    if (!region) { showError('Please select a region.'); return; }
    if (!countryCode) { showError('Please select a country.'); return; }
    if (!adminName) { showError('Please enter administrator name.'); return; }
    if (!adminTitle) { showError('Please select a job title.'); return; }
    if (!adminEmail || !adminEmail.includes('@')) { showError('Please enter a valid work email.'); return; }
    if (!agreeAccuracy || !agreePricingCheck || !agreeTerms) { showError('Please accept all terms to continue.'); return; }
    
    const fullPhoneNumber = phoneNumber ? `${phoneCode} ${phoneNumber}` : null;
    const studentCount = getStudentCount();
    const blocks = Math.ceil(studentCount / 100);
    const termPrice = calculateTermPrice(studentCount);
    const sessionPrice = calculateSessionPrice(studentCount);
    const finalAmount = currentBilling === 'term' ? termPrice : sessionPrice;
    
    const registrationData = {
      school_name: schoolName,
      region: region,
      country_code: countryCode,
      address: address || null,
      phone_number: fullPhoneNumber,
      email_domain: emailDomain || null,
      student_count: studentCount,
      billing_period: currentBilling,
      subscription_amount_ngn: finalAmount,
      currency_code: 'NGN',
      blocks_count: blocks,
      session_premium_applied: currentBilling === 'session',
      admin_name: adminName,
      admin_job_title: adminTitle,
      admin_email: adminEmail,
      parent_premium_enabled: true,
      parent_premium_monthly_ngn: pricingData.parentPremiumNgn,
      registration_status: 'pending_review',
      review_status: 'pending_review',
      terms_accepted: true,
      terms_accepted_at: new Date().toISOString(),
      user_agent: navigator.userAgent
    };
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = 'Processing...';
    
    try {
      const { data, error } = await supabase.from('school_registrations').insert([registrationData]).select();
      
      if (error) throw error;
      
      if (data && data[0]) {
        showProcessingPage(data[0].id, adminEmail, schoolName);
      } else {
        throw new Error('No data returned');
      }
    } catch (error) {
      console.error('Supabase error:', error);
      showError(`Registration failed: ${error.message}. Please try again.`);
      submitBtn.disabled = false;
      submitBtn.innerText = 'Register Institution';
    }
  }
  
  function showError(msg) {
    const statusDiv = document.getElementById('statusMessage');
    if (statusDiv) {
      statusDiv.innerHTML = `<div class="alert alert-error">✗ ${escapeHtml(msg)}</div>`;
      statusDiv.scrollIntoView({ behavior: 'smooth' });
    } else {
      alert(msg);
    }
  }

                  <label>Country <span class="required">*</span></label>
                  <select id="country" required></select>
                </div>

                  <label>Physical address</label>
                  <input type="text" id="address" placeholder="Street, city, postal code">
                </div>

                  <label>Official phone number</label>

                    </div>

                </div>
              </div>
              
              <div class="billing-toggle">
                <div class="billing-option active" data-billing="term">Per Term (3 months)</div>
                <div class="billing-option" data-billing="session">Per Session (9 months)</div>
              </div>
              
              <div class="pricing-preview" id="pricingPreview">
                <div class="pricing-row"><span>Base fee (per 100 students)</span><span><strong id="baseFeeDisplay">₦0</strong> / block</span></div>
                <div class="pricing-row"><span>Number of blocks (100 students each)</span><span><span id="blocksCount">0</span> blocks</span></div>
                <div class="pricing-row total"><span>Total subscription</span><span><strong id="totalDisplay">₦0</strong> / <span id="periodLabel">term</span></span></div>
                <div class="pricing-note" id="pricingNote">Loading pricing...</div>
              </div>
              
              <div class="parent-premium-card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                  <div><strong style="font-size: 0.875rem;">Parent Premium (Optional Add-On)</strong><p style="font-size: 0.75rem; color: #8f806e; margin-top: 4px;">Parents subscribe directly to Asperthan</p></div>
                  <div><span style="font-size: 1.25rem; font-weight: 700; color: #b87c3a;" id="parentPremiumDisplay">₦0</span><span style="font-size: 0.75rem;"> / month per parent</span></div>

          </div>
          
          <!-- SECTION 3: ADMINISTRATOR ACCOUNT -->
          <div class="form-section">
            <div class="section-header"><h2>Primary Administrator</h2><p>This person will receive all official communications</p></div>
            <div class="section-body">
              <div class="form-grid">
                <div class="form-field"><label>Full name <span class="required">*</span></label><input type="text" id="adminName" placeholder="e.g., Dr. Sarah Okafor" required></div>
                <div class="form-field"><label>Job title <span class="required">*</span></label>
                  <select id="adminTitle" required>
                    <option value="">Select job title</option>
                    <option value="principal">Principal / Head of School</option>
                    <option value="vice_principal">Vice Principal</option>
                    <option value="administrator">School Administrator</option>
                    <option value="it_director">IT Director / Manager</option>
                    <option value="registrar">Registrar</option>
                    <option value="proprietor">Proprietor / Owner</option>
                    <option value="finance_officer">Finance Officer</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="form-field full-width"><label>Work email <span class="required">*</span></label><input type="email" id="adminEmail" placeholder="admin@school.edu" required></div>
              </div>
            </div>
          </div>
          
          <!-- SECTION 4: CONFIRMATION & TERMS -->
          <div class="form-section">
            <div class="section-header"><h2>Review & Confirm</h2><p>Please review the terms before submitting</p></div>
            <div class="section-body">
              <div class="checkbox-row"><input type="checkbox" id="agreeAccuracy" required><label>I confirm that the information provided is accurate and I have authority to register this institution.</label></div>
              <div class="checkbox-row"><input type="checkbox" id="agreePricing" required><label>I understand the pricing structure and agree to the subscription terms.</label></div>
              <div class="checkbox-row"><input type="checkbox" id="agreeTerms" required><label>I have read and accept the <a href="#" target="_blank">Terms of Service</a>, <a href="#" target="_blank">Data Processing Agreement</a>, and <a href="#" target="_blank">Privacy Policy</a>.</label></div>
              <hr>
              <div class="disclaimer"><strong>Legal Disclaimer:</strong> By registering your institution, you enter into a binding agreement with Asperthan. All school data is protected under applicable data protection laws.</div>
            </div>
          </div>
          
          <div class="submit-area">

    document.getElementById('appRoot').innerHTML = formHtml;
    
    // Re-attach event listeners
    document.getElementById('studentRangeSelect')?.addEventListener('change', () => {
      toggleCustomCapacity();
      updatePricingDisplay();
    });
    document.getElementById('customStudentCount')?.addEventListener('input', updatePricingDisplay);
    
    document.querySelectorAll('.billing-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.billing-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        currentBilling = opt.getAttribute('data-billing');
        updatePricingDisplay();
      });
    });
    
    document.querySelectorAll('#schoolRegistrationForm input, #schoolRegistrationForm select').forEach(el => {
      el.addEventListener('change', updateProgressStep);
      el.addEventListener('input', updateProgressStep);
    });
    
    document.getElementById('schoolRegistrationForm')?.addEventListener('submit', handleSubmit);
    
    toggleCustomCapacity();
    updatePricingDisplay();
    updateProgressStep();
    populateCountrySelects();
  }
  
  // Initialize
  window.onload = () => {
    showRegistrationForm();
    document.getElementById('helpCenterLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      showHelpCentre();
    });
  };
</script>
