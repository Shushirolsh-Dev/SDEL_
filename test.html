<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'sunlight') {
                document.documentElement.classList.add('sunlight-mode');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sdel | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; transition: background-color 0.3s; padding-bottom: 85px; }
        .text-sdel { color: #FF6600; }
        .bg-sdel { background-color: #FF6600; }
        .card-glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .header-text { font-weight: 900; letter-spacing: -0.02em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Story Rings */
        .ring-blue-rotate { border-color: transparent !important; background: linear-gradient(#000, #000) padding-box, conic-gradient(#3b82f6, transparent) border-box; border: 2px solid transparent; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes gold-glow { 0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); } 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); } }
        .sdel-pulse { animation: gold-glow 2s infinite; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #FF6600; border-radius: 10px; }
        
        /* Sunlight Mode */
        .sunlight-mode body { background-color: #f5f5f5; color: #121212; }
        .sunlight-mode .card-glass { background: rgba(255,255,255,0.9); border-color: #e4e4e7; }
        .sunlight-mode .bg-black\/90 { background-color: rgba(255,255,255,0.9); }
        .sunlight-mode .border-white\/10 { border-color: #e4e4e7; }
        .sunlight-mode .text-white { color: #121212; }
        .sunlight-mode .bg-white\/5 { background-color: #e4e4e7; }
        .sunlight-mode .text-zinc-500 { color: #71717a; }
        
        /* Stats Card */
        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .sunlight-mode .stat-card { background: white; border-color: #e4e4e7; }
        
        /* Ad Banner */
        #ad-banner {
            transition: opacity 0.5s ease;
        }
        
        /* Order Items */
        .order-item {
            transition: all 0.2s;
        }
        .order-item:active { transform: scale(0.98); }
        
        /* Modal */
        .modal-overlay {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
        }
        .sunlight-mode .modal-overlay { background: rgba(255,255,255,0.95); }

        /* ========== BOTTOM NAVIGATION - STRAIGHT LINE, WARM SOFT COLORS, CUSTOM ICONS ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 15, 12, 0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 140, 60, 0.25);
            padding: 10px 20px 20px;
            z-index: 1000;
            transition: all 0.3s ease;
            /* Warm gradient background that softly shifts colors */
            background: linear-gradient(135deg, #2a1a0e, #1f1408, #2d1c0f);
            background-size: 200% 200%;
            animation: warmBottomShift 12s ease infinite;
        }

        /* Soft shifting animation for bottom nav background */
        @keyframes warmBottomShift {
            0% {
                background-position: 0% 50%;
                background-color: #2a1a0e;
            }
            50% {
                background-position: 100% 50%;
                background-color: #3d2616;
            }
            100% {
                background-position: 0% 50%;
                background-color: #2a1a0e;
            }
        }

        /* Sunlight mode adjustment for bottom nav */
        .sunlight-mode .bottom-nav {
            background: linear-gradient(135deg, #fff0e6, #ffe6d9, #fff0e6);
            background-size: 200% 200%;
            animation: warmBottomShiftLight 12s ease infinite;
            border-top: 1px solid rgba(255, 102, 0, 0.3);
        }

        @keyframes warmBottomShiftLight {
            0% { background-position: 0% 50%; background-color: #fff0e6; }
            50% { background-position: 100% 50%; background-color: #ffe0d0; }
            100% { background-position: 0% 50%; background-color: #fff0e6; }
        }

        /* Nav container - straight line horizontal layout */
        .nav-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            gap: 4px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Individual nav item - pure straight line */
        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
            text-decoration: none;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 0 4px;
            border-radius: 40px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: rgba(255, 200, 160, 0.7);
        }

        /* Nav icon styling - crisp vector-only (no emojis) */
        .nav-item-bottom i {
            font-size: 22px;
            transition: transform 0.2s ease, color 0.2s;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        .nav-item-bottom span {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        /* Active state - warm orange glow */
        .nav-item-bottom.active {
            color: #FF884D;
            transform: translateY(-2px);
        }

        .nav-item-bottom.active i {
            color: #FF884D;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
            transform: scale(1.05);
        }

        .nav-item-bottom.active span {
            color: #FF884D;
            font-weight: 800;
        }

        /* Hover / tap feedback */
        .nav-item-bottom:hover {
            background: rgba(255, 140, 60, 0.15);
            border-radius: 40px;
            transform: translateY(-1px);
        }

        .nav-item-bottom:active {
            transform: scale(0.96);
            transition: 0.05s;
        }

        /* Remove focus outline and keep accessible ring */
        .nav-item-bottom:focus-visible {
            outline: 2px solid #FF884D;
            outline-offset: 2px;
            border-radius: 40px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .nav-item-bottom i { font-size: 20px; }
            .nav-item-bottom span { font-size: 9px; }
            .bottom-nav { padding: 8px 12px 18px; }
        }
    </style>
</head>
<body>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://lgfyrlfjoazedwymjpfc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw');

        let currentUserId = null;
        let activeAds = [];
        let currentAdIndex = 0;
        let allOrdersData = [];

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            currentUserId = session.user.id;

            const { data: profile } = await supabase.from('profile').select('*').eq('id', currentUserId).single();
            
            const displayName = profile?.first_name || session.user.user_metadata?.first_name || "CHAMP";
            document.getElementById('user-name').innerText = displayName;

            if(profile) {
                document.getElementById('wallet-pill').innerText = `₦${(profile.wallet_balance || 0).toLocaleString()}`;
                if (profile.avatar_url) document.getElementById('user-avatar').src = profile.avatar_url;
                document.getElementById('xp-count').innerText = profile.xp || 0;
                updatePrestige(profile.xp || 0);
            }

            loadStories();
            loadFeed();
            loadAds(); 
            loadOrders();
            getUnreadCount(); 
            initBottomNav();  // Initialize bottom nav interactions
        }

        // Bottom Navigation Handler - Straight line with warm colors and different favicon for explore
        function initBottomNav() {
            const navItems = document.querySelectorAll('.nav-item-bottom');
            const sections = {
                home: () => { window.scrollTo({ top: 0, behavior: 'smooth' }); },
                explore: () => { 
                    // Explore action: scroll to global feed section or open explore modal
                    const feedSection = document.getElementById('global-feed');
                    if(feedSection) feedSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    else window.scrollTo({ top: 600, behavior: 'smooth' });
                },
                shop: () => { 
                    // Navigate to shop or order section
                    const orderSection = document.querySelector('#order-history-list');
                    if(orderSection) orderSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                },
                feed: () => {
                    const globalFeed = document.getElementById('global-feed');
                    if(globalFeed) globalFeed.scrollIntoView({ behavior: 'smooth', block: 'start' });
                },
                profile: () => { window.location.href = 'profile.html'; }
            };

            // Set active based on scroll or manual
            function setActiveNav(navValue) {
                navItems.forEach(item => {
                    if(item.getAttribute('data-nav') === navValue) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }

            // Default active home
            setActiveNav('home');

            // Add click handlers
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const navValue = item.getAttribute('data-nav');
                    if (navValue && sections[navValue]) {
                        sections[navValue]();
                        setActiveNav(navValue);
                        // Add subtle animation to bottom nav background flash (warm glow effect)
                        const bottomNav = document.querySelector('.bottom-nav');
                        if(bottomNav) {
                            bottomNav.style.transform = 'scale(0.99)';
                            setTimeout(() => { if(bottomNav) bottomNav.style.transform = 'scale(1)'; }, 100);
                        }
                    }
                });
            });

            // Optional: detect scroll to update active based on visible section
            window.addEventListener('scroll', () => {
                const scrollPos = window.scrollY;
                const homeTop = 0;
                const exploreTop = document.getElementById('global-feed')?.offsetTop - 100 || 600;
                const shopTop = document.querySelector('#order-history-list')?.offsetTop - 100 || 1100;
                const feedTop = document.getElementById('global-feed')?.offsetTop - 80 || 600;
                
                if(scrollPos < exploreTop - 100) setActiveNav('home');
                else if(scrollPos >= exploreTop - 80 && scrollPos < shopTop - 80) setActiveNav('explore');
                else if(scrollPos >= shopTop - 80 && scrollPos < feedTop + 300) setActiveNav('shop');
                else if(scrollPos >= feedTop - 50) setActiveNav('feed');
            });
        }

        async function loadStories() {
            const now = new Date().toISOString();
            
            const { data: follows } = await supabase.from('followers').select('following_id').eq('follower_id', currentUserId);
            const homieIds = follows ? follows.map(f => f.following_id) : [];

            const { data: viewed } = await supabase.from('story_views').select('story_id').eq('user_id', currentUserId);
            const viewedSet = new Set(viewed?.map(v => v.story_id));

            const { data: stories } = await supabase
                .from('stories')
                .select('*, profile:profile(first_name, is_official)')
                .gt('expires_at', now)
                .or(`is_official_post.eq.true,author_id.eq.${currentUserId},author_id.in.(${homieIds.join(',') || '00000000-0000-0000-0000-000000000000'})`);

            const rail = document.getElementById('story-rail-content');
            if (stories && stories.length > 0) {
                const userLatestMap = new Map();
                stories.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).forEach(s => {
                    if(!userLatestMap.has(s.author_id)) userLatestMap.set(s.author_id, s);
                });
                let uniqueStories = Array.from(userLatestMap.values());

                uniqueStories.sort((a, b) => {
                    const aIsSdel = a.is_official_post || a.profile?.is_official;
                    const bIsSdel = b.is_official_post || b.profile?.is_official;
                    const aIsMe = a.author_id === currentUserId;
                    const bIsMe = b.author_id === currentUserId;
                    const aWatched = viewedSet.has(a.id);
                    const bWatched = viewedSet.has(b.id);

                    if (aIsSdel && !bIsSdel) return -1;
                    if (!aIsSdel && bIsSdel) return 1;
                    if (aIsMe && !bIsMe) return -1;
                    if (!aIsMe && bIsMe) return 1;
                    if (!aWatched && bWatched) return -1;
                    if (aWatched && !bWatched) return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                const extraStories = uniqueStories.map(s => {
                    const isSdel = s.is_official_post || s.profile?.is_official;
                    const isMe = s.author_id === currentUserId;
                    const isWatched = viewedSet.has(s.id);
                    
                    let ringStyle = "";
                    if (isSdel) ringStyle = isWatched ? "border-green-500" : "sdel-pulse";
                    else if (isMe) ringStyle = "border-zinc-600";
                    else ringStyle = isWatched ? "border-zinc-600" : "ring-blue-rotate";

                    return `
                        <div class="flex-shrink-0 flex flex-col items-center gap-2" onclick="watchStory('${s.id}')">
                            <div class="w-16 h-16 rounded-full border-2 ${ringStyle} overflow-hidden">
                                <img src="${s.media_url}" class="w-full h-full object-cover bg-zinc-900">
                            </div>
                            <span class="text-[8px] font-black uppercase truncate w-16 text-center ${isSdel ? 'text-sdel' : 'text-zinc-400'}">
                                ${isSdel ? 'SDEL' : (s.profile?.first_name || 'HOMIE')}
                            </span>
                        </div>`;
                }).join('');
                
                rail.innerHTML += extraStories;
            }
            lucide.createIcons();
        }

        window.watchStory = async (id) => {
            await supabase.from('story_views').upsert({ user_id: currentUserId, story_id: id });
            location.href = `view-story.html?id=${id}`;
        };

        async function getUnreadCount() {
            if (!currentUserId) return;
            const { data: profile } = await supabase.from('profile').select('last_read_general, last_read_team').eq('id', currentUserId).single();
            const lastGen = new Date(profile?.last_read_general || 0);
            const lastTeam = new Date(profile?.last_read_team || 0);
            const { data: messages } = await supabase.from('messages').select('type, created_at').or(`recipient_id.is.null,recipient_id.eq.${currentUserId}`);
            if (!messages) return;
            const unreadGen = messages.filter(m => m.type === 'general' && new Date(m.created_at) > lastGen).length;
            const unreadTeam = messages.filter(m => m.type === 'team' && new Date(m.created_at) > lastTeam).length;
            const totalUnread = unreadGen + unreadTeam;
            const badge = document.getElementById('notif-badge');
            if (totalUnread > 0) {
                badge.innerText = totalUnread > 9 ? '9+' : totalUnread;
                badge.classList.remove('hidden');
                badge.style.display = 'flex';
            } else {
                badge.classList.add('hidden');
                badge.style.display = 'none';
            }
        }

        async function loadAds() {
            const { data: ads, error } = await supabase.from('promoted_ads').select('*').eq('active', true);
            if (error || !ads || ads.length === 0) return;
            let weightedAds = [];
            ads.forEach(ad => {
                const weight = Math.max(1, Math.floor((ad.price || 0) / 100)); 
                for(let i=0; i<weight; i++) { weightedAds.push(ad); }
            });
            activeAds = weightedAds.sort(() => Math.random() - 0.5);
            displayNextAd();
            setInterval(displayNextAd, 5000);
        }

        function displayNextAd() {
            if (activeAds.length === 0) return;
            const ad = activeAds[currentAdIndex];
            const banner = document.getElementById('ad-banner');
            const adLink = document.getElementById('ad-link');
            banner.classList.add('opacity-0');
            setTimeout(() => {
                banner.style.backgroundImage = `url(${ad.media_url})`;
                document.getElementById('ad-text').innerText = ad.title;
                adLink.href = ad.link_url || '#';
                banner.classList.remove('opacity-0');
                banner.style.display = 'flex';
            }, 300);
            currentAdIndex = (currentAdIndex + 1) % activeAds.length;
        }

        async function loadOrders() {
            const { data: orders } = await supabase.from('orders').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false });
            if (!orders) return;
            allOrdersData = orders;
            renderOrderList(orders.slice(0, 3), 'order-history-list');
        }

        function renderOrderList(data, targetId) {
            const container = document.getElementById(targetId);
            if (!container) return;
            if (data.length === 0) {
                container.innerHTML = `<div class="card-glass rounded-xl p-6 text-center"><i data-lucide="package-x" size="24" class="mx-auto text-zinc-600 mb-2"></i><p class="text-[9px] font-black uppercase text-zinc-500">No orders yet</p></div>`;
                lucide.createIcons();
                return;
            }
            container.innerHTML = data.map(o => {
                const displayId = o.order_code || `ID: ${o.id.slice(0,8)}`;
                const itemNames = o.items ? JSON.parse(JSON.stringify(o.items)).map(i => i.name).join(', ') : 'Market Item';
                let statusColor = 'bg-zinc-500/20 text-zinc-400 border-zinc-500/20';
                let statusText = o.status?.toUpperCase() || 'PENDING';
                if(o.status === 'accepted') { statusColor = 'bg-green-500/20 text-green-500 border-green-500/20'; statusText = 'ACCEPTED'; }
                if(o.status === 'rejected') { statusColor = 'bg-red-500/20 text-red-500 border-red-500/20'; statusText = 'REJECTED'; }
                if(o.status === 'pending') { statusColor = 'bg-sdel/20 text-sdel border-sdel/20'; statusText = 'PENDING'; }
                return `
                    <div class="order-item card-glass rounded-xl p-3 flex justify-between items-center">
                        <div class="flex-1 min-w-0">
                            <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">${displayId}</p>
                            <p class="text-[10px] font-bold truncate">${itemNames}</p>
                        </div>
                        <span class="px-2 py-1 rounded-full text-[7px] font-black uppercase border ${statusColor} ml-2 flex-shrink-0">${statusText}</span>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        window.toggleAllOrders = (show) => {
            const modal = document.getElementById('all-orders-modal');
            if(show) { 
                renderOrderList(allOrdersData, 'full-order-list'); 
                modal.classList.remove('hidden'); 
            } else { 
                modal.classList.add('hidden'); 
            }
        }

        function updatePrestige(xp) {
            const badge = document.getElementById('rank-badge');
            const progress = document.getElementById('xp-progress-bar');
            let rank = { n: "CITIZEN", p: (xp/500)*100 };
            if (xp >= 10000) rank = { n: "OVERLORD", p: 100 };
            else if (xp >= 5000) rank = { n: "MYTHIC", p: (xp/10000)*100 };
            else if (xp >= 2500) rank = { n: "ELITE", p: (xp/5000)*100 };
            else if (xp >= 1000) rank = { n: "WRAITH", p: (xp/2500)*100 };
            else if (xp >= 500) rank = { n: "SCOUT", p: (xp/1000)*100 };
            badge.innerText = rank.n;
            progress.style.width = `${Math.min(rank.p, 100)}%`;
        }

        async function loadFeed() {
            const { data: posts } = await supabase.from('posts').select('*, profile(first_name, avatar_url, xp)').order('created_at', { ascending: false });
            const feed = document.getElementById('global-feed');
            if (posts && posts.length > 0) {
                feed.innerHTML = posts.map(p => `
                    <div class="card-glass rounded-2xl overflow-hidden">
                        ${p.media_url ? `<img src="${p.media_url}" class="w-full h-64 object-cover">` : ''}
                        <div class="p-4">
                            <div class="flex items-center gap-3 mb-3">
                                <img src="${p.profile?.avatar_url || 'https://api.dicebear.com/7.x/initials/svg?seed='+p.profile?.first_name}" class="w-8 h-8 rounded-full border border-white/10">
                                <div>
                                    <p class="text-[10px] font-black">${p.profile?.first_name || 'Scholar'}</p>
                                    <p class="text-[7px] text-zinc-500 uppercase">${formatDate(p.created_at)}</p>
                                </div>
                            </div>
                            <p class="text-[11px] font-medium leading-relaxed">${p.content}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } else {
                feed.innerHTML = `<div class="card-glass rounded-2xl p-8 text-center"><i data-lucide="image" size="32" class="mx-auto text-zinc-600 mb-3"></i><p class="text-[9px] font-black uppercase text-zinc-500">No posts yet</p></div>`;
                lucide.createIcons();
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days} days ago`;
            return date.toLocaleDateString();
        }

        init();
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
