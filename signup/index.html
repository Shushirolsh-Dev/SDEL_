<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THESDEL - Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            font-style: normal !important;
            font-family: 'Poppins', sans-serif;
        }
        body { 
            background: #000; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }
        .stars { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            pointer-events: none; 
        }
        .star { 
            position: absolute; 
            background: white; 
            border-radius: 50%; 
            animation: fall linear infinite; 
        }
        @keyframes fall { 
            0% { transform: translateY(-10vh); } 
            100% { transform: translateY(110vh); } 
        }
        .login-card { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            border-radius: 28px; 
            padding: 35px; 
            width: 95%; 
            max-width: 450px; 
            z-index: 10; 
            position: relative; 
            max-height: 95vh; 
            overflow-y: auto; 
        }
        .sdel-input { 
            background: #161616; 
            border: 1px solid #333; 
            border-radius: 14px; 
            padding: 16px; 
            width: 100%; 
            color: white; 
            outline: none; 
            font-size: 16px; 
        }
        .btn-orange { 
            background: #FF6600; 
            color: black; 
            font-weight: 900; 
            width: 100%; 
            padding: 18px; 
            border-radius: 14px; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none; 
            font-size: 16px; 
            letter-spacing: 1px; 
        }
        .btn-orange:disabled { 
            background: #555; 
            cursor: not-allowed; 
        }
        .eye-box { 
            position: absolute; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            z-index: 100; 
            padding: 10px; 
        }
        .hidden { 
            display: none !important; 
        }
        /* Phone container with searchable dropdown */
        .phone-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #161616;
            border: 1px solid #333;
            border-radius: 14px;
            overflow: visible;
        }
        .country-code-btn {
            background: #1a1a1a;
            border: none;
            border-right: 1px solid #333;
            padding: 16px 12px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            min-width: 105px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            font-family: 'Poppins', sans-serif;
        }
        .country-code-btn:hover {
            background: #252525;
        }
        .dropdown-arrow {
            font-size: 10px;
            margin-left: 4px;
        }
        .country-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 14px;
            width: 280px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .country-search {
            padding: 12px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: #0f0f0f;
        }
        .country-search input {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 13px;
        }
        .country-list {
            max-height: 220px;
            overflow-y: auto;
        }
        .country-option {
            padding: 12px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .country-option:hover {
            background: #FF6600;
            color: black;
        }
        .country-code-small {
            color: #FF6600;
            font-weight: 800;
            margin-left: auto;
        }
        .country-option:hover .country-code-small {
            color: black;
        }
        .phone-input {
            background: transparent;
            border: none;
            padding: 16px 12px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 16px;
        }
        
        .criteria-item { 
            font-size: 15px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-right: 15px; 
            transition: color 0.3s; 
        }
        .valid { 
            color: #22c55e; 
        } 
        .invalid { 
            color: #ffffff33; 
        }
        
        .login-card::-webkit-scrollbar { 
            width: 5px; 
        }
        .login-card::-webkit-scrollbar-thumb { 
            background: #333; 
            border-radius: 10px; 
        }
        .live-msg { 
            text-transform: uppercase; 
            font-size: 10px; 
            font-weight: 900; 
            margin-top: 4px; 
            padding-left: 5px; 
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-error { 
            animation: shake 0.2s ease-in-out 2; 
        }

        #school-results { 
            position: absolute; 
            left: 0; 
            right: 0; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 14px; 
            margin-top: 5px; 
            z-index: 1000; 
            max-height: 200px; 
            overflow-y: auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        .uni-item { 
            padding: 15px; 
            font-size: 11px; 
            font-weight: 900; 
            text-transform: uppercase; 
            border-bottom: 1px solid #222; 
            cursor: pointer; 
        }
        .uni-item:hover { 
            background: #FF6600; 
            color: black; 
        }

        .thesdel-logo-wrapper {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0px;
        }
        .t-white {
            color: white;
            font-weight: 900;
            font-size: 2.25rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }
        .hesdel-orange {
            color: #FF6600;
            font-weight: 900;
            font-size: 2.25rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }
        .join-white {
            color: white;
            font-weight: 900;
            font-size: 2.25rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin-left: 6px;
        }
        @media (max-width: 480px) {
            .t-white, .hesdel-orange, .join-white {
                font-size: 1.75rem;
            }
            .country-code-btn {
                min-width: 85px;
                font-size: 12px;
                padding: 16px 8px;
            }
            .country-dropdown {
                width: 260px;
            }
        }
        .t-white, .hesdel-orange, .join-white {
            font-style: normal !important;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="stars" id="star-field"></div>
    <div class="login-card">
        <a href="index.html" class="text-[12px] font-black text-white hover:text-[#FF6600] uppercase tracking-[0.4em] transition block mb-6">← Back</a>
        <div class="text-center mb-8">
            <h1 class="thesdel-logo-wrapper">
                <span class="t-white">T</span><span class="hesdel-orange">HESDEL</span><span class="join-white"> JOIN</span>
            </h1>
            <p class="text-[12px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-3">Create your account</p>
        </div>
        <div id="msg" class="hidden p-4 mb-5 rounded text-sm font-black text-center uppercase"></div>
        <div class="space-y-4">
            <div class="flex gap-3">
                <input type="text" id="fname" placeholder="FIRST NAME" class="sdel-input w-1/2">
                <input type="text" id="lname" placeholder="LAST NAME" class="sdel-input w-1/2">
            </div>

            <div class="relative" id="school-container">
                <input type="text" id="school-search" placeholder="SELECT CAMPUS (E.G. OAU)" class="sdel-input" autocomplete="off">
                <div id="school-results" class="hidden"></div>
            </div>
            
            <div>
                <input type="text" id="uname" placeholder="USERNAME" class="sdel-input" oninput="this.value = this.value.toLowerCase().replace(/\s/g, '')" onblur="liveCheck('username', this.value, 'u-msg')">
                <p id="u-msg" class="live-msg hidden"></p>
            </div>

            <!-- SEARCHABLE COUNTRY CODE DROPDOWN with abbreviations -->
            <div>
                <div class="phone-wrapper" id="phone-wrapper">
                    <button type="button" id="country-btn" class="country-code-btn">
                        <span id="selected-flag">🇳🇬</span>
                        <span id="selected-code">+234</span>
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div id="country-dropdown" class="country-dropdown hidden">
                        <div class="country-search">
                            <input type="text" id="country-search-input" placeholder="Search country, code or abbreviation (US, UK, NG...)">
                        </div>
                        <div id="country-list" class="country-list"></div>
                    </div>
                    <input type="tel" id="ph" placeholder="Phone number" maxlength="15" class="phone-input" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onblur="validatePhone()">
                </div>
                <p id="p-msg" class="live-msg hidden"></p>
            </div>

            <div>
                <input type="email" id="em" placeholder="EMAIL ADDRESS" class="sdel-input" onblur="liveCheck('email', this.value, 'e-msg')">
                <p id="e-msg" class="live-msg hidden"></p>
            </div>

            <div class="relative">
                <input type="password" id="pw" placeholder="PASSWORD" class="sdel-input pr-14" oninput="validatePassword(); checkMatch();">
                <div class="eye-box" onclick="toggleView('pw', 'on1', 'off1')">
                    <svg id="on1" class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="off1" class="w-5 h-5 text-gray-500 hidden" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </div>
            </div>
            <div id="criteria-box" class="flex flex-wrap px-1 gap-y-2">
                <span id="c-len" class="criteria-item invalid">6+ Digits</span>
                <span id="c-up" class="criteria-item invalid">Uppercase</span>
                <span id="c-low" class="criteria-item invalid">Lowercase</span>
                <span id="c-sym" class="criteria-item invalid">Symbol</span>
            </div>
            <div class="relative">
                <input type="password" id="rpw" placeholder="RE-ENTER PASSWORD" class="sdel-input pr-14" oninput="checkMatch()">
                <div class="eye-box" onclick="toggleView('rpw', 'on2', 'off2')">
                    <svg id="on2" class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="off2" class="w-5 h-5 text-gray-500 hidden" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </div>
            </div>
            <div id="match-text" class="text-[12px] font-black uppercase text-center hidden">Match Status</div>
            <div class="flex items-center gap-3 px-2 py-2">
                <input type="checkbox" id="agree" class="w-5 h-5 accent-[#FF6600]">
                <label for="agree" class="text-[11px] font-bold text-gray-400 uppercase tracking-wide">I agree to the <a href="terms.html" class="text-white underline">Terms</a> & <a href="privacy.html" class="text-white underline">Privacy</a></label>
            </div>
            <button onclick="signUp()" id="s-btn" class="btn-orange mt-2">Create Account</button>
        </div>
    </div>
    <script>
        // Starfield
        const f = document.getElementById('star-field');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = (Math.random()*2+1.5)+'px';
            s.style.left = Math.random()*100+'vw'; 
            s.style.animationDuration = (Math.random()*20+25)+'s';
            f.appendChild(s);
        }

        const sb = window.supabase.createClient('https://lgfyrlfjoazedwymjpfc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw');

        // COUNTRIES with abbreviations (ISO codes), flags, and dial codes
        const countries = [
            { code: "+1", abbr: "US", name: "United States", flag: "🇺🇸" },
            { code: "+1", abbr: "CA", name: "Canada", flag: "🇨🇦" },
            { code: "+44", abbr: "GB", name: "United Kingdom", flag: "🇬🇧" },
            { code: "+91", abbr: "IN", name: "India", flag: "🇮🇳" },
            { code: "+234", abbr: "NG", name: "Nigeria", flag: "🇳🇬" },
            { code: "+27", abbr: "ZA", name: "South Africa", flag: "🇿🇦" },
            { code: "+61", abbr: "AU", name: "Australia", flag: "🇦🇺" },
            { code: "+49", abbr: "DE", name: "Germany", flag: "🇩🇪" },
            { code: "+33", abbr: "FR", name: "France", flag: "🇫🇷" },
            { code: "+39", abbr: "IT", name: "Italy", flag: "🇮🇹" },
            { code: "+34", abbr: "ES", name: "Spain", flag: "🇪🇸" },
            { code: "+55", abbr: "BR", name: "Brazil", flag: "🇧🇷" },
            { code: "+52", abbr: "MX", name: "Mexico", flag: "🇲🇽" },
            { code: "+81", abbr: "JP", name: "Japan", flag: "🇯🇵" },
            { code: "+86", abbr: "CN", name: "China", flag: "🇨🇳" },
            { code: "+82", abbr: "KR", name: "South Korea", flag: "🇰🇷" },
            { code: "+7", abbr: "RU", name: "Russia", flag: "🇷🇺" },
            { code: "+62", abbr: "ID", name: "Indonesia", flag: "🇮🇩" },
            { code: "+63", abbr: "PH", name: "Philippines", flag: "🇵🇭" },
            { code: "+92", abbr: "PK", name: "Pakistan", flag: "🇵🇰" },
            { code: "+880", abbr: "BD", name: "Bangladesh", flag: "🇧🇩" },
            { code: "+90", abbr: "TR", name: "Turkey", flag: "🇹🇷" },
            { code: "+966", abbr: "SA", name: "Saudi Arabia", flag: "🇸🇦" },
            { code: "+971", abbr: "AE", name: "UAE", flag: "🇦🇪" },
            { code: "+972", abbr: "IL", name: "Israel", flag: "🇮🇱" },
            { code: "+20", abbr: "EG", name: "Egypt", flag: "🇪🇬" },
            { code: "+212", abbr: "MA", name: "Morocco", flag: "🇲🇦" },
            { code: "+254", abbr: "KE", name: "Kenya", flag: "🇰🇪" },
            { code: "+233", abbr: "GH", name: "Ghana", flag: "🇬🇭" },
            { code: "+1-868", abbr: "TT", name: "Trinidad", flag: "🇹🇹" },
            { code: "+1-876", abbr: "JM", name: "Jamaica", flag: "🇯🇲" },
            { code: "+64", abbr: "NZ", name: "New Zealand", flag: "🇳🇿" },
            { code: "+65", abbr: "SG", name: "Singapore", flag: "🇸🇬" },
            { code: "+60", abbr: "MY", name: "Malaysia", flag: "🇲🇾" },
            { code: "+66", abbr: "TH", name: "Thailand", flag: "🇹🇭" },
            { code: "+84", abbr: "VN", name: "Vietnam", flag: "🇻🇳" },
            { code: "+353", abbr: "IE", name: "Ireland", flag: "🇮🇪" },
            { code: "+31", abbr: "NL", name: "Netherlands", flag: "🇳🇱" },
            { code: "+32", abbr: "BE", name: "Belgium", flag: "🇧🇪" },
            { code: "+41", abbr: "CH", name: "Switzerland", flag: "🇨🇭" },
            { code: "+46", abbr: "SE", name: "Sweden", flag: "🇸🇪" },
            { code: "+47", abbr: "NO", name: "Norway", flag: "🇳🇴" },
            { code: "+45", abbr: "DK", name: "Denmark", flag: "🇩🇰" },
            { code: "+358", abbr: "FI", name: "Finland", flag: "🇫🇮" },
            { code: "+48", abbr: "PL", name: "Poland", flag: "🇵🇱" },
            { code: "+420", abbr: "CZ", name: "Czechia", flag: "🇨🇿" },
            { code: "+36", abbr: "HU", name: "Hungary", flag: "🇭🇺" },
            { code: "+30", abbr: "GR", name: "Greece", flag: "🇬🇷" },
            { code: "+351", abbr: "PT", name: "Portugal", flag: "🇵🇹" },
            { code: "+54", abbr: "AR", name: "Argentina", flag: "🇦🇷" },
            { code: "+56", abbr: "CL", name: "Chile", flag: "🇨🇱" },
            { code: "+57", abbr: "CO", name: "Colombia", flag: "🇨🇴" },
            { code: "+58", abbr: "VE", name: "Venezuela", flag: "🇻🇪" },
            { code: "+51", abbr: "PE", name: "Peru", flag: "🇵🇪" }
        ];

        // Sort by name
        countries.sort((a,b) => a.name.localeCompare(b.name));

        let selectedCountry = countries.find(c => c.code === "+234" && c.abbr === "NG") || countries[0];
        
        function renderCountryList(searchTerm = "") {
            const container = document.getElementById('country-list');
            const term = searchTerm.toLowerCase();
            const filtered = countries.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.code.includes(term) || 
                c.abbr.toLowerCase().includes(term)
            );
            container.innerHTML = "";
            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'country-option';
                div.innerHTML = `
                    <span>${c.flag}</span>
                    <span><strong>${c.abbr}</strong> - ${c.name}</span>
                    <span class="country-code-small">${c.code}</span>
                `;
                div.onclick = () => selectCountry(c);
                container.appendChild(div);
            });
        }

        function selectCountry(country) {
            selectedCountry = country;
            document.getElementById('selected-flag').innerText = country.flag;
            document.getElementById('selected-code').innerText = country.code;
            document.getElementById('country-dropdown').classList.add('hidden');
            validatePhone(); // re-check phone uniqueness when country changes
        }

        // Toggle dropdown
        const btn = document.getElementById('country-btn');
        const dropdown = document.getElementById('country-dropdown');
        const searchInput = document.getElementById('country-search-input');
        
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
            if (!dropdown.classList.contains('hidden')) {
                renderCountryList("");
                searchInput.value = "";
                searchInput.focus();
            }
        });
        
        searchInput.addEventListener('input', (e) => {
            renderCountryList(e.target.value);
        });
        
        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
        
        renderCountryList("");

        const nigerianUniversities = ["Obafemi Awolowo University (OAU)", "University of Lagos (UNILAG)", "University of Ibadan (UI)", "University of Ilorin (UNILORIN)", "University of Benin (UNIBEN)", "University of Nigeria, Nsukka (UNN)", "Ahmadu Bello University (ABU)", "Bayero University (BUK)", "Federal University of Technology, Akure (FUTA)", "Covenant University", "Babcock University", "Other / Not Listed"];

        const schoolInp = document.getElementById('school-search');
        const schoolRes = document.getElementById('school-results');

        schoolInp.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            schoolRes.innerHTML = '';
            if(!val) { schoolRes.classList.add('hidden'); return; }
            const filtered = nigerianUniversities.filter(u => u.toLowerCase().includes(val));
            if(filtered.length > 0) {
                schoolRes.classList.remove('hidden');
                filtered.forEach(u => {
                    const d = document.createElement('div'); d.className = 'uni-item'; d.innerText = u;
                    d.onclick = () => { schoolInp.value = u; schoolRes.classList.add('hidden'); };
                    schoolRes.appendChild(d);
                });
            } else { schoolRes.classList.add('hidden'); }
        });

        document.addEventListener('click', (e) => { if(!document.getElementById('school-container').contains(e.target)) schoolRes.classList.add('hidden'); });

        let isUnique = { username: true, phone: true, email: true };

        function getFullPhoneNumber() {
            return selectedCountry.code + document.getElementById('ph').value;
        }

        function validatePhone() {
            const fullPhone = getFullPhoneNumber();
            const phoneNum = document.getElementById('ph').value;
            if (phoneNum.length >= 5) {
                liveCheck('phone', fullPhone, 'p-msg');
            }
            return fullPhone;
        }

        async function liveCheck(col, val, msgId) {
            const msgEl = document.getElementById(msgId);
            if (!val || val.length < 5) { msgEl.classList.add('hidden'); return; }
            const { data } = await sb.from('profile').select(col).eq(col, val).maybeSingle();
            msgEl.classList.remove('hidden');
            if (data) {
                msgEl.innerText = col + " already taken";
                msgEl.style.color = "#ef4444";
                isUnique[col] = false;
            } else {
                msgEl.innerText = col + " available";
                msgEl.style.color = "#22c55e";
                isUnique[col] = true;
            }
        }

        function validatePassword() {
            const p = document.getElementById('pw').value;
            const len = p.length >= 6;
            const up = /[A-Z]/.test(p);
            const low = /[a-z]/.test(p);
            const sym = /[^A-Za-z0-9]/.test(p);
            document.getElementById('c-len').className = `criteria-item ${len ? 'valid' : 'invalid'}`;
            document.getElementById('c-up').className = `criteria-item ${up ? 'valid' : 'invalid'}`;
            document.getElementById('c-low').className = `criteria-item ${low ? 'valid' : 'invalid'}`;
            document.getElementById('c-sym').className = `criteria-item ${sym ? 'valid' : 'invalid'}`;
            return { all: (len && up && low && sym) };
        }

        function checkMatch() {
            const p1 = document.getElementById('pw').value;
            const p2 = document.getElementById('rpw').value;
            const mt = document.getElementById('match-text');
            if(!p2) { mt.classList.add('hidden'); return; }
            mt.classList.remove('hidden');
            if(p1 === p2) { mt.innerText = "PASSWORDS MATCH"; mt.style.color = "#22c55e"; } 
            else { mt.innerText = "PASSWORDS DO NOT MATCH"; mt.style.color = "#ef4444"; }
        }

        function toggleView(inputId, onId, offId) {
            const p = document.getElementById(inputId);
            const on = document.getElementById(onId);
            const off = document.getElementById(offId);
            if (p.type === 'password') { p.type = 'text'; on.classList.add('hidden'); off.classList.remove('hidden'); }
            else { p.type = 'password'; on.classList.remove('hidden'); off.classList.add('hidden'); }
        }

        async function signUp() {
            const fn = document.getElementById('fname').value;
            const ln = document.getElementById('lname').value;
            const un = document.getElementById('uname').value;
            const sc = document.getElementById('school-search').value;
            const phoneNumberOnly = document.getElementById('ph').value;
            const fullPhone = getFullPhoneNumber();
            const em = document.getElementById('em').value;
            const pw = document.getElementById('pw').value;
            const rpw = document.getElementById('rpw').value;
            const agree = document.getElementById('agree').checked;
            const btn = document.getElementById('s-btn');

            if(!fn || !ln || !un || !sc || !phoneNumberOnly || !em || !pw || !rpw) return showMsg("FILL ALL FIELDS", "red");
            if(!isUnique.username || !isUnique.phone || !isUnique.email) return showMsg("SOME DATA IS ALREADY REGISTERED", "red");
            if(phoneNumberOnly.length < 5) return showMsg("ENTER VALID PHONE NUMBER", "red");
            
            if(!validatePassword().all) return showMsg("PASSWORD MUST HAVE 6+ CHARS, UPPER, LOWER & SYMBOL", "red");
            if(pw !== rpw) return showMsg("PASSWORDS MUST MATCH", "red");
            if(!agree) return showMsg("AGREE TO TERMS FIRST", "red");

            btn.innerText = "PROCESSING..."; btn.disabled = true;
            
            const { error } = await sb.auth.signUp({
                email: em, password: pw,
                options: { data: { first_name: fn, last_name: ln, username: un, phone: fullPhone, school_name: sc } }
            });

            if (error) { 
                showMsg(error.message, "red"); 
                btn.innerText = "CREATE ACCOUNT"; btn.disabled = false; 
            } else { 
                showMsg("SUCCESS! REDIRECTING...", "green");
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            }
        }

        function showMsg(t, type) {
            const m = document.getElementById('msg');
            m.innerText = t.toUpperCase();
            m.className = `p-4 mb-5 rounded border text-sm font-black text-center uppercase block ${type === 'red' ? 'bg-red-900/20 text-red-500 border-red-500/30' : 'bg-green-900/20 text-green-500 border-green-500/30'}`;
            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
