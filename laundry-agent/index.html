<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Thesdel | Book Laundry Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #f05a28;
            --primary-dark: #dc4a1a;
            --primary-light: #ff7a4a;
            --bg-dark: #05070a;
            --bg-surface: #0c0f15;
            --bg-elevated: #11161f;
            --border-color: #1e2530;
            --text-primary: #ffffff;
            --text-secondary: #a1abb8;
            --text-muted: #5e6b7c;
            --success: #2ecc71;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(240, 90, 40, 0.12);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 0.5px solid rgba(240, 90, 40, 0.25);
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin: 48px 0 56px;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(to right, #fff, #cbd5e1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 16px auto 0;
            font-size: clamp(0.9rem, 3vw, 1rem);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .feature-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Section Header */
        .section-header {
            margin: 40px 0 28px;
        }

        .section-title {
            font-size: clamp(1.3rem, 4vw, 1.5rem);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-bar {
            width: 40px;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        /* Services Grid - Mobile First */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 64px;
        }

        @media (min-width: 640px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }

        @media (min-width: 1024px) {
            .services-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 28px;
            }
        }

        /* Service Card - Optimized for mobile */
        .service-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .service-image-wrapper {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1f2a, #0f131a);
        }

        .service-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .service-card:hover .service-image {
            transform: scale(1.05);
        }

        .service-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .service-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin: 12px 0 4px;
            line-height: 1;
        }

        .price-unit {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .service-desc {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 8px 0 20px;
            line-height: 1.5;
            flex: 1;
        }

        .btn-book {
            width: 100%;
            background: rgba(240, 90, 40, 0.08);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .btn-book:hover {
            background: var(--primary);
            color: #0a0c10;
        }

        /* Modal - Mobile Optimized */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 10, 0.98);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            max-width: 520px;
            width: 100%;
            padding: 28px 24px;
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 24px 20px;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: #0b0f16;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-cancel:hover {
            border-color: var(--text-muted);
            color: white;
        }

        .btn-confirm {
            background: linear-gradient(105deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(240, 90, 40, 0.3);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-elevated);
            border: 1px solid var(--success);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
            z-index: 1100;
            white-space: nowrap;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .toast {
                white-space: normal;
                max-width: calc(100vw - 40px);
                text-align: center;
            }
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 32px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        /* SVG Icons */
        .icon-svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="brand">
            <div class="brand-icon">T</div>
            <span class="brand-name">THESDEL</span>
            <span class="badge">LAUNDRY</span>
        </div>
    </header>

    <div class="hero">
        <h1>Fresh clothes, delivered</h1>
        <p>Professional laundry and dry cleaning. Same-day pickup, premium care, free delivery.</p>
        <div class="features">
            <div class="feature">
                <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Same-day service</span>
            </div>
            <div class="feature">
                <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M22 12h-4l-3 9-4-18-3 9H2"/>
                </svg>
                <span>Free pickup & delivery</span>
            </div>
            <div class="feature">
                <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
                <span>Eco-friendly</span>
            </div>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">
            <div class="title-bar"></div>
            Choose your service
        </div>
    </div>

    <div class="services-grid" id="servicesGrid"></div>

    <footer class="footer">
        <p>© 2025 Thesdel — Professional laundry service</p>
    </footer>
</div>

<div class="modal" id="bookingModal">
    <div class="modal-content">
        <div class="modal-header">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
            <h2 id="modalTitle">Request pickup</h2>
        </div>
        <div class="form-group">
            <label>Full name</label>
            <input type="text" id="customerName" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Pickup address</label>
            <input type="text" id="pickupAddress" placeholder="Hostel, room number, or full address">
        </div>
        <div class="form-group">
            <label>Phone number</label>
            <input type="tel" id="phoneNumber" placeholder="For order updates">
        </div>
        <div class="form-group">
            <label>Notes (optional)</label>
            <textarea id="notes" rows="2" placeholder="Special instructions"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="closeModalBtn">Cancel</button>
            <button class="btn-confirm" id="confirmOrderBtn">Confirm booking →</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toastMessage">✓ Order placed!</span>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0';

    const SUPABASE_URL = 'https://lgfyrlfjoazedwymjpfc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnlybGZqb2F6ZWR3eW1qcGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MTc1MTksImV4cCI6MjA4MjA5MzUxOX0.g1xVMCtSkkQIu2s1pkvWwxDDvgNGbikAMkyfbZJywVw';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentService = null;
    const UNIFIED_IMAGE = "https://images.unsplash.com/photo-1582735689369-4fe89db7114c?w=800&h=600&fit=crop";

    const FIXED_SERVICES = [
        { id: 1, name: "Wash & Fold", price: 550, unit: "kg", description: "Washed, dried, and neatly folded. Perfect for everyday clothes.", image: UNIFIED_IMAGE },
        { id: 2, name: "Ironing Only", price: 350, unit: "kg", description: "Professional steam ironing. Wrinkle-free finish on hangers.", image: UNIFIED_IMAGE },
        { id: 3, name: "Dry Cleaning", price: 1200, unit: "item", description: "Premium care for suits, dresses, and delicate fabrics.", image: UNIFIED_IMAGE },
        { id: 4, name: "Wash & Iron", price: 750, unit: "kg", description: "Complete care: wash, dry, iron, and fold. Ready to wear.", image: UNIFIED_IMAGE }
    ];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMessage');
        toastMsg.innerHTML = isError ? `❌ ${msg}` : `✓ ${msg}`;
        toast.style.borderColor = isError ? '#e74c3c' : '#2ecc71';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function seedServicesToDatabase() {
        const { data: existing, error: checkError } = await supabase.from('laundry_services').select('id').limit(1);
        if (checkError || (existing && existing.length > 0)) return true;
        
        const { error: insertError } = await supabase.from('laundry_services').insert(
            FIXED_SERVICES.map(s => ({ name: s.name, price: s.price, unit: s.unit, description: s.description, image_url: s.image, is_active: true, sort_order: s.id }))
        );
        return !insertError;
    }

    async function loadServices() {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = '<div class="loading">Loading services...</div>';
        await seedServicesToDatabase();
        
        let { data, error } = await supabase.from('laundry_services').select('*').eq('is_active', true).order('sort_order');
        if (error || !data || data.length === 0) data = FIXED_SERVICES;
        
        grid.innerHTML = data.map(service => `
            <div class="service-card">
                <div class="service-image-wrapper">
                    <img src="${UNIFIED_IMAGE}" class="service-image" alt="${service.name}" loading="lazy">
                </div>
                <div class="service-content">
                    <div class="service-name">${service.name}</div>
                    <div class="service-price">₦${service.price.toLocaleString()}<span class="price-unit"> / ${service.unit}</span></div>
                    <div class="service-desc">${service.description}</div>
                    <button class="btn-book" data-id="${service.id}" data-name="${service.name}" data-price="${service.price}" data-unit="${service.unit}">Book now →</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.btn-book').forEach(btn => {
            btn.addEventListener('click', () => {
                currentService = {
                    id: parseInt(btn.dataset.id),
                    name: btn.dataset.name,
                    price: parseInt(btn.dataset.price),
                    unit: btn.dataset.unit
                };
                document.getElementById('modalTitle').innerHTML = `${currentService.name} — ₦${currentService.price}/${currentService.unit}`;
                document.getElementById('customerName').value = localStorage.getItem('thesdel_name') || '';
                document.getElementById('pickupAddress').value = '';
                document.getElementById('phoneNumber').value = '';
                document.getElementById('notes').value = '';
                document.getElementById('bookingModal').style.display = 'flex';
            });
        });
    }

    async function submitOrder() {
        if (!currentService) return;
        const name = document.getElementById('customerName').value.trim();
        const address = document.getElementById('pickupAddress').value.trim();
        const phone = document.getElementById('phoneNumber').value.trim();
        const notes = document.getElementById('notes').value.trim();
        
        if (!name || !address || !phone) { showToast('Please fill all required fields', true); return; }
        localStorage.setItem('thesdel_name', name);
        
        const { error } = await supabase.from('laundry_orders').insert([{
            customer_name: name, phone, service_id: currentService.id, service_name: currentService.name,
            price: currentService.price, unit: currentService.unit, pickup_address: address, instructions: notes || null,
            status: 'pending', created_at: new Date().toISOString()
        }]);
        
        if (error) { 
            showToast('Failed to place order', true); 
        } else { 
            showToast(`Order confirmed! Pickup from ${address.substring(0, 30)}...`); 
            document.getElementById('bookingModal').style.display = 'none'; 
        }
    }
    
    document.getElementById('closeModalBtn')?.addEventListener('click', () => { document.getElementById('bookingModal').style.display = 'none'; });
    document.getElementById('confirmOrderBtn')?.addEventListener('click', submitOrder);
    document.getElementById('bookingModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('bookingModal')) document.getElementById('bookingModal').style.display = 'none'; });
    
    loadServices();
</script>
</body>
</html>
